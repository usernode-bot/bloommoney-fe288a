<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>BloomMoney</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col items-center justify-center gap-8 p-4">
  <h1 class="text-2xl font-bold">BloomMoney</h1>

  <button id="press-btn" class="w-32 h-32 rounded-full bg-violet-600 hover:bg-violet-500 active:scale-95 transition-all text-white text-xl font-bold shadow-lg shadow-violet-600/30">
    Press!
  </button>

  <div id="count" class="text-lg text-zinc-400">0 total presses</div>

  <div class="w-full max-w-sm">
    <h2 class="text-sm font-medium text-zinc-500 mb-2 text-center">Leaderboard</h2>
    <div id="leaderboard" class="space-y-1"></div>
  </div>

  <div class="w-full max-w-sm">
    <h2 class="text-sm font-medium text-zinc-500 mb-2 text-center">Crypto Prices</h2>
    <div id="prices-list" class="space-y-1">
      <div class="animate-pulse h-10 rounded bg-zinc-800"></div>
      <div class="animate-pulse h-10 rounded bg-zinc-800"></div>
      <div class="animate-pulse h-10 rounded bg-zinc-800"></div>
      <div class="animate-pulse h-10 rounded bg-zinc-800"></div>
      <div class="animate-pulse h-10 rounded bg-zinc-800"></div>
      <div class="animate-pulse h-10 rounded bg-zinc-800"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const headers = token ? { 'x-usernode-token': token } : {};

    async function loadLeaderboard() {
      const res = await fetch('/api/leaderboard', { headers });
      if (!res.ok) return;
      const { leaderboard } = await res.json();
      const el = document.getElementById('leaderboard');
      if (!leaderboard.length) {
        el.innerHTML = '<p class="text-center text-zinc-600 text-sm">No presses yet</p>';
        return;
      }
      el.innerHTML = leaderboard.map((r, i) =>
        '<div class="flex justify-between px-3 py-1 rounded ' + (i === 0 ? 'bg-violet-600/20 text-violet-300' : 'text-zinc-400') + '">' +
        '<span>' + (i + 1) + '. ' + r.username + '</span>' +
        '<span class="font-mono">' + r.presses + '</span></div>'
      ).join('');
      const total = leaderboard.reduce((s, r) => s + parseInt(r.presses), 0);
      document.getElementById('count').textContent = total + ' total presses';
    }

    document.getElementById('press-btn').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/press', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...headers },
        });
        if (res.ok) loadLeaderboard();
        else if (res.status === 401) document.getElementById('count').textContent = 'Sign in to press!';
      } catch {}
    });

    loadLeaderboard();

    function formatPrice(price) {
      if (price == null) return 'N/A';
      if (price >= 1) {
        return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
    }

    function formatChange(pct) {
      if (pct == null) return { text: 'N/A', cls: 'text-zinc-500' };
      const sign = pct >= 0 ? '+' : '';
      return { text: sign + pct.toFixed(2) + '%', cls: pct >= 0 ? 'text-green-400' : 'text-red-400' };
    }

    function buildSparkline(sparklineData, isUp) {
      if (!sparklineData || !sparklineData.length) return '';
      const raw = sparklineData;
      const count = 40;
      const step = (raw.length - 1) / (count - 1);
      const points = Array.from({ length: count }, (_, i) => raw[Math.round(i * step)] || 0);
      const min = Math.min.apply(null, points);
      const max = Math.max.apply(null, points);
      const range = max - min || 1;
      const pts = points.map(function(p, i) {
        var x = (i / (count - 1)) * 80;
        var y = 32 - ((p - min) / range) * 32;
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
      const color = isUp ? '#4ade80' : '#f87171';
      return '<svg width="80" height="32" viewBox="0 0 80 32" fill="none" xmlns="http://www.w3.org/2000/svg">' +
        '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>' +
        '</svg>';
    }

    function renderPrices(coins, stale) {
      const el = document.getElementById('prices-list');
      if (!coins || !coins.length) {
        el.innerHTML = '<p class="text-center text-zinc-600 text-sm">Price data unavailable</p>';
        return;
      }
      const rows = coins.map(function(coin) {
        const change = formatChange(coin.price_change_percentage_24h);
        const isUp = (coin.price_change_percentage_24h || 0) >= 0;
        const sparkline = buildSparkline(
          coin.sparkline_in_7d && coin.sparkline_in_7d.price,
          isUp
        );
        return '<div class="price-row flex items-center gap-3 px-2 py-1.5 rounded hover:bg-zinc-900 transition-colors">' +
          '<img src="' + coin.image + '" width="24" height="24" alt="" onerror="this.style.visibility=\'hidden\'" class="rounded-full flex-shrink-0"/>' +
          '<div class="flex-1 min-w-0">' +
            '<span class="text-sm text-zinc-100">' + coin.name + '</span> ' +
            '<span class="text-xs text-zinc-500 uppercase">' + coin.symbol + '</span>' +
          '</div>' +
          '<div class="flex items-center gap-2 flex-shrink-0">' +
            '<span class="text-sm font-mono text-zinc-100">' + formatPrice(coin.current_price) + '</span>' +
            '<span class="text-xs font-mono ' + change.cls + ' w-14 text-right">' + change.text + '</span>' +
            '<div class="flex-shrink-0">' + sparkline + '</div>' +
          '</div>' +
          '</div>';
      }).join('');
      el.innerHTML = rows + (stale ? '<p class="text-center text-zinc-600 text-xs mt-1">prices may be stale</p>' : '');
    }

    function schedulePriceRefresh() {
      setTimeout(loadPrices, 60000);
    }

    async function loadPrices() {
      try {
        const res = await fetch('/api/prices', { headers });
        if (!res.ok) {
          schedulePriceRefresh();
          return;
        }
        const data = await res.json();
        if (data.error) {
          const el = document.getElementById('prices-list');
          if (!el.querySelector('.price-row')) {
            el.innerHTML = '<p class="text-center text-zinc-600 text-sm">Price data unavailable</p>';
          }
        } else {
          renderPrices(data.coins, data.stale);
        }
      } catch (e) {
        const el = document.getElementById('prices-list');
        if (!el.querySelector('.price-row')) {
          el.innerHTML = '<p class="text-center text-zinc-600 text-sm">Price data unavailable</p>';
        }
      }
      schedulePriceRefresh();
    }

    loadPrices();
  </script>
</body>
</html>
