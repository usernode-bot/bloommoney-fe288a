      <div id="pm-grid" class="pm-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 px-4 py-4"></div>

      <div class="pm-how-it-works px-4 py-8 border-t border-[rgba(255,255,255,0.06)]">
        <h3 class="text-lg font-bold mb-1 text-center">How it works</h3>
        <p class="text-xs text-[#8b95ab] text-center mb-6">Three steps to trade your opinion</p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-4xl mx-auto">
          <div class="card text-center space-y-2">
            <div class="text-3xl">&#x1f50d;</div>
            <h4 class="font-semibold text-sm">1. Browse Markets</h4>
            <p class="text-xs text-[#8b95ab]">Find a question to trade on. New markets open every day across Crypto, Politics, Science and more.</p>
          </div>
          <div class="card text-center space-y-2">
            <div class="text-3xl">&#x1f4b8;</div>
            <h4 class="font-semibold text-sm">2. Buy YES or NO</h4>
            <p class="text-xs text-[#8b95ab]">Trade with USDC at the current implied odds. Your position is recorded instantly.</p>
          </div>
          <div class="card text-center space-y-2">
            <div class="text-3xl">&#x1f3c6;</div>
            <h4 class="font-semibold text-sm">3. Claim Winnings</h4>
            <p class="text-xs text-[#8b95ab]">When the market resolves, winners split the entire pool proportional to their position.</p>
          </div>
        </div>
      </div>
    `;

    renderGrid();

    window.pmSetCategory = (c) => { pmActiveCategory = c; renderGrid(); };
    window.toggleCreate = () => { showCreate = !showCreate; load(); };
    window.openMarket = (id) => { S.marketId = id; clearInterval(_activeInterval); _activeInterval = null; renderMarkets(sec); };
    window.createMarket = async () => {
      const title = document.getElementById('mk-title')?.value;
      const desc = document.getElementById('mk-desc')?.value;
      const criteria = document.getElementById('mk-criteria')?.value;
      const closes = document.getElementById('mk-closes')?.value;
      const category = document.getElementById('mk-category')?.value;
      const msg = document.getElementById('mk-msg');
      try {
        await api('POST', '/api/markets', { title, description: desc, resolution_criteria: criteria, closes_at: closes || null, category });
        if (msg) { msg.className='text-emerald-400 text-sm'; msg.textContent='✓ Market created'; }
        showCreate = false;
        setTimeout(() => load(), 800);
      } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
    };
  }

  await load();
  // No live polling for the static demo prerender (would 401 without a token).
  if (!demoMarkets) _activeInterval = setInterval(load, 10000);
}

async function renderMarketDetail(sec) {
  async function load() {
    const [{ market, positions }, { history }] = await Promise.all([
      api('GET', `/api/markets/${S.marketId}`),
      api('GET', `/api/markets/${S.marketId}/history`).catch(() => ({ history: [] })),
    ]);
    const myAdminOrCreator = S.user && (S.user.is_admin || market.created_by_user_id === S.user.user_id);
    const yesPct = (Number(market.yes_pool)/(Number(market.yes_pool)+Number(market.no_pool))*100).toFixed(1);
    const canClaim = positions.some(p => !p.claimed && p.outcome === market.resolved_outcome);
    const chartPts = history.map(h => ({ x: new Date(h.created_at).getTime(), y: parseFloat(h.yes_pct) }));
    const chartHtml = svgLineChart(chartPts, { color: '#10b981', yMin: 0, yMax: 100, refLine: parseFloat(yesPct) });

    sec.innerHTML = `
      <button class="text-sm text-[#8b95ab] hover:text-white mb-4 flex items-center gap-1" onclick="S.marketId=null;clearInterval(_activeInterval);_activeInterval=null;navigate('markets')">← Markets</button>
      <div class="card space-y-3 mb-4">
        <div class="flex justify-between items-start gap-2">
          <h2 class="font-bold text-lg leading-snug">${esc(market.title)}</h2>
          <span class="text-xs ${market.status==='open'?'text-emerald-400':market.status==='resolved'?'text-blue-400':'text-[#8b95ab]'}">${market.status}</span>
        </div>
        ${market.description ? `<p class="text-sm text-[#8b95ab]">${esc(market.description)}</p>` : ''}
        ${market.resolution_criteria ? `<p class="text-xs text-[#8b95ab] italic">${esc(market.resolution_criteria)}</p>` : ''}
        <div class="space-y-1">
          <div class="flex justify-between text-xs text-[#8b95ab]"><span>YES ${yesPct}%</span><span>NO ${(100-parseFloat(yesPct)).toFixed(1)}%</span></div>
          <div class="bg-[#1c2236] rounded-full h-3 overflow-hidden flex">
            <div class="bg-emerald-600 h-full transition-all" style="width:${yesPct}%"></div>
            <div class="bg-red-700 h-full flex-1"></div>
          </div>
        </div>
        <div class="text-xs text-[#8b95ab]">Total liquidity: ${fmtUSD(Number(market.yes_pool)+Number(market.no_pool))} USDC</div>
        <div class="mt-2">${chartHtml}</div>
      </div>

      ${market.status === 'open' ? `
      <div class="card space-y-3 mb-4">
        <h3 class="font-semibold">Trade</h3>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-xs text-[#8b95ab]">USDC Amount</label>
            <input id="trade-amt" type="number" class="inp mt-1" placeholder="0.00" min="0">
          </div>
          <div class="flex flex-col justify-end gap-2">
            <button class="btn btn-g w-full" onclick="tradeMarket('YES')">Buy YES</button>
            <button class="btn btn-r w-full" onclick="tradeMarket('NO')">Buy NO</button>
          </div>
        </div>
        <div class="text-xs text-[#8b95ab]">Balance: ${getBal('USDC')} USDC</div>
        <p id="trade-msg" class="text-sm"></p>
      </div>` : ''}

      ${market.status === 'resolved' && canClaim ? `
      <div class="card mb-4">
        <p class="text-sm text-emerald-400 mb-2">You have winning positions to claim!</p>
        <button class="btn btn-g" onclick="claimWinnings(${market.id})">Claim Winnings</button>
        <p id="claim-msg" class="text-sm mt-2"></p>
      </div>` : ''}

      ${myAdminOrCreator && market.status === 'open' ? `
      <div class="card mb-4 space-y-2">
        <h3 class="text-sm font-semibold">Resolve Market</h3>
        <div class="flex gap-2">
          <button class="btn btn-g" onclick="resolveMarket(${market.id},'YES')">Resolve YES</button>
          <button class="btn btn-r" onclick="resolveMarket(${market.id},'NO')">Resolve NO</button>
        </div>
      </div>` : ''}

      ${positions.length ? `
      <div class="card">
        <h3 class="font-semibold mb-2">My Positions</h3>
        <div class="space-y-2">${positions.map(p => `
          <div class="flex justify-between items-center text-sm">
            <span class="${p.outcome==='YES'?'text-emerald-400':'text-red-400'} font-medium">${p.outcome}</span>
            <span class="text-[#8b95ab]">${Number(p.shares).toFixed(4)} shares</span>
            <span class="text-[#8b95ab]">${fmtUSD(p.cost_basis)} USDC paid</span>
            ${p.claimed ? `<span class="text-[#4e5872] text-xs">Claimed</span>` : ''}
          </div>`).join('')}</div>
      </div>` : ''}`;

    window.tradeMarket = async (outcome) => {
      if (!requireWalletThen(null, 'trade on this market')) return;
      const amt = document.getElementById('trade-amt')?.value;
      const msg = document.getElementById('trade-msg');
      try {
        await api('POST', `/api/markets/${S.marketId}/trade`, { outcome, usdc_amount: amt });
        if (msg) { msg.className='text-emerald-400 text-sm'; msg.textContent=`✓ Bought ${outcome} shares`; }
        await refreshBalances();
        await load();
      } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
    };
    window.claimWinnings = async (id) => {
      const msg = document.getElementById('claim-msg');
      try {
        const d = await api('POST', `/api/markets/${id}/claim`);
        if (msg) { msg.className='text-emerald-400 text-sm'; msg.textContent=`✓ Claimed ${d.payout.toFixed(2)} USDC`; }
        await refreshBalances();
        await load();
      } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
    };
    window.resolveMarket = async (id, outcome) => {
      if (!confirm(`Resolve as ${outcome}?`)) return;
      try {
        await api('POST', `/api/markets/${id}/resolve`, { outcome });
        await load();
      } catch (e) { alert(e.message); }
    };
  }

  await load();
  _activeInterval = setInterval(load, 10000);
}

// ── Trade Journal ─────────────────────────────────────────────────────────────
async function renderJournal(sec) {
  let filterType = 'all', filterDir = 'all', filterStatus = 'all';
  const JOURNAL_LIVE_TICKERS = new Set(['BTC','ETH','BNB','SOL','XRP','USDT','ADA','DOGE','TON','LINK','DOT','AVAX']);

  function entryPnl(e) {
    if (e.exit_price == null) return null;
    return (parseFloat(e.exit_price) - parseFloat(e.entry_price)) * parseFloat(e.quantity) * (e.direction === 'long' ? 1 : -1);
  }

  async function load() {
    const { entries } = await api('GET', '/api/journal');

    const closed = entries.filter(e => e.exit_price != null);
    const open = entries.filter(e => e.exit_price == null);
    const totalPnl = closed.reduce((s, e) => s + (entryPnl(e) || 0), 0);
    const wins = closed.filter(e => (entryPnl(e) || 0) > 0);
    const winRate = closed.length > 0 ? Math.round(wins.length / closed.length * 100) : null;

    let filtered = entries;
    if (filterType !== 'all') filtered = filtered.filter(e => e.asset_type === filterType);
    if (filterDir !== 'all') filtered = filtered.filter(e => e.direction === filterDir);
    if (filterStatus === 'open') filtered = filtered.filter(e => e.exit_price == null);
    if (filterStatus === 'closed') filtered = filtered.filter(e => e.exit_price != null);

    sec.innerHTML = `
      <h2 class="text-xl font-bold mb-4">&#x1f4d3; Trade Journal</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <div class="card text-center py-3">
          <div class="text-[#8b95ab] text-xs mb-1">Total Trades</div>
          <div class="text-2xl font-bold">${entries.length}</div>
        </div>
        <div class="card text-center py-3">
          <div class="text-[#8b95ab] text-xs mb-1">Open</div>
          <div class="text-2xl font-bold">${open.length}</div>
        </div>
        <div class="card text-center py-3">
          <div class="text-[#8b95ab] text-xs mb-1">Win Rate</div>
          <div class="text-2xl font-bold">${winRate !== null ? winRate + '%' : '&#x2014;'}</div>
        </div>
        <div class="card text-center py-3">
          <div class="text-[#8b95ab] text-xs mb-1">Realised P&amp;L</div>
          <div class="text-2xl font-bold ${totalPnl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${totalPnl >= 0 ? '+' : ''}$${Math.abs(totalPnl).toFixed(2)}</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-4 items-center">
        <select id="jf-type" class="inp text-sm" style="width:auto;padding:4px 8px;height:auto" onchange="jSetFilter('type',this.value)">
          <option value="all">All types</option>
          <option value="crypto">Crypto</option>
          <option value="stock">Stock</option>
          <option value="etf">ETF</option>
        </select>
        <select id="jf-dir" class="inp text-sm" style="width:auto;padding:4px 8px;height:auto" onchange="jSetFilter('dir',this.value)">
          <option value="all">All directions</option>
          <option value="long">Long</option>
          <option value="short">Short</option>
        </select>
        <select id="jf-status" class="inp text-sm" style="width:auto;padding:4px 8px;height:auto" onchange="jSetFilter('status',this.value)">
          <option value="all">All statuses</option>
          <option value="open">Open</option>
          <option value="closed">Closed</option>
        </select>
        <button class="btn btn-z text-sm px-3 py-1" onclick="jResetFilters()">Reset</button>
        <button class="btn btn-v text-sm px-3 py-1 ml-auto" onclick="openLogTradeModal()">+ Log Trade</button>
      </div>
      ${filtered.length === 0
        ? `<div class="card text-center py-8 text-[#8b95ab] text-sm">No trades yet. Click <strong>+ Log Trade</strong> to get started.</div>`
        : `<div class="space-y-2">${filtered.map(e => {
            const pnl = entryPnl(e);
            const isOpen = e.exit_price == null;
            const qty = parseFloat(e.quantity);
            return `<div class="card flex flex-wrap gap-3 items-center text-sm">
              <div class="shrink-0 min-w-[3.5rem]">
                <div class="font-bold text-[#e8eaf0]">${esc(e.ticker)}</div>
                <div class="text-xs text-[#8b95ab]">${esc(e.asset_type)}</div>
              </div>
              <span class="text-xs font-semibold px-1.5 py-0.5 rounded shrink-0 ${e.direction === 'long' ? 'bg-emerald-900/40 text-emerald-400' : 'bg-red-900/40 text-red-400'}">${e.direction.toUpperCase()}</span>
              <div class="shrink-0">
                <div class="font-mono text-xs">&times;${qty < 1 ? qty.toFixed(4) : qty.toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">qty</div>
              </div>
              <div class="shrink-0">
                <div class="font-mono text-xs">$${parseFloat(e.entry_price).toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">entry</div>
              </div>
              ${!isOpen ? `<div class="shrink-0">
                <div class="font-mono text-xs">$${parseFloat(e.exit_price).toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">exit</div>
              </div>` : ''}
              ${pnl !== null ? `<div class="shrink-0">
                <div class="font-mono text-xs font-semibold ${pnl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl).toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">P&amp;L</div>
              </div>` : ''}
              <div class="ml-auto flex items-center gap-2 shrink-0">
                <span class="text-xs ${isOpen ? 'text-amber-400' : 'text-[#4e5872]'}">${isOpen ? 'open' : 'closed'}</span>
                ${isOpen ? `<button class="btn btn-z text-xs px-2 py-0.5" onclick="openEditTradeModal(${e.id},${parseFloat(e.entry_price)})">Edit</button>` : ''}
                <button class="btn text-xs px-2 py-0.5 border-red-900/40 hover:border-red-500/40 text-red-400" onclick="deleteTradeEntry(${e.id})">&#x2715;</button>
              </div>
            </div>`;
          }).join('')}</div>`
      }`;

    const selType = document.getElementById('jf-type');
    const selDir = document.getElementById('jf-dir');
    const selStatus = document.getElementById('jf-status');
    if (selType) selType.value = filterType;
    if (selDir) selDir.value = filterDir;
    if (selStatus) selStatus.value = filterStatus;

    window.jSetFilter = (key, val) => {
      if (key === 'type') filterType = val;
      else if (key === 'dir') filterDir = val;
      else if (key === 'status') filterStatus = val;
      load();
    };
    window.jResetFilters = () => { filterType = 'all'; filterDir = 'all'; filterStatus = 'all'; load(); };
    window.deleteTradeEntry = async (id) => {
      if (!confirm('Delete this trade entry?')) return;
      try { await api('DELETE', `/api/journal/${id}`); load(); } catch (e) { alert(e.message); }
    };
  }

  window.openLogTradeModal = () => {
    document.getElementById('journal-trade-modal')?.remove();
    const modal = document.createElement('div');
    modal.id = 'journal-trade-modal';
    modal.className = 'fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-[#131620] border border-[rgba(255,255,255,0.08)] rounded-xl max-w-md w-full p-6 space-y-3 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center">
          <h3 class="font-bold text-lg">Log Trade</h3>
          <button onclick="document.getElementById('journal-trade-modal')?.remove()" class="text-[#8b95ab] hover:text-[#e8eaf0] text-xl leading-none">&#x2715;</button>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Asset Type</label>
          <select id="jt-type" class="inp w-full" onchange="jClearLivePrice()">
            <option value="crypto">Crypto</option>
            <option value="stock">Stock</option>
            <option value="etf">ETF</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Ticker</label>
          <input id="jt-ticker" type="text" class="inp w-full" placeholder="e.g. BTC, ETH, AAPL" autocomplete="off">
          <span id="journal-live-price" style="font-size:0.85em;color:#aaa;" class="mt-0.5 block min-h-[1.2em]"></span>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Direction</label>
          <select id="jt-direction" class="inp w-full">
            <option value="long">Long &#x25b2;</option>
            <option value="short">Short &#x25bc;</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Quantity</label>
          <input id="jt-qty" type="number" class="inp w-full" placeholder="0.00" min="0" step="any">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Entry Price ($)</label>
          <input id="jt-entry" type="number" class="inp w-full" placeholder="0.00" min="0" step="any">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Date</label>
          <input id="jt-date" type="date" class="inp w-full" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Notes (optional)</label>
          <textarea id="jt-notes" class="inp w-full" rows="2" placeholder="Strategy, reasoning…" style="resize:vertical"></textarea>
        </div>
        <div class="flex gap-2 pt-1">
          <button class="btn btn-v flex-1" onclick="submitLogTrade()">Log trade</button>
          <button class="btn btn-z flex-1" onclick="document.getElementById('journal-trade-modal')?.remove()">Cancel</button>
        </div>
        <p id="jt-msg" class="text-sm"></p>
      </div>`;
    document.body.appendChild(modal);

    let _jpDebounce = null;
    const tickerInput = document.getElementById('jt-ticker');
    const typeSelect = document.getElementById('jt-type');
    const liveLabel = document.getElementById('journal-live-price');
    const entryInput = document.getElementById('jt-entry');

    window.jClearLivePrice = () => { if (liveLabel) liveLabel.textContent = ''; };

    function lookupLivePrice() {
      clearTimeout(_jpDebounce);
      _jpDebounce = setTimeout(async () => {
        const ticker = tickerInput.value.trim().toUpperCase();
        if (!ticker || typeSelect.value !== 'crypto' || !JOURNAL_LIVE_TICKERS.has(ticker)) {
          if (liveLabel) liveLabel.textContent = '';
          return;
        }
        try {
          const { prices } = await api('GET', `/api/ticker-prices?symbols=${ticker}`);
          const p = prices[ticker];
          if (p != null) {
            if (liveLabel) liveLabel.textContent = `Live: $${p >= 1 ? p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : p.toFixed(4)}`;
            if (entryInput && !entryInput.value) entryInput.value = p.toString();
          } else {
            if (liveLabel) liveLabel.textContent = '';
          }
        } catch { if (liveLabel) liveLabel.textContent = ''; }
      }, 500);
    }

    if (tickerInput) tickerInput.addEventListener('input', lookupLivePrice);

    window.submitLogTrade = async () => {
      const msg = document.getElementById('jt-msg');
      try {
        await api('POST', '/api/journal', {
          asset_type: typeSelect.value,
          ticker: tickerInput.value.trim().toUpperCase(),
          direction: document.getElementById('jt-direction').value,
          quantity: document.getElementById('jt-qty').value,
          entry_price: document.getElementById('jt-entry').value,
          trade_date: document.getElementById('jt-date').value,
          notes: document.getElementById('jt-notes').value,
        });
        document.getElementById('journal-trade-modal')?.remove();
        load();
      } catch (e) {
        if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; }
      }
    };
  };

  window.openEditTradeModal = (id, entryPrice) => {
    document.getElementById('journal-trade-modal')?.remove();
    const modal = document.createElement('div');
    modal.id = 'journal-trade-modal';
    modal.className = 'fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-[#131620] border border-[rgba(255,255,255,0.08)] rounded-xl max-w-md w-full p-6 space-y-3">
        <div class="flex justify-between items-center">
          <h3 class="font-bold text-lg">Close Trade</h3>
          <button onclick="document.getElementById('journal-trade-modal')?.remove()" class="text-[#8b95ab] hover:text-[#e8eaf0] text-xl leading-none">&#x2715;</button>
        </div>
        <p class="text-sm text-[#8b95ab]">Entry price: <span class="font-mono text-[#e8eaf0]">$${parseFloat(entryPrice).toFixed(2)}</span></p>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Exit Price ($)</label>
          <input id="je-exit" type="number" class="inp w-full" placeholder="0.00" min="0" step="any">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Notes (optional)</label>
          <textarea id="je-notes" class="inp w-full" rows="2" style="resize:vertical"></textarea>
        </div>
        <div class="flex gap-2 pt-1">
          <button class="btn btn-v flex-1" onclick="submitEditTrade(${id})">Save</button>
          <button class="btn btn-z flex-1" onclick="document.getElementById('journal-trade-modal')?.remove()">Cancel</button>
        </div>
        <p id="je-msg" class="text-sm"></p>
      </div>`;
    document.body.appendChild(modal);

    window.submitEditTrade = async (tid) => {
      const msg = document.getElementById('je-msg');
      try {
        const exitVal = document.getElementById('je-exit')?.value;
        const notesVal = document.getElementById('je-notes')?.value;
        const body = {};
        if (exitVal) body.exit_price = exitVal;
        if (notesVal) body.notes = notesVal;
        await api('PATCH', `/api/journal/${tid}`, body);
        document.getElementById('journal-trade-modal')?.remove();
        load();
      } catch (e) {
        if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; }
      }
    };
  };

  await load();
}

// ── Messages ──────────────────────────────────────────────────────────────────
// Inbox + thread live in one section; S.msgOpenConv decides which renders.
// Thread polling reuses the shared _activeInterval (navigate clears it).
async function renderMessages(sec) {
  const isMobile = window.innerWidth < 768;
  const openId = S.msgOpenConv; S.msgOpenConv = null;

  if (isMobile) {
    if (openId) { await openThread(sec, openId); }
    else { await renderInbox(sec); }
    return;
  }

  // Desktop: persistent two-panel split
  if (openId) S.msgActiveConv = openId;
  sec.innerHTML = `
    <div class="flex h-full">

// Shared inbox row renderer — used by both full-screen mobile and left-panel desktop
function buildInboxRows(convos) {
  const row = (c) => {
    const isGroup = c.type === 'group';
    const title = isGroup ? (c.title || 'Group') : (c.other_display_name || c.other_username || 'Unknown');
    const subtitle = isGroup ? null : (c.other_username ? '@' + c.other_username : null);
    const avatarName = isGroup ? (c.title || 'Group') : (c.other_username || '?');
    const preview = c.last_message
      ? (isGroup ? esc(c.last_message.sender_username) + ': ' : '') + esc(c.last_message.content)
      : '<span class="italic text-[#4e5872]">No messages yet</span>';
    const when = c.last_message ? tsAgo(c.last_message.created_at) : '';
    const unread = c.unread > 0;
    return `<button class="inbox-row w-full text-left ${unread ? 'bg-[rgba(124,92,252,0.04)]' : ''}" onclick="openConversation(${c.id})">
      ${avatarImg(avatarName, 'w-11 h-11 shrink-0')}
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-1.5">
          <span class="font-semibold text-sm truncate ${unread ? 'text-[#e8eaf0]' : 'text-[#c5c8d0]'}">${esc(title)}</span>
          ${isGroup ? `<span class="text-xs text-[#4e5872] shrink-0">👥 ${c.member_count}</span>` : ''}
          <span class="ml-auto text-xs text-[#4e5872] shrink-0">${when}</span>
        </div>
        ${subtitle ? `<div class="text-xs text-[#4e5872] truncate">${esc(subtitle)}</div>` : ''}
        <div class="flex items-center gap-2 mt-0.5">
          <span class="text-xs truncate ${unread ? 'text-[#8b95ab]' : 'text-[#4e5872]'}">${preview}</span>
          ${unread ? `<span class="ml-auto shrink-0 min-w-[1.25rem] px-1.5 py-0.5 rounded-full bg-[var(--accent-purple)] text-white text-[0.6rem] font-bold text-center leading-none">${c.unread}</span>` : ''}
        </div>
      </div>
    </button>`;
  };
  return convos.map(row).join('');
}

// Shared thread renderer — used by mobile full-screen and desktop right panel
async function openThreadInPanel(panel, convId) {
  clearInterval(_activeInterval); _activeInterval = null;
  panel.innerHTML = `<div class="flex justify-center py-8">${spin()}</div>`;
  let data;
  try { data = await api('GET', `/api/conversations/${convId}/messages`); }
  catch (e) { panel.innerHTML = err(e.message); return; }
  refreshUnreadBadge();
  const conv = data.conversation;
  const isGroup = conv.type === 'group';
  const displayName = isGroup
    ? (conv.title || 'Group')
    : (conv.other_display_name || conv.other_username || 'Unknown');
  const subtitle = isGroup
    ? `${conv.member_count} members`
    : (conv.other_username ? '@' + conv.other_username : null);
  const myId = S.user && S.user.user_id;

  const paint = (msgs) => {
    const box = panel.querySelector('#msg-scroll');
    if (!box) return;
    box.innerHTML = (msgs || []).map(m => {
      const mine = m.sender_user_id === myId;
      if (mine) {
        return `<div class="flex justify-end px-4 py-0.5"><div class="max-w-[75%]">
          <div class="bg-[#4e9af1] text-white rounded-2xl rounded-br-sm px-3 py-2 text-sm break-words whitespace-pre-wrap">${esc(m.content)}</div>
          <div class="text-[0.65rem] text-[#4e5872] text-right mt-0.5">${tsAgo(m.created_at)}</div>
        </div></div>`;
      }
      return `<div class="flex gap-2 px-4 py-0.5">
        ${avatarImg(m.sender_username, 'w-7 h-7 shrink-0 mt-0.5')}
        <div class="max-w-[75%]">
          ${isGroup ? `<div class="text-xs text-[#4e5872] mb-0.5">@${esc(m.sender_username)}</div>` : ''}
          <div class="bg-[#1c2236] rounded-2xl rounded-bl-sm px-3 py-2 text-sm break-words whitespace-pre-wrap text-[#e8eaf0]">${esc(m.content)}</div>
          <div class="text-[0.65rem] text-[#4e5872] mt-0.5">${tsAgo(m.created_at)}</div>
        </div>
      </div>`;
    }).join('') || '<p class="text-[#4e5872] text-sm text-center py-8">No messages yet — say hi!</p>';
    box.scrollTop = box.scrollHeight;
  };

  const avatarName = isGroup ? (conv.title || 'Group') : (conv.other_username || '?');
  panel.innerHTML = `
    <div class="flex items-center gap-3 px-4 py-3 border-b border-[var(--border-subtle)] shrink-0">
      <button class="md:hidden text-[#4e5872] hover:text-[#e8eaf0] mr-1" onclick="backToInbox()" title="Back">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
      </button>
      ${avatarImg(avatarName, 'w-9 h-9')}
      <div class="min-w-0 flex-1">
        <div class="font-semibold text-[#e8eaf0] truncate">${esc(displayName)}</div>
        ${subtitle ? `<div class="text-xs text-[#4e5872] truncate">${esc(subtitle)}</div>` : ''}
      </div>
      ${isGroup ? `<button class="text-[#4e5872] hover:text-[#e8eaf0] p-1" onclick="openAddPeopleModal(${conv.id})" title="Add people">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM3 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 019.374 21c-2.331 0-4.512-.645-6.374-1.766z"/></svg>
      </button>` : ''}
    </div>
    <div id="msg-scroll" class="flex-1 overflow-y-auto py-2 space-y-0.5"></div>
    <div class="px-3 py-3 border-t border-[var(--border-subtle)] shrink-0">
      <form id="msg-form" class="flex items-center gap-2 bg-[var(--bg-card)] rounded-full border border-[var(--border-subtle)] px-4 py-1.5 focus-within:border-[var(--border-focus)]">
        <input id="msg-input" class="flex-1 bg-transparent outline-none text-sm text-[#e8eaf0] placeholder-[#4e5872]" placeholder="Start a new message" autocomplete="off" maxlength="4000">
        <button type="submit" class="shrink-0 text-[#4e9af1] hover:text-[#7cb8f8] transition-colors" title="Send">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
        </button>
      </form>
    </div>`;
  paint(data.messages);

  const form = panel.querySelector('#msg-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = panel.querySelector('#msg-input');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    try {
      await api('POST', `/api/conversations/${convId}/messages`, { content });
      const d = await api('GET', `/api/conversations/${convId}/messages`);
      paint(d.messages);
    } catch (e2) { alert(e2.message); input.value = content; }
  });
  panel.querySelector('#msg-input')?.focus();

  _activeInterval = setInterval(async () => {
    try { const d = await api('GET', `/api/conversations/${convId}/messages`); paint(d.messages); }
    catch (_) {}
  }, 4000);
}

// ── Messaging: recipient picker + modals ────────────────────────────────────────
// Removes any existing messaging modal first so re-opens don't stack.
function _closeMsgModal() { document.getElementById('msg-modal')?.remove(); }

// Builds a search-and-select control inside the modal. `multi` toggles between
// single-pick (direct) and multi-pick (group / add people). Returns nothing —
// selection state lives in the modal's dataset via _msgSelected.
let _msgSelected = [];
function _renderSelected() {
  const wrap = document.getElementById('msg-selected');
  if (!wrap) return;
  wrap.innerHTML = _msgSelected.map(u =>
    `<span class="tag-basic inline-flex items-center gap-1">${userTag(u, { size: 'w-4 h-4' })}
       <button class="text-zinc-400 hover:text-white" onclick="msgRemovePick('${esc(u)}')">✕</button></span>`
  ).join('');
}
window.msgRemovePick = (u) => { _msgSelected = _msgSelected.filter(x => x !== u); _renderSelected(); };

async function _msgSearch(q, multi) {
  const results = document.getElementById('msg-results');
  if (!results) return;
  if (!q.trim()) { results.innerHTML = ''; return; }
  let users = [];
  try { users = (await api('GET', '/api/users/search?q=' + encodeURIComponent(q.trim()))).users || []; }
  catch (_) {}
  if (!users.length) { results.innerHTML = '<p class="text-zinc-600 text-sm py-2">No users found</p>'; return; }
  results.innerHTML = users.map(u => `
    <button class="w-full text-left flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-zinc-800" onclick="msgPick('${esc(u.username)}', ${multi})">
      ${avatarImg(u.username, 'w-7 h-7')}
      <span class="text-sm">@${esc(u.username)}${u.display_name ? ` <span class="text-zinc-500">· ${esc(u.display_name)}</span>` : ''}</span>
    </button>`).join('');
}

window.msgPick = async (username, multi) => {
  if (multi) {
    if (!_msgSelected.includes(username)) _msgSelected.push(username);
    _renderSelected();
    const inp = document.getElementById('msg-search'); if (inp) { inp.value = ''; inp.focus(); }
    document.getElementById('msg-results').innerHTML = '';
  } else {
    // Direct: create-or-find immediately, then open the thread.
    try {
      const d = await api('POST', '/api/conversations', { type: 'direct', username });
      _closeMsgModal();
      navigate('messages', { msgOpenConv: d.id });
    } catch (e) { alert(e.message); }
  }
};

function _openMsgModal(innerHtml) {
  _closeMsgModal();
  const modal = document.createElement('div');
  modal.id = 'msg-modal';
  modal.className = 'fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4';
  modal.onclick = (e) => { if (e.target.id === 'msg-modal') _closeMsgModal(); };
  modal.innerHTML = `<div class="card w-full max-w-md max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">${innerHtml}</div>`;
  document.body.appendChild(modal);
}

  if (zkVerified)

}

  // ── Lazy-load TradingView Lightweight Charts v4 ──────────────────────────────
  async function loadLWC() {
    if (window.__LWC) return window.__LWC;
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js';
      s.onload = () => { window.__LWC = window.LightweightCharts; resolve(window.__LWC); };
      s.onerror = () => reject(new Error('LWC load failed'));
      document.head.appendChild(s);
    });
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function pricePrecision(mp) { return mp < 1 ? 6 : mp < 100 ? 4 : 2; }

  function buildOrderBook(mp) {
    const prec = pricePrecision(mp);
    const asks = [], bids = [];
    for (let i = 0; i < 8; i++) {
      asks.push({ price: (mp * (1 + (i + 1) * 0.00025)).toFixed(prec), size: (Math.floor(mp * (i + 3) * 17) % 80) + 15 });
      bids.push({ price: (mp * (1 - (i + 1) * 0.00025)).toFixed(prec), size: (Math.floor(mp * (i + 5) * 13) % 80) + 15 });
    }
    return { asks: asks.reverse(), bids };
  }

  function renderOrderBookHtml(mp) {
    const { asks, bids } = buildOrderBook(mp);
    const maxSz = Math.max(...asks.map(a => a.size), ...bids.map(b => b.size));
    const spread = (parseFloat(asks[asks.length - 1].price) - parseFloat(bids[0].price)).toFixed(pricePrecision(mp));
    const askRows = asks.map(a =>
      `<div class="fut-ob-row fut-ob-ask py-0.5 px-2 flex justify-between text-xs font-mono" style="--bar-w:${(a.size/maxSz*100).toFixed(1)}%">
        <span class="fut-ask">${a.price}</span><span class="text-[#8b95ab]">${a.size}</span>
      </div>`).join('');
    const bidRows = bids.map(b =>
      `<div class="fut-ob-row fut-ob-bid py-0.5 px-2 flex justify-between text-xs font-mono" style="--bar-w:${(b.size/maxSz*100).toFixed(1)}%">
        <span class="fut-bid">${b.price}</span><span class="text-[#8b95ab]">${b.size}</span>
      </div>`).join('');
    return `
      <div class="flex justify-between text-[10px] text-[#4e5872] px-2 mb-0.5"><span>Price</span><span>Size</span></div>
      ${askRows}
      <div class="py-1 px-2 text-center text-xs text-[#8b95ab] border-y" style="border-color:var(--border-t)">Spread: ${spread}</div>
      ${bidRows}
      <div class="text-[9px] text-[#4e5872] text-center mt-1 pb-1">Simulated depth</div>`;
  }

  function calcPreview(mkt) {
    if (!qty || !mkt || isNaN(parseFloat(qty))) return null;
    const mp = parseFloat(mkt.mark_price);
    const prec = pricePrecision(mp);
    const margin = parseFloat(qty) * mp / leverage;
    const liqP = side === 'long' ? mp * (1 - 0.9 / leverage) : mp * (1 + 0.9 / leverage);
    return { margin: margin.toFixed(2), liq: liqP.toFixed(prec) };
  }

  function buildPositionsHtml(openPos) {
    if (!openPos.length) return `<tr><td colspan="9" class="py-4 text-center text-[#4e5872] text-xs">No open positions</td></tr>`;

      const pnl = parseFloat(p.unrealized_pnl || 0) / 1e6;

        <td class="pr-3 text-xs ${p.side === 'long' ? 'fut-bid' : 'fut-ask'}">${p.side}</td>
        <td class="pr-3 text-xs">${p.leverage}×</td>
        <td class="pr-3 font-mono text-xs">${parseFloat(p.quantity).toFixed(4)}</td>
        <td class="pr-3 font-mono text-xs">$${parseFloat(p.entry_price).toFixed(2)}</td>
        <td class="pr-3 font-mono text-xs">$${parseFloat(p.mark_price || 0).toFixed(2)}</td>
        <td class="pr-3 text-xs ${fund >= 0 ? 'fut-bid' : 'fut-ask'}">${fund >= 0 ? '+' : ''}${fund.toFixed(2)}</td>

      </tr>`;
    }).join('');
  }

  function buildHistoryHtml(closedPos) {
    if (!closedPos.length) return `<tr><td colspan="6" class="py-4 text-center text-[#4e5872] text-xs">No trade history</td></tr>`;
    return closedPos.map(p => {

      </tr>`;
    }).join('');

  // ── initialRender: build full terminal skeleton ───────────────────────────────

</div><!-- /.futures-terminal -->`;

    // ── Initialize chart ──────────────────────────────────────────────────────
    const chartEl = document.getElementById('fut-chart-container');
    try {
      const LWC = await loadLWC();
      if (chartEl && LWC) {
        chartEl.innerHTML = '';
        chartEl.style.display = 'block';
        _chart = LWC.createChart(chartEl, {
          autoSize: true,
          layout: { background: { color: '#0b0e11' }, textColor: '#8b95ab', fontFamily: 'ui-monospace,monospace' },
          grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
          crosshair: { mode: 1 },

          timeScale: { borderColor: 'rgba(255,255,255,0.06)', timeVisible: true, secondsVisible: false },
          handleScroll: true, handleScale: true,
        });
        _areaSeries = _chart.addAreaSeries({
          topColor: 'rgba(38,166,154,0.28)',
          bottomColor: 'rgba(38,166,154,0)',
          lineColor: '#26a69a',
          lineWidth: 2,
        });
        if (mkt) {
          const { history } = await api('GET', `/api/futures/markets/${mkt.id}/history`).catch(() => ({ history: [] }));
          const pts = history
            .map(h => ({ time: Math.floor(new Date(h.created_at).getTime() / 1000), value: parseFloat(h.mark_price) }))
            .sort((a, b) => a.time - b.time)
            .filter((p, i, arr) => i === 0 || p.time !== arr[i - 1].time);
          if (pts.length > 0) { _areaSeries.setData(pts); _chart.timeScale().fitContent(); }

  // ── refresh: update dynamic DOM without destroying chart ─────────────────────
  async function refresh() {
    try {
      const [marketsData, posData] = await Promise.all([
        api('GET', '/api/futures/markets'),
        api('GET', '/api/futures/positions'),
      ]);
      _markets = marketsData.markets || [];
      _positions = posData.positions || [];
    } catch { return; }

    const mkt = _markets.find(m => m.id === S.futuresMarket?.id) || _markets[0];
    if (mkt) S.futuresMarket = mkt;
    if (!mkt) return;

    const mp = parseFloat(mkt.mark_price);
    const prec = pricePrecision(mp);
    const fundingRate = parseFloat(mkt.funding_rate || 0) * 100;
    const nextFunding = mkt.next_funding_at ? fundingCountdown(mkt.next_funding_at) : '—';
    const openInterest = (Number(mkt.open_interest || 0) / 1e6).toFixed(1);
    const openPositions = _positions.filter(p => p.status === 'open');
    const closedPositions = _positions.filter(p => p.status !== 'open').slice(0, 20);

    function setEl(id, html, isText) {
      const el = document.getElementById(id);
      if (!el) return;
      if (isText) el.textContent = html; else el.innerHTML = html;
    }

    setEl('fut-header-price', '$' + mp.toFixed(prec), true);
    const fundEl = document.getElementById('fut-header-funding');
    if (fundEl) { fundEl.textContent = (fundingRate >= 0 ? '+' : '') + fundingRate.toFixed(4) + '%'; fundEl.className = 'font-mono ' + (fundingRate >= 0 ? 'fut-bid' : 'fut-ask'); }
    setEl('fut-header-countdown', nextFunding, true);
    setEl('fut-header-oi', '$' + openInterest + 'K', true);
    setEl('fut-ob-content', renderOrderBookHtml(mp));
    setEl('fut-positions-body', buildPositionsHtml(openPositions));
    setEl('fut-history-body', buildHistoryHtml(closedPositions));
    setEl('fut-pos-count', '(' + openPositions.length + ')', true);
    setEl('fut-hist-count', '(' + closedPositions.length + ')', true);

    const balEl = document.getElementById('fut-balance-display');
    if (balEl) balEl.innerHTML = `<span class="text-amber-400 text-xs">⚡ LIVE</span> <span class="font-mono text-xs text-emerald-400">${getBal('USDC')}</span>`;

    updatePreviewDisplay(mkt);

    if (_areaSeries) {
      try { _areaSeries.update({ time: Math.floor(Date.now() / 1000), value: mp }); } catch {}
    }
  }

  function updatePreviewDisplay(mkt) {
    const el = document.getElementById('fut-preview');
    if (!el) return;
    const bloomFutBal = parseFloat(S.balances['BLOOM'] || 0) / 1_000_000;
    const gasLine = bloomFutBal >= 1
      ? `<div>Gas: <span class="text-[#a78bfa] font-mono">1 BLOOM</span></div>`
      : `<div>Gas: <span class="text-red-400 font-mono">1 BLOOM ⚠ insufficient</span></div>`;
    if (!mkt || side === 'swap') { el.innerHTML = gasLine; return; }
    const mp = parseFloat(mkt.mark_price);
    const prec = pricePrecision(mp);
    const pa = parseFloat(payAmount);
    if (!pa || isNaN(pa) || pa <= 0) { el.innerHTML = gasLine; return; }
    const posSize = (pa * leverage / mp).toFixed(6);
    const liqP = side === 'long' ? mp * (1 - 0.9 / leverage) : mp * (1 + 0.9 / leverage);
    el.innerHTML = `<div>Position size: <span class="text-[#e8eaf0] font-mono">${posSize} ${receiveToken}</span></div><div>Liq. Price: <span class="text-[#e8eaf0] font-mono">$${liqP.toFixed(prec)}</span></div>${gasLine}`;
  }

    if (swBtn) { swBtn.className = `py-2 rounded text-sm font-bold transition-all ${side === 'swap' ? 'fut-tab-swap' : 'text-[#8b95ab] hover:text-[#4e9af1] border border-[rgba(255,255,255,0.06)]'}`; swBtn.style.background = side !== 'swap' ? '#161b2a' : ''; }

  window.futCalcTwap = () => {
    const totalMinutes = twapHours * 60 + twapMinutes;

    if (freqEl) {
      if (twapParts >= 2 && totalMinutes > 0) {
        const freqMin = totalMinutes / twapParts;
        if (freqMin >= 1) {
          const m = Math.floor(freqMin);
          const s = Math.round((freqMin - m) * 60);

  window.futPlaceOrder = async () => {
    if (!requireWalletThen(null, 'place an order')) return;
    const msg = document.getElementById('fut-msg');

    if (msg) { msg.textContent = ''; msg.className = 'text-xs text-center min-h-[1rem]'; }

    if (side === 'swap') {
      const pa = parseFloat(payAmount);
      if (!pa || pa <= 0) {
        if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-ask'; msg.textContent = 'Enter an amount'; }
        return;
      }
      try {
        await api('POST', '/api/defi/swap', {
          from_token: payToken, to_token: receiveToken, amount: pa,
          slippage_bps: Math.round(slippage * 100),
          order_type: orderType,
          ...(orderType === 'limit' ? { limit_price: parseFloat(limitPrice) || null } : {}),
          ...(orderType === 'twap' ? { twap_duration_minutes: twapHours * 60 + twapMinutes, twap_parts: twapParts } : {}),
        });
        if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-bid'; msg.textContent = '✓ Swap submitted'; }
        const payEl = document.getElementById('fut-pay-amt');

        if (recvEl) recvEl.value = '';
        await refreshBalances();
      } catch (e) {
        if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-ask'; msg.textContent = e.message; }
      }
      return;
    }

    const mkt = _markets.find(m => m.id === S.futuresMarket?.id);
    const mp = mkt ? parseFloat(mkt.mark_price) : 0;
    const pa = parseFloat(payAmount);
    if (!pa || pa <= 0 || !mp) {
      if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-ask'; msg.textContent = 'Enter pay amount'; }
      return;
    }
    const calcQty = pa * leverage / mp;
    try {
      await api('POST', '/api/futures/positions', {
        market_id: S.futuresMarket.id, side, leverage,
        quantity: calcQty,
        idempotency_key: 'fut-' + S.user.user_id + '-' + Date.now(),
        order_type: orderType,
        limit_price: orderType === 'limit' ? (parseFloat(limitPrice) || null) : null,
        slippage_bps: Math.round(slippage * 100),
        twap_duration_minutes: orderType === 'twap' ? twapHours * 60 + twapMinutes : null,
        twap_parts: orderType === 'twap' ? twapParts : null,
      });
      if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-bid'; msg.textContent = '✓ Order placed'; }
      const payEl = document.getElementById('fut-pay-amt');
      const recvEl = document.getElementById('fut-receive-amt');
      if (payEl) { payEl.value = ''; payAmount = ''; qty = ''; }
      if (recvEl) recvEl.value = '';
      updatePreviewDisplay(S.futuresMarket);
      await refreshBalances();
      await refresh();
    } catch (e) {
      if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-ask'; msg.textContent = e.message; }
    }
  };

  // Backward-compat alias
  window.closeFutures = window.futClosePosBtn;

  await initialRender();
  _activeInterval = setInterval(refresh, 5000);
}

function renderSparkline(prices, width = 120, height = 32) {
  if (!prices || prices.length < 2) return '';
  const vals = prices.map(Number);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const trend = vals[vals.length - 1] >= vals[0] ? '#10b981' : '#ef4444';
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" fill="none">
    <polyline points="${pts}" stroke="${trend}" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  </svg>`;
}

async function renderNFTs(sec) {
  let nftView = 'landing';
  let nftViewArg = null;

  async function navNFT(view, arg) {
    if (view === 'mint' && !requireWalletThen(null, 'mint an NFT')) return;
    nftView = view;
    nftViewArg = arg ?? null;
    await renderView();
  }
  window._nftNav = navNFT;

  async function renderView() {
    sec.innerHTML = `<div class="flex items-center justify-center py-12"><div class="spinner"></div></div>`;
    try {
      if (nftView === 'landing')   await renderNFTLanding(sec);
      else if (nftView === 'collections') await renderNFTCollections(sec);
      else if (nftView === 'explore') await renderNFTExplore(sec, nftViewArg || {});
      else if (nftView === 'detail')  await renderNFTDetail(sec, nftViewArg);
      else if (nftView === 'mint')    await renderNFTMint(sec);
      else if (nftView === 'portfolio') await renderNFTPortfolio(sec, nftViewArg);
      else if (nftView === 'activity')  await renderNFTActivity(sec);
      else await renderNFTLanding(sec);
    } catch (e) {
      sec.innerHTML = `<div class="text-red-400 text-sm py-8 text-center">${esc(e.message)}</div>`;
    }
  }

  await renderView();
}

async function renderNFTExplore(sec, filters) {
  filters = filters || {};
  let search = filters.search || '';
  let collection = filters.collection || '';
  let rarity = filters.rarity || '';
  let sort = filters.sort || '';
  let listed = filters.listed || false;
  let offset = 0;
  const PAGE = 24;

  async function load() {
    const params = new URLSearchParams({ limit: PAGE, offset });
    if (search) params.set('search', search);
    if (collection) params.set('collection', collection);
    if (rarity) params.set('rarity', rarity);
    if (sort) params.set('sort', sort);
    if (listed) params.set('listed', 'true');
    const { nfts } = await api('GET', `/api/nfts?${params}`).catch(() => ({ nfts: [] }));
    const grid = document.getElementById('nft-explore-grid');
    if (!grid) return;
    grid.innerHTML = nfts.length
      ? nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')
      : '<p class="text-[#4e5872] text-sm col-span-full py-8 text-center">No NFTs found</p>';
    const prevBtn = document.getElementById('nft-prev');
    const nextBtn = document.getElementById('nft-next');
    if (prevBtn) prevBtn.disabled = offset === 0;
    if (nextBtn) nextBtn.disabled = nfts.length < PAGE;
  }

  sec.innerHTML = nftTopBar('explore', 'window._nftNav') + `
    <div class="flex flex-wrap gap-2 mb-4">
      <input id="nft-search" class="inp flex-1 min-w-[160px]" placeholder="Search NFTs…" value="${esc(search)}">
      <select id="nft-rarity-sel" class="inp text-sm">
        <option value="">All Rarities</option>
        ${['common','uncommon','rare','epic','legendary'].map(r => `<option value="${r}" ${rarity===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}
      </select>
      <select id="nft-sort-sel" class="inp text-sm">
        <option value="">Newest</option>
        <option value="oldest" ${sort==='oldest'?'selected':''}>Oldest</option>
        <option value="price_asc" ${sort==='price_asc'?'selected':''}>Price ↑</option>
        <option value="price_desc" ${sort==='price_desc'?'selected':''}>Price ↓</option>
      </select>
      <label class="flex items-center gap-1 text-sm text-[#8b95ab] cursor-pointer">
        <input type="checkbox" id="nft-listed-chk" ${listed?'checked':''} class="accent-[#7c5cfc]"> For Sale
      </label>
    </div>
    <div id="nft-explore-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mb-4"></div>
    <div class="flex gap-2 justify-center">
      <button id="nft-prev" class="btn-z text-sm px-3 py-1 rounded" disabled onclick="nftExpPage(-1)">← Prev</button>
      <button id="nft-next" class="btn-z text-sm px-3 py-1 rounded" onclick="nftExpPage(1)">Next →</button>
    </div>
  `;

  window.nftExpPage = (dir) => { offset = Math.max(0, offset + dir * PAGE); load(); };
  document.getElementById('nft-search')?.addEventListener('input', e => { search = e.target.value; offset = 0; load(); });
  document.getElementById('nft-rarity-sel')?.addEventListener('change', e => { rarity = e.target.value; offset = 0; load(); });
  document.getElementById('nft-sort-sel')?.addEventListener('change', e => { sort = e.target.value; offset = 0; load(); });
  document.getElementById('nft-listed-chk')?.addEventListener('change', e => { listed = e.target.checked; offset = 0; load(); });
  await load();
}

        <button class="btn-z w-full" onclick="document.getElementById('nft-receive-modal').classList.add('hidden')">Close</button>
      </div>
    </div>
  `;

  window.nftToggleFav = async (id) => {
    if (!requireWalletThen(null, 'favorite an NFT')) return;
    try {
      const d = await api('POST', `/api/nfts/${id}/favorite`);
      const btn = document.getElementById('nft-fav-btn');
      if (btn) btn.textContent = d.favorited ? '♥ Unfavorite' : '♡ Favorite';
    } catch (e) { alert(e.message); }
  };
  window.nftBuy = async (id) => {
    if (!requireWalletThen(null, 'buy an NFT')) return;
    if (!confirm('Buy this NFT?')) return;
    try { await api('POST', `/api/nfts/${id}/buy`); await refreshBalances(); window._nftNav('detail', id); }
    catch (e) { alert(e.message); }
  };
  window.nftList = async (id) => {
    if (!requireWalletThen(null, 'list an NFT')) return;
    const price = parseInt(document.getElementById('nft-list-price')?.value);
    if (!price) return alert('Enter a price in USDC micro-units (1 USDC = 1000000)');
    try { await api('POST', `/api/nfts/${id}/list`, { price_usdc: price }); window._nftNav('detail', id); }
    catch (e) { alert(e.message); }
  };
  window.nftDelist = async (id) => {
    if (!requireWalletThen(null, 'delist an NFT')) return;
    try { await api('DELETE', `/api/nfts/${id}/list`); window._nftNav('detail', id); }
    catch (e) { alert(e.message); }
  };
  window.nftAcceptBid = async (nftId, bidId) => {
    if (!requireWalletThen(null, 'accept a bid')) return;
    if (!confirm('Accept this bid?')) return;
    try { await api('POST', `/api/nfts/${nftId}/accept-bid/${bidId}`); await refreshBalances(); window._nftNav('detail', nftId); }
    catch (e) { alert(e.message); }
  };
  window.nftWithdrawBid = async (bidId) => {
    if (!requireWalletThen(null, 'withdraw a bid')) return;
    try { await api('DELETE', `/api/nfts/bids/${bidId}`); window._nftNav('detail', nft.id); }
    catch (e) { alert(e.message); }
  };
  window.showNFTBidModal = () => { if (!requireWalletThen(null, 'place a bid')) return; document.getElementById('nft-bid-modal')?.classList.remove('hidden'); };
  window.nftSubmitBid = async (id) => {
    if (!requireWalletThen(null, 'place a bid')) return;
    const price = parseInt(document.getElementById('nft-bid-price')?.value);
    const days = parseInt(document.getElementById('nft-bid-days')?.value) || 7;
    const msg = document.getElementById('nft-bid-msg');
    try {
      await api('POST', `/api/nfts/${id}/bid`, { price_usdc: price, expires_days: days });
      document.getElementById('nft-bid-modal')?.classList.add('hidden');
      window._nftNav('detail', id);
    } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
  };
  window.showNFTTransferModal = () => { if (!requireWalletThen(null, 'transfer an NFT')) return; document.getElementById('nft-transfer-modal')?.classList.remove('hidden'); };
  window.nftSubmitTransfer = async (id) => {
    if (!requireWalletThen(null, 'transfer an NFT')) return;
    const to = document.getElementById('nft-transfer-to')?.value?.trim();
    const msg = document.getElementById('nft-transfer-msg');
    if (!to) return;
    try {
      await api('POST', `/api/nfts/${id}/transfer`, { to_username: to });
      document.getElementById('nft-transfer-modal')?.classList.add('hidden');
      if (msg) { msg.className='text-emerald-400 text-sm'; msg.textContent='Transferred!'; }
      setTimeout(() => window._nftNav('portfolio'), 1200);
    } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
  };
  window.showNFTReceiveModal = async () => {
    const modal = document.getElementById('nft-receive-modal');
    modal?.classList.remove('hidden');
    const container = document.getElementById('nft-qr-container');
    if (!container || !S.user) return;
    try {
      if (!window.QRCode) {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }
      container.innerHTML = '<canvas id="nft-qr-canvas"></canvas>';
      await QRCode.toCanvas(document.getElementById('nft-qr-canvas'), S.user.username, { width: 160, color: { dark: '#e8eaf0', light: '#131620' } });
    } catch (_) { container.innerHTML = `<p class="text-sm font-mono text-[#7c5cfc]">${esc(S.user.username)}</p>`; }
  };
}

async function renderNFTMint(sec) {
  let step = 1;
  const form = { name: '', description: '', image_url: '', collection: 'BloomMoney Genesis', royalty_bps: 500, rarity: 'common', properties: '' };

  function renderStep() {
    sec.innerHTML = nftTopBar('mint', 'window._nftNav') + `
      <h2 class="text-xl font-bold mb-1">Mint NFT</h2>
      <p class="text-[#8b95ab] text-sm mb-4">Costs 10.5 BLOOM • Balance: ${getBal('BLOOM')} BLOOM</p>
      <div class="flex gap-2 mb-6">
        ${['Artwork','Properties','Confirm'].map((l,i) => `
          <div class="flex items-center gap-1 ${i>0?'ml-2':''}">
            <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${step===i+1?'bg-[#7c5cfc] text-white':step>i+1?'bg-emerald-500 text-white':'bg-[#1c2236] text-[#8b95ab]'}">${step>i+1?'✓':i+1}</div>
            <span class="text-xs ${step===i+1?'text-[#e8eaf0]':'text-[#4e5872]'}">${l}</span>
            ${i<2?'<span class="text-[#4e5872] ml-2">—</span>':''}
          </div>`).join('')}
      </div>
      ${step === 1 ? `
        <div class="card space-y-3">
          <input id="mint-name" class="inp" placeholder="NFT Name *" value="${esc(form.name)}">
          <textarea id="mint-desc" class="inp resize-none" rows="3" placeholder="Description (optional)">${esc(form.description)}</textarea>
          <input id="mint-img" class="inp" placeholder="Image URL (https://…) *" value="${esc(form.image_url)}">
          ${form.image_url ? `<div class="h-32 rounded-lg overflow-hidden bg-[#0f1117]"><img src="${esc(form.image_url)}" class="h-full object-cover" onerror="this.style.display='none'"></div>` : ''}
          <button class="btn-v w-full" onclick="mintStep1Next()">Next →</button>
        </div>` : step === 2 ? `
        <div class="card space-y-3">
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Collection</label>
            <input id="mint-collection" class="inp" value="${esc(form.collection)}">
          </div>
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Rarity</label>
            <select id="mint-rarity" class="inp">
              ${['common','uncommon','rare','epic','legendary'].map(r => `<option value="${r}" ${form.rarity===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Royalty % (0–20)</label>
            <input id="mint-royalty" class="inp" type="number" min="0" max="20" step="0.5" value="${(form.royalty_bps/100).toFixed(1)}">
          </div>
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Properties (JSON, optional)</label>
            <textarea id="mint-props" class="inp font-mono text-xs resize-none" rows="3" placeholder='{"trait":"value"}'>${esc(form.properties)}</textarea>
          </div>
          <div class="flex gap-2">
            <button class="btn-z flex-1" onclick="mintStepBack()">← Back</button>
            <button class="btn-v flex-1" onclick="mintStep2Next()">Review →</button>
          </div>
        </div>` : `
        <div class="card space-y-3">
          <div class="aspect-square w-32 rounded-lg overflow-hidden bg-[#0f1117] mx-auto">
            <img src="${esc(form.image_url)}" class="w-full h-full object-cover" onerror="this.style.display='none'">
          </div>
          <h3 class="text-lg font-bold text-center">${esc(form.name)}</h3>
          <div class="grid grid-cols-2 gap-2 text-sm">
            <div class="text-[#8b95ab]">Collection</div><div>${esc(form.collection)}</div>
            <div class="text-[#8b95ab]">Rarity</div><div class="capitalize">${esc(form.rarity)}</div>
            <div class="text-[#8b95ab]">Royalty</div><div>${(form.royalty_bps/100).toFixed(1)}%</div>
            <div class="text-[#8b95ab]">Mint Cost</div><div class="text-amber-400">10.5 BLOOM</div>
          </div>
          <p id="mint-msg" class="text-sm text-center"></p>
          <div class="flex gap-2">
            <button class="btn-z flex-1" onclick="mintStepBack()">← Back</button>
            <button id="mint-confirm-btn" class="btn-v flex-1" onclick="mintConfirm()">Mint NFT</button>
          </div>
        </div>`}
    `;
  }

  window.mintStep1Next = () => {
    form.name = document.getElementById('mint-name')?.value?.trim() || '';
    form.description = document.getElementById('mint-desc')?.value?.trim() || '';
    form.image_url = document.getElementById('mint-img')?.value?.trim() || '';
    if (!form.name) return alert('Name is required');
    if (!form.image_url || !/^https?:\/\//.test(form.image_url)) return alert('Valid image URL required');
    step = 2; renderStep();
  };
  window.mintStep2Next = () => {
    form.collection = document.getElementById('mint-collection')?.value?.trim() || 'BloomMoney Genesis';
    form.rarity = document.getElementById('mint-rarity')?.value || 'common';
    form.royalty_bps = Math.round((parseFloat(document.getElementById('mint-royalty')?.value)||5) * 100);
    form.properties = document.getElementById('mint-props')?.value?.trim() || '';
    step = 3; renderStep();
  };
  window.mintStepBack = () => { step = Math.max(1, step - 1); renderStep(); };
  window.mintConfirm = async () => {
    if (!requireWalletThen(null, 'mint an NFT')) return;
    const btn = document.getElementById('mint-confirm-btn');
    const msg = document.getElementById('mint-msg');
    if (btn) { btn.disabled = true; btn.textContent = 'Minting…'; }
    try {
      const d = await api('POST', '/api/nfts/mint', {
        name: form.name, description: form.description, image_url: form.image_url,
        collection: form.collection, rarity: form.rarity, royalty_bps: form.royalty_bps,
        properties: form.properties || undefined
      });
      if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = `✓ Minted ${d.token_id}`; }
      await refreshBalances();
      setTimeout(() => window._nftNav('detail', d.nft_id), 1500);
    } catch (e) {
      if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; }
      if (btn) { btn.disabled = false; btn.textContent = 'Mint NFT'; }
    }
  };

  renderStep();
}

async function renderNFTPortfolio(sec, activeTab) {
  activeTab = activeTab || 'owned';
  const tabs = ['owned','created','listed','favorites','activity'];

  async function loadTab() {
    const panel = document.getElementById('nft-portfolio-panel');
    if (!panel) return;
    panel.innerHTML = `<div class="flex items-center justify-center py-8"><div class="spinner"></div></div>`;
    try {
      if (activeTab === 'owned') {
        const { nfts } = await api('GET', `/api/nfts?owner=${encodeURIComponent(S.user.username)}`);
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No NFTs owned yet</p>';
      } else if (activeTab === 'created') {
        const { nfts } = await api('GET', `/api/nfts?creator=${encodeURIComponent(S.user.username)}`);
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No NFTs created yet</p>';
      } else if (activeTab === 'listed') {
        const { nfts } = await api('GET', `/api/nfts?owner=${encodeURIComponent(S.user.username)}&listed=true`);
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No active listings</p>';
      } else if (activeTab === 'favorites') {
        const { nfts } = await api('GET', '/api/nfts/favorites');
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No favorites yet</p>';
      } else if (activeTab === 'activity') {
        const { events } = await api('GET', '/api/nft-activity');
        if (!events.length) { panel.innerHTML = '<p class="text-[#4e5872] text-sm">No activity yet</p>'; return; }
        panel.innerHTML = `<div class="space-y-2">${events.map(e => {
          const typeLabel = { mint:'Minted', sale:'Sold', transfer:'Transferred' }[e.event_type] || e.event_type;
          const typeColor = { mint:'text-[#7c5cfc]', sale:'text-emerald-400', transfer:'text-[#4e9af1]' }[e.event_type] || 'text-[#8b95ab]';
          return `<div class="card flex items-center gap-3">
            <img src="${esc(e.nft_image||'')}" class="w-12 h-12 rounded object-cover bg-[#0f1117] flex-shrink-0" onerror="this.style.display='none'">
            <div class="min-w-0 flex-1">
              <p class="text-sm font-medium truncate">${esc(e.nft_name||'')}</p>
              <p class="text-xs inline-flex items-center gap-1 flex-wrap"><span class="${typeColor}">${typeLabel}</span>${e.to_username ? `<span class="inline-flex items-center gap-1">to ${userTag(e.to_username, { size: 'w-4 h-4' })}</span>` : ''}</p>
            </div>
            ${e.price_usdc ? `<span class="text-emerald-400 text-sm font-semibold">${(Number(e.price_usdc)/1e6).toFixed(2)} USDC</span>` : ''}
            <span class="text-xs text-[#4e5872]">${tsAgo(e.created_at)}</span>
          </div>`;
        }).join('')}</div>`;
      }
    } catch (e) { panel.innerHTML = `<p class="text-red-400 text-sm">${esc(e.message)}</p>`; }
  }

  sec.innerHTML = nftTopBar('portfolio', 'window._nftNav') + `
    <h2 class="text-xl font-bold mb-4">My Portfolio</h2>
    <div class="flex gap-2 mb-4 flex-wrap">
      ${tabs.map(t => `<button class="pill-${activeTab===t?'active':'inactive'} text-sm capitalize" onclick="nftPortTab('${t}')">${t}</button>`).join('')}
    </div>
    <div id="nft-portfolio-panel"></div>
  `;
  window.nftPortTab = (t) => { activeTab = t; loadTab(); sec.querySelectorAll('.pill-active,.pill-inactive').forEach((el,i) => { el.className = `pill-${tabs[i]===t?'active':'inactive'} text-sm capitalize`; }); };
  await loadTab();
}

// ── Verify (three-tier self-service) ────────────────────────────────────────────
const PROVIDER_LABEL = { x: 'X', instagram: 'Instagram', tiktok: 'TikTok', coinbase: 'Coinbase' };

async function renderVerify(sec) {
  const [kycResp, providers] = await Promise.all([
    api('GET', '/api/kyc').catch(() => ({ kyc: null, zk_verified: false })),
    api('GET', '/api/verify/providers').catch(() => ({ social_providers: [], social_enabled: false, premium_enabled: false, staging: false })),
  ]);
  const kyc = kycResp.kyc;
  S.kyc = kyc;
  S.zkVerified = !!kycResp.zk_verified;
  const level = (kyc && kyc.status === 'approved') ? kyc.level : 'basic';
  const isSocial = level === 'social' || level === 'premium';
  const isPremium = level === 'premium';

  function tierCard(name, badge, active, unlocks, action) {
    return `<div class="card space-y-2 ${active ? 'border-[#7c5cfc]' : ''}">
      <div class="flex items-center justify-between">
        <h3 class="font-semibold">${badge} ${name}</h3>
        ${active ? '<span class="tag-social">Active</span>' : '<span class="text-xs text-[#4e5872]">Locked</span>'}
      </div>
      <ul class="text-xs text-[#8b95ab] list-disc pl-4 space-y-0.5">${unlocks.map(u => `<li>${u}</li>`).join('')}</ul>
      ${action || ''}
    </div>`;
  }

  const socialAction = isSocial
    ? `<p class="text-xs text-emerald-400">✓ Verified via ${esc(kyc?.provider || 'social')}</p>`
    : providers.social_enabled && providers.social_providers.length
      ? `<div class="flex flex-wrap gap-2">${providers.social_providers.map(p =>
          `<button class="btn btn-v text-xs" onclick="connectSocial('${p}')">Connect ${PROVIDER_LABEL[p] || p}</button>`).join('')}</div>
         <p id="social-msg" class="text-sm"></p>`
      : `<p class="text-xs text-amber-400">No social providers are configured right now — try Premium instead.</p>`;

  const zkVerified = !!kycResp.zk_verified;
  const zkButtonHtml = `<button class="btn btn-v text-xs" onclick="startZkSession()">Verify with zkPassport</button>
         <div id="zk-qr-section" class="hidden space-y-2 mt-2">
           <img id="zk-qr-img" src="" alt="ZK QR Code" class="w-48 h-48 rounded-lg mx-auto bg-[#161b2a]">
           <p class="text-xs text-[#8b95ab] text-center">Scan with your zkPassport app</p>
           <p id="zk-session-msg" class="text-sm text-center"></p>
         </div>`;
  const premiumAction = zkVerified
    ? `<p class="text-xs text-emerald-400">✓ Premium verified via zkPassport — 50× & 100× leverage unlocked</p>`
    : providers.premium_enabled
      ? `${isPremium ? '<p class="text-xs text-[#8b95ab] mb-1">Verify with zkPassport to unlock 50× & 100× leverage.</p>' : ''}${zkButtonHtml}`
      : `<p class="text-xs text-amber-400">zkPassport is unavailable in this environment.</p>`;

  sec.innerHTML = `
    <h2 class="text-xl font-bold mb-1">🪪 Subscription</h2>
    <p class="text-sm text-[#8b95ab] mb-4">Your tier: <span class="font-semibold text-[#e8eaf0]">${tierLabel(level)}</span>${kyc?.status === 'pending' ? ' <span class="text-amber-400">(pending)</span>' : ''}</p>
    <div class="space-y-3">
      ${tierCard('Free', '🔵', true, ['Post, follow, swap, stake, provide liquidity', 'Join ICOs & prediction markets', 'Paper futures trading'],
        '<p class="text-xs text-emerald-400">✓ Granted automatically on wallet link</p>')}
      ${tierCard('Pro', '🟢', isSocial, ['Everything in Free', 'Live futures up to 5× leverage', 'Removes per-day Free limits'], socialAction)}
      ${tierCard('Premium+', '⭐', isPremium, ['Everything in Pro', 'Up to 100× leverage (50× & 100× require zkPassport)', 'Higher trade-size limits', 'Premium+ profile badge', '20 tracked holdings (vs 10)'], premiumAction)}
    </div>`;

  window.connectSocial = async (provider) => {
    if (!requireWalletThen(null, 'verify your identity')) return;
    const msg = document.getElementById('social-msg');
    try {
      const start = await api('POST', '/api/verify/social/start', { provider });
      if (start.simulated) {
        // Staging / simulated path: complete immediately with the signed state.
        await api('POST', '/api/verify/social/complete', { provider, code: 'staging-code', state: start.state });
        if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = '✓ Connected'; }
        await renderVerify(sec);
      } else if (start.oauth_url) {
        // Production: hand off to the provider's OAuth screen.
        window.location.href = start.oauth_url;
      }
    } catch (e) {
      if (msg) {
        msg.className = 'text-red-400 text-sm';
        msg.textContent = e.message === 'social_account_in_use'
          ? 'That account already verifies another wallet.' : e.message;
      }
    }
  };

  window.connectZk = async () => {
    const msg = document.getElementById('zk-msg');
    try {
      await api('POST', '/api/verify/zkpassport', { proof: { simulated: true } });
      if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = '✓ Premium verified'; }
      await renderVerify(sec);
    } catch (e) { if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; } }
  };

  window.startZkSession = async () => {
    if (!requireWalletThen(null, 'verify with zkPassport')) return;
    const qrSection = document.getElementById('zk-qr-section');
    const qrImg = document.getElementById('zk-qr-img');
    const msg = document.getElementById('zk-session-msg');
    if (!qrSection || !qrImg || !msg) return;
    try {
      msg.className = 'text-[#8b95ab] text-sm text-center';
      msg.textContent = 'Starting session…';
      qrSection.classList.remove('hidden');
      const { sessionId, qrUrl } = await api('POST', '/api/zk/start', {});
      if (qrUrl) qrImg.src = qrUrl;
      msg.textContent = 'Waiting for scan…';
      let attempts = 0;
      const poll = async () => {
        attempts++;
        try {
          const { status } = await api('GET', `/api/zk/status/${sessionId}`);
          if (status === 'verified') {
            S.kyc = { level: 'premium', status: 'approved', provider: 'zkpassport' };
            S.zkVerified = true;
            msg.className = 'text-emerald-400 text-sm text-center';
            msg.textContent = '✓ Identity verified!';
            setTimeout(() => renderVerify(sec), 1200);
          } else if (status === 'failed' || attempts >= 60) {
            msg.className = 'text-red-400 text-sm text-center';
            msg.textContent = status === 'failed' ? 'Verification failed.' : 'Session timed out.';
          } else {
            setTimeout(poll, 3000);
          }
        } catch (e) {
          msg.className = 'text-red-400 text-sm text-center';
          msg.textContent = e.message;
        }
      };
      setTimeout(poll, 3000);
    } catch (e) {
      if (msg) { msg.className = 'text-red-400 text-sm text-center'; msg.textContent = e.message; }
    }
  };

  // OAuth return handler: if a provider redirected back with ?code&state, finish.
  const qp = new URLSearchParams(location.search);
  if (qp.get('code') && qp.get('state') && qp.get('provider')) {
    try {
      await api('POST', '/api/verify/social/complete', { provider: qp.get('provider'), code: qp.get('code'), state: qp.get('state') });
      await renderVerify(sec);
    } catch {}
  }
}
