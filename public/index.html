    USDC:  { name: 'USD Coin',   color: 'rgb(52,211,153)',  badgeBg: 'bg-emerald-400/10', badgeText: 'text-emerald-400', btnCls: 'bg-emerald-600 hover:bg-emerald-500',  desc: 'A dollar-pegged stablecoin issued by Circle, redeemable 1:1 for USD.' },
  };
  const TV_SYMBOLS = { BTC: 'COINBASE:BTCUSD', ETH: 'COINBASE:ETHUSD', SOL: 'COINBASE:SOLUSD', DOGE: 'BINANCE:DOGEUSDT', ADA: 'BINANCE:ADAUSDT', BNB: 'BINANCE:BNBUSDT', XRP: 'BINANCE:XRPUSDT', TON: 'BINANCE:TONUSDT' };
  const useTradingView = sym in TV_SYMBOLS;

  const meta = TOKEN_META_DETAIL[sym];
  if (!meta) { S.tradeToken = null; navigate('trade'); return; }

  let chartHours = 24;

  function computeChangePct(hist) {
    if (!hist || hist.length < 2) return null;
    const first = parseFloat(hist[0].price_usd);
    const last  = parseFloat(hist[hist.length - 1].price_usd);
    return ((last - first) / first) * 100;
  }

  async function renderChart() {
    const chartWrap = document.getElementById('token-detail-chart');
    if (!chartWrap) return;
    chartWrap.innerHTML = `<div class="text-[#4e5872] text-sm text-center py-6">${spin()}</div>`;
    let hist = [];
    try {
      const res = await api('GET', `/api/price-history?symbol=${sym}&hours=${chartHours}`);
      hist = (res && res.history) || [];
    } catch {}
    const pts = hist.map(h => ({ x: new Date(h.recorded_at).getTime(), y: parseFloat(h.price_usd) }));
    chartWrap.innerHTML = svgLineChart(pts, { color: meta.color, width: 480, height: 140 });
  }

  function mountTradingViewChart(tokenSym) {
    const container = document.getElementById('tv-chart-container');
    if (!container) return;
    container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.type = 'text/javascript';
    script.async = true;
    script.textContent = JSON.stringify({
      autosize: true,
      symbol: TV_SYMBOLS[tokenSym],
      interval: 'D',
      timezone: 'Etc/UTC',
      theme: 'dark',
      style: '1',
      locale: 'en',
      hide_top_toolbar: false,
      hide_legend: true,
      allow_symbol_change: false,
    });
    container.appendChild(script);
  }

  function fmtDetailPrice(s) {
    const p = S.prices[s];
    if (p == null) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(2);
    return '$' + p.toFixed(4);
  }

  async function load() {
    await refreshBalances();
    let hist24 = [];
    try {
      const res = await api('GET', `/api/price-history?symbol=${sym}&hours=24`);
      hist24 = (res && res.history) || [];
    } catch {}

    const change = computeChangePct(hist24);
    const changeStr = change === null ? '—' : (change >= 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`);
    const changeCls = change === null ? 'text-[#8b95ab]' : change > 0.05 ? 'text-emerald-400' : change < -0.05 ? 'text-red-400' : 'text-[#8b95ab]';

    const chartSection = useTradingView
      ? `<div id="tv-chart-container" class="tradingview-widget-container" style="height:400px;min-height:400px"></div>`
      : `<div>
          <div class="flex gap-2 mb-3">
            <button id="btn-24h" class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${chartHours === 24 ? 'pill-active' : 'pill-inactive'}" onclick="window._setTokenChartHours(24)">24H</button>
            <button id="btn-7d"  class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${chartHours === 168 ? 'pill-active' : 'pill-inactive'}" onclick="window._setTokenChartHours(168)">7D</button>
          </div>
          <div id="token-detail-chart"></div>
        </div>`;

    sec.innerHTML = `
      <button class="text-sm text-[#8b95ab] hover:text-[#e8eaf0] mb-4 flex items-center gap-1 token-detail-back" onclick="S.tradeToken=null;navigate('trade')">← Markets</button>
      <div class="card space-y-4 mb-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full flex items-center justify-center ${meta.badgeBg} ${meta.badgeText} text-sm font-bold shrink-0">${sym}</div>
          <div>
            <div class="font-bold text-lg leading-tight">${esc(meta.name)}</div>
            <div class="text-sm text-[#8b95ab]">${sym}</div>
          </div>
          <div class="ml-auto text-right">
            <div class="text-2xl font-bold text-[#e8eaf0]">${fmtDetailPrice(sym)}</div>
            <div class="text-sm font-medium ${changeCls}">${changeStr} <span class="text-[#4e5872] font-normal">24h</span></div>
          </div>
        </div>
        <p class="text-sm text-[#8b95ab]">${esc(meta.desc)}</p>
        ${chartSection}
      </div>
      <button class="btn btn-v w-full py-3 rounded-xl font-semibold" onclick="window._swapFromDetail('${sym}')">Swap ${esc(sym)} →</button>`;

    if (useTradingView) {
      mountTradingViewChart(sym);
    } else {
      await renderChart();
    }
  }

  window._setTokenChartHours = async (h) => {
    chartHours = h;
    const b24 = document.getElementById('btn-24h');
    const b7d  = document.getElementById('btn-7d');
    if (b24) b24.className = `text-xs px-3 py-1 rounded-full font-medium transition-colors ${h === 24 ? 'pill-active' : 'pill-inactive'}`;
    if (b7d)  b7d.className  = `text-xs px-3 py-1 rounded-full font-medium transition-colors ${h === 168 ? 'pill-active' : 'pill-inactive'}`;
    await renderChart();
  };

  window._swapFromDetail = (s) => {
    S.tradeToken = null;
    navigate('trade');
    setTimeout(() => { if (window.swapFromChange) window.swapFromChange(s); }, 50);
  };

  await load();
}

// ── ICO ───────────────────────────────────────────────────────────────────────
async function renderICO(sec) {
  function tokenBadge(o) {
    if (o.icon_url) {
      return `<img src="${esc(o.icon_url)}" class="w-8 h-8 rounded-full object-cover flex-shrink-0" onerror="this.style.display='none'" alt="">`;
    }
    const cols = ['bg-violet-700','bg-emerald-700','bg-blue-700','bg-amber-700','bg-rose-700','bg-teal-700','bg-indigo-700'];
    const c = cols[(o.token_symbol || 'X').charCodeAt(0) % cols.length];
    return `<div class="w-8 h-8 rounded-full ${c} flex items-center justify-center text-xs font-bold flex-shrink-0">${esc((o.token_symbol||'?')[0])}</div>`;
  }

  function timeUntil(d) {
    const ms = new Date(d) - Date.now();
    if (ms <= 0) return 'now';
    const s = ms / 1000;
    if (s < 3600) return 'in ' + Math.floor(s / 60) + 'm';
    if (s < 86400) return 'in ' + Math.floor(s / 3600) + 'h';
    return 'in ' + Math.floor(s / 86400) + 'd';
  }

  function liveCard(o) {
    const pct = Number(o.hard_cap) > 0 ? Math.min(100, Number(o.raised) / Number(o.hard_cap) * 100) : 0;
    return `<div class="card space-y-3">
      <div class="flex items-start gap-3">
        ${tokenBadge(o)}
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start gap-2">
            <div class="min-w-0">
              <h3 class="font-bold truncate">${esc(o.token_name)} <span class="text-[#4e5872] text-sm">${esc(o.token_symbol)}</span></h3>
              ${o.description ? `<p class="text-xs text-[#8b95ab] mt-0.5">${esc(o.description)}</p>` : ''}
            </div>
            <span class="text-emerald-400 text-xs font-semibold shrink-0">LIVE</span>
          </div>
        </div>
      </div>
      <div class="text-sm space-y-0.5">
        <div class="flex justify-between"><span class="text-[#8b95ab]">Price</span><span>${fmtUSD(o.price_per_token)} USDC</span></div>
        <div class="flex justify-between"><span class="text-[#8b95ab]">Raised</span><span>${fmtUSD(o.raised)} / ${fmtUSD(o.hard_cap)} USDC</span></div>
      </div>
      <div class="bg-[#0d1021] rounded-full h-2 overflow-hidden">
        <div class="h-full rounded-full transition-all" style="width:${pct.toFixed(1)}%;background:linear-gradient(90deg,#7c5cfc,#4e9af1)"></div>
      </div>
      <div class="flex gap-2">
        <input id="ico-amt-${o.id}" type="number" class="inp flex-1" placeholder="USDC amount" min="0">
        <button class="btn btn-v shrink-0" onclick="investICO(${o.id})">Invest</button>
      </div>
      <div class="text-xs text-[#8b95ab]">Balance: ${getBal('USDC')} USDC</div>
      <p id="ico-msg-${o.id}" class="text-sm"></p>
    </div>`;
  }

  function upcomingCard(o) {
    const startStr = o.start_date
      ? new Date(o.start_date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
      : 'TBA';
    const countdown = o.start_date ? timeUntil(o.start_date) : '';
    return `<div class="card space-y-3">
      <div class="flex items-start gap-3">
        ${tokenBadge(o)}
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start gap-2">
            <div class="min-w-0">
              <h3 class="font-bold truncate">${esc(o.token_name)} <span class="text-[#4e5872] text-sm">${esc(o.token_symbol)}</span></h3>
              ${o.description ? `<p class="text-xs text-[#8b95ab] mt-0.5">${esc(o.description)}</p>` : ''}
            </div>
            <span class="text-amber-400 text-xs font-semibold shrink-0">UPCOMING</span>
          </div>
        </div>
      </div>
      <div class="text-sm space-y-0.5">
        <div class="flex justify-between"><span class="text-[#8b95ab]">Price</span><span>${fmtUSD(o.price_per_token)} USDC</span></div>
        <div class="flex justify-between"><span class="text-[#8b95ab]">Raise goal</span><span>${fmtUSD(o.hard_cap)} USDC</span></div>
        <div class="flex justify-between"><span class="text-[#8b95ab]">Opens</span><span class="text-amber-300">${esc(startStr)}${countdown ? ` (${countdown})` : ''}</span></div>
      </div>
      <div class="flex justify-end">
        <span class="text-xs text-[#4e5872] bg-[#1c2236] px-3 py-1.5 rounded-lg">Coming soon</span>
      </div>
    </div>`;
  }

  function completedCard(o) {
    const pct = Number(o.hard_cap) > 0 ? Math.min(100, Number(o.raised) / Number(o.hard_cap) * 100) : 0;
    const isSoldOut = o.status === 'sold_out';
    const badgeCls = isSoldOut ? 'text-[#7c5cfc]' : 'text-[#4e5872]';
    const badgeLbl = isSoldOut ? 'SOLD OUT' : 'ENDED';
    return `<div class="card space-y-3 opacity-70">
      <div class="flex items-start gap-3">
        ${tokenBadge(o)}
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start gap-2">
            <div class="min-w-0">
              <h3 class="font-bold text-[#8b95ab] truncate">${esc(o.token_name)} <span class="text-[#4e5872] text-sm">${esc(o.token_symbol)}</span></h3>
              ${o.description ? `<p class="text-xs text-[#4e5872] mt-0.5">${esc(o.description)}</p>` : ''}
            </div>
            <span class="${badgeCls} text-xs font-semibold shrink-0">${badgeLbl}</span>
          </div>
        </div>
      </div>
      <div class="text-sm space-y-0.5">
        <div class="flex justify-between"><span class="text-[#4e5872]">Price</span><span class="text-[#8b95ab]">${fmtUSD(o.price_per_token)} USDC</span></div>
        <div class="flex justify-between"><span class="text-[#4e5872]">Raised</span><span class="text-[#8b95ab]">${fmtUSD(o.raised)} / ${fmtUSD(o.hard_cap)} USDC</span></div>
      </div>
      <div class="bg-[#0d1021] rounded-full h-2 overflow-hidden">
        <div class="h-full rounded-full" style="width:${pct.toFixed(1)}%;background:${isSoldOut ? 'linear-gradient(90deg,#7c5cfc,#4e9af1)' : '#1c2236'}"></div>
      </div>
    </div>`;
  }

  function renderSection(title, cards) {
    if (!cards.length) return '';
    return `<div class="mb-6">
      <h3 class="text-sm font-semibold text-[#8b95ab] mb-3">${title}</h3>
      <div class="space-y-3">${cards.join('')}</div>
    </div>`;
  }

  async function load() {
    await refreshBalances();
    const { offerings } = await api('GET', '/api/ico');
    const live = offerings.filter(o => o.status === 'active');
    const upcoming = offerings.filter(o => o.status === 'upcoming');
    const completed = offerings.filter(o => o.status === 'sold_out' || o.status === 'ended');
    const empty = !live.length && !upcoming.length && !completed.length;
    sec.innerHTML = `
      <h2 class="text-xl font-bold mb-4">Token Offerings</h2>
      ${empty
        ? '<p class="text-[#4e5872] text-sm">No ICO offerings</p>'
        : renderSection('🟢 Live ICOs', live.map(liveCard)) +
          renderSection('🕐 Upcoming ICOs', upcoming.map(upcomingCard)) +
          renderSection('✅ Completed ICOs', completed.map(completedCard))
      }`;
  }

  window.investICO = async (id) => {
    const amt = document.getElementById(`ico-amt-${id}`)?.value;
    const msg = document.getElementById(`ico-msg-${id}`);
    try {
      const d = await api('POST', `/api/ico/${id}/invest`, { usdc_amount: amt });
      if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = `Received ${d.tokens_received.toFixed(4)} ${d.symbol}`; }
      await refreshBalances();
    } catch (e) { if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; } }
  };
  await load();
}

    <div class="flex gap-2 mb-4 border-b border-[rgba(255,255,255,0.06)] pb-2 flex-wrap">

// ── SVG Line Chart ────────────────────────────────────────────────────────────
function svgLineChart(points, opts = {}) {
  const { width = 480, height = 120, color = '#7c3aed', refLine = null } = opts;
  if (!points || points.length < 2) {
    return `<svg viewBox="0 0 ${width} ${height}" width="100%" class="rounded-lg bg-[#161b2a]/80">
      <text x="${width/2}" y="${height/2}" text-anchor="middle" fill="#4e5872" font-size="11">No history yet</text></svg>`;
  }
  const pad = { top: 16, right: 10, bottom: 20, left: 38 };
  const W = width - pad.left - pad.right;
  const H = height - pad.top - pad.bottom;
  const xs = points.map(p => p.x);
  const ys = points.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  let yMin = opts.yMin != null ? opts.yMin : Math.min(...ys);
  let yMax = opts.yMax != null ? opts.yMax : Math.max(...ys);
  if (yMax - yMin < 0.001) { yMin -= 1; yMax += 1; }
  const xScale = x => pad.left + (xMax === xMin ? W / 2 : (x - xMin) / (xMax - xMin) * W);
  const yScale = y => pad.top + H - ((y - yMin) / (yMax - yMin)) * H;
  const polyline = points.map(p => `${xScale(p.x).toFixed(1)},${yScale(p.y).toFixed(1)}`).join(' ');
  const fmt = ts => { const d = new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
  const fmtY = v => v >= 10000 ? (v/1000).toFixed(1)+'k' : v >= 1 ? v.toFixed(1) : v.toFixed(4);
  let refLineEl = '';
  if (refLine != null && refLine >= yMin && refLine <= yMax) {
    const ry = yScale(refLine).toFixed(1);
    refLineEl = `<line x1="${pad.left}" y1="${ry}" x2="${pad.left+W}" y2="${ry}" stroke="#4e5872" stroke-width="1" stroke-dasharray="3,3"/>`;
  }
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" class="rounded-lg bg-[#161b2a]/80">
    <rect x="${pad.left}" y="${pad.top}" width="${W}" height="${H}" fill="#0d1021" rx="4"/>
    ${refLineEl}
    <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${xScale(xs[xs.length-1]).toFixed(1)}" cy="${yScale(ys[ys.length-1]).toFixed(1)}" r="3" fill="${color}"/>
    <text x="${pad.left}" y="${pad.top-3}" fill="#8b95ab" font-size="9">${fmt(xMin)}</text>
    <text x="${pad.left+W}" y="${pad.top-3}" fill="#8b95ab" font-size="9" text-anchor="end">${fmt(xMax)}</text>
    <text x="${pad.left-3}" y="${pad.top+5}" fill="#8b95ab" font-size="9" text-anchor="end">${fmtY(yMax)}</text>
    <text x="${pad.left-3}" y="${pad.top+H}" fill="#8b95ab" font-size="9" text-anchor="end">${fmtY(yMin)}</text>
  </svg>`;
}

async function renderMarkets(sec) {
  if (S.marketId) { await renderMarketDetail(sec); return; }

  function fmtCountdown(closesAt) {
    const ms = new Date(closesAt) - Date.now();
    if (ms <= 0) return 'closing';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 1) return `${h}h ${m}m`;
    return m > 0 ? `${m}m` : 'closing';
  }

  function marketCard(m, opts = {}) {
    const yesPct = (Number(m.yes_pool)/(Number(m.yes_pool)+Number(m.no_pool))*100).toFixed(1);

        ${opts.daily && m.closes_at ? `<span class="text-amber-400">&#x23f1; ${fmtCountdown(m.closes_at)}</span>` :

      ${m.resolved_outcome ? `<div class="text-xs text-[#4e9af1]">&#x2713; Resolved: ${m.resolved_outcome}</div>` : ''}

  }

  async function load() {

    sec.innerHTML = `

        <h2 class="text-xl font-bold">Opinion Markets</h2>
        <button class="btn btn-z text-xs" onclick="toggleCreate()">+ New Market</button>
      </div>
      ${dailyToday.length ? `
      <div class="mb-5">
        <h3 class="font-semibold text-sm text-amber-400 mb-2">&#x1f4c5; Today's Markets</h3>
        <div class="space-y-3">${dailyToday.map(m => marketCard(m, { daily: true })).join('')}</div>
      </div>` : ''}
      <div id="create-market-form" class="${showCreate ? '' : 'hidden'} card space-y-2 mb-4">
        <h3 class="font-semibold text-sm">Create Market</h3>

      <div class="space-y-3">${otherMarkets.map(m => marketCard(m)).join('')}</div>` :
      dailyToday.length ? '' : '<p class="text-[#4e5872] text-sm">No markets</p>'}

// ── Trade Journal ─────────────────────────────────────────────────────────────
async function renderJournal(sec) {
  let filterType = 'all', filterDir = 'all', filterStatus = 'all';
  const JOURNAL_LIVE_TICKERS = new Set(['BTC','ETH','BNB','SOL','XRP','USDT','ADA','DOGE','TON','LINK','DOT','AVAX']);

  function entryPnl(e) {
    if (e.exit_price == null) return null;
    return (parseFloat(e.exit_price) - parseFloat(e.entry_price)) * parseFloat(e.quantity) * (e.direction === 'long' ? 1 : -1);
  }

  async function load() {
    const { entries } = await api('GET', '/api/journal');

    const closed = entries.filter(e => e.exit_price != null);
    const open = entries.filter(e => e.exit_price == null);
    const totalPnl = closed.reduce((s, e) => s + (entryPnl(e) || 0), 0);
    const wins = closed.filter(e => (entryPnl(e) || 0) > 0);
    const winRate = closed.length > 0 ? Math.round(wins.length / closed.length * 100) : null;

    let filtered = entries;
    if (filterType !== 'all') filtered = filtered.filter(e => e.asset_type === filterType);
    if (filterDir !== 'all') filtered = filtered.filter(e => e.direction === filterDir);

        </div>
        <div class="card text-center py-3">
          <div class="text-[#8b95ab] text-xs mb-1">Open</div>

          <div class="text-[#8b95ab] text-xs mb-1">Win Rate</div>

        </div>
        <div class="card text-center py-3">
          <div class="text-[#8b95ab] text-xs mb-1">Realised P&amp;L</div>
          <div class="text-2xl font-bold ${totalPnl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${totalPnl >= 0 ? '+' : ''}$${Math.abs(totalPnl).toFixed(2)}</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-4 items-center">
        <select id="jf-type" class="inp text-sm" style="width:auto;padding:4px 8px;height:auto" onchange="jSetFilter('type',this.value)">
          <option value="all">All types</option>
          <option value="crypto">Crypto</option>
          <option value="stock">Stock</option>
          <option value="etf">ETF</option>
        </select>
        <select id="jf-dir" class="inp text-sm" style="width:auto;padding:4px 8px;height:auto" onchange="jSetFilter('dir',this.value)">
          <option value="all">All directions</option>
          <option value="long">Long</option>
          <option value="short">Short</option>
        </select>
        <select id="jf-status" class="inp text-sm" style="width:auto;padding:4px 8px;height:auto" onchange="jSetFilter('status',this.value)">
          <option value="all">All statuses</option>
          <option value="open">Open</option>
          <option value="closed">Closed</option>
        </select>
        <button class="btn btn-z text-sm px-3 py-1" onclick="jResetFilters()">Reset</button>
        <button class="btn btn-v text-sm px-3 py-1 ml-auto" onclick="openLogTradeModal()">+ Log Trade</button>
      </div>
      ${filtered.length === 0
        ? `<div class="card text-center py-8 text-[#8b95ab] text-sm">No trades yet. Click <strong>+ Log Trade</strong> to get started.</div>`
        : `<div class="space-y-2">${filtered.map(e => {
            const pnl = entryPnl(e);
            const isOpen = e.exit_price == null;
            const qty = parseFloat(e.quantity);
            return `<div class="card flex flex-wrap gap-3 items-center text-sm">
              <div class="shrink-0 min-w-[3.5rem]">
                <div class="font-bold text-[#e8eaf0]">${esc(e.ticker)}</div>
                <div class="text-xs text-[#8b95ab]">${esc(e.asset_type)}</div>
              </div>
              <span class="text-xs font-semibold px-1.5 py-0.5 rounded shrink-0 ${e.direction === 'long' ? 'bg-emerald-900/40 text-emerald-400' : 'bg-red-900/40 text-red-400'}">${e.direction.toUpperCase()}</span>
              <div class="shrink-0">
                <div class="font-mono text-xs">&times;${qty < 1 ? qty.toFixed(4) : qty.toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">qty</div>
              </div>
              <div class="shrink-0">
                <div class="font-mono text-xs">$${parseFloat(e.entry_price).toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">entry</div>
              </div>
              ${!isOpen ? `<div class="shrink-0">
                <div class="font-mono text-xs">$${parseFloat(e.exit_price).toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">exit</div>
              </div>` : ''}
              ${pnl !== null ? `<div class="shrink-0">
                <div class="font-mono text-xs font-semibold ${pnl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl).toFixed(2)}</div>
                <div class="text-xs text-[#4e5872]">P&amp;L</div>
              </div>` : ''}
              <div class="ml-auto flex items-center gap-2 shrink-0">
                <span class="text-xs ${isOpen ? 'text-amber-400' : 'text-[#4e5872]'}">${isOpen ? 'open' : 'closed'}</span>
                ${isOpen ? `<button class="btn btn-z text-xs px-2 py-0.5" onclick="openEditTradeModal(${e.id},${parseFloat(e.entry_price)})">Edit</button>` : ''}
                <button class="btn text-xs px-2 py-0.5 border-red-900/40 hover:border-red-500/40 text-red-400" onclick="deleteTradeEntry(${e.id})">&#x2715;</button>
              </div>
            </div>`;
          }).join('')}</div>`
      }`;

    const selType = document.getElementById('jf-type');
    const selDir = document.getElementById('jf-dir');
    const selStatus = document.getElementById('jf-status');
    if (selType) selType.value = filterType;
    if (selDir) selDir.value = filterDir;
    if (selStatus) selStatus.value = filterStatus;

    window.jSetFilter = (key, val) => {
      if (key === 'type') filterType = val;
      else if (key === 'dir') filterDir = val;
      else if (key === 'status') filterStatus = val;
      load();
    };
    window.jResetFilters = () => { filterType = 'all'; filterDir = 'all'; filterStatus = 'all'; load(); };
    window.deleteTradeEntry = async (id) => {
      if (!confirm('Delete this trade entry?')) return;
      try { await api('DELETE', `/api/journal/${id}`); load(); } catch (e) { alert(e.message); }

  }

  window.openLogTradeModal = () => {

    modal.className = 'fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-4';

        <div class="flex justify-between items-center">
          <h3 class="font-bold text-lg">Log Trade</h3>
          <button onclick="document.getElementById('journal-trade-modal')?.remove()" class="text-[#8b95ab] hover:text-[#e8eaf0] text-xl leading-none">&#x2715;</button>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Asset Type</label>
          <select id="jt-type" class="inp w-full" onchange="jClearLivePrice()">
            <option value="crypto">Crypto</option>
            <option value="stock">Stock</option>
            <option value="etf">ETF</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Ticker</label>
          <input id="jt-ticker" type="text" class="inp w-full" placeholder="e.g. BTC, ETH, AAPL" autocomplete="off">
          <span id="journal-live-price" style="font-size:0.85em;color:#aaa;" class="mt-0.5 block min-h-[1.2em]"></span>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Direction</label>
          <select id="jt-direction" class="inp w-full">
            <option value="long">Long &#x25b2;</option>
            <option value="short">Short &#x25bc;</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Quantity</label>
          <input id="jt-qty" type="number" class="inp w-full" placeholder="0.00" min="0" step="any">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Entry Price ($)</label>
          <input id="jt-entry" type="number" class="inp w-full" placeholder="0.00" min="0" step="any">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Date</label>
          <input id="jt-date" type="date" class="inp w-full" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Notes (optional)</label>
          <textarea id="jt-notes" class="inp w-full" rows="2" placeholder="Strategy, reasoning…" style="resize:vertical"></textarea>
        </div>
        <div class="flex gap-2 pt-1">
          <button class="btn btn-v flex-1" onclick="submitLogTrade()">Log trade</button>
          <button class="btn btn-z flex-1" onclick="document.getElementById('journal-trade-modal')?.remove()">Cancel</button>
        </div>
        <p id="jt-msg" class="text-sm"></p>
      </div>`;
    document.body.appendChild(modal);

    let _jpDebounce = null;
    const tickerInput = document.getElementById('jt-ticker');
    const typeSelect = document.getElementById('jt-type');
    const liveLabel = document.getElementById('journal-live-price');
    const entryInput = document.getElementById('jt-entry');

    window.jClearLivePrice = () => { if (liveLabel) liveLabel.textContent = ''; };

    function lookupLivePrice() {
      clearTimeout(_jpDebounce);
      _jpDebounce = setTimeout(async () => {
        const ticker = tickerInput.value.trim().toUpperCase();
        if (!ticker || typeSelect.value !== 'crypto' || !JOURNAL_LIVE_TICKERS.has(ticker)) {
          if (liveLabel) liveLabel.textContent = '';
          return;
        }
        try {
          const { prices } = await api('GET', `/api/ticker-prices?symbols=${ticker}`);
          const p = prices[ticker];
          if (p != null) {
            if (liveLabel) liveLabel.textContent = `Live: $${p >= 1 ? p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : p.toFixed(4)}`;
            if (entryInput && !entryInput.value) entryInput.value = p.toString();
          } else {
            if (liveLabel) liveLabel.textContent = '';
          }
        } catch { if (liveLabel) liveLabel.textContent = ''; }
      }, 500);
    }

    if (tickerInput) tickerInput.addEventListener('input', lookupLivePrice);

    window.submitLogTrade = async () => {
      const msg = document.getElementById('jt-msg');
      try {
        await api('POST', '/api/journal', {
          asset_type: typeSelect.value,
          ticker: tickerInput.value.trim().toUpperCase(),
          direction: document.getElementById('jt-direction').value,
          quantity: document.getElementById('jt-qty').value,
          entry_price: document.getElementById('jt-entry').value,
          trade_date: document.getElementById('jt-date').value,
          notes: document.getElementById('jt-notes').value,

    modal.id = 'journal-trade-modal';
    modal.className = 'fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="bg-[#131620] border border-[rgba(255,255,255,0.08)] rounded-xl max-w-md w-full p-6 space-y-3">
        <div class="flex justify-between items-center">
          <h3 class="font-bold text-lg">Close Trade</h3>
          <button onclick="document.getElementById('journal-trade-modal')?.remove()" class="text-[#8b95ab] hover:text-[#e8eaf0] text-xl leading-none">&#x2715;</button>
        </div>
        <p class="text-sm text-[#8b95ab]">Entry price: <span class="font-mono text-[#e8eaf0]">$${parseFloat(entryPrice).toFixed(2)}</span></p>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Exit Price ($)</label>
          <input id="je-exit" type="number" class="inp w-full" placeholder="0.00" min="0" step="any">
        </div>
        <div>
          <label class="text-xs text-[#8b95ab] block mb-1">Notes (optional)</label>
          <textarea id="je-notes" class="inp w-full" rows="2" style="resize:vertical"></textarea>
        </div>
        <div class="flex gap-2 pt-1">
          <button class="btn btn-v flex-1" onclick="submitEditTrade(${id})">Save</button>
          <button class="btn btn-z flex-1" onclick="document.getElementById('journal-trade-modal')?.remove()">Cancel</button>
        </div>
        <p id="je-msg" class="text-sm"></p>
      </div>`;
    document.body.appendChild(modal);

    window.submitEditTrade = async (tid) => {
      const msg = document.getElementById('je-msg');
      try {
        const exitVal = document.getElementById('je-exit')?.value;
        const notesVal = document.getElementById('je-notes')?.value;
        const body = {};
        if (exitVal) body.exit_price = exitVal;
        if (notesVal) body.notes = notesVal;
        await api('PATCH', `/api/journal/${tid}`, body);
        document.getElementById('journal-trade-modal')?.remove();
        load();
      } catch (e) {
        if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; }
      }
    };
  };

  await load();
}

// ── Messages ──────────────────────────────────────────────────────────────────
// Inbox + thread live in one section; S.msgOpenConv decides which renders.
// Thread polling reuses the shared _activeInterval (navigate clears it).
async function renderMessages(sec) {
  const openId = S.msgOpenConv; S.msgOpenConv = null;
  if (openId) { await openThread(sec, openId); }
  else { await renderInbox(sec); }
}

async function renderInbox(sec) {
  clearInterval(_activeInterval); _activeInterval = null;
  sec.innerHTML = spin();
  let data;
  try { data = await api('GET', '/api/conversations' + (MSG_DEMO ? '?demo=1' : '')); }
  catch (e) { sec.innerHTML = err(e.message); return; }
  setUnreadBadge(Number(data.total_unread) || 0);
  const convos = data.conversations || [];
  const row = (c) => {
    const isGroup = c.type === 'group';
    const title = isGroup ? (c.title || 'Group') : ('@' + (c.other_username || 'unknown'));
    const avatarName = isGroup ? (c.title || 'Group') : (c.other_username || '?');
    const preview = c.last_message
      ? (isGroup ? esc(c.last_message.sender_username) + ': ' : '') + esc(c.last_message.content)
      : '<span class="italic text-zinc-600">No messages yet</span>';
    const when = c.last_message ? tsAgo(c.last_message.created_at) : '';
    const unread = c.unread > 0;
    return `<button class="card w-full text-left flex items-center gap-3 hover:border-zinc-600 ${unread ? 'border-violet-500/40 bg-violet-600/5' : ''}" onclick="openConversation(${c.id})">
      ${avatarImg(avatarName, 'w-10 h-10')}
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2">
          <span class="font-medium truncate ${unread ? 'text-white' : 'text-zinc-200'}">${esc(title)}</span>
          ${isGroup ? `<span class="text-xs text-zinc-500 shrink-0">👥 ${c.member_count}</span>` : ''}
          <span class="ml-auto text-xs text-zinc-500 shrink-0">${when}</span>
        </div>
        <div class="flex items-center gap-2 mt-0.5">
          <span class="text-sm truncate ${unread ? 'text-zinc-200' : 'text-zinc-500'}">${preview}</span>
          ${unread ? `<span class="ml-auto shrink-0 min-w-[1.25rem] px-1.5 py-0.5 rounded-full bg-violet-600 text-white text-[0.65rem] font-bold text-center leading-none">${c.unread}</span>` : ''}
        </div>
      </div>
    </button>`;
  };
  sec.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold">💬 Messages</h2>
      <div class="flex gap-2">
        <button class="btn btn-z text-xs" onclick="openNewGroupModal()">New group</button>
        <button class="btn btn-v text-xs" onclick="openNewMessageModal()">New message</button>
      </div>
    </div>
    ${convos.length ? `<div class="space-y-2">${convos.map(row).join('')}</div>`
      : `<div class="card text-center py-10 text-zinc-500">
           <div class="text-3xl mb-2">✉️</div>
           <p class="mb-3">No conversations yet</p>
           <button class="btn btn-v text-xs" onclick="openNewMessageModal()">Start a conversation</button>
         </div>`}
  `;
}

async function openThread(sec, convId) {
  clearInterval(_activeInterval); _activeInterval = null;
  sec.innerHTML = spin();
  let data;
  try { data = await api('GET', `/api/conversations/${convId}/messages`); }
  catch (e) { sec.innerHTML = err(e.message); return; }
  refreshUnreadBadge(); // server marked this thread read
  const conv = data.conversation;
  const isGroup = conv.type === 'group';
  const title = isGroup ? (conv.title || 'Group') : ('@' + (conv.other_username || 'unknown'));
  const myId = S.user && S.user.user_id;

  const paint = (msgs) => {
    const box = sec.querySelector('#msg-scroll');
    if (!box) return;
    box.innerHTML = (msgs || []).map(m => {
      const mine = m.sender_user_id === myId;
      if (mine) {
        return `<div class="flex justify-end"><div class="max-w-[75%]">
          <div class="bg-violet-600 text-white rounded-2xl rounded-br-sm px-3 py-2 text-sm break-words whitespace-pre-wrap">${esc(m.content)}</div>
          <div class="text-[0.65rem] text-zinc-500 text-right mt-0.5">${tsAgo(m.created_at)}</div>
        </div></div>`;
      }
      return `<div class="flex gap-2">
        ${avatarImg(m.sender_username, 'w-7 h-7')}
        <div class="max-w-[75%]">
          ${isGroup ? `<div class="text-xs text-zinc-500 mb-0.5">@${esc(m.sender_username)}</div>` : ''}
          <div class="bg-zinc-800 rounded-2xl rounded-bl-sm px-3 py-2 text-sm break-words whitespace-pre-wrap">${esc(m.content)}</div>
          <div class="text-[0.65rem] text-zinc-500 mt-0.5">${tsAgo(m.created_at)}</div>
        </div>
      </div>`;
    }).join('') || '<p class="text-zinc-600 text-sm text-center py-6">No messages yet — say hi!</p>';
    box.scrollTop = box.scrollHeight;
  };

  sec.innerHTML = `
    <div class="flex items-center gap-2 mb-3">
      <button class="text-lg text-zinc-400 hover:text-white px-1" onclick="backToInbox()" title="Back">←</button>
      ${avatarImg(isGroup ? (conv.title || 'Group') : (conv.other_username || '?'), 'w-8 h-8')}
      <div class="min-w-0">
        <div class="font-semibold truncate">${esc(title)}</div>
        ${isGroup ? `<div class="text-xs text-zinc-500">${conv.member_count} members</div>` : ''}
      </div>
      ${isGroup ? `<button class="btn btn-z text-xs ml-auto" onclick="openAddPeopleModal(${conv.id})">Add people</button>` : ''}
    </div>
    <div id="msg-scroll" class="space-y-2 mb-3 h-[60vh] overflow-y-auto pr-1"></div>
    <form id="msg-form" class="flex gap-2">
      <input id="msg-input" class="inp flex-1" placeholder="Type a message…" autocomplete="off" maxlength="4000">
      <button class="btn btn-v shrink-0" type="submit">Send</button>
    </form>
  `;
  paint(data.messages);

  const form = sec.querySelector('#msg-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = sec.querySelector('#msg-input');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    try {
      await api('POST', `/api/conversations/${convId}/messages`, { content });
      const d = await api('GET', `/api/conversations/${convId}/messages`);
      paint(d.messages);
    } catch (e2) { alert(e2.message); input.value = content; }
  });
  sec.querySelector('#msg-input')?.focus();

  // Live refresh while the thread is open.
  _activeInterval = setInterval(async () => {
    try { const d = await api('GET', `/api/conversations/${convId}/messages`); paint(d.messages); }
    catch (_) {}
  }, 4000);
}

window.openConversation = (id) => navigate('messages', { msgOpenConv: id });
window.backToInbox = () => navigate('messages');

// ── Messaging: recipient picker + modals ────────────────────────────────────────
// Removes any existing messaging modal first so re-opens don't stack.
function _closeMsgModal() { document.getElementById('msg-modal')?.remove(); }

// Builds a search-and-select control inside the modal. `multi` toggles between
// single-pick (direct) and multi-pick (group / add people). Returns nothing —
// selection state lives in the modal's dataset via _msgSelected.
let _msgSelected = [];
function _renderSelected() {
  const wrap = document.getElementById('msg-selected');
  if (!wrap) return;
  wrap.innerHTML = _msgSelected.map(u =>
    `<span class="tag-basic inline-flex items-center gap-1">@${esc(u)}
       <button class="text-zinc-400 hover:text-white" onclick="msgRemovePick('${esc(u)}')">✕</button></span>`
  ).join('');
}
window.msgRemovePick = (u) => { _msgSelected = _msgSelected.filter(x => x !== u); _renderSelected(); };

async function _msgSearch(q, multi) {
  const results = document.getElementById('msg-results');
  if (!results) return;
  if (!q.trim()) { results.innerHTML = ''; return; }
  let users = [];
  try { users = (await api('GET', '/api/users/search?q=' + encodeURIComponent(q.trim()))).users || []; }
  catch (_) {}
  if (!users.length) { results.innerHTML = '<p class="text-zinc-600 text-sm py-2">No users found</p>'; return; }
  results.innerHTML = users.map(u => `
    <button class="w-full text-left flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-zinc-800" onclick="msgPick('${esc(u.username)}', ${multi})">
      ${avatarImg(u.username, 'w-7 h-7')}
      <span class="text-sm">@${esc(u.username)}${u.display_name ? ` <span class="text-zinc-500">· ${esc(u.display_name)}</span>` : ''}</span>
    </button>`).join('');
}

window.msgPick = async (username, multi) => {
  if (multi) {
    if (!_msgSelected.includes(username)) _msgSelected.push(username);
    _renderSelected();
    const inp = document.getElementById('msg-search'); if (inp) { inp.value = ''; inp.focus(); }
    document.getElementById('msg-results').innerHTML = '';
  } else {
    // Direct: create-or-find immediately, then open the thread.
    try {
      const d = await api('POST', '/api/conversations', { type: 'direct', username });
      _closeMsgModal();
      navigate('messages', { msgOpenConv: d.id });
    } catch (e) { alert(e.message); }
  }
};

function _openMsgModal(innerHtml) {
  _closeMsgModal();
  const modal = document.createElement('div');
  modal.id = 'msg-modal';
  modal.className = 'fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4';
  modal.onclick = (e) => { if (e.target.id === 'msg-modal') _closeMsgModal(); };
  modal.innerHTML = `<div class="card w-full max-w-md max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">${innerHtml}</div>`;
  document.body.appendChild(modal);
}

window.openNewMessageModal = () => {
  _msgSelected = [];
  _openMsgModal(`
    <div class="flex items-center justify-between mb-3">

// ── Futures Terminal ──────────────────────────────────────────────────────────
async function renderFutures(sec) {
  let side = 'long', leverage = 5, qty = '';
  let _chart = null, _areaSeries = null;
  let _futuresTab = 'positions';
  let _markets = [], _positions = [], _paperBal = 0;

  // ── Lazy-load TradingView Lightweight Charts v4 ──────────────────────────────
  async function loadLWC() {
    if (window.__LWC) return window.__LWC;
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js';
      s.onload = () => { window.__LWC = window.LightweightCharts; resolve(window.__LWC); };
      s.onerror = () => reject(new Error('LWC load failed'));
      document.head.appendChild(s);
    });
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function pricePrecision(mp) { return mp < 1 ? 6 : mp < 100 ? 4 : 2; }

  function buildOrderBook(mp) {
    const prec = pricePrecision(mp);
    const asks = [], bids = [];
    for (let i = 0; i < 8; i++) {
      asks.push({ price: (mp * (1 + (i + 1) * 0.00025)).toFixed(prec), size: (Math.floor(mp * (i + 3) * 17) % 80) + 15 });
      bids.push({ price: (mp * (1 - (i + 1) * 0.00025)).toFixed(prec), size: (Math.floor(mp * (i + 5) * 13) % 80) + 15 });
    }
    return { asks: asks.reverse(), bids };
  }

  function renderOrderBookHtml(mp) {
    const { asks, bids } = buildOrderBook(mp);
    const maxSz = Math.max(...asks.map(a => a.size), ...bids.map(b => b.size));
    const spread = (parseFloat(asks[asks.length - 1].price) - parseFloat(bids[0].price)).toFixed(pricePrecision(mp));
    const askRows = asks.map(a =>
      `<div class="fut-ob-row fut-ob-ask py-0.5 px-2 flex justify-between text-xs font-mono" style="--bar-w:${(a.size/maxSz*100).toFixed(1)}%">
        <span class="fut-ask">${a.price}</span><span class="text-[#8b95ab]">${a.size}</span>
      </div>`).join('');
    const bidRows = bids.map(b =>
      `<div class="fut-ob-row fut-ob-bid py-0.5 px-2 flex justify-between text-xs font-mono" style="--bar-w:${(b.size/maxSz*100).toFixed(1)}%">
        <span class="fut-bid">${b.price}</span><span class="text-[#8b95ab]">${b.size}</span>
      </div>`).join('');
    return `
      <div class="flex justify-between text-[10px] text-[#4e5872] px-2 mb-0.5"><span>Price</span><span>Size</span></div>
      ${askRows}
      <div class="py-1 px-2 text-center text-xs text-[#8b95ab] border-y" style="border-color:var(--border-t)">Spread: ${spread}</div>
      ${bidRows}
      <div class="text-[9px] text-[#4e5872] text-center mt-1 pb-1">Simulated depth</div>`;
  }

  function calcPreview(mkt) {
    if (!qty || !mkt || isNaN(parseFloat(qty))) return null;
    const mp = parseFloat(mkt.mark_price);
    const prec = pricePrecision(mp);
    const margin = parseFloat(qty) * mp / leverage;
    const liqP = side === 'long' ? mp * (1 - 0.9 / leverage) : mp * (1 + 0.9 / leverage);
    return { margin: margin.toFixed(2), liq: liqP.toFixed(prec) };
  }

  function buildPositionsHtml(openPos) {
    if (!openPos.length) return `<tr><td colspan="10" class="py-4 text-center text-[#4e5872] text-xs">No open positions</td></tr>`;
    return openPos.map(p => {
      const pnl = parseFloat(p.unrealized_pnl || 0) / 1e6;
      const fund = parseFloat(p.funding_paid || 0) / 1e6;
      return `<tr class="border-t hover:bg-[rgba(255,255,255,0.02)] transition-colors fut-pos-row" style="border-color:var(--border-t)" data-pos-id="${p.id}">
        <td class="py-1.5 pr-3 pl-3 text-xs font-medium">${esc(p.symbol)}</td>
        <td class="pr-3 text-xs">${p.mode === 'paper' ? '📄' : '⚡'}</td>
        <td class="pr-3 text-xs ${p.side === 'long' ? 'fut-bid' : 'fut-ask'}">${p.side}</td>
        <td class="pr-3 text-xs">${p.leverage}×</td>
        <td class="pr-3 font-mono text-xs">${parseFloat(p.quantity).toFixed(4)}</td>
        <td class="pr-3 font-mono text-xs">$${parseFloat(p.entry_price).toFixed(2)}</td>
        <td class="pr-3 font-mono text-xs">$${parseFloat(p.mark_price || 0).toFixed(2)}</td>
        <td class="pr-3 text-xs ${fund >= 0 ? 'fut-bid' : 'fut-ask'}">${fund >= 0 ? '+' : ''}${fund.toFixed(2)}</td>
        <td class="pr-3 text-xs font-bold fut-pnl-cell ${pnl >= 0 ? 'fut-bid' : 'fut-ask'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</td>
        <td class="pr-2"><button class="text-[11px] px-2 py-0.5 rounded border transition-all" style="border-color:var(--short);color:var(--short)" onmouseenter="this.style.background='var(--short)';this.style.color='#fff'" onmouseleave="this.style.background='';this.style.color='var(--short)'" onclick="futClosePosBtn(${p.id})">Close</button></td>
      </tr>`;
    }).join('');
  }

  function buildHistoryHtml(closedPos) {
    if (!closedPos.length) return `<tr><td colspan="6" class="py-4 text-center text-[#4e5872] text-xs">No trade history</td></tr>`;
    return closedPos.map(p => {
      const pnl = parseFloat(p.realized_pnl || 0) / 1e6;
      return `<tr class="border-t" style="border-color:var(--border-t)">
        <td class="py-1.5 pr-3 pl-3 text-xs font-medium">${esc(p.symbol)}</td>
        <td class="pr-3 text-xs ${p.side === 'long' ? 'fut-bid' : 'fut-ask'}">${p.side}</td>
        <td class="pr-3 text-xs">${p.leverage}×</td>
        <td class="pr-3 font-mono text-xs">$${parseFloat(p.entry_price).toFixed(2)}</td>
        <td class="pr-3 text-xs ${p.status === 'liquidated' ? 'fut-ask' : 'text-[#8b95ab]'}">${p.status}</td>
        <td class="text-xs font-bold ${pnl >= 0 ? 'fut-bid' : 'fut-ask'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</td>
      </tr>`;
    }).join('');
  }

  // ── initialRender: build full terminal skeleton ───────────────────────────────
  async function initialRender() {
    sec.innerHTML = `<div class="flex justify-center py-12"><div class="spinner"></div></div>`;
    try {
      const [marketsData, posData, pb] = await Promise.all([
        api('GET', '/api/futures/markets'),
        api('GET', '/api/futures/positions'),
        api('GET', '/api/futures/paper-balance').then(d => d.balance).catch(() => 0),
      ]);
      await refreshBalances();
      _markets = marketsData.markets || [];
      _positions = posData.positions || [];
      _paperBal = pb;
    } catch (e) {
      sec.innerHTML = `<div class="p-8 text-center text-[#4e5872] text-sm">Failed to load futures data: ${esc(e.message)}</div>`;
      return;
    }

    if (!S.futuresMarket && _markets.length) S.futuresMarket = _markets[0];
    const mkt = _markets.find(m => m.id === S.futuresMarket?.id) || _markets[0];
    if (mkt) S.futuresMarket = mkt;

    const mp = mkt ? parseFloat(mkt.mark_price) : 0;
    const prec = pricePrecision(mp);
    const futTier = (S.kyc && S.kyc.status === 'approved') ? S.kyc.level : 'basic';
    const openPositions = _positions.filter(p => p.status === 'open');
    const closedPositions = _positions.filter(p => p.status !== 'open').slice(0, 20);
    const fundingRate = mkt ? parseFloat(mkt.funding_rate || 0) * 100 : 0;
    const nextFunding = mkt && mkt.next_funding_at ? fundingCountdown(mkt.next_funding_at) : '—';
    const openInterest = mkt ? (Number(mkt.open_interest || 0) / 1e6).toFixed(1) : '0';

    const balHtml = S.futuresMode === 'paper'
      ? `<span class="text-[#8b95ab] text-xs">Paper:</span> <span class="font-mono text-xs" style="color:var(--long)">$${fmtUSD(_paperBal)}</span>`
      : `<span class="text-amber-400 text-xs">⚡ LIVE</span> <span class="font-mono text-xs text-emerald-400">${getBal('USDC')}</span>`;

    let tierWarnHtml = '';
    if (S.futuresMode === 'live' && futTier === 'basic')
      tierWarnHtml = `<div class="text-xs text-amber-300 mt-1.5">🔒 Live trading needs <b>Social</b> verification. <button class="underline opacity-80 hover:opacity-100" onclick="navigate('verify')">Verify →</button></div>`;
    else if (S.futuresMode === 'live' && futTier === 'social')
      tierWarnHtml = `<div class="text-xs mt-1.5" style="color:var(--long)">Social: up to 5× leverage. <button class="underline opacity-80" onclick="navigate('verify')">Go Premium for 20× →</button></div>`;

    const mktTabsHtml = _markets.map(m =>
      `<button class="fut-mkt-tab px-3 py-1 text-xs font-mono rounded-sm ${S.futuresMarket?.id === m.id ? 'fut-mkt-tab-active' : ''}" onclick="futSwitchMarket(${m.id})">${esc(m.symbol)}</button>`
    ).join('');

    const LEV_PRESETS = [1, 2, 3, 5, 10, 20];
    const levPresetsHtml = LEV_PRESETS.map(l =>
      `<button class="fut-lev-preset px-2 py-0.5 text-xs rounded border border-[rgba(255,255,255,0.08)] transition-all ${leverage === l ? 'lev-active' : 'text-[#8b95ab] hover:text-[#e8eaf0]'}" onclick="futSetLeverage(${l})">${l}×</button>`
    ).join('');

    const preview = calcPreview(mkt);

    sec.innerHTML = `
<div class="futures-terminal" id="fut-root">

  <!-- ── Market Header Bar ── -->
  <div class="fut-header flex flex-wrap items-center gap-x-4 gap-y-1 px-3 py-2 border-b" style="border-color:var(--border-t)">
    <div class="flex gap-1 flex-wrap" id="fut-mkt-tabs">${mktTabsHtml}</div>
    <div class="h-4 w-px bg-[rgba(255,255,255,0.08)] hidden sm:block"></div>
    <span id="fut-header-price" class="text-lg font-mono font-bold text-[#e8eaf0]">$${mp.toFixed(prec)}</span>
    <div class="flex gap-4 text-xs">
      <div class="flex flex-col leading-tight">
        <span class="text-[#4e5872]">Funding</span>
        <span id="fut-header-funding" class="font-mono ${fundingRate >= 0 ? 'fut-bid' : 'fut-ask'}">${fundingRate >= 0 ? '+' : ''}${fundingRate.toFixed(4)}%</span>
      </div>
      <div class="flex flex-col leading-tight">
        <span class="text-[#4e5872]">Next Funding</span>
        <span id="fut-header-countdown" class="font-mono text-[#8b95ab]">${nextFunding}</span>
      </div>
      <div class="flex flex-col leading-tight">
        <span class="text-[#4e5872]">Open Interest</span>
        <span id="fut-header-oi" class="font-mono text-[#8b95ab]">$${openInterest}K</span>
      </div>
    </div>
  </div>

  <!-- ── Main 3-column area ── -->
  <div class="futures-terminal__main">

    <!-- Left: Order Book -->
    <div class="fut-panel-ob">
      <div class="px-2 py-1.5 text-[10px] font-semibold text-[#4e5872] tracking-wider uppercase border-b" style="border-color:var(--border-t)">Order Book</div>
      <div id="fut-ob-content">${renderOrderBookHtml(mp)}</div>
    </div>

    <!-- Center: Chart -->
    <div class="fut-panel-chart flex flex-col">
      <div id="fut-chart-container" class="flex-1" style="min-height:380px;display:flex;align-items:center;justify-content:center">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Right: Order Entry -->
    <div class="fut-panel-entry">
      <div class="p-3 space-y-3">
        <!-- Account row -->
        <div class="flex items-center justify-between gap-2">
          <div id="fut-balance-display" class="text-sm">${balHtml}</div>
          <div class="flex gap-1">
            <button class="text-xs px-2 py-0.5 rounded transition-all ${S.futuresMode === 'paper' ? 'border' : 'border border-[rgba(255,255,255,0.08)] text-[#8b95ab] hover:border-[rgba(255,255,255,0.2)]'}" style="${S.futuresMode === 'paper' ? 'background:rgba(38,166,154,0.12);color:#26a69a;border-color:rgba(38,166,154,0.4)' : ''}" onclick="futSetMode('paper')">Paper</button>
            <button class="text-xs px-2 py-0.5 rounded transition-all ${S.futuresMode === 'live' ? 'border' : 'border border-[rgba(255,255,255,0.08)] text-[#8b95ab] hover:border-[rgba(255,255,255,0.2)]'}" style="${S.futuresMode === 'live' ? 'background:rgba(239,83,80,0.12);color:#ef5350;border-color:rgba(239,83,80,0.35)' : ''}" onclick="futSetMode('live')">Live</button>
          </div>
        </div>
        ${tierWarnHtml}

        <!-- Long / Short tabs -->
        <div class="grid grid-cols-2 gap-1">
          <button id="fut-side-long" class="py-2 rounded text-sm font-bold transition-all ${side === 'long' ? 'fut-side-long' : 'text-[#8b95ab] hover:text-[#26a69a] border border-[rgba(255,255,255,0.06)]'}" style="${side !== 'long' ? 'background:#161b2a' : ''}" onclick="futSetSide('long')">Long ▲</button>
          <button id="fut-side-short" class="py-2 rounded text-sm font-bold transition-all ${side === 'short' ? 'fut-side-short' : 'text-[#8b95ab] hover:text-[#ef5350] border border-[rgba(255,255,255,0.06)]'}" style="${side !== 'short' ? 'background:#161b2a' : ''}" onclick="futSetSide('short')">Short ▼</button>
        </div>

        <!-- Leverage -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="text-xs text-[#4e5872]">Leverage</label>
            <span id="fut-lev-display" class="text-xs font-mono text-[#e8eaf0]">${leverage}×</span>
          </div>
          <div class="flex gap-1 flex-wrap mb-1.5" id="fut-lev-presets">${levPresetsHtml}</div>
          <input id="fut-lev-custom" type="number" min="1" max="20" value="${leverage}" class="inp text-xs py-1 text-center" placeholder="Custom 1-20×" oninput="futSetLeverageCustom(parseInt(this.value)||1)">
        </div>

        <!-- Size -->
        <div>
          <label class="text-xs text-[#4e5872]">Size</label>
          <input id="fut-qty" type="number" class="inp mt-1 text-xs" placeholder="0.0000" min="0" step="0.0001" oninput="futUpdatePreview(this.value)">
          <div id="fut-preview" class="mt-1.5 space-y-0.5 text-xs text-[#8b95ab]">${preview ? `<div>Margin: <span class="text-[#e8eaf0] font-mono">${preview.margin} USDC</span></div><div>Liq. Price: <span class="text-[#e8eaf0] font-mono">$${preview.liq}</span></div>` : ''}<div>Gas: <span class="text-[#a78bfa] font-mono">1 BLOOM</span></div></div>
        </div>

        <!-- Place Order -->
        <button id="fut-submit-btn" class="w-full py-2.5 rounded font-bold text-sm transition-all ${side === 'long' ? 'fut-side-long' : 'fut-side-short'}" onclick="futPlaceOrder()">${side === 'long' ? 'Buy / Long' : 'Sell / Short'}</button>
        <div id="fut-msg" class="text-xs text-center min-h-[1rem]"></div>
      </div>
    </div>
  </div><!-- /.futures-terminal__main -->

  <!-- ── Bottom: Positions / History tabs ── -->
  <div class="fut-panel-bottom">
    <div class="flex items-center gap-0.5 px-3 py-1 border-b" style="border-color:var(--border-t)">
      <button id="fut-tab-positions" class="fut-tab-btn ${_futuresTab === 'positions' ? 'fut-tab-active' : ''}" onclick="futSetTab('positions')">Positions <span id="fut-pos-count" class="text-[#4e5872]">(${openPositions.length})</span></button>
      <button id="fut-tab-history" class="fut-tab-btn ${_futuresTab === 'history' ? 'fut-tab-active' : ''}" onclick="futSetTab('history')">History <span id="fut-hist-count" class="text-[#4e5872]">(${closedPositions.length})</span></button>
      <div class="ml-auto pr-1"><div id="fut-pos-toast" class="text-xs font-mono hidden px-2"></div></div>
    </div>
    <div class="fut-bottom-scroll overflow-x-auto">
      <div id="fut-positions-panel" class="${_futuresTab === 'positions' ? '' : 'hidden'}">
        <table class="w-full text-xs"><thead><tr class="text-[#4e5872]">
          ${['Market','Mode','Side','Lev','Size','Entry','Mark','Funding','PnL',''].map(h=>`<th class="text-left py-1.5 pr-3 first:pl-3 font-normal">${h}</th>`).join('')}
        </tr></thead><tbody id="fut-positions-body">${buildPositionsHtml(openPositions)}</tbody></table>
      </div>
      <div id="fut-history-panel" class="${_futuresTab === 'history' ? '' : 'hidden'}">
        <table class="w-full text-xs"><thead><tr class="text-[#4e5872]">
          ${['Market','Side','Lev','Entry','Status','PnL'].map(h=>`<th class="text-left py-1.5 pr-3 first:pl-3 font-normal">${h}</th>`).join('')}
        </tr></thead><tbody id="fut-history-body">${buildHistoryHtml(closedPositions)}</tbody></table>
      </div>
    </div>
  </div>

</div><!-- /.futures-terminal -->`;

    // ── Initialize chart ──────────────────────────────────────────────────────
    const chartEl = document.getElementById('fut-chart-container');
    try {
      const LWC = await loadLWC();
      if (chartEl && LWC) {
        chartEl.innerHTML = '';
        chartEl.style.display = 'block';
        _chart = LWC.createChart(chartEl, {
          autoSize: true,
          layout: { background: { color: '#0b0e11' }, textColor: '#8b95ab', fontFamily: 'ui-monospace,monospace' },
          grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
          crosshair: { mode: 1 },
          rightPriceScale: { borderColor: 'rgba(255,255,255,0.06)' },
          timeScale: { borderColor: 'rgba(255,255,255,0.06)', timeVisible: true, secondsVisible: false },
          handleScroll: true, handleScale: true,
        });
        _areaSeries = _chart.addAreaSeries({
          topColor: 'rgba(38,166,154,0.28)',
          bottomColor: 'rgba(38,166,154,0)',
          lineColor: '#26a69a',
          lineWidth: 2,
        });
        if (mkt) {
          const { history } = await api('GET', `/api/futures/markets/${mkt.id}/history`).catch(() => ({ history: [] }));
          const pts = history
            .map(h => ({ time: Math.floor(new Date(h.created_at).getTime() / 1000), value: parseFloat(h.mark_price) }))
            .sort((a, b) => a.time - b.time)
            .filter((p, i, arr) => i === 0 || p.time !== arr[i - 1].time);
          if (pts.length > 0) { _areaSeries.setData(pts); _chart.timeScale().fitContent(); }
        }
      }
    } catch {
      if (chartEl) chartEl.innerHTML = `<div class="text-xs text-[#4e5872] p-4 text-center">Chart unavailable</div>`;
    }
  }

  // ── refresh: update dynamic DOM without destroying chart ─────────────────────
  async function refresh() {
    try {
      const [marketsData, posData, pb] = await Promise.all([
        api('GET', '/api/futures/markets'),
        api('GET', '/api/futures/positions'),
        api('GET', '/api/futures/paper-balance').then(d => d.balance).catch(() => 0),
      ]);
      _markets = marketsData.markets || [];
      _positions = posData.positions || [];
      _paperBal = pb;
    } catch { return; }

    const mkt = _markets.find(m => m.id === S.futuresMarket?.id) || _markets[0];
    if (mkt) S.futuresMarket = mkt;
    if (!mkt) return;

    const mp = parseFloat(mkt.mark_price);
    const prec = pricePrecision(mp);
    const fundingRate = parseFloat(mkt.funding_rate || 0) * 100;
    const nextFunding = mkt.next_funding_at ? fundingCountdown(mkt.next_funding_at) : '—';
    const openInterest = (Number(mkt.open_interest || 0) / 1e6).toFixed(1);
    const openPositions = _positions.filter(p => p.status === 'open');
    const closedPositions = _positions.filter(p => p.status !== 'open').slice(0, 20);

    function setEl(id, html, isText) {
      const el = document.getElementById(id);
      if (!el) return;
      if (isText) el.textContent = html; else el.innerHTML = html;
    }

    setEl('fut-header-price', '$' + mp.toFixed(prec), true);
    const fundEl = document.getElementById('fut-header-funding');
    if (fundEl) { fundEl.textContent = (fundingRate >= 0 ? '+' : '') + fundingRate.toFixed(4) + '%'; fundEl.className = 'font-mono ' + (fundingRate >= 0 ? 'fut-bid' : 'fut-ask'); }
    setEl('fut-header-countdown', nextFunding, true);
    setEl('fut-header-oi', '$' + openInterest + 'K', true);
    setEl('fut-ob-content', renderOrderBookHtml(mp));
    setEl('fut-positions-body', buildPositionsHtml(openPositions));
    setEl('fut-history-body', buildHistoryHtml(closedPositions));
    setEl('fut-pos-count', '(' + openPositions.length + ')', true);
    setEl('fut-hist-count', '(' + closedPositions.length + ')', true);

    const balEl = document.getElementById('fut-balance-display');
    if (balEl) balEl.innerHTML = S.futuresMode === 'paper'
      ? `<span class="text-[#8b95ab] text-xs">Paper:</span> <span class="font-mono text-xs" style="color:var(--long)">$${fmtUSD(_paperBal)}</span>`
      : `<span class="text-amber-400 text-xs">⚡ LIVE</span> <span class="font-mono text-xs text-emerald-400">${getBal('USDC')}</span>`;

    updatePreviewDisplay(mkt);

    if (_areaSeries) {
      try { _areaSeries.update({ time: Math.floor(Date.now() / 1000), value: mp }); } catch {}
    }
  }

  function updatePreviewDisplay(mkt) {
    const preview = calcPreview(mkt);
    const el = document.getElementById('fut-preview');
    if (!el) return;
    const bloomFutBal = parseFloat(S.balances['BLOOM'] || 0) / 1_000_000;
    const gasLine = bloomFutBal >= 1
      ? `<div>Gas: <span class="text-[#a78bfa] font-mono">1 BLOOM</span></div>`
      : `<div>Gas: <span class="text-red-400 font-mono">1 BLOOM ⚠ insufficient</span></div>`;
    el.innerHTML = preview
      ? `<div>Margin: <span class="text-[#e8eaf0] font-mono">${preview.margin} USDC</span></div><div>Liq. Price: <span class="text-[#e8eaf0] font-mono">$${preview.liq}</span></div>${gasLine}`
      : gasLine;
  }

  function updateLevUI() {
    document.querySelectorAll('.fut-lev-preset').forEach(btn => {
      const l = parseInt(btn.textContent);
      btn.classList.toggle('lev-active', l === leverage);
      btn.classList.toggle('text-[#8b95ab]', l !== leverage);
    });
    const dispEl = document.getElementById('fut-lev-display');
    if (dispEl) dispEl.textContent = leverage + '×';
  }

  function updateSideUI() {
    const lBtn = document.getElementById('fut-side-long');
    const sBtn = document.getElementById('fut-side-short');
    const subBtn = document.getElementById('fut-submit-btn');
    if (lBtn) { lBtn.className = `py-2 rounded text-sm font-bold transition-all ${side === 'long' ? 'fut-side-long' : 'text-[#8b95ab] hover:text-[#26a69a] border border-[rgba(255,255,255,0.06)]'}`; if (side !== 'long') lBtn.style.background = '#161b2a'; else lBtn.style.background = ''; }
    if (sBtn) { sBtn.className = `py-2 rounded text-sm font-bold transition-all ${side === 'short' ? 'fut-side-short' : 'text-[#8b95ab] hover:text-[#ef5350] border border-[rgba(255,255,255,0.06)]'}`; if (side !== 'short') sBtn.style.background = '#161b2a'; else sBtn.style.background = ''; }
    if (subBtn) { subBtn.className = `w-full py-2.5 rounded font-bold text-sm transition-all ${side === 'long' ? 'fut-side-long' : 'fut-side-short'}`; subBtn.textContent = side === 'long' ? 'Buy / Long' : 'Sell / Short'; }
    const mkt = _markets.find(m => m.id === S.futuresMarket?.id);
    updatePreviewDisplay(mkt);
  }

  // ── Exposed globals ───────────────────────────────────────────────────────────
  window.futSwitchMarket = async (id) => {
    clearInterval(_activeInterval); _activeInterval = null;
    const mkt = _markets.find(m => m.id === id);
    if (mkt) S.futuresMarket = mkt;
    if (_chart) { try { _chart.remove(); } catch {} _chart = null; _areaSeries = null; }
    await initialRender();
    _activeInterval = setInterval(refresh, 5000);
  };

  window.futSetMode = async (mode) => {
    S.futuresMode = mode;
    clearInterval(_activeInterval); _activeInterval = null;
    if (_chart) { try { _chart.remove(); } catch {} _chart = null; _areaSeries = null; }
    await initialRender();
    _activeInterval = setInterval(refresh, 5000);
  };

  window.futSetSide = (s) => { side = s; updateSideUI(); };

  window.futSetLeverage = (l) => {
    leverage = l;
    const custom = document.getElementById('fut-lev-custom');
    if (custom) custom.value = l;
    updateLevUI();
    const mkt = _markets.find(m => m.id === S.futuresMarket?.id);
    updatePreviewDisplay(mkt);
  };

  window.futSetLeverageCustom = (l) => {
    l = Math.max(1, Math.min(20, l || 1));
    leverage = l;
    updateLevUI();
    const mkt = _markets.find(m => m.id === S.futuresMarket?.id);
    updatePreviewDisplay(mkt);
  };

  window.futUpdatePreview = (val) => {
    qty = val;
    const mkt = _markets.find(m => m.id === S.futuresMarket?.id);
    updatePreviewDisplay(mkt);
  };

  window.futSetTab = (tab) => {
    _futuresTab = tab;
    ['positions', 'history'].forEach(t => {
      document.getElementById('fut-' + t + '-panel')?.classList.toggle('hidden', tab !== t);
      document.getElementById('fut-tab-' + t)?.classList.toggle('fut-tab-active', tab === t);
    });
  };

  window.futClosePosBtn = async (id) => {
    const row = document.querySelector(`[data-pos-id="${id}"]`);
    if (row) row.style.opacity = '0.4';
    const toast = document.getElementById('fut-pos-toast');
    try {
      const d = await api('DELETE', `/api/futures/positions/${id}`);
      if (toast) {
        const sign = d.pnl >= 0 ? '+' : '';
        toast.textContent = `Closed — PnL: ${sign}${d.pnl.toFixed(2)} USDC`;
        toast.className = `text-xs font-mono px-2 ${d.pnl >= 0 ? 'fut-bid' : 'fut-ask'}`;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
      }
      await refreshBalances();
      await refresh();
    } catch (e) {
      if (row) row.style.opacity = '1';
      if (toast) { toast.textContent = e.message; toast.className = 'text-xs font-mono px-2 fut-ask'; toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000); }
    }
  };

  window.futPlaceOrder = async () => {
    const msg = document.getElementById('fut-msg');
    const qtyEl = document.getElementById('fut-qty');
    if (!S.futuresMarket) return;
    if (msg) { msg.textContent = ''; msg.className = 'text-xs text-center min-h-[1rem]'; }
    try {
      await api('POST', '/api/futures/positions', {
        market_id: S.futuresMarket.id, side, leverage,
        quantity: parseFloat(qtyEl?.value || 0),
        mode: S.futuresMode,
        idempotency_key: 'fut-' + S.user.user_id + '-' + Date.now(),
      });
      if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-bid'; msg.textContent = '✓ Order placed'; }
      if (qtyEl) { qtyEl.value = ''; qty = ''; updatePreviewDisplay(S.futuresMarket); }
      await refreshBalances();
      await refresh();
    } catch (e) {
      if (msg) { msg.className = 'text-xs text-center min-h-[1rem] fut-ask'; msg.textContent = e.message; }
    }
  };

  // Backward-compat alias
  window.closeFutures = window.futClosePosBtn;

  await initialRender();
  _activeInterval = setInterval(refresh, 5000);
}

function renderSparkline(prices, width = 120, height = 32) {
  if (!prices || prices.length < 2) return '';
  const vals = prices.map(Number);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const trend = vals[vals.length - 1] >= vals[0] ? '#10b981' : '#ef4444';
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" fill="none">
    <polyline points="${pts}" stroke="${trend}" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  </svg>`;
}

async function renderNFTExplore(sec, filters) {
  filters = filters || {};
  let search = filters.search || '';
  let collection = filters.collection || '';
  let rarity = filters.rarity || '';
  let sort = filters.sort || '';
  let listed = filters.listed || false;
  let offset = 0;
  const PAGE = 24;

  async function load() {
    const params = new URLSearchParams({ limit: PAGE, offset });
    if (search) params.set('search', search);
    if (collection) params.set('collection', collection);
    if (rarity) params.set('rarity', rarity);
    if (sort) params.set('sort', sort);
    if (listed) params.set('listed', 'true');
    const { nfts } = await api('GET', `/api/nfts?${params}`).catch(() => ({ nfts: [] }));
    const grid = document.getElementById('nft-explore-grid');
    if (!grid) return;
    grid.innerHTML = nfts.length
      ? nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')
      : '<p class="text-[#4e5872] text-sm col-span-full py-8 text-center">No NFTs found</p>';
    const prevBtn = document.getElementById('nft-prev');
    const nextBtn = document.getElementById('nft-next');
    if (prevBtn) prevBtn.disabled = offset === 0;
    if (nextBtn) nextBtn.disabled = nfts.length < PAGE;
  }

  sec.innerHTML = nftTopBar('explore', 'window._nftNav') + `
    <div class="flex flex-wrap gap-2 mb-4">
      <input id="nft-search" class="inp flex-1 min-w-[160px]" placeholder="Search NFTs…" value="${esc(search)}">
      <select id="nft-rarity-sel" class="inp text-sm">
        <option value="">All Rarities</option>
        ${['common','uncommon','rare','epic','legendary'].map(r => `<option value="${r}" ${rarity===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}
      </select>
      <select id="nft-sort-sel" class="inp text-sm">
        <option value="">Newest</option>
        <option value="oldest" ${sort==='oldest'?'selected':''}>Oldest</option>
        <option value="price_asc" ${sort==='price_asc'?'selected':''}>Price ↑</option>
        <option value="price_desc" ${sort==='price_desc'?'selected':''}>Price ↓</option>
      </select>
      <label class="flex items-center gap-1 text-sm text-[#8b95ab] cursor-pointer">
        <input type="checkbox" id="nft-listed-chk" ${listed?'checked':''} class="accent-[#7c5cfc]"> For Sale
      </label>
    </div>
    <div id="nft-explore-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mb-4"></div>
    <div class="flex gap-2 justify-center">
      <button id="nft-prev" class="btn-z text-sm px-3 py-1 rounded" disabled onclick="nftExpPage(-1)">← Prev</button>
      <button id="nft-next" class="btn-z text-sm px-3 py-1 rounded" onclick="nftExpPage(1)">Next →</button>
    </div>
  `;

  window.nftExpPage = (dir) => { offset = Math.max(0, offset + dir * PAGE); load(); };
  document.getElementById('nft-search')?.addEventListener('input', e => { search = e.target.value; offset = 0; load(); });
  document.getElementById('nft-rarity-sel')?.addEventListener('change', e => { rarity = e.target.value; offset = 0; load(); });
  document.getElementById('nft-sort-sel')?.addEventListener('change', e => { sort = e.target.value; offset = 0; load(); });
  document.getElementById('nft-listed-chk')?.addEventListener('change', e => { listed = e.target.checked; offset = 0; load(); });
  await load();
}

          <div class="flex gap-2 mt-1">
            <span class="text-xs ${rc} capitalize font-medium">${esc(nft.rarity||'common')}</span>
            <span class="text-xs text-[#8b95ab] font-mono">${esc(nft.token_id)}</span>

        </div>
        <div class="card">
          <div class="flex justify-between text-sm mb-1">
            <span class="text-[#8b95ab]">Owner</span>

        ${priceHistory.length >= 2 ? `<div class="card">
          <p class="text-xs text-[#8b95ab] mb-1">Price History</p>

        </div>` : ''}

        <!-- Listing / Buy panel -->
        <div id="nft-trade-panel" class="card space-y-2">
          ${nft.listing_id ? `
            <div class="flex items-center justify-between">
              <span class="text-[#8b95ab] text-sm">Listed for</span>
              <span class="text-emerald-400 font-bold text-lg">${(Number(nft.price_usdc)/1e6).toFixed(2)} USDC</span>
            </div>
            ${!isOwner ? `<button class="btn-v w-full" onclick="nftBuy(${nft.id})">Buy Now</button>` : `<button class="btn-z w-full text-sm" onclick="nftDelist(${nft.id})">Cancel Listing</button>`}
          ` : isOwner ? `
            <p class="text-sm text-[#8b95ab]">Not listed</p>
            <div class="flex gap-2">
              <input id="nft-list-price" class="inp flex-1" placeholder="Price (USDC micro-units)">
              <button class="btn-v text-sm px-3" onclick="nftList(${nft.id})">List</button>
            </div>
          ` : `<p class="text-sm text-[#8b95ab]">Not for sale</p>`}
