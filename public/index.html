        : `<div class="mt-3">
            <div class="flex gap-2 mb-2" id="pf-modal-pills">
              <button class="text-xs px-3 py-1 rounded-full font-medium pill-active" id="pf-modal-btn-24h" onclick="window._pfModalChartHours('${sym}',24)">24H</button>
              <button class="text-xs px-3 py-1 rounded-full font-medium pill-inactive" id="pf-modal-btn-7d" onclick="window._pfModalChartHours('${sym}',168)">7D</button>
            </div>
            <div id="${chartContainerId}">${spin()}</div>
          </div>`;

      const modal = document.createElement('div');
      modal.id = 'pf-token-modal';
      modal.className = 'fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-4';
      modal.onclick = e => { if (e.target === modal) modal.remove(); };
      modal.innerHTML = `
        <div class="bg-[#131620] border border-[rgba(255,255,255,0.08)] rounded-2xl w-full max-w-lg max-h-[85vh] overflow-y-auto">
          <div class="p-4">
            <div class="flex items-start justify-between mb-3">
              <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${meta.badgeBg} ${meta.badgeText}">${sym.length>4?sym.slice(0,4):sym}</div>
                <div>
                  <div class="font-bold text-lg leading-tight text-[#e8eaf0]">${esc(meta.name)}</div>
                  <div class="text-sm text-[#8b95ab]">${esc(sym)}</div>
                </div>
              </div>
              <div class="flex items-start gap-3">
                <div class="text-right">
                  <div class="text-xl font-bold text-[#e8eaf0]">${fmtP(price)}</div>
                  <div class="text-sm font-medium ${chgCls}">${chgStr} <span class="text-[#4e5872] font-normal">24h</span></div>
                </div>
                <button onclick="document.getElementById('pf-token-modal')?.remove()" class="text-[#8b95ab] hover:text-[#e8eaf0] text-xl leading-none shrink-0 ml-1">✕</button>
              </div>
            </div>
            ${statsHtml}
            ${meta.desc ? `<p class="text-sm text-[#8b95ab] mt-3">${esc(meta.desc)}</p>` : ''}
            ${chartSection}
            <button class="w-full mt-4 py-3 rounded-xl font-bold text-sm transition-all active:scale-95" style="background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#0f1117" onclick="document.getElementById('pf-token-modal')?.remove();window.openTradeForToken?window.openTradeForToken('${esc(sym)}'):navigate('trade',{tradePrefillSymbol:'${esc(sym)}'})">Trade ${esc(sym)} →</button>
          </div>
        </div>`;
      document.body.appendChild(modal);

      // Render chart after modal is in DOM
      if (useTv) {
        const container = document.getElementById(tvContainerId);
        if (container) {
          container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
          const script = document.createElement('script');
          script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
          script.type = 'text/javascript'; script.async = true;
          script.textContent = JSON.stringify({ autosize:true, symbol:TV_SYMBOLS_MAP[sym], interval:'D', timezone:'Etc/UTC', theme:'dark', style:'1', locale:'en', hide_top_toolbar:false, hide_legend:true, allow_symbol_change:false });
          container.appendChild(script);
        }
      } else {
        window._pfModalChartHours = async (s, hours) => {
          const wrap = document.getElementById('pf-modal-chart-' + s);
          if (!wrap) return;
          wrap.innerHTML = spin();
          const b24 = document.getElementById('pf-modal-btn-24h');
          const b7d  = document.getElementById('pf-modal-btn-7d');
          if (b24) b24.className = `text-xs px-3 py-1 rounded-full font-medium ${hours===24?'pill-active':'pill-inactive'}`;
          if (b7d)  b7d.className  = `text-xs px-3 py-1 rounded-full font-medium ${hours===168?'pill-active':'pill-inactive'}`;
          try {
            const res = await api('GET', `/api/price-history?symbol=${s}&hours=${hours}`);
            const hist = (res && res.history) || [];
            const pts = hist.map(h=>({ x:new Date(h.recorded_at).getTime(), y:parseFloat(h.price_usd) }));
            wrap.innerHTML = svgLineChart(pts, { color: meta.color, width:480, height:140 });
          } catch(_) { if(wrap) wrap.innerHTML = '<p class="text-[#4e5872] text-sm text-center py-4">Chart unavailable</p>'; }
        };
        window._pfModalChartHours(sym, 24);
      }
    };

    const sendBtn=document.getElementById('pf-send-btn');
    if (sendBtn) sendBtn.addEventListener('click',window._pfSendSubmit);
    const sendReset=document.getElementById('pf-send-reset');
    if (sendReset) sendReset.addEventListener('click',()=>{sendStatus='idle';sendError='';sendRecipient='';sendAmount='';sendView='scan';scanError='';render();});
    // Switch between scanner and manual entry within the Send tab.
    const scanManual=document.getElementById('pf-scan-manual');
    if (scanManual) scanManual.addEventListener('click',()=>{window._pfStopScanner();sendView='form';scanError='';render();});
    const sendScan=document.getElementById('pf-send-scan');
    if (sendScan) sendScan.addEventListener('click',()=>{sendView='scan';scanError='';sendStatus='idle';sendError='';render();});

    if (walletTab==='receive'&&walletAddr) setTimeout(window._pfLoadQR,50);
    // Boot the camera when the Send tab is showing its scanner view.
    if (walletTab==='send' && sendView==='scan' && bridgeAvail && sendStatus!=='pending' && sendStatus!=='ok') {
      setTimeout(window._pfStartScanner,50);
    } else {
      window._pfStopScanner();
    }
  }

  // Initial fetch
  sec.innerHTML = spin();
  try {
    const username = S.user?.username || '';
    const [portData, chartData, actData, coinsData] = await Promise.all([
      fetch(`/explorer-api/portfolio/${encodeURIComponent(username)}`).then(r=>r.json()).catch(()=>({holdings:[],prices:{}})),
      api('GET','/api/portfolio/chart?range=1d').catch(()=>({points:[]})),
      api('GET','/api/activity?limit=10').catch(()=>({activities:[],nextCursor:null})),
      api('GET','/api/coins/top?limit=20').catch(()=>({coins:[]})),
    ]);
    holdings=portData.holdings||[];
    prices=portData.prices||{};
    chartPoints=chartData.points||[];
    allActivities=actData.activities||[];
    activityCursor=actData.nextCursor||null;
    topCoins=coinsData.coins||[];
    S.topCoinsData = topCoins;
    const tickers=[...new Set(holdings.map(h=>(h.ticker||'').toUpperCase()).filter(Boolean))];
    if (tickers.length) {
      const sr=await Promise.all(tickers.map(sym=>api('GET',`/api/price-history?symbol=${sym}&hours=24`).catch(()=>({history:[]}))));
      tickers.forEach((sym,i)=>{sparkData[sym]=sr[i].history||[];});
    }
    sendToken=holdings[0]?(holdings[0].ticker||'').toUpperCase():'BLOOM';
  } catch(e){ sec.innerHTML=err(e.message); return; }
  render();
}

// ── Swap Card (reusable helper) ────────────────────────────────────────────────
function renderSwapCard(containerEl, prefilledFrom) {
  const tokens = ['USDC','USDT','BTC','ETH','BNB','SOL','XRP','ADA','DOGE','TON','BLOOM'];
  const initFrom = tokens.includes(prefilledFrom) ? prefilledFrom : 'BTC';
  const initTo   = initFrom === 'BTC' ? 'ETH' : 'BTC';
  const swapState = { from: initFrom, to: initTo, fromAmt: '', slippage: 0.5, flipping: false, showSlippagePopover: false };

  if (!document.getElementById('swap-anim-style')) {
    const st = document.createElement('style');
    st.id = 'swap-anim-style';
    st.textContent = `
      @keyframes swapCardUp{0%{transform:translateY(0);opacity:1}50%{opacity:.3}100%{transform:translateY(-32px);opacity:1}}
      @keyframes swapCardDown{0%{transform:translateY(0);opacity:1}50%{opacity:.3}100%{transform:translateY(32px);opacity:1}}
      .swap-flip-up{animation:swapCardUp 150ms ease forwards}
      .swap-flip-down{animation:swapCardDown 150ms ease forwards}
      #swap-amt-inp::placeholder{color:#3a3a45}
      #swap-amt-inp::-webkit-inner-spin-button,#swap-amt-inp::-webkit-outer-spin-button{-webkit-appearance:none}
    `;
    document.head.appendChild(st);
  }

  const TOKEN_COLORS = {
    BTC:   { bg: 'rgba(251,191,36,0.15)',   text: '#fbbf24', symbol: '₿' },
    ETH:   { bg: 'rgba(56,189,248,0.15)',   text: '#38bdf8', symbol: 'Ξ' },
    BNB:   { bg: 'rgba(243,186,47,0.15)',   text: '#f3ba2f', symbol: 'B' },
    SOL:   { bg: 'rgba(153,69,255,0.15)',   text: '#9945ff', symbol: '◎' },
    XRP:   { bg: 'rgba(0,149,207,0.15)',    text: '#0095cf', symbol: 'X' },
    USDC:  { bg: 'rgba(52,211,153,0.15)',   text: '#34d399', symbol: '$' },
    USDT:  { bg: 'rgba(38,161,123,0.15)',   text: '#26a17b', symbol: '₮' },
    ADA:   { bg: 'rgba(0,140,255,0.15)',    text: '#008cff', symbol: '₳' },
    DOGE:  { bg: 'rgba(203,155,31,0.15)',   text: '#cb9b1f', symbol: 'Ð' },
    TON:   { bg: 'rgba(0,136,204,0.15)',    text: '#0088cc', symbol: '◆' },
    BLOOM: { bg: 'rgba(167,139,250,0.15)',  text: '#a78bfa', symbol: '✿' },
  };

  function tokenBadge(sym) {
    const tc = TOKEN_COLORS[sym] || { bg: 'rgba(100,100,120,0.3)', text: '#a1a1aa', symbol: sym[0] };
    return `<div style="width:38px;height:38px;border-radius:50%;background:${tc.bg};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:${tc.text};flex-shrink:0;">${tc.symbol}</div>`;
  }

  function calcToAmt() {
    if (!swapState.fromAmt || isNaN(swapState.fromAmt) || !S.prices[swapState.from] || !S.prices[swapState.to]) return '';
    const rate = S.prices[swapState.from] / S.prices[swapState.to];
    return (parseFloat(swapState.fromAmt) * rate * 0.997).toFixed(swapState.to === 'ETH' ? 6 : swapState.to === 'BTC' ? 8 : 2);
  }

  function render() {
    if (!containerEl || !containerEl.isConnected) return;
    const toAmt = calcToAmt();
    const fromBal = getBal(swapState.from);
    const toBal = getBal(swapState.to);
    const expectedOut = toAmt ? toAmt + ' ' + swapState.to : '—';

    const svgGear = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14M12 2v2m0 16v2M2 12h2m16 0h2"/></svg>`;
    const svgChevron = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2.5" style="pointer-events:none;margin-left:-10px;flex-shrink:0;"><path d="M6 9l6 6 6-6"/></svg>`;
    const svgSwapArrows = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>`;
    const svgInfo = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

    const bloomSwapBal = parseFloat(S.balances['BLOOM'] || 0) / 1_000_000;
    const hasBloomGas = bloomSwapBal >= 1;
    const gasLabel = hasBloomGas
      ? '<span style="color:#a78bfa;font-weight:600;">1 BLOOM</span>'
      : '<span style="color:#f87171;font-weight:600;">1 BLOOM ⚠ insufficient</span>';
    const breakdownRows = [
      { label: 'Slippage tolerance', value: swapState.slippage + '%', info: true },
      { label: 'Price impact',       value: '0.01%',                  info: true },
      { label: 'Network fee',        value: '$0.04',                  info: false },
      { label: 'Exchange fee',       value: 'Free',                   info: false },
      { label: 'Gas fee (BLOOM)',    value: gasLabel,                  info: false, raw: true },
      { label: 'Expected output',    value: expectedOut,              info: false },
    ];

    containerEl.innerHTML = `
      <div class="swap-token-card" style="display:flex;flex-direction:column;gap:4px;padding:0 4px;">

          <!-- Header -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
            <span style="font-size:19px;font-weight:700;color:#e8eaf0;letter-spacing:-0.01em;">Swap Token</span>
            <div style="position:relative;">
              <button onclick="swapToggleSlippage()" style="display:flex;align-items:center;gap:5px;padding:6px 11px;background:#1c2236;border-radius:9999px;border:1px solid rgba(255,255,255,0.06);cursor:pointer;">
                ${svgGear}
                <span style="font-size:12px;color:#8b95ab;font-weight:500;">${swapState.slippage}%</span>
              </button>
              ${swapState.showSlippagePopover ? `
                <div style="position:absolute;right:0;top:calc(100% + 6px);background:#131620;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;z-index:20;width:176px;box-shadow:0 8px 24px rgba(0,0,0,0.6);">
                  <div style="font-size:11px;color:#4e5872;font-weight:500;margin-bottom:9px;">Slippage tolerance</div>
                  <div style="display:flex;gap:7px;align-items:center;">
                    <input id="slippage-inp" type="number" min="0.1" max="50" step="0.1" value="${swapState.slippage}"
                      style="background:#0d1021;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 8px;color:#e8eaf0;font-size:13px;width:76px;outline:none;">
                    <button onclick="swapSetSlippage()" style="flex:1;background:linear-gradient(135deg,#7c5cfc,#4e9af1);color:#fff;font-weight:700;font-size:12px;padding:7px 0;border-radius:8px;border:none;cursor:pointer;">Set</button>
                  </div>
                </div>` : ''}
            </div>
          </div>

          <!-- From label + quick-select -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;">
            <span style="font-size:12px;color:#4e5872;font-weight:500;">From</span>
            <div style="display:flex;gap:5px;">
              ${['25%','50%','75%','Max'].map(p => `<button onclick="swapQuickSelect('${p}')" style="font-size:11px;color:#4e5872;padding:2px 7px;background:#1c2236;border:1px solid rgba(255,255,255,0.06);border-radius:9999px;cursor:pointer;transition:color .15s;" onmouseover="this.style.color='#8b95ab'" onmouseout="this.style.color='#4e5872'">${p}</button>`).join('')}
            </div>
          </div>

          <!-- From card -->
          <div id="swap-from-card" style="background:#161b2a;border-radius:18px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0;border:1px solid rgba(255,255,255,0.06);">
            <div style="display:flex;align-items:center;gap:10px;">
              ${tokenBadge(swapState.from)}
              <div style="display:flex;align-items:center;gap:2px;cursor:pointer;">
                <select id="swap-from-sel" onchange="swapFromChange(this.value)"
                  style="background:transparent;border:none;color:#fff;font-weight:600;font-size:15px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:2px;min-width:48px;">
                  ${tokens.map(t=>`<option value="${t}" ${t===swapState.from?'selected':''} style="background:#161b2a;">${t}</option>`).join('')}
                </select>
                ${svgChevron}
              </div>
            </div>
            <div style="text-align:right;flex:1;margin-left:8px;">
              <input id="swap-amt-inp" type="number" value="${swapState.fromAmt}" placeholder="0.00" min="0"
                oninput="swapAmtChange(this.value)"
                style="background:transparent;border:none;color:#e8eaf0;font-size:22px;font-weight:700;text-align:right;width:100%;outline:none;display:block;">
              <div style="font-size:11px;color:#4e5872;margin-top:3px;">Balance: ${fromBal}</div>
            </div>
          </div>

          <!-- Floating switch button -->
          <div style="display:flex;justify-content:center;position:relative;z-index:2;margin:-1px 0;">
            <button id="swap-flip-btn" onclick="swapFlipTokens()"
              style="width:38px;height:38px;border-radius:50%;background:#1c2236;border:3px solid #0f1117;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,background .15s;"
              onmouseover="this.style.background='#232c42'" onmouseout="this.style.background='#1c2236'">
              ${svgSwapArrows}
            </button>
          </div>

          <!-- To card -->
          <div id="swap-to-card" style="background:#161b2a;border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <div style="display:flex;align-items:center;gap:10px;">
              ${tokenBadge(swapState.to)}
              <div style="display:flex;align-items:center;gap:2px;cursor:pointer;">
                <select id="swap-to-sel" onchange="swapToChange(this.value)"
                  style="background:transparent;border:none;color:#e8eaf0;font-weight:600;font-size:15px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:2px;min-width:48px;">
                  ${tokens.map(t=>`<option value="${t}" ${t===swapState.to?'selected':''} style="background:#161b2a;">${t}</option>`).join('')}
                </select>
                ${svgChevron}
              </div>
            </div>
            <div style="text-align:right;flex:1;margin-left:8px;">
              <div style="color:${toAmt?'#e8eaf0':'#4e5872'};font-size:22px;font-weight:700;">${toAmt || '0.00'}</div>
              <div style="font-size:11px;color:#4e5872;margin-top:3px;">Balance: ${toBal}</div>
            </div>
          </div>

          <!-- Transaction breakdown -->
          <div style="background:#161b2a;border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:14px 16px;margin-bottom:14px;display:flex;flex-direction:column;gap:11px;">
            ${breakdownRows.map(row => `
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:4px;">
                  <span style="font-size:12px;color:#8b95ab;">${row.label}</span>
                  ${row.info ? svgInfo : ''}
                </div>
                ${row.raw
                  ? `<span style="font-size:12px;font-weight:500;">${row.value}</span>`
                  : `<span style="font-size:12px;color:#e8eaf0;font-weight:500;">${row.value}</span>`}
              </div>`).join('')}
          </div>

          <!-- Feedback message -->
          <div id="swap-msg" style="font-size:12px;text-align:center;min-height:16px;margin-bottom:6px;"></div>

          <!-- CTA -->
          <button onclick="execSwap()"
            style="width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,#7c5cfc,#4e9af1);color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.01em;margin-bottom:18px;transition:opacity .15s;"
            onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
            Create swap →
          </button>

      </div>`;
  }

  window.swapFromChange = (v) => {
    swapState.from = v;
    if (swapState.from === swapState.to) swapState.to = tokens.find(t => t !== swapState.from);
    render();
  };
  window.swapToChange = (v) => {
    swapState.to = v;
    if (swapState.to === swapState.from) swapState.from = tokens.find(t => t !== swapState.to);
    render();
  };
  window.swapAmtChange = (v) => { swapState.fromAmt = v; render(); };

  window.swapQuickSelect = (pct) => {
    const balNum = parseFloat(S.balances[swapState.from] || 0) / 1_000_000;
    swapState.fromAmt = pct === 'Max'
      ? String(balNum)
      : String(parseFloat((balNum * parseInt(pct) / 100).toFixed(8)));
    render();
  };

  window.swapToggleSlippage = () => {
    swapState.showSlippagePopover = !swapState.showSlippagePopover;
    render();
  };
  window.swapSetSlippage = () => {
    const inp = document.getElementById('slippage-inp');
    if (inp) { const v = parseFloat(inp.value); if (v > 0 && v <= 50) swapState.slippage = v; }
    swapState.showSlippagePopover = false;
    render();
  };

  window.swapFlipTokens = () => {
    if (swapState.flipping) return;
    swapState.flipping = true;
    const fromCard = document.getElementById('swap-from-card');
    const toCard   = document.getElementById('swap-to-card');
    if (fromCard) fromCard.classList.add('swap-flip-down');
    if (toCard)   toCard.classList.add('swap-flip-up');
    setTimeout(() => {
      const prevToAmt = calcToAmt();
      [swapState.from, swapState.to] = [swapState.to, swapState.from];
      if (prevToAmt) swapState.fromAmt = prevToAmt;
      swapState.flipping = false;
      render();
    }, 150);
  };

  window.execSwap = async () => {
    const msg = document.getElementById('swap-msg');
    if (!msg) return;
    try {
      const d = await api('POST', '/api/defi/swap', { from_token: swapState.from, to_token: swapState.to, from_amount: swapState.fromAmt });
      msg.style.color = '#34d399';
      msg.textContent = `✓ Received ${d.to_amount.toFixed(6)} ${d.to_token}`;
      await refreshBalances();
      swapState.fromAmt = '';
      setTimeout(() => { if (msg) { msg.textContent = ''; } render(); }, 2000);
    } catch (e) {
      if (msg) { msg.style.color = '#f87171'; msg.textContent = e.message; }
    }
  };

  render();
}

// ── Market ────────────────────────────────────────────────────────────────────

  sec.innerHTML = `<div id="market-list-wrap"></div>`;
  const mwrap = document.getElementById('market-list-wrap');
  if (!mwrap) return;

  const TOKEN_COLORS = {
    BTC:   '#fbbf24', ETH:   '#38bdf8', BNB:   '#f3ba2f', SOL:   '#9945ff',
    XRP:   '#0095cf', USDC:  '#34d399', USDT:  '#26a17b', ADA:   '#008cff',
    DOGE:  '#cb9b1f', TON:   '#0088cc', BLOOM: '#a78bfa',
  };
  const TOKEN_BG = {
    BTC:'rgba(251,191,36,0.15)', ETH:'rgba(56,189,248,0.15)',   BNB:'rgba(243,186,47,0.15)',
    SOL:'rgba(153,69,255,0.15)', XRP:'rgba(0,149,207,0.15)',    USDC:'rgba(52,211,153,0.15)',
    USDT:'rgba(38,161,123,0.15)',ADA:'rgba(0,140,255,0.15)',    DOGE:'rgba(203,155,31,0.15)',
    TON:'rgba(0,136,204,0.15)',  BLOOM:'rgba(167,139,250,0.15)',
  };

  let topCoins = [];
  let marketStats = {};
  let globalStats = null;

  try {
    const [topData, statsData, globalData] = await Promise.all([
      api('GET', '/api/coins/top?limit=50').catch(() => ({ coins: [] })),
      api('GET', '/api/trade/market-stats').catch(() => ({ stats: [] })),
      api('GET', '/api/coins/global').catch(() => ({ stats: null })),
    ]);
    topCoins = topData.coins || [];
    S.topCoinsData = topCoins;
    (statsData.stats || []).forEach(s => { marketStats[s.symbol] = s.swap_count; });
    globalStats = globalData.stats || null;
  } catch {}

  // ── UI state ──
  let activeTab = 'most_active';        // quick-filter chip: most_active | top_gainer | top_loser | ''
  let sortKey = 'most_active';          // most_active | rank | price | c1h | c24h | c7d | mcap | vol
  let sortDir = 'desc';                 // asc | desc
  let searchTerm = '';

  // ── formatters ──
  function fmtCoinPrice(p) {
    if (p == null) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(2);
    if (p >= 0.01) return '$' + p.toFixed(4);
    return '$' + p.toFixed(8);
  }
  function fmtLargeNum(n) {
    if (n == null || n === 0) return '—';
    if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3)  return '$' + (n / 1e3).toFixed(2) + 'K';
    return '$' + Number(n).toLocaleString();
  }
  function pctCell(pct) {
    if (pct == null) return `<span class="text-[#8b95ab]">—</span>`;
    const cls = pct > 0.05 ? 'text-emerald-400' : pct < -0.05 ? 'text-red-400' : 'text-[#8b95ab]';
    const str = pct >= 0 ? `+${pct.toFixed(2)}%` : `${pct.toFixed(2)}%`;
    return `<span class="${cls}">${str}</span>`;
  }

  function buildSparkline(arr, color) {
    if (!arr || arr.length < 2) {
      return `<svg viewBox="0 0 72 24" width="72" height="24"><line x1="0" y1="12" x2="72" y2="12" stroke="${color}" stroke-width="1.5"/></svg>`;
    }
    const prices = arr.map(Number).filter(n => !isNaN(n));
    if (prices.length < 2) {
      return `<svg viewBox="0 0 72 24" width="72" height="24"><line x1="0" y1="12" x2="72" y2="12" stroke="${color}" stroke-width="1.5"/></svg>`;
    }
    const mn = Math.min(...prices), mx = Math.max(...prices);
    const rng = Math.max(mx - mn, 1e-9);
    const xStep = 72 / (prices.length - 1);
    const pts = prices.map((p, i) =>
      `${(i * xStep).toFixed(1)},${(22 - ((p - mn) / rng) * 20).toFixed(1)}`
    ).join(' ');
    return `<svg viewBox="0 0 72 24" width="72" height="24"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  }

  // Logo fallback to a coloured letter badge when the image fails to load.
  window._mktLogoErr = (img) => {
    const d = img.dataset;
    img.outerHTML = `<div class="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0" style="background:${d.bg};color:${d.fg}">${d.sym}</div>`;
  };

  function getRows() {
    let coins = topCoins.slice();
    // search
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      coins = coins.filter(c =>
        (c.symbol && c.symbol.toLowerCase().includes(q)) ||
        (c.name && c.name.toLowerCase().includes(q))
      );
    }
    // sort
    const dir = sortDir === 'asc' ? 1 : -1;
    if (sortKey === 'most_active') {
      coins.sort((a, b) => (marketStats[b.symbol] || 0) - (marketStats[a.symbol] || 0));
    } else if (sortKey === 'rank') {
      coins.sort((a, b) => (a.rank || 999) - (b.rank || 999));
    } else {
      const field = { price: 'price_usd', c1h: 'price_change_1h_pct', c24h: 'price_change_24h_pct', c7d: 'price_change_7d_pct', mcap: 'market_cap', vol: 'volume_24h' }[sortKey] || 'market_cap';
      coins.sort((a, b) => {
        const av = a[field] == null ? -Infinity : a[field];
        const bv = b[field] == null ? -Infinity : b[field];
        return (av - bv) * dir;
      });
    }
    return coins;
  }

  const caret = (key) => sortKey === key ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

  function renderHeader() {
    const headEl = document.getElementById('market-table-head');
    if (!headEl) return;
    headEl.innerHTML = `
      <div class="w-6 text-right shrink-0">#</div>
      <div class="w-8 shrink-0"></div>
      <div class="flex-1 min-w-0">Name</div>
      <button class="w-24 text-right hover:text-[#e8eaf0] transition-colors" onclick="setMarketSort('price')">Price${caret('price')}</button>
      <button class="hidden lg:block w-16 text-right hover:text-[#e8eaf0] transition-colors" onclick="setMarketSort('c1h')">1h${caret('c1h')}</button>
      <button class="w-16 text-right hover:text-[#e8eaf0] transition-colors" onclick="setMarketSort('c24h')">24h${caret('c24h')}</button>
      <button class="hidden lg:block w-16 text-right hover:text-[#e8eaf0] transition-colors" onclick="setMarketSort('c7d')">7d${caret('c7d')}</button>
      <button class="hidden md:block w-28 text-right hover:text-[#e8eaf0] transition-colors" onclick="setMarketSort('mcap')">Market Cap${caret('mcap')}</button>
      <button class="hidden xl:block w-28 text-right hover:text-[#e8eaf0] transition-colors" onclick="setMarketSort('vol')">Volume (24h)${caret('vol')}</button>
      <div class="w-[72px] text-right shrink-0">Last 7d</div>`;
  }

  function renderCoinRows() {
    const rowsEl = document.getElementById('market-coin-rows');
    if (!rowsEl) return;
    const tabBtns = { most_active: 'mkt-tab-most-active', top_gainer: 'mkt-tab-top-gainer', top_loser: 'mkt-tab-top-loser' };
    Object.entries(tabBtns).forEach(([t, id]) => {
      const btn = document.getElementById(id);
      if (btn) btn.className = `text-sm px-3 py-1 font-medium transition-colors ${activeTab === t ? 'pill-active' : 'pill-inactive'}`;
    });
    const rows = getRows();
    if (!rows.length) {
      rowsEl.innerHTML = `<div class="card text-center py-8 text-[#8b95ab] text-sm">No coins match "${esc(searchTerm)}".</div>`;
      return;
    }
    rowsEl.innerHTML = rows.map((coin, idx) => {
      const clrText = TOKEN_COLORS[coin.symbol] || '#8b95ab';
      const clrBg   = TOKEN_BG[coin.symbol]    || 'rgba(100,100,120,0.2)';
      const pct7    = coin.price_change_7d_pct;
      const sparkColor = pct7 == null ? clrText : pct7 >= 0 ? '#34d399' : '#f87171';
      const sparkline  = buildSparkline(coin.sparkline_7d, sparkColor);
      const displaySym = coin.symbol.length > 4 ? coin.symbol.slice(0, 4) : coin.symbol;
      const rankNum    = coin.rank || idx + 1;
      const logo = coin.logo_url
        ? `<img src="${esc(coin.logo_url)}" alt="" data-sym="${displaySym}" data-bg="${clrBg}" data-fg="${clrText}" class="w-8 h-8 rounded-full shrink-0 object-cover bg-[#161b2a]" onerror="_mktLogoErr(this)">`
        : `<div class="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0" style="background:${clrBg};color:${clrText}">${displaySym}</div>`;
      return `
        <div class="token-market-row card flex items-center gap-2 sm:gap-3 cursor-pointer hover:bg-[#1c2236]/60 transition-colors py-3 px-2 sm:px-3"
             onclick="openTokenDetail('${coin.symbol}')">
          <div class="text-xs text-[#4e5872] font-mono w-6 text-right shrink-0">${rankNum}</div>
          ${logo}
          <div class="flex-1 min-w-0">
            <div class="text-sm font-semibold leading-tight">${coin.symbol}</div>
            <div class="text-xs text-[#8b95ab] truncate">${esc(coin.name)}</div>
          </div>
          <div class="w-24 text-right text-sm font-semibold shrink-0">${fmtCoinPrice(coin.price_usd)}</div>
          <div class="hidden lg:block w-16 text-right text-xs font-medium">${pctCell(coin.price_change_1h_pct)}</div>
          <div class="w-16 text-right text-xs font-medium">${pctCell(coin.price_change_24h_pct)}</div>
          <div class="hidden lg:block w-16 text-right text-xs font-medium">${pctCell(coin.price_change_7d_pct)}</div>
          <div class="hidden md:block w-28 text-right text-sm text-[#e8eaf0]">${fmtLargeNum(coin.market_cap)}</div>
          <div class="hidden xl:block w-28 text-right text-sm text-[#cfd4e0]">${fmtLargeNum(coin.volume_24h)}</div>
          <div class="w-[72px] text-right shrink-0">${sparkline}</div>
        </div>`;
    }).join('');
  }

  function rerender() { renderHeader(); renderCoinRows(); }

  window.setMarketTab = (tab) => {
    activeTab = tab;
    if (tab === 'most_active') { sortKey = 'most_active'; sortDir = 'desc'; }
    else if (tab === 'top_gainer') { sortKey = 'c24h'; sortDir = 'desc'; }
    else if (tab === 'top_loser') { sortKey = 'c24h'; sortDir = 'asc'; }
    rerender();
  };
  window.setMarketSort = (key) => {
    activeTab = ''; // column sort overrides the quick-filter chips
    if (sortKey === key) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
    else { sortKey = key; sortDir = 'desc'; }
    rerender();
  };
  window.setMarketSearch = (val) => {
    searchTerm = (val || '').trim();
    renderCoinRows();
  };

  // ── Global stats bar ──
  const g = globalStats || {};
  const mcChange = g.market_cap_change_24h_pct;
  const mcChangeCls = mcChange == null ? 'text-[#8b95ab]' : mcChange >= 0 ? 'text-emerald-400' : 'text-red-400';
  const mcChangeStr = mcChange == null ? '' : (mcChange >= 0 ? `+${mcChange.toFixed(2)}%` : `${mcChange.toFixed(2)}%`);
  const statsBar = `
    <div id="market-global-stats" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
      <div class="bg-[#161b2a] rounded-xl px-3 py-2.5">
        <div class="text-xs text-[#4e5872] mb-0.5">Market Cap</div>
        <div class="text-sm font-semibold text-[#e8eaf0]">${fmtLargeNum(g.total_market_cap_usd)}</div>
        ${mcChangeStr ? `<div class="text-xs font-medium ${mcChangeCls}">${mcChangeStr} 24h</div>` : ''}
      </div>
      <div class="bg-[#161b2a] rounded-xl px-3 py-2.5">
        <div class="text-xs text-[#4e5872] mb-0.5">24h Volume</div>
        <div class="text-sm font-semibold text-[#e8eaf0]">${fmtLargeNum(g.total_volume_24h_usd)}</div>
      </div>
      <div class="bg-[#161b2a] rounded-xl px-3 py-2.5">
        <div class="text-xs text-[#4e5872] mb-0.5">BTC Dominance</div>
        <div class="text-sm font-semibold text-[#e8eaf0]">${g.btc_dominance_pct != null ? g.btc_dominance_pct.toFixed(1) + '%' : '—'}</div>
      </div>
      <div class="bg-[#161b2a] rounded-xl px-3 py-2.5">
        <div class="text-xs text-[#4e5872] mb-0.5">Active Coins</div>
        <div class="text-sm font-semibold text-[#e8eaf0]">${g.active_coins ? Number(g.active_coins).toLocaleString() : '—'}</div>
      </div>
    </div>`;

  mwrap.innerHTML = `
    <div class="flex items-center justify-between mb-4 gap-3">
      <h2 class="text-xl font-bold text-[#e8eaf0]">Market</h2>
      <input id="mkt-search" type="text" placeholder="Search coins…" oninput="setMarketSearch(this.value)"
             class="bg-[#161b2a] border border-[rgba(255,255,255,0.08)] rounded-lg px-3 py-1.5 text-sm text-[#e8eaf0] placeholder-[#4e5872] focus:outline-none focus:border-[#7c5cfc] w-40 sm:w-56">
    </div>
    ${statsBar}
    <div class="flex gap-2 mb-3 flex-wrap">
      <button id="mkt-tab-most-active" class="text-sm px-3 py-1 font-medium transition-colors pill-active"  onclick="setMarketTab('most_active')">Most Active</button>
      <button id="mkt-tab-top-gainer"  class="text-sm px-3 py-1 font-medium transition-colors pill-inactive" onclick="setMarketTab('top_gainer')">Top Gainers</button>
      <button id="mkt-tab-top-loser"   class="text-sm px-3 py-1 font-medium transition-colors pill-inactive" onclick="setMarketTab('top_loser')">Top Losers</button>
    </div>
    <div id="market-table-head" class="hidden md:flex items-center gap-3 px-3 py-2 text-xs text-[#4e5872] font-medium"></div>
    <div id="market-coin-rows" class="space-y-2"></div>`;

  rerender();
}

// ── Token Detail ──────────────────────────────────────────────────────────────
async function renderTokenDetail(sec) {
  const sym = S.tradeToken;

  // Base metadata for all known swappable tokens + fallback for top-25 coins
  const SWAPPABLE_TOKENS = new Set(['USDC','USDT','BTC','ETH','BNB','SOL','XRP','ADA','DOGE','TON','BLOOM']);

  // Try to get extended data (market cap, volume, etc.) from cached top-coins list
  let topCoinData = (S.topCoinsData || []).find(c => c.symbol === sym);
  // If not cached (deep link), fetch it
  if (!topCoinData) {
    try {
      const td = await api('GET', '/api/coins/top?limit=25');
      S.topCoinsData = td.coins || [];
      topCoinData = S.topCoinsData.find(c => c.symbol === sym);
    } catch {}
  }

  // Build meta from static map, then augment with top-coin name/desc if available
  let meta = TOKEN_META_DETAIL[sym];
  if (!meta) {
    if (topCoinData) {
      meta = {
        name: topCoinData.name,
        color: 'rgb(139,149,171)',
        badgeBg: 'bg-[#8b95ab]/10',
        badgeText: 'text-[#8b95ab]',
        desc: `${topCoinData.name} (${sym}) — ranked #${topCoinData.rank} by market cap.`,
      };
    } else {
      S.tradeToken = null; navigate('market'); return;
    }
  }

  const swappable = SWAPPABLE_TOKENS.has(sym);
  const TV_SYMBOLS = TV_SYMBOLS_MAP;
  const useTradingView = sym in TV_SYMBOLS;
  let chartHours = 24;

  function fmtDetailPrice(s) {
    const p = topCoinData ? topCoinData.price_usd : S.prices[s];
    if (p == null) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(2);
    if (p >= 0.01) return '$' + p.toFixed(4);
    return '$' + p.toFixed(8);
  }

  function fmtLargeNum(n) {
    if (!n || n === 0) return '—';
    if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
    return '$' + n.toLocaleString();
  }

  function fmtSupply(n, s) {
    if (!n || n === 0) return '—';
    if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T ' + s;
    if (n >= 1e9)  return (n / 1e9).toFixed(2) + 'B ' + s;
    if (n >= 1e6)  return (n / 1e6).toFixed(2) + 'M ' + s;
    return n.toLocaleString() + ' ' + s;
  }

  function fmtHiLo(p) {
    if (!p || p === 0) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(2);
    return '$' + p.toFixed(4);
  }

  function computeChangePct(hist) {
    if (!hist || hist.length < 2) return null;
    const first = parseFloat(hist[0].price_usd);
    const last  = parseFloat(hist[hist.length - 1].price_usd);
    return ((last - first) / first) * 100;
  }

  async function renderChart() {
    const chartWrap = document.getElementById('token-detail-chart');
    if (!chartWrap) return;
    chartWrap.innerHTML = `<div class="text-[#4e5872] text-sm text-center py-6">${spin()}</div>`;
    let hist = [];
    try {
      const res = await api('GET', `/api/price-history?symbol=${sym}&hours=${chartHours}`);
      hist = (res && res.history) || [];
    } catch {}
    const pts = hist.map(h => ({ x: new Date(h.recorded_at).getTime(), y: parseFloat(h.price_usd) }));
    chartWrap.innerHTML = svgLineChart(pts, { color: meta.color, width: 480, height: 140 });
  }

  function mountTradingViewChart(tokenSym) {
    const container = document.getElementById('tv-chart-container');
    if (!container) return;
    container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.type = 'text/javascript';
    script.async = true;
    script.textContent = JSON.stringify({
      autosize: true,
      symbol: TV_SYMBOLS[tokenSym],
      interval: 'D',
      timezone: 'Etc/UTC',
      theme: 'dark',
      style: '1',
      locale: 'en',
      hide_top_toolbar: false,
      hide_legend: true,
      allow_symbol_change: false,
    });
    container.appendChild(script);
  }

  async function load() {
    await refreshBalances();
    let hist24 = [];
    try {
      const res = await api('GET', `/api/price-history?symbol=${sym}&hours=24`);
      hist24 = (res && res.history) || [];
    } catch {}

    // Use API 24h pct if available, otherwise compute from history
    let change = topCoinData ? topCoinData.price_change_24h_pct : computeChangePct(hist24);
    const changeStr = change === null ? '—' : (change >= 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`);
    const changeCls = change === null ? 'text-[#8b95ab]' : change > 0.05 ? 'text-emerald-400' : change < -0.05 ? 'text-red-400' : 'text-[#8b95ab]';

    const chartSection = useTradingView
      ? `<div id="tv-chart-container" class="tradingview-widget-container" style="height:400px;min-height:400px"></div>`
      : `<div>
          <div class="flex gap-2 mb-3">
            <button id="btn-24h" class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${chartHours === 24 ? 'pill-active' : 'pill-inactive'}" onclick="window._setTokenChartHours(24)">24H</button>
            <button id="btn-7d"  class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${chartHours === 168 ? 'pill-active' : 'pill-inactive'}" onclick="window._setTokenChartHours(168)">7D</button>
          </div>
          <div id="token-detail-chart"></div>
        </div>`;

    // Stats tiles from top-coin data
    const statsRow = topCoinData ? `
      <div class="grid grid-cols-2 gap-2 mt-3">
        <div class="bg-[#161b2a] rounded-xl px-3 py-2">
          <div class="text-xs text-[#4e5872] mb-0.5">Market Cap</div>
          <div class="text-sm font-semibold text-[#e8eaf0]">${fmtLargeNum(topCoinData.market_cap)}</div>
        </div>
        <div class="bg-[#161b2a] rounded-xl px-3 py-2">
          <div class="text-xs text-[#4e5872] mb-0.5">24h Volume</div>
          <div class="text-sm font-semibold text-[#e8eaf0]">${fmtLargeNum(topCoinData.volume_24h)}</div>
        </div>
        <div class="bg-[#161b2a] rounded-xl px-3 py-2">
          <div class="text-xs text-[#4e5872] mb-0.5">Circulating Supply</div>
          <div class="text-sm font-semibold text-[#e8eaf0]">${fmtSupply(topCoinData.circulating_supply, sym)}</div>
        </div>
        <div class="bg-[#161b2a] rounded-xl px-3 py-2">

      + '</div>';

    // ── Zone 5: Active Stakes ────────────────────────────────────────
    let activeHtml;

      const stakeRows = stakes.map(function(s) {
        const c = TC[s.token] || TC.BLOOM;

    });

    if (form) form.classList.toggle('hidden');
  };

  window.stakeConfirm = async function(token) {
    if (!requireWalletThen(null, 'stake')) return;
    const input = document.getElementById('stake-input-' + token);
    const msg   = document.getElementById('stake-form-msg-' + token);
    if (!input || !msg) return;
    try {
      msg.className = 'text-xs text-[#8b95ab]'; msg.textContent = 'Staking…';
      await api('POST', '/api/defi/stake', { token, amount: input.value });
      msg.className = 'text-xs text-emerald-400'; msg.textContent = 'Staked successfully!';

    if (!requireWalletThen(null, 'unstake')) return;
    try {
      const d = await api('DELETE', '/api/defi/stakes/' + id);

      alert('Unstaked! Received ' + d.returned.toFixed(4) + ' ' + tok + ' (reward: ' + d.reward.toFixed(6) + ' ' + tok + ')');
      await load();
    } catch (e) { alert(e.message); }
  };

  await load();
}

        + '</div>'

    const tableHtml = '<div class="card overflow-hidden p-0">'
      + '<div class="px-4 py-3 border-b border-[rgba(255,255,255,0.06)] flex items-center justify-between">'
      + '<h3 class="font-semibold text-[#e8eaf0]">All Pools</h3>'
      + '<span class="text-xs text-[#4e5872]">Click a pool to deposit or withdraw</span>'
      + '</div>'
      + (poolStats.length ? tableRows : '<div class="px-4 py-8 text-center text-[#4e5872] text-sm">No pools available.</div>')
      + '</div>';

    sec.innerHTML = defiTabBar('liquidity') + heroHtml + tableHtml;
  }

  window.poolSelectRow = function(poolId) {
    selPool = (selPool === poolId) ? null : poolId;
    if (selPool) selTab = 'deposit';
    load();
  };

  window.poolSetTab = function(tab) {
    selTab = tab;
    load();
  };

  window.poolUpdateShare = function() {
    const aVal = parseFloat(document.getElementById('liq-a')?.value || 0);
    const bVal = parseFloat(document.getElementById('liq-b')?.value || 0);
    const totalShares = parseFloat(document.getElementById('liq-pool-total-shares')?.value || 0);
    const el = document.getElementById('liq-share-est');
    if (!el) return;
    if (!aVal || !bVal || aVal <= 0 || bVal <= 0) { el.textContent = '—'; return; }
    const newShares = Math.sqrt(aVal * 1e6 * bVal * 1e6);
    const pct = totalShares > 0 ? (newShares / (totalShares + newShares) * 100) : 100;
    el.textContent = pct.toFixed(2) + '%';
  };

  window.addLiquidity = async () => {
    if (!requireWalletThen(null, 'add liquidity')) return;
    const a = document.getElementById('liq-a')?.value;
    const b = document.getElementById('liq-b')?.value;
    const msg = document.getElementById('liq-msg');
    const btn = document.getElementById('liq-submit-btn');
    if (!a || !b || !selPool) return;
    if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }
    try {
      await api('POST', '/api/defi/liquidity', { pool_id: selPool, token_a_amount: a, token_b_amount: b });
      if (msg) { msg.className = 'text-emerald-400 text-sm mt-2'; msg.textContent = 'Liquidity added!'; }
      selTab = 'withdraw';
      await load();
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = 'Add Liquidity'; }
      if (msg) { msg.className = 'text-red-400 text-sm mt-2'; msg.textContent = e.message; }
    }
  };

  window.removeLiqConfirm = function(id) {
    const btn = document.getElementById('remove-btn-' + id);
    if (!btn) return;
    btn.textContent = 'Confirm?';
    btn.className = 'btn btn-r text-xs';
    btn.onclick = function() { window.removeLiq(id); };
    setTimeout(function() {
      const b = document.getElementById('remove-btn-' + id);
      if (b && b.textContent === 'Confirm?') {
        b.textContent = 'Remove';
        b.className = 'btn btn-z text-xs';
        b.onclick = function() { window.removeLiqConfirm(id); };
      }
    }, 3000);
  };

  window.removeLiq = async function(id) {
    if (!requireWalletThen(null, 'remove liquidity')) return;
    const row = document.getElementById('pos-row-' + id);
    try {
      const d = await api('DELETE', '/api/defi/liquidity/' + id);
      if (row) {
        row.innerHTML = '<div class="text-sm text-emerald-400 py-1">Removed · Earned ' + d.fees_earned.toFixed(4) + ' USDC in fees</div>';
        setTimeout(load, 1500);
      } else {
        await load();
      }
    } catch (e) { alert(e.message); }
  };

  window.load = load;
  await load();
}

// ── ICO ───────────────────────────────────────────────────────────────────────
async function renderICO(sec) {
  function tokenBadge(o) {
    if (o.icon_url) {
      return `<img src="${esc(o.icon_url)}" class="w-8 h-8 rounded-full object-cover flex-shrink-0" onerror="this.style.display='none'" alt="">`;
    }
    const cols = ['bg-violet-700','bg-emerald-700','bg-blue-700','bg-amber-700','bg-rose-700','bg-teal-700','bg-indigo-700'];
    const c = cols[(o.token_symbol || 'X').charCodeAt(0) % cols.length];
    return `<div class="w-8 h-8 rounded-full ${c} flex items-center justify-center text-xs font-bold flex-shrink-0">${esc((o.token_symbol||'?')[0])}</div>`;
  }

  function timeUntil(d) {
    const ms = new Date(d) - Date.now();
    if (ms <= 0) return 'now';
    const s = ms / 1000;
    if (s < 3600) return 'in ' + Math.floor(s / 60) + 'm';
    if (s < 86400) return 'in ' + Math.floor(s / 3600) + 'h';
    return 'in ' + Math.floor(s / 86400) + 'd';
  }

  function fmtStat(usdc) {
    if (usdc >= 1_000_000) return '$' + (usdc / 1_000_000).toFixed(2) + 'M';
    if (usdc >= 1_000) return '$' + (usdc / 1_000).toFixed(1) + 'K';
    return '$' + usdc.toFixed(0);
  }

  const GRAD = 'background:linear-gradient(90deg,#7c5cfc,#4e9af1);-webkit-background-clip:text;-webkit-text-fill-color:transparent';

  function liveCard(o) {
    const pct = Number(o.hard_cap) > 0 ? Math.min(100, Number(o.raised) / Number(o.hard_cap) * 100) : 0;
    return `<div class="card space-y-3" style="padding-top:0;overflow:hidden;border-color:rgba(124,92,252,0.3);">
      <div style="height:2px;background:linear-gradient(90deg,#7c5cfc,#4e9af1);margin:0 -1px;"></div>
      <div class="space-y-3 pt-3">
        <div class="flex items-start gap-3">
          ${tokenBadge(o)}
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start gap-2">
              <div class="min-w-0">
                <h3 class="font-bold truncate">${esc(o.token_name)} <span class="text-[#4e5872] text-sm">${esc(o.token_symbol)}</span></h3>
                ${o.description ? `<p class="text-xs text-[#8b95ab] mt-0.5">${esc(o.description)}</p>` : ''}
              </div>
              <span style="background:linear-gradient(90deg,#7c5cfc,#4e9af1);color:#fff;font-weight:600;font-size:0.7rem;border-radius:9999px;padding:2px 8px;flex-shrink:0;">LIVE</span>
            </div>
          </div>
        </div>
        <div class="text-sm space-y-0.5">
          <div class="flex justify-between"><span class="text-[#8b95ab]">Price</span><span>${fmtUSD(o.price_per_token)} USDC</span></div>
          <div class="flex justify-between"><span class="text-[#8b95ab]">Raised</span><span>${fmtUSD(o.raised)} / ${fmtUSD(o.hard_cap)} USDC</span></div>
        </div>
        <div>
          <div class="bg-[#0d1021] rounded-full overflow-hidden" style="height:8px;">
            <div class="h-full rounded-full transition-all" style="width:${pct.toFixed(1)}%;background:linear-gradient(90deg,#7c5cfc,#4e9af1)"></div>
          </div>
          <div class="text-xs font-semibold mt-1" style="${GRAD}">${pct.toFixed(0)}% funded</div>
        </div>
        <div class="flex gap-2">
          <input id="ico-amt-${o.id}" type="number" class="inp flex-1" placeholder="USDC amount" min="0">
          <button class="btn btn-v shrink-0" onclick="investICO(${o.id})">Invest</button>
        </div>
        <div class="text-xs text-[#8b95ab]">Balance: ${getBal('USDC')} USDC</div>
        <p id="ico-msg-${o.id}" class="text-sm"></p>
      </div>
    </div>`;
  }

  function upcomingCard(o) {
    const startStr = o.start_date
      ? new Date(o.start_date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
      : 'TBA';
    const countdown = o.start_date ? timeUntil(o.start_date) : '';
    return `<div class="card space-y-3">
      <div class="flex items-start gap-3">
        ${tokenBadge(o)}
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start gap-2">
            <div class="min-w-0">
              <h3 class="font-bold truncate">${esc(o.token_name)} <span class="text-[#4e5872] text-sm">${esc(o.token_symbol)}</span></h3>
              ${o.description ? `<p class="text-xs text-[#8b95ab] mt-0.5">${esc(o.description)}</p>` : ''}
            </div>
            <span class="text-amber-400 text-xs font-semibold shrink-0">UPCOMING</span>
          </div>
        </div>
      </div>
      <div class="text-sm space-y-0.5">
        <div class="flex justify-between"><span class="text-[#8b95ab]">Price</span><span>${fmtUSD(o.price_per_token)} USDC</span></div>
        <div class="flex justify-between"><span class="text-[#8b95ab]">Raise goal</span><span>${fmtUSD(o.hard_cap)} USDC</span></div>
        <div class="flex justify-between"><span class="text-[#8b95ab]">Opens</span><span class="text-amber-300">${esc(startStr)}</span></div>
      </div>
      <div class="flex justify-between items-center">
        ${countdown ? `<span style="background:linear-gradient(90deg,#f59e0b,#f97316);color:#fff;font-weight:600;font-size:0.7rem;border-radius:9999px;padding:2px 8px;">${esc(countdown)}</span>` : '<span></span>'}
        <span class="text-xs text-[#4e5872] bg-[#1c2236] px-3 py-1.5 rounded-lg">Coming soon</span>
      </div>
    </div>`;
  }

  function completedCard(o) {
    const pct = Number(o.hard_cap) > 0 ? Math.min(100, Number(o.raised) / Number(o.hard_cap) * 100) : 0;
    const isSoldOut = o.status === 'sold_out';
    const badgeCls = isSoldOut ? 'text-[#7c5cfc]' : 'text-[#4e5872]';
    const badgeLbl = isSoldOut ? 'SOLD OUT' : 'ENDED';
    return `<div class="card space-y-3 opacity-70">
      <div class="flex items-start gap-3">
        ${tokenBadge(o)}
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start gap-2">
            <div class="min-w-0">
              <h3 class="font-bold text-[#8b95ab] truncate">${esc(o.token_name)} <span class="text-[#4e5872] text-sm">${esc(o.token_symbol)}</span></h3>
              ${o.description ? `<p class="text-xs text-[#4e5872] mt-0.5">${esc(o.description)}</p>` : ''}
            </div>
            <span class="${badgeCls} text-xs font-semibold shrink-0">${badgeLbl}</span>
          </div>
        </div>
      </div>
      <div class="text-sm space-y-0.5">
        <div class="flex justify-between"><span class="text-[#4e5872]">Price</span><span class="text-[#8b95ab]">${fmtUSD(o.price_per_token)} USDC</span></div>
        <div class="flex justify-between"><span class="text-[#4e5872]">Raised</span><span class="text-[#8b95ab]">${fmtUSD(o.raised)} / ${fmtUSD(o.hard_cap)} USDC</span></div>
      </div>
      <div class="bg-[#0d1021] rounded-full h-2 overflow-hidden">
        <div class="h-full rounded-full" style="width:${pct.toFixed(1)}%;background:${isSoldOut ? 'linear-gradient(90deg,#7c5cfc,#4e9af1)' : '#1c2236'}"></div>
      </div>
    </div>`;
  }

  function renderSection(title, cards, grid) {
    if (!cards.length) return '';
    const layout = grid ? 'grid grid-cols-1 sm:grid-cols-2 gap-4' : 'space-y-3';
    return `<div class="mb-6">
      <div class="flex items-center gap-2 mb-3">
        <div style="width:3px;height:1rem;background:linear-gradient(180deg,#7c5cfc,#4e9af1);border-radius:2px;flex-shrink:0;"></div>
        <h3 class="text-sm font-semibold text-[#8b95ab]">${title}</h3>
      </div>
      <div class="${layout}">${cards.join('')}</div>
    </div>`;
  }

  async function load() {
    await refreshBalances();
    const { offerings } = await api('GET', '/api/ico');
    const live = offerings.filter(o => o.status === 'active');
    const upcoming = offerings.filter(o => o.status === 'upcoming');
    const completed = offerings.filter(o => o.status === 'sold_out' || o.status === 'ended');
    const empty = !live.length && !upcoming.length && !completed.length;

    const totalRaisedUsdc = offerings.reduce((s, o) => s + Number(o.raised), 0) / U;
    const totalCapUsdc = offerings.reduce((s, o) => s + Number(o.hard_cap), 0) / U;
    const liveCount = live.length;
    const totalCount = offerings.length;

    const statTile = (label, value) => `
      <div class="card text-center space-y-1" style="transition:box-shadow 0.2s;" onmouseenter="this.style.boxShadow='0 0 16px rgba(124,92,252,0.2)'" onmouseleave="this.style.boxShadow=''">
        <div class="text-xs text-[#8b95ab]">${label}</div>
        <div class="text-lg font-bold" style="${GRAD}">${value}</div>
      </div>`;

    sec.innerHTML = defiTabBar('launchpad') + `
      <div class="mb-6">
        <h2 class="text-3xl font-bold mb-1">🚀 <span style="${GRAD}">Launchpad</span></h2>
        <p class="text-[#8b95ab] text-sm mb-3">Early token access — curated IDO launches</p>
        <div style="height:2px;width:50%;background:linear-gradient(90deg,#7c5cfc,#4e9af1);border-radius:1px;"></div>
      </div>
      <div data-launchpad-stats class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        ${statTile('Total Raised', fmtStat(totalRaisedUsdc))}
        ${statTile('Hard Cap', fmtStat(totalCapUsdc))}
        ${statTile('Live Projects', String(liveCount))}
        ${statTile('Total Projects', String(totalCount))}
      </div>
      ${empty
        ? `<div class="text-center py-16 space-y-3">
            <div class="text-5xl">🚀</div>
            <h3 class="font-semibold text-lg">No active launches</h3>
            <p class="text-[#8b95ab] text-sm">Check back soon for upcoming token offerings</p>
          </div>`
        : renderSection('Live ICOs', live.map(liveCard), true) +
          renderSection('Upcoming ICOs', upcoming.map(upcomingCard), true) +
          renderSection('Completed ICOs', completed.map(completedCard), false)
      }`;
  }

  window.investICO = async (id) => {
    if (!requireWalletThen(null, 'invest')) return;
    const amt = document.getElementById(`ico-amt-${id}`)?.value;
    const msg = document.getElementById(`ico-msg-${id}`);
    try {
      const d = await api('POST', `/api/ico/${id}/invest`, { usdc_amount: amt });
      if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = `Received ${d.tokens_received.toFixed(4)} ${d.symbol}`; }
      await refreshBalances();
    } catch (e) { if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; } }
  };
  await load();
}

// ── SVG Line Chart ────────────────────────────────────────────────────────────
function svgLineChart(points, opts = {}) {
  const { width = 480, height = 120, color = '#7c3aed', refLine = null } = opts;
  if (!points || points.length < 2) {
    return `<svg viewBox="0 0 ${width} ${height}" width="100%" class="rounded-lg bg-[#161b2a]/80">
      <text x="${width/2}" y="${height/2}" text-anchor="middle" fill="#4e5872" font-size="11">No history yet</text></svg>`;
  }
  const pad = { top: 16, right: 10, bottom: 20, left: 38 };
  const W = width - pad.left - pad.right;
  const H = height - pad.top - pad.bottom;
  const xs = points.map(p => p.x);
  const ys = points.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  let yMin = opts.yMin != null ? opts.yMin : Math.min(...ys);
  let yMax = opts.yMax != null ? opts.yMax : Math.max(...ys);
  if (yMax - yMin < 0.001) { yMin -= 1; yMax += 1; }
  const xScale = x => pad.left + (xMax === xMin ? W / 2 : (x - xMin) / (xMax - xMin) * W);
  const yScale = y => pad.top + H - ((y - yMin) / (yMax - yMin)) * H;
  const polyline = points.map(p => `${xScale(p.x).toFixed(1)},${yScale(p.y).toFixed(1)}`).join(' ');
  const fmt = ts => { const d = new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
  const fmtY = v => v >= 10000 ? (v/1000).toFixed(1)+'k' : v >= 1 ? v.toFixed(1) : v.toFixed(4);
  let refLineEl = '';
  if (refLine != null && refLine >= yMin && refLine <= yMax) {
    const ry = yScale(refLine).toFixed(1);
    refLineEl = `<line x1="${pad.left}" y1="${ry}" x2="${pad.left+W}" y2="${ry}" stroke="#4e5872" stroke-width="1" stroke-dasharray="3,3"/>`;
  }
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" class="rounded-lg bg-[#161b2a]/80">
    <rect x="${pad.left}" y="${pad.top}" width="${W}" height="${H}" fill="#0d1021" rx="4"/>
    ${refLineEl}
    <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${xScale(xs[xs.length-1]).toFixed(1)}" cy="${yScale(ys[ys.length-1]).toFixed(1)}" r="3" fill="${color}"/>
    <text x="${pad.left}" y="${pad.top-3}" fill="#8b95ab" font-size="9">${fmt(xMin)}</text>
    <text x="${pad.left+W}" y="${pad.top-3}" fill="#8b95ab" font-size="9" text-anchor="end">${fmt(xMax)}</text>
    <text x="${pad.left-3}" y="${pad.top+5}" fill="#8b95ab" font-size="9" text-anchor="end">${fmtY(yMax)}</text>
    <text x="${pad.left-3}" y="${pad.top+H}" fill="#8b95ab" font-size="9" text-anchor="end">${fmtY(yMin)}</text>
  </svg>`;
}

// `demoMarkets` (optional): when provided, renders from that static array
// instead of the live API and skips the auto-refresh interval — used for the
// /?demo=1 prerender so CI selectors exist without auth.
async function renderMarkets(sec, demoMarkets) {
  if (S.marketId) { await renderMarketDetail(sec); return; }

  let showCreate = false;
  let allMarkets = [];

  function pmCountdown(closesAt) {
    const ms = new Date(closesAt) - Date.now();
    if (ms <= 0) return 'closing';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 1) return `${h}h ${m}m`;
    return m > 0 ? `${m}m` : 'closing';
  }
  // Compact USD from micro-units, with thousands separators (no cents).
  function pmMoney(units) {
    return '$' + Math.round(Number(units) / 1e6).toLocaleString('en-US');
  }
  function pmCloses(m) {
    if (!m.closes_at) return '';
    const ms = new Date(m.closes_at) - Date.now();
    if (ms > 0 && ms <= 48 * 3600000) {
      return `<span class="text-amber-400 text-xs font-semibold whitespace-nowrap">&#x23f1; ${pmCountdown(m.closes_at)}</span>`;
    }
    return ms > 0 ? `<span class="text-[#4e5872] text-xs whitespace-nowrap">Closes ${new Date(m.closes_at).toLocaleDateString()}</span>` : '';
  }
  function pmProbBar(yesPct) {
    const noPct = (100 - yesPct).toFixed(0);
    return `<div class="flex items-center justify-between text-xs mb-1">
        <span class="font-bold text-emerald-400">${yesPct.toFixed(0)}% YES</span>
        <span class="font-bold text-red-400">${noPct}% NO</span>
      </div>
      <div class="flex h-2 rounded-full overflow-hidden bg-[#1c2236]">
        <div class="bg-emerald-500 h-full" style="width:${yesPct}%"></div>
        <div class="bg-red-600 h-full" style="width:${100 - yesPct}%"></div>
      </div>`;
  }
  function pmResolvedBadge(m) {
    const yes = m.resolved_outcome === 'YES';
    return `<div class="text-sm font-bold ${yes ? 'text-emerald-400' : 'text-red-400'}">${yes ? '&#x2713; YES' : '&#x2717; NO'} <span class="text-[#4e5872] font-normal text-xs">resolved</span></div>`;
  }

  // Compact grid card.
  function pmMarketCard(m) {
    const liq = Number(m.yes_pool) + Number(m.no_pool);
