  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

  <script>
  // Pre-paint theme decision (render-blocking, before Tailwind/body paint to
  // avoid a flash-of-wrong-theme). Stored choice wins; otherwise follow the OS
  // via prefers-color-scheme. localStorage may throw in a sandboxed iframe.
  (function(){
    var t=null;
    try{t=localStorage.getItem('bloom_theme');}catch(e){}
    var dark;
    if(t==='light'){dark=false;}
    else if(t==='dark'){dark=true;}
    else{dark=!(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches);}
    document.documentElement.classList[dark?'add':'remove']('dark');
  })();
  </script>
    <title>BloomMoney</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  // Semantic colour names resolving to the CSS vars defined in <style> below.
  // Lets new/migrated markup use theme-correct utilities (bg-surface,
  // text-secondary, …) instead of arbitrary hex, shrinking reliance on the
  // light-mode override map over time.
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: { colors: {
      deep:           'var(--bg-deep)',
      surface:        'var(--bg-surface)',
      card:           'var(--bg-card)',
      'card-hover':   'var(--bg-card-hover)',
      input:          'var(--bg-input)',
      'text-primary':   'var(--text-primary)',
      'text-secondary': 'var(--text-secondary)',
      'text-muted':     'var(--text-muted)',
      'border-subtle':  'var(--border-subtle)',
      'accent-purple':  'var(--accent-purple)',
      'accent-blue':    'var(--accent-blue)',
    } } },
  };
  </script>

<!-- ───── Wallet Prompt Modal ───── -->

  </div>
</div>

<!-- ───── Tip Modal ───── -->

      <div class="flex gap-2 justify-end">
        <button class="btn btn-z" onclick="closeTipModal()">Cancel</button>

<style>
:root {
  --bg-deep:        #f4f5f8;
  --bg-surface:     #ffffff;
  --bg-card:        #f0f1f6;
  --bg-card-hover:  #e6e8f0;
  --bg-input:       #f8f8fb;
  --border-subtle:  rgba(0,0,0,0.07);
  --border-hover:   rgba(124,92,252,0.25);
  --border-focus:   #7c5cfc;
  --accent-purple:  #7c5cfc;
  --accent-blue:    #4e9af1;
  --text-primary:   #1c1e2d;
  --text-secondary: #525875;       /* ~7:1 on white — AA body */
  --text-muted:     #6b7196;       /* darkened from #9499b3 → ~4.6:1 on white (AA body) */
  /* Mobile-first responsive foundation: adaptive gutter + fluid type scale.
     Same tokens in both themes (layout, not colour). */
  --space-gutter:   clamp(0.85rem, 2.5vw, 1.15rem);
  --fs-h1:          clamp(1.5rem, 1.1rem + 2vw, 2.25rem);
  --fs-h2:          clamp(1.25rem, 1rem + 1.2vw, 1.6rem);
  --fs-h3:          clamp(1.05rem, 0.95rem + 0.6vw, 1.25rem);
}
html.dark {
  --bg-deep:        #0f1117;
  --bg-surface:     #131620;
  --bg-card:        #161b2a;
  --bg-card-hover:  #1c2236;
  --bg-input:       #0d1021;
  --border-subtle:  rgba(255,255,255,0.06);
  --border-hover:   rgba(124,92,252,0.20);
  --border-focus:   #7c5cfc;
  --accent-purple:  #7c5cfc;
  --accent-blue:    #4e9af1;
  --text-primary:   #e8eaf0;
  --text-secondary: #8b95ab;       /* ~5.4:1 on #131620 — AA body */
  --text-muted:     #7884a3;       /* lightened from #4e5872 → ~4.6:1 on card, 5:1 on deep (AA body) */
}
/* Fluid heading helpers (additive — use in place of fixed text-* sizes). */
.fluid-h1 { font-size: var(--fs-h1); line-height: 1.15; }
.fluid-h2 { font-size: var(--fs-h2); line-height: 1.2; }
.fluid-h3 { font-size: var(--fs-h3); line-height: 1.25; }
/* Light-mode: override Tailwind hardcoded arbitrary-value colour classes.
   [class~="..."] attribute selectors need no escaping and cover both static HTML
   and dynamically injected innerHTML. */
html:not(.dark) [class~="text-[#e8eaf0]"] { color: var(--text-primary) !important; }
html:not(.dark) [class~="text-[#8b95ab]"] { color: var(--text-secondary) !important; }
html:not(.dark) [class~="text-[#4e5872]"] { color: var(--text-muted) !important; }
html:not(.dark) [class~="bg-[#0f1117]"]   { background-color: var(--bg-deep) !important; }
html:not(.dark) [class~="bg-[#131620]"]   { background-color: var(--bg-surface) !important; }
html:not(.dark) [class~="bg-[#161b2a]"]   { background-color: var(--bg-card) !important; }
html:not(.dark) [class~="bg-[#1c2236]"]   { background-color: var(--bg-card-hover) !important; }
html:not(.dark) [class~="bg-[#0d1021]"]   { background-color: var(--bg-input) !important; }
html:not(.dark) [class~="hover:bg-[#1c2236]"]:hover { background-color: var(--bg-card-hover) !important; }
html:not(.dark) [class~="border-[rgba(255,255,255,0.06)]"] { border-color: var(--border-subtle) !important; }
html:not(.dark) [class~="border-[rgba(255,255,255,0.08)]"] { border-color: var(--border-subtle) !important; }
html:not(.dark) [class~="border-[rgba(255,255,255,0.15)]"] { border-color: rgba(0,0,0,0.12) !important; }
html:not(.dark) .inp { background: var(--bg-input) !important; border-color: rgba(0,0,0,0.1) !important; color: var(--text-primary) !important; }
html:not(.dark) select.inp option { background: var(--bg-card); color: var(--text-primary); }
/* SVG chart fill-attribute overrides */
html:not(.dark) svg rect[fill="#0d1021"] { fill: var(--bg-input); }
html:not(.dark) svg text[fill="#4e5872"] { fill: var(--text-muted); }
html:not(.dark) svg text[fill="#e8eaf0"] { fill: var(--text-primary); }
html:not(.dark) svg [fill="#8b95ab"] { fill: var(--text-secondary); }
/* Light-mode: remaining hardcoded utilities not covered above. Near-white
   text tones (invisible on a light surface) → primary; light accent tints
   (low contrast on white) → the full-strength accent var. P&L green/red and
   the brand purple/blue accents are intentionally theme-invariant. */

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let _activeInterval = null;
const S = {
  token: new URLSearchParams(location.search).get('token') || '',
  user: null,
  balances: {},
  kyc: null,
  view: 'home',
  prices: {},
  marketId: null,
  tradeToken: null,
  tradePrefillSymbol: null,
  topCoinsData: [],
  profileUser: null,
  futuresMarket: null,
  social_accounts: [],
  points: 0,
  msgOpenConv: null,
  totalUnread: 0,
};

// ── Token refresh via bridge postMessage ───────────────────────────────────────
window.addEventListener('message', (e) => {
  if (e.data && typeof e.data === 'object') {
    const t = e.data.token || e.data.jwt;
    if (t && typeof t === 'string' && t.length > 20) {
      S.token = t;
      init();
    }
  }
});

// ── API ────────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const h = { 'Content-Type': 'application/json' };
  if (S.token) h['x-usernode-token'] = S.token;
  const opts = { method, headers: h };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Helpers ────────────────────────────────────────────────────────────────────
const U = 1_000_000;
function fmtAmt(sym, v) {
  const n = Number(v) / U;
  if (sym === 'ETH') return n.toFixed(6);
  if (sym === 'BTC') return n.toFixed(8);
  return n.toFixed(2);
}
function fmtUSD(v) { return (Number(v) / U).toFixed(2); }
// AI Trade Helper: client-side mirror of server COINGECKO_TICKER_MAP keys.
const KNOWN_TICKERS = new Set(['BTC','ETH','BNB','SOL','XRP','USDT','ADA','DOGE','TON','LINK','DOT','AVAX']);
const TICKER_RE = /\$([A-Za-z]{2,6})\b/g;
function detectTickers(text) {
  const seen = [];
  let m;
  TICKER_RE.lastIndex = 0;
  while ((m = TICKER_RE.exec(text || '')) !== null) {
    const sym = m[1].toUpperCase();
    if (KNOWN_TICKERS.has(sym) && !seen.includes(sym)) seen.push(sym);
    if (seen.length >= 3) break;
  }
  return seen;
}
function fmtTickerPrice(v) {
  const n = Number(v);
  if (!isFinite(n)) return '';
  if (n >= 1) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return '$' + n.toFixed(4);
}
function getBal(sym) { return fmtAmt(sym, S.balances[sym] || 0); }
function shortAddr(a) { return a ? a.slice(0,6)+'…'+a.slice(-4) : ''; }
function tsAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return Math.floor(s)+'s';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}
function tierLabel(lvl) {
  return { basic: 'Free', social: 'Pro ✓', premium: 'Premium+ ★' }[lvl] || (lvl || 'Free');
}
function kycTag(lvl) {
  if (!lvl) return '';
  return `<span class="tag-${lvl}">${tierLabel(lvl)}</span>`;
}
function fundingCountdown(ts) {
  const ms = new Date(ts) - Date.now();
  if (ms <= 0) return 'due';
  const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
  if (m >= 60) return Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
  return m + 'm ' + s + 's';
}
function err(msg) { return `<div class="text-red-400 text-sm py-2">${msg}</div>`; }
function spin() { return `<div class="flex justify-center py-8"><div class="spinner"></div></div>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Avatar placeholder ─────────────────────────────────────────────────────────
// Deterministic, stylish initials avatar rendered as an inline SVG data-URI image.
// Same username always yields the same gradient, so avatars stay consistent across
// the feed, threads, and profiles without any upload flow.
function _avatarHash(str) {
  let h = 0;
  str = String(str || '?');
  for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) | 0; }
  return Math.abs(h);
}
// Deterministic 1–2 letter monogram from a username. Splits on separators
// (- _ . space): with two+ segments, takes the first letter of the first two
// (e.g. "staging-alice" → "SA"); otherwise the first two letters of the single
// segment (e.g. "alice" → "AL", "bob" → "BO"). Falls back through the first raw
// char to "?" for non-Latin / emoji handles.
function userInitials(username) {
  const name = String(username || '?');
  const segs = name.split(/[^a-zA-Z0-9]+/).filter(Boolean);
  let out = '';
  if (segs.length >= 2) {
    out = segs[0][0] + segs[1][0];
  } else if (segs.length === 1) {
    out = segs[0].slice(0, 2);
  }
  if (!out) out = (name.replace(/\s/g, '')[0] || '?');
  return out.toUpperCase();
}
function avatarDataUri(username) {
  const name = String(username || '?');
  const initials = userInitials(name);
  const h = _avatarHash(name);
  const hue = h % 360;                 // full spectrum, hashed from the name
  const hue2 = (hue + 40) % 360;
  const c1 = `hsl(${hue},68%,58%)`;
  const c2 = `hsl(${hue2},72%,42%)`;
  const gid = 'g' + h;
  // Tighten the type a notch when two glyphs are present so they don't clip.
  const fontSize = initials.length > 1 ? 26 : 32;
  const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">` +
      `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1">` +
        `<stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>` +
      `</linearGradient></defs>` +
      `<rect width="64" height="64" fill="url(#${gid})"/>` +
      `<text x="32" y="34" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" ` +
        `font-size="${fontSize}" font-weight="600" fill="#fff" fill-opacity="0.95" ` +
        `text-anchor="middle" dominant-baseline="central">${esc(initials)}</text>` +
    `</svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}
// Reusable circular <img> avatar. `cls` adds Tailwind sizing/extra classes.
// `avatarUrl` is an optional stored data URI; falls back to the generated SVG.
function avatarImg(username, cls, avatarUrl) {
  const src = avatarUrl || avatarDataUri(username);
  return `<img src="${esc(src)}" alt="@${esc(username)}" ` +
    `class="rounded-full object-cover shrink-0 ring-1 ring-white/10 ${cls || 'w-8 h-8'}" ` +
    `loading="lazy" draggable="false">`;
}
// Inline "[badge] @handle" fragment — the single reusable renderer for the many
// text-only username sites (tables, captions, chips, modal titles). opts:
//   { avatarUrl, size, link, displayName, atSign }
// `size` is a Tailwind size class for the badge (default 'w-5 h-5'); `link`
// wraps the whole thing in a profile-navigating button; `displayName` shows a
// name instead of the @handle; `atSign` (default true) prefixes "@".
function userTag(username, opts) {
  opts = opts || {};
  const uname = String(username || '?');
  const size = opts.size || 'w-5 h-5';
  const label = opts.displayName != null
    ? esc(opts.displayName)
    : (opts.atSign === false ? '' : '@') + esc(uname);
  const badge = avatarImg(uname, size, opts.avatarUrl);
  const inner = `${badge}<span class="truncate">${label}</span>`;
  if (opts.link) {
    return `<button type="button" class="inline-flex items-center gap-1.5 min-w-0 hover:underline" ` +
      `onclick="navigate('profile',{profileUser:'${esc(uname)}'})" aria-label="@${esc(uname)} profile">${inner}</button>`;
  }
  return `<span class="inline-flex items-center gap-1.5 min-w-0 align-middle">${inner}</span>`;
}

// ── Navigation ────────────────────────────────────────────────────────────────
// Six primary tabs (home/trade/futures/earn/predict/profile) plus explore,
// verify and nfts. Legacy aliases (feed/swap/markets/stake/…) still resolve so
// internal deep-links keep working.
const VIEW_SECTION = {
  home: 'app-feed', feed: 'app-feed',
  market: 'section-market', swap: 'section-market',
  trade: 'section-trade', futures: 'section-trade',
  journal: 'section-journal',
  earn: 'section-earn',
  stake: 'section-stake', liquidity: 'section-liquidity',
  ico: 'section-ico', launchpad: 'section-ico',
  vault: 'section-vault',
  predict: 'section-markets', markets: 'section-markets',
  profile: 'section-profile',
  messages: 'section-messages',
  explore: 'section-explore',
  verify: 'section-verify', kyc: 'section-verify',
  nfts: 'section-nfts',
  admin: 'section-admin',
  portfolio: 'section-portfolio',
};
// Which bottom tab is highlighted for a given view.
const VIEW_TAB = {
  home: 'home', feed: 'home', market: 'market', swap: 'market', trade: 'trade', futures: 'trade',
  earn: 'earn', stake: 'earn', liquidity: 'earn', ico: 'earn',
  launchpad: 'earn', vault: 'earn',
  predict: 'predict', markets: 'predict', profile: 'profile',
  portfolio: 'portfolio',
};

function navigate(view, opts) {
  clearInterval(_activeInterval); _activeInterval = null;
  // Release the Portfolio camera scanner if it's running when leaving the view.
  if (typeof window._pfStopScanner === 'function') { try { window._pfStopScanner(); } catch (_) {} }
  if (opts) Object.assign(S, opts);
  S.view = view;
  document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
  const sec = document.getElementById(VIEW_SECTION[view]);
  if (sec) sec.classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  const tab = VIEW_TAB[view];
  document.querySelectorAll('.bottom-tab').forEach(b => {
    b.classList.toggle('text-[#7c5cfc]', b.dataset.tab === tab);
    b.classList.toggle('text-[#8b95ab]', b.dataset.tab !== tab);
  });
  hideMobileSidebar();
  loadView(view);
  document.getElementById('main-scroll').scrollTo(0, 0);
}

// ── Theme toggle ──────────────────────────────────────────────────────────────
function applyThemeGlyph(isDark) {
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = isDark ? '☀️' : '🌙';
  const notice = document.getElementById('fut-dark-notice');
  if (notice) notice.style.display = isDark ? 'none' : 'flex';
}
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  // Persisting the explicit choice locks it in: the OS-change listener below
  // only acts while bloom_theme is unset.
  try { localStorage.setItem('bloom_theme', isDark ? 'dark' : 'light'); } catch (e) {}
  applyThemeGlyph(isDark);
}
function initThemeBtn() {
  applyThemeGlyph(document.documentElement.classList.contains('dark'));
}
// Follow OS theme changes, but ONLY while the user has made no manual choice.
(function () {
  if (!window.matchMedia) return;
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  const onChange = (e) => {
    let stored = null;
    try { stored = localStorage.getItem('bloom_theme'); } catch (_) {}
    if (stored === 'light' || stored === 'dark') return; // manual choice wins
    document.documentElement.classList[e.matches ? 'add' : 'remove']('dark');
    applyThemeGlyph(e.matches);
  };
  if (mq.addEventListener) mq.addEventListener('change', onChange);
  else if (mq.addListener) mq.addListener(onChange); // Safari < 14
})();

async function loadView(view) {
  const sec = document.getElementById(VIEW_SECTION[view]);
  if (!sec) return;
  sec.innerHTML = spin();
  try {
    switch (view) {
      case 'home': case 'feed': await renderFeed(sec); break;
      case 'profile': await renderProfile(sec); break;
      case 'market': case 'swap': await renderMarket(sec); break;
      case 'earn': S.earnHubFilter = 'all'; await renderEarn(sec); break;
      case 'stake': await renderStake(sec); break;
      case 'liquidity': await renderLiquidity(sec); break;
      case 'ico': case 'launchpad': await renderICO(sec); break;
      case 'vault': await renderVault(sec); break;
      case 'predict': case 'markets': await renderMarkets(sec); break;
      case 'messages': await renderMessages(sec); break;
      case 'trade': case 'futures': await renderFutures(sec); break;
      case 'journal': await renderJournal(sec); break;
      case 'nfts': await renderNFTs(sec); break;
      case 'explore': await renderExplore(sec); break;
      case 'verify': case 'kyc': await renderVerify(sec); break;
      case 'admin': await renderAdmin(sec); break;
      case 'portfolio': await renderPortfolio(sec); break;
    }
  } catch (e) { sec.innerHTML = err(e.message); }
}

// ── Messaging unread badge ─────────────────────────────────────────────────────
const MSG_DEMO = new URLSearchParams(location.search).get('demo') === '1';
let _unreadInterval = null;
let _prevConvUnread = null; // Map<convId, unreadCount> snapshot; null = first load baseline not yet set
function setUnreadBadge(total) {
  S.totalUnread = total;
  for (const id of ['nav-unread-badge']) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (total > 0) { el.textContent = total > 99 ? '99+' : String(total); el.classList.remove('hidden'); }
    else el.classList.add('hidden');
  }
}
async function refreshUnreadBadge() {
  try {
    const d = await api('GET', '/api/conversations' + (MSG_DEMO ? '?demo=1' : ''));
    const convos = d.conversations || [];
    if (_prevConvUnread === null) {
      // First successful call — establish baseline, no toasts
      _prevConvUnread = new Map(convos.map(c => [c.id, c.unread || 0]));
    } else {
      // Detect new messages since last poll
      for (const conv of convos) {
        const prev = _prevConvUnread.get(conv.id) ?? 0;
        if ((conv.unread || 0) > prev) {
          // Only toast if user isn't already viewing this specific conversation
          if (S.view !== 'messages' || S.msgActiveConv !== conv.id) {
            showMsgToast(conv);
          }
        }
      }
      _prevConvUnread = new Map(convos.map(c => [c.id, c.unread || 0]));
    }
    setUnreadBadge(Number(d.total_unread) || 0);
  } catch (_) { /* non-fatal */ }
}

function removeToast(el) {
  el.style.transform = 'translateX(1rem)';
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 300);
}

function showMsgToast(conv) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  if (container.querySelectorAll('.msg-toast').length >= 3) return;
  if (!conv.last_message) return;

  const isGroup = conv.type === 'group';
  const sender = conv.last_message.sender_username || '';
  const label = isGroup
    ? esc((conv.title || 'Group') + ' · ' + sender)
    : esc(sender);
  const rawPreview = conv.last_message.content || '';
  const preview = esc(rawPreview.length > 60 ? rawPreview.slice(0, 60) + '…' : rawPreview);

  const isLight = document.documentElement.classList.contains('light');
  const cardBg = isLight ? 'bg-white border-[rgba(124,92,252,0.2)]' : 'bg-[#1c2236] border-[rgba(124,92,252,0.25)]';

  const toast = document.createElement('div');
  toast.className = `msg-toast ${cardBg} rounded-xl shadow-lg px-4 py-3 flex gap-3 items-start w-72 max-w-[90vw] pointer-events-auto cursor-pointer border`;
  toast.style.cssText = 'transform:translateX(1rem);opacity:0;transition:transform 0.3s ease,opacity 0.3s ease;';
  toast.innerHTML = `
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-1 mb-0.5">
        <span class="text-sm font-semibold truncate text-[#7c5cfc]">${label}</span>
        <span class="ml-auto text-xs text-[#4e5872] shrink-0">💬</span>
      </div>
      <div class="text-xs truncate ${isLight ? 'text-[#525875]' : 'text-[#8b95ab]'}">${preview}</div>
    </div>
    <button class="msg-toast-close shrink-0 text-[#4e5872] hover:text-[#8b95ab] text-base leading-none mt-0.5" aria-label="Dismiss">×</button>`;

  const autoTimer = setTimeout(() => removeToast(toast), 5000);

  toast.querySelector('.msg-toast-close').addEventListener('click', (e) => {
    e.stopPropagation();
    clearTimeout(autoTimer);
    removeToast(toast);
  });
  toast.addEventListener('click', () => {
    clearTimeout(autoTimer);
    removeToast(toast);
    navigate('messages');
    // openConversation is defined in the messages section; call after navigate renders the view
    setTimeout(() => openConversation(conv.id), 50);
  });

  container.appendChild(toast);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      toast.style.transform = 'translateX(0)';
      toast.style.opacity = '1';
    });
  });
}

// Writes the current points total into the "Points available" badge (no animation).
function updatePoints() {
  const el = document.getElementById('points-value');

}

// Animates the badge from its old total up to `newTotal`, floating a "+gained"
// chip and pulsing the badge. Drives off the server-confirmed total.
function animatePointsGain(newTotal, gained) {
  const valEl = document.getElementById('points-value');
  const badge = document.getElementById('points-available');
  const from = Number(S.points) || 0;
  S.points = newTotal;
  if (!valEl || !badge) { updatePoints(); return; }

  // Floating "+N" chip
  const float = document.createElement('div');
  float.className = 'points-float';
  float.textContent = '+' + gained;
  badge.appendChild(float);
  float.addEventListener('animationend', () => float.remove());

  // Glow/pulse on the badge
  badge.classList.remove('points-pulse');
  void badge.offsetWidth; // restart animation
  badge.classList.add('points-pulse');
  badge.addEventListener('animationend', () => badge.classList.remove('points-pulse'), { once: true });

  // Count-up tween from old -> new
  const start = performance.now();
  const dur = 600;
  function tick(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    valEl.textContent = String(Math.round(from + (newTotal - from) * eased));
    if (t < 1) requestAnimationFrame(tick);
    else valEl.textContent = String(newTotal);
  }
  requestAnimationFrame(tick);
}

      else if (v === 'err') body = '<span class="text-[#8b95ab]">price unavailable</span>';
      else body = `<span class="text-[#4e9af1] font-semibold">${fmtTickerPrice(v)}</span>`;
      return `<span class="inline-flex items-center gap-1 text-xs bg-[#161b2a] border border-[rgba(78,154,241,0.3)] rounded-full px-2 py-0.5">
        <span class="w-1.5 h-1.5 rounded-full bg-[#4e9af1]"></span>
        <span class="text-[#e8eaf0] font-medium">$${sym}</span>
        <span class="text-[#4e5872]">·</span>${body}</span>`;
    }).join('');
  }

  async function refreshTickers(symbols) {
    const need = symbols.filter(s => tickerCache[s] === undefined);
    renderTickerBadge(symbols);
    if (!need.length) return;
    try {
      const d = await api('GET', '/api/ticker-prices?symbols=' + encodeURIComponent(need.join(',')));
      for (const s of need) {
        const p = d.prices && d.prices[s];
        tickerCache[s] = (p != null) ? p : 'err';
      }
    } catch {
      for (const s of need) if (tickerCache[s] === undefined) tickerCache[s] = 'err';
    }
    // Re-render against the current composer text (user may have kept typing).
    const box = document.getElementById('compose-box');
    renderTickerBadge(detectTickers(box ? box.value : ''));
  }

  function onComposeInput() {
    const box = document.getElementById('compose-box');
    if (!box) return;
    const cnt = document.getElementById('compose-count');
    if (cnt) cnt.textContent = box.value.length + '/280';
    const symbols = detectTickers(box.value);
    const key = symbols.join(',');
    renderTickerBadge(symbols);
    if (key === lastTickerKey) return;
    lastTickerKey = key;
    if (tickerDebounce) clearTimeout(tickerDebounce);
    if (!symbols.length) return;
    tickerDebounce = setTimeout(() => refreshTickers(symbols), 500);
  }

  function resetComposerTicker() {
    if (tickerDebounce) { clearTimeout(tickerDebounce); tickerDebounce = null; }
    lastTickerKey = '';
    renderTickerBadge([]);
  }

  async function loadPosts() {
    const params = new URLSearchParams({ tab: feedState.tab, limit: 20 });
    if (feedState.cursor) params.set('cursor', feedState.cursor);
    const d = await api('GET', '/api/feed?' + params);
    feedState.posts = feedState.cursor ? [...feedState.posts, ...d.posts] : d.posts;
    feedState.cursor = d.nextCursor;
    render();
  }

  function threadView(post, replies) {
    return `<div class="space-y-3">
      <button class="text-sm text-[#8b95ab] hover:text-[#e8eaf0] flex items-center gap-1" onclick="backToFeed()">← Back to Feed</button>

        ${replies.map(r => postCard(r)).join('')}

            <button class="btn btn-v" onclick="submitReply(${post.id})">Reply</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  function render() {

    const isNewsTab = feedState.tab === 'news';

                <option value="investment_win">Investment win 📈</option>

                <option value="emergency_fund">Emergency fund complete 🛡️</option>

              <label class="flex items-center gap-1.5 text-xs text-[#8b95ab] cursor-pointer select-none shrink-0" title="Lock this post behind a 5 TOK paywall">
                <input id="compose-lock" type="checkbox" class="accent-violet-600 w-3.5 h-3.5">
                <span>🔒 Lock</span>
              </label>
            </div>
            <div class="flex justify-between items-center mt-2">
              <span id="compose-count" class="text-xs text-[#4e5872]">0/280</span>
              <button class="btn btn-v px-5 py-1.5 text-sm" onclick="submitPost()">Post</button>

          </div>
        </div>
      </div>
      <div class="flex border-b border-[var(--border-subtle)]">
        <button class="flex-1 py-3 text-sm font-medium text-center transition-colors ${feedState.tab==='global'?'tab-ul-active':'tab-ul-inactive'}" onclick="switchTab('global')">For You</button>
        <button class="flex-1 py-3 text-sm font-medium text-center transition-colors ${feedState.tab==='following'?'tab-ul-active':'tab-ul-inactive'}" onclick="switchTab('following')">Following</button>
        <button class="flex-1 py-3 text-sm font-medium text-center transition-colors ${feedState.tab==='wins'?'tab-ul-active':'tab-ul-inactive'}" onclick="switchTab('wins')">Highlights</button>
        <button class="flex-1 py-3 text-sm font-medium text-center transition-colors ${feedState.tab==='news'?'tab-ul-active':'tab-ul-inactive'}" onclick="switchTab('news')">News 📰</button>
        <button class="flex-1 py-3 text-sm font-medium text-center transition-colors ${feedState.tab==='explore'?'tab-ul-active':'tab-ul-inactive'}" onclick="switchTab('explore')">Explore 🔭</button>

      <div id="feed-list" class="space-y-3">
        ${feedState.tab==='explore'
          ? spin()

      </div>
      ${feedState.tab!=='explore' && feedState.cursor ? `<div class="px-4 py-3"><button class="btn btn-z w-full" onclick="loadMore()">Load more</button></div>` : ''}
    `;
    const box = document.getElementById('compose-box');
    if (box) {
      box.addEventListener('input', onComposeInput);
      // Restore any previously-detected ticker badge after a background re-render.
      renderTickerBadge(detectTickers(box.value));
    }
    window._feedFns = { loadPosts, postCard, threadView, feedState };
  }

  window.switchTab = (tab) => {
    feedState.tab = tab;
    feedState.cursor = null;
    if (tab === 'explore') { loadExplore(); return; }
    loadPosts();
  };
  window.loadMore = () => loadPosts();

  // Explore tab: render the shared Explore content into the feed area.
  // No pagination/cursor — it's a one-shot discovery view behind a spinner.
  async function loadExplore() {
    feedState.tab = 'explore';
    render(); // draws composer + tab strip + spinner in #feed-list
    let html;
    try {
      html = await exploreContentHtml();
    } catch (e) {
      html = `<p class="text-red-400 text-sm text-center py-4">Couldn't load Explore: ${esc(e.message || 'error')}</p>`;
    }
    // Guard: the user may have switched away (or opened a thread) while loading.
    if (feedState.tab !== 'explore' || feedState.thread) return;
    const list = document.getElementById('feed-list');
    if (list) list.innerHTML = html;
  }

  window.submitPost = async () => {
    if (!requireWalletThen(null, 'post')) return;
    const box = document.getElementById('compose-box');
    const content = box?.value.trim();
    if (!content) return;
    const locked = !!document.getElementById('compose-lock')?.checked;
    const milestoneEl = document.getElementById('compose-milestone');
    const milestone_type = milestoneEl?.value || undefined;
    try {
      const body = { content, locked };
      if (milestone_type) body.milestone_type = milestone_type;
      const res = await api('POST', '/api/posts', body);
      box.value = '';
      if (milestoneEl) milestoneEl.value = '';
      resetComposerTicker();
      feedState.cursor = null;
      await loadPosts();
      // Post-to-Earn: animate the confirmed points credit (server-driven).
      if (res && res.awarded > 0 && res.points != null) {
        animatePointsGain(Number(res.points), Number(res.awarded));
      }
    } catch (e) { alert(e.message); }
  };

  window.unlockPost = async (id) => {
    if (!requireWalletThen(null, 'unlock this post')) return;
    try {
      const { content } = await api('POST', `/api/posts/${id}/unlock`);
      const post = feedState.posts.find(p => p.id === id);
      if (post) { post.unlocked = true; post.content = content; }
      if (feedState.thread && feedState.thread.post.id === id) {
        feedState.thread.post.unlocked = true;
        feedState.thread.post.content = content;
        sec.innerHTML = threadView(feedState.thread.post, feedState.thread.replies);
      } else {
        render();
      }
    } catch (e) { alert(e.message); }
  };

  window.likePost = async (id) => {
    try {
      await api('POST', `/api/posts/${id}/like`);
      feedState.cursor = null;
      await loadPosts();
    } catch (e) { alert(e.message); }
  };

  window.openThread = async (id) => {
    sec.innerHTML = spin();
    try {
      const { post, replies } = await api('GET', `/api/posts/${id}`);
      feedState.thread = { post, replies };
      sec.innerHTML = threadView(post, replies);
    } catch (e) { sec.innerHTML = err(e.message); }
  };

  window.backToFeed = () => { feedState.thread = null; render(); };

  window.submitReply = async (parentId) => {
    if (!requireWalletThen(null, 'reply')) return;
    const content = document.getElementById('reply-box')?.value.trim();
    if (!content) return;
    try {
      await api('POST', '/api/posts', { content, parent_id: parentId });
      await window.openThread(parentId);
    } catch (e) { alert(e.message); }
  };

  window.toggleFollow = async (username) => {
    if (!requireWalletThen(null, 'follow')) return;
    try {
      await api('POST', '/api/follow', { username });
      await loadPosts();
    } catch (e) { alert(e.message); }
  };

  // Honor a one-shot requested tab (e.g. the header 🔭 shortcut opens Home
  // straight on the Explore tab). Defaults to the normal post feed.
  if (S.pendingHomeTab === 'explore') {
    S.pendingHomeTab = null;
    feedState.tab = 'explore';
    await loadExplore();
  } else {
    if (S.pendingHomeTab) S.pendingHomeTab = null;
    await loadPosts();
  }
}

// ── Tip Modal ──────────────────────────────────────────────────────────────────
let tipState = { postId: null, creatorUsername: null };

window.openTipModal = (postId, creatorUsername) => {
  if (!requireWalletThen(null, 'send a tip')) return;
  tipState.postId = postId;
  tipState.creatorUsername = creatorUsername;
  const modal = document.getElementById('tip-modal');
  const title = document.getElementById('tip-modal-title');
  const balance = document.getElementById('tip-balance');
  const amountInput = document.getElementById('tip-amount');
  const errorDiv = document.getElementById('tip-error');

  title.innerHTML = `<span class="inline-flex items-center gap-1.5 flex-wrap">Send BLOOM to ${userTag(creatorUsername, { size: 'w-6 h-6' })}</span>`;
  const bloomTipBal = S.balances['BLOOM'] || 0;
  balance.textContent = `${fmtAmt('BLOOM', bloomTipBal)} BLOOM`;
  amountInput.value = '';
  errorDiv.classList.add('hidden');
  errorDiv.textContent = '';

  modal.classList.remove('hidden');
  amountInput.focus();
};

window.closeTipModal = () => {
  const modal = document.getElementById('tip-modal');
  modal.classList.add('hidden');
  tipState = { postId: null, creatorUsername: null };
};

window.submitTip = async () => {
  const amountInput = document.getElementById('tip-amount');
  const errorDiv = document.getElementById('tip-error');
  const amount = parseFloat(amountInput.value);

  errorDiv.classList.add('hidden');
  errorDiv.textContent = '';

  if (!amount || amount <= 0) {
    errorDiv.textContent = 'Please enter an amount greater than 0';
    errorDiv.classList.remove('hidden');
    return;
  }

  const bloomTipBal = S.balances['BLOOM'] || 0;
  const amountUnits = toUnits(amount.toString());
  if (amountUnits > bloomTipBal) {
    errorDiv.textContent = 'Insufficient BLOOM balance';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    const submitBtn = document.getElementById('tip-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    await api('POST', `/api/posts/${tipState.postId}/tip`, { amount: amount.toString() });

    closeTipModal();
    await refreshBalances();
    await window._feedFns.loadPosts();

    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
  } catch (e) {
    errorDiv.textContent = e.message || 'Failed to send tip';
    errorDiv.classList.remove('hidden');
    const submitBtn = document.getElementById('tip-submit-btn');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
  }
};

// ── Profile ───────────────────────────────────────────────────────────────────

  const isMe = S.user && user.user_id === S.user.user_id;

  let activeTab = 'posts';

    return userPosts.length
      ? userPosts.map(p => `<div class="card space-y-1">
          <span class="text-xs text-[#4e5872]">${p.locked ? '🔒 ' : ''}${tsAgo(p.created_at)}</span>
          <p class="text-sm ${p.locked && !p.unlocked ? 'text-[#8b95ab] italic' : 'text-[#e8eaf0]'}">${p.locked && !p.unlocked ? 'Locked alpha — open the feed to pay 5 TOK and read.' : esc(p.content)}</p>
          <div class="flex gap-3 text-xs text-[#8b95ab]"><span>♥ ${p.like_count}</span><span>💬 ${p.reply_count}</span></div>
        </div>`).join('')
      : '<p class="text-[#4e5872] text-sm">No posts yet</p>';
  }

  async function renderPortfolioTab() {
    const PTOK = {
      BTC:   { color: '#f59e0b', bg: 'bg-amber-400/10',    text: 'text-amber-400'   },
      ETH:   { color: '#38bdf8', bg: 'bg-sky-400/10',      text: 'text-sky-400'     },
      SOL:   { color: '#a855f7', bg: 'bg-purple-500/10',   text: 'text-purple-400'  },
      DOGE:  { color: '#eab308', bg: 'bg-yellow-400/10',   text: 'text-yellow-400'  },
      ADA:   { color: '#3b82f6', bg: 'bg-blue-500/10',     text: 'text-blue-400'    },
      LINK:  { color: '#60a5fa', bg: 'bg-blue-300/10',     text: 'text-blue-300'    },
      DOT:   { color: '#ec4899', bg: 'bg-pink-500/10',     text: 'text-pink-400'    },
      AVAX:  { color: '#ef4444', bg: 'bg-red-500/10',      text: 'text-red-400'     },
      BLOOM: { color: '#7c5cfc', bg: 'bg-[#7c5cfc]/10',   text: 'text-[#7c5cfc]'  },
      USDC:  { color: '#10b981', bg: 'bg-emerald-400/10',  text: 'text-emerald-400' },
    };

    function pSparkline(hist, color) {
      if (!hist || hist.length < 2) {
        return `<svg viewBox="0 0 60 24" width="60" height="24"><line x1="0" y1="12" x2="60" y2="12" stroke="${color}" stroke-width="1.5" stroke-opacity="0.4"/></svg>`;
      }
      const ps = hist.map(h => parseFloat(h.price_usd));
      const mn = Math.min(...ps), mx = Math.max(...ps);
      const rng = Math.max(mx - mn, 0.000001);
      const xStep = 60 / (ps.length - 1);
      const pts = ps.map((p, i) => `${(i*xStep).toFixed(1)},${(22-((p-mn)/rng)*20).toFixed(1)}`).join(' ');
      return `<svg viewBox="0 0 60 24" width="60" height="24"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
    }

    function fmtLivePrice(p) {
      if (p == null) return '—';
      if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (p >= 1)    return '$' + p.toFixed(2);
      return '$' + p.toFixed(4);
    }

    function fmtQty(qty) {
      return qty < 1 ? qty.toFixed(6) : qty < 10 ? qty.toFixed(4) : qty.toFixed(2);
    }

    // Fetch portfolio data and chart data in parallel
    const [portData, initChart] = await Promise.all([
      fetch(`/explorer-api/portfolio/${encodeURIComponent(username)}`).then(r => r.json()),
      isMe ? api('GET', '/api/portfolio/chart?range=1d').catch(() => ({ points: [], range: '1d' })) : Promise.resolve({ points: [], range: '1d' }),
    ]);

    const holdings = portData.holdings || [];
    const prices   = portData.prices   || {};

    // Fetch 24h sparkline history for all held tickers in parallel
    const tickers = [...new Set(holdings.map(h => h.ticker?.toUpperCase()).filter(Boolean))];
    const sparkData = {};
    if (tickers.length) {
      const results = await Promise.all(
        tickers.map(sym => api('GET', `/api/price-history?symbol=${sym}&hours=24`).catch(() => ({ history: [] })))
      );
      tickers.forEach((sym, i) => { sparkData[sym] = results[i].history || []; });
    }

    // Compute total value and chart delta
    let totalValue = 0;
    for (const h of holdings) {
      const p = prices[h.ticker?.toUpperCase()] ?? null;
      if (p != null) totalValue += parseFloat(h.quantity) * p;
    }

    let chartRange = '1d';
    let chartPoints = initChart.points || [];

    function computeDelta(pts) {
      if (!pts || pts.length < 2) return null;
      const first = pts[0].value, last = pts[pts.length - 1].value;
      return { delta: last - first, pct: first > 0 ? ((last - first) / first * 100) : 0 };
    }

    function heroHtml(pts) {
      const d = computeDelta(pts);
      const rangeLabel = chartRange === '1m' ? '30d' : chartRange === '1w' ? '7d' : '24h';
      const deltaHtml = d ? `<div class="text-sm font-medium mt-1 ${d.delta >= 0 ? 'text-emerald-400' : 'text-red-400'}">
        ${d.delta >= 0 ? '+' : ''}$${Math.abs(d.delta).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
        &nbsp;(${d.delta >= 0 ? '+' : ''}${d.pct.toFixed(2)}%)
        <span class="text-[#4e5872] font-normal">${rangeLabel}</span>
      </div>` : '';
      return `<div class="portfolio-hero" id="ptab-hero">
        <div class="text-xs text-[#8b95ab] uppercase tracking-widest mb-1">Total Portfolio Value</div>
        <div class="text-4xl font-bold text-[#e8eaf0] tracking-tight">$${totalValue.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        ${deltaHtml}
      </div>`;
    }

    function areaChartHtml(pts) {
      const W = 480, H = 160, color = '#7c5cfc';
      const pad = { t: 10, r: 8, b: 28, l: 8 };
      const IW = W - pad.l - pad.r, IH = H - pad.t - pad.b;
      if (!pts || pts.length < 2) {
        return `<svg viewBox="0 0 ${W} ${H}" width="100%" class="rounded-xl"><rect width="${W}" height="${H}" fill="#0d1021" rx="12"/><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#4e5872" font-size="11" font-family="sans-serif">Not enough history yet</text></svg>`;
      }
      const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
      const xMin = Math.min(...xs), xMax = Math.max(...xs);
      let yMin = Math.min(...ys), yMax = Math.max(...ys);
      const yRng = yMax - yMin;
      yMin -= yRng * 0.08; yMax += yRng * 0.08;
      if (yMax - yMin < 0.01) { yMin -= 1; yMax += 1; }
      const xS = x => pad.l + (xMax === xMin ? IW/2 : (x-xMin)/(xMax-xMin)*IW);
      const yS = y => pad.t + IH - ((y-yMin)/(yMax-yMin))*IH;
      const linePts = pts.map(p => `${xS(p.x).toFixed(1)},${yS(p.y).toFixed(1)}`).join(' ');
      const areaPts = `${linePts} ${xS(xs[xs.length-1]).toFixed(1)},${(pad.t+IH).toFixed(1)} ${xS(xs[0]).toFixed(1)},${(pad.t+IH).toFixed(1)}`;
      const fmtTs = ts => { const d = new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
      const fmtV  = v  => v >= 10000 ? '$'+(v/1000).toFixed(1)+'k' : '$'+v.toFixed(0);
      return `<svg viewBox="0 0 ${W} ${H}" width="100%" class="rounded-xl">
        <defs>
          <linearGradient id="ptabGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${color}" stop-opacity="0.25"/>
            <stop offset="85%" stop-color="${color}" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <rect width="${W}" height="${H}" fill="#0d1021" rx="12"/>
        <polygon points="${areaPts}" fill="url(#ptabGrad)"/>
        <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${xS(xs[xs.length-1]).toFixed(1)}" cy="${yS(ys[ys.length-1]).toFixed(1)}" r="3.5" fill="${color}"/>
        <text x="${pad.l+2}" y="${pad.t+IH+18}" fill="#4e5872" font-size="9" font-family="sans-serif">${fmtTs(xs[0])}</text>
        <text x="${pad.l+IW-2}" y="${pad.t+IH+18}" fill="#4e5872" font-size="9" font-family="sans-serif" text-anchor="end">${fmtTs(xs[xs.length-1])}</text>
        <text x="${pad.l+2}" y="${pad.t+12}" fill="#4e5872" font-size="9" font-family="sans-serif">${fmtV(yMax)}</text>
        <text x="${pad.l+2}" y="${pad.t+IH-2}" fill="#4e5872" font-size="9" font-family="sans-serif">${fmtV(yMin)}</text>
      </svg>`;
    }

    function chartSectionHtml(pts) {
      if (!isMe) return '';
      const cpts = (pts || []).map(p => ({ x: new Date(p.ts).getTime(), y: p.value }));
      return `<div id="ptab-chart-section" class="space-y-2">
        <div class="flex gap-1.5 items-center">
          ${['1d','1w','1m'].map(r => `<button id="ptab-rng-${r}" onclick="window.portfolioSetRange('${r}')"
            class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${r === chartRange ? 'pill-active' : 'pill-inactive'}">${r.toUpperCase()}</button>`).join('')}
        </div>
        <div id="ptab-chart">${areaChartHtml(cpts)}</div>
      </div>`;
    }

    function tokenRowHtml(h) {
      const sym = h.ticker?.toUpperCase();
      const meta = PTOK[sym] || { color: '#8b95ab', bg: 'bg-[#1c2236]', text: 'text-[#8b95ab]' };
      const qty = parseFloat(h.quantity);
      const live = prices[sym] ?? null;
      const val = live != null ? qty * live : null;
      const hist = sparkData[sym] || [];
      const ch24 = hist.length >= 2
        ? ((parseFloat(hist[hist.length-1].price_usd) - parseFloat(hist[0].price_usd)) / parseFloat(hist[0].price_usd) * 100)
        : null;
      const tradeable = ['ETH','BTC','BLOOM','USDC'].includes(sym);
      return `<div class="flex items-center gap-3 py-3 px-1 border-b border-[rgba(255,255,255,0.04)] last:border-0 ${tradeable ? 'cursor-pointer hover:bg-[#1c2236]/40 rounded transition-colors' : ''}"
               ${tradeable ? `onclick="window.openTokenDetail('${sym}')"` : ''}>
        <div class="w-9 h-9 rounded-full flex items-center justify-center shrink-0 text-xs font-bold ${meta.bg} ${meta.text}">${sym || '?'}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-[#e8eaf0] truncate">${esc(h.asset_name)}</div>
          <div class="text-xs text-[#8b95ab]">${sym || ''}</div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-semibold">${fmtLivePrice(live)}</div>
          <div class="text-xs font-medium ${ch24 == null ? 'text-[#8b95ab]' : ch24 >= 0 ? 'text-emerald-400' : 'text-red-400'}">
            ${ch24 == null ? '—' : (ch24 >= 0 ? '+' : '') + ch24.toFixed(2) + '%'}
          </div>
        </div>
        <div class="text-right shrink-0 min-w-[4.5rem] hidden sm:block">
          <div class="text-xs text-[#8b95ab]">${fmtQty(qty)} ${sym || ''}</div>
          <div class="text-sm font-semibold">${val != null ? '$'+val.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</div>
        </div>
        <div class="shrink-0">${pSparkline(hist, meta.color)}</div>
      </div>`;
    }

    function tokensHtml() {
      if (!holdings.length) {
        return `<div class="text-center py-10 text-[#4e5872] text-sm">Your holdings will appear here once you make your first trade.</div>`;
      }
      return `<div>${holdings.map(tokenRowHtml).join('')}</div>`;
    }

    const html = `<div class="md:flex md:gap-6 space-y-5 md:space-y-0">
      <div class="md:w-[55%] space-y-4">
        ${heroHtml(chartPoints)}
        ${chartSectionHtml(chartPoints)}
      </div>
      <div class="md:w-[45%]">
        <div class="flex gap-2 mb-4">
          <button id="ptab-sub-tokens"   onclick="window.portfolioSwitchSubTab('tokens')"   class="text-sm px-4 py-1 font-medium transition-colors pill-active">Tokens</button>
          <button id="ptab-sub-nfts"     onclick="window.portfolioSwitchSubTab('nfts')"     class="text-sm px-4 py-1 font-medium transition-colors pill-inactive">NFTs</button>
          ${isMe ? `<button id="ptab-sub-activity" onclick="window.portfolioSwitchSubTab('activity')" class="text-sm px-4 py-1 font-medium transition-colors pill-inactive">Activity</button>` : ''}
        </div>
        <div id="ptab-content">${tokensHtml()}</div>
      </div>
    </div>`;

    // Wire up sub-tab switching (closure captures renderNFTTab / renderActivityTab)
    window.portfolioSwitchSubTab = async (t) => {
      ['tokens','nfts','activity'].forEach(tab => {
        const btn = document.getElementById(`ptab-sub-${tab}`);
        if (btn) btn.className = `text-sm px-4 py-1 font-medium transition-colors ${tab === t ? 'pill-active' : 'pill-inactive'}`;
      });
      const el = document.getElementById('ptab-content');
      if (!el) return;
      el.innerHTML = `<div class="py-6 flex justify-center">${spin()}</div>`;
      if (t === 'tokens')   el.innerHTML = tokensHtml();
      else if (t === 'nfts')     el.innerHTML = await renderNFTTab().catch(e => err(e.message));
      else if (t === 'activity') el.innerHTML = await renderActivityTab().catch(e => err(e.message));
    };

    // Wire up chart range switching
    window.portfolioSetRange = async (r) => {
      if (r === chartRange) return;
      chartRange = r;
      ['1d','1w','1m'].forEach(rng => {
        const btn = document.getElementById(`ptab-rng-${rng}`);
        if (btn) btn.className = `text-xs px-3 py-1 rounded-full font-medium transition-colors ${rng === r ? 'pill-active' : 'pill-inactive'}`;
      });
      const chartEl = document.getElementById('ptab-chart');
      if (chartEl) chartEl.innerHTML = `<div class="py-8 flex justify-center">${spin()}</div>`;
      try {
        const data = await api('GET', `/api/portfolio/chart?range=${r}`);
        chartPoints = data.points || [];
        const cpts = chartPoints.map(p => ({ x: new Date(p.ts).getTime(), y: p.value }));
        if (chartEl) chartEl.innerHTML = areaChartHtml(cpts);
        const heroEl = document.getElementById('ptab-hero');
        if (heroEl) heroEl.outerHTML = heroHtml(chartPoints);
      } catch {
        if (chartEl) chartEl.innerHTML = `<p class="text-[#4e5872] text-sm text-center py-6">Could not load chart data.</p>`;
      }
    };

    return html;
  }

  async function renderActivityTab() {
    const typeConfig = {
      swap:              { label: 'Swap',              color: 'text-[#4e9af1]',  bg: 'bg-blue-900/30' },
      market_trade:      { label: 'Prediction Market', color: 'text-[#7c5cfc]',  bg: 'bg-violet-900/30' },
      futures_open:      { label: 'Futures Open',      color: 'text-orange-400', bg: 'bg-orange-900/30' },
      futures_pnl:       { label: 'Futures Close',     color: 'text-orange-400', bg: 'bg-orange-900/30' },
      funding:           { label: 'Funding Payment',   color: 'text-amber-400',  bg: 'bg-amber-900/30' },
      ico_invest:        { label: 'ICO Investment',    color: 'text-green-400',  bg: 'bg-green-900/30' },
      nft_buy:           { label: 'NFT Purchase',      color: 'text-[#a78bfa]',  bg: 'bg-purple-900/30' },
      nft_sale:          { label: 'NFT Sale',          color: 'text-emerald-400',bg: 'bg-emerald-900/30' },
      nft_royalty:       { label: 'NFT Royalty',       color: 'text-amber-400',  bg: 'bg-amber-900/30' },
      nft_gas:           { label: 'Mint Gas',          color: 'text-[#8b95ab]',  bg: 'bg-slate-900/30' },
      nft_transfer_gas:  { label: 'Transfer Gas',      color: 'text-[#8b95ab]',  bg: 'bg-slate-900/30' },
      swap_gas:          { label: 'Swap Gas',           color: 'text-[#a78bfa]',  bg: 'bg-purple-900/30' },
      futures_gas:       { label: 'Futures Gas',        color: 'text-[#a78bfa]',  bg: 'bg-purple-900/30' },
      tip:               { label: 'Tip',                color: 'text-[#7c5cfc]',  bg: 'bg-violet-900/30' },
    };

    function activityRows(items) {
      return items.map(a => {
        const cfg = typeConfig[a.type] || { label: esc(a.type), color: 'text-[#8b95ab]', bg: 'bg-[#1c2236]/60' };
        const rawAmt = Number(a.amount);
        const formatted = fmtAmt(a.token_symbol || 'USDC', Math.abs(rawAmt));
        const sign = rawAmt >= 0 ? '+' : '-';
        const amtColor = rawAmt >= 0 ? 'text-emerald-400' : 'text-red-400';
        return `
          <div class="card flex items-start justify-between gap-3">
            <div class="flex items-start gap-2 min-w-0 flex-1">
              <span class="text-xs font-semibold px-2 py-0.5 rounded shrink-0 ${cfg.color} ${cfg.bg}">${cfg.label}</span>
              <span class="text-sm text-[#e8eaf0] leading-tight">${esc(a.description)}</span>
            </div>
            <div class="shrink-0 text-right">
              <div class="text-sm font-mono ${amtColor}">${sign}${formatted} ${esc(a.token_symbol || '')}</div>
              <div class="text-xs text-[#4e5872]">${tsAgo(a.created_at)} ago</div>
            </div>
          </div>`;
      }).join('');
    }

    const { activities, nextCursor } = await api('GET', '/api/activity?limit=20');

    if (!activities.length) {
      return `<div class="card text-center py-8 text-[#8b95ab] text-sm">No on-chain activity yet. Make a swap, trade a market, or open a futures position to get started.</div>`;
    }

    let actCursor = nextCursor;
    window.loadMoreActivity = async () => {
      const btn = document.getElementById('activity-load-more');
      const list = document.getElementById('activity-list');
      if (!btn || !list) return;
      btn.textContent = 'Loading…';
      btn.disabled = true;
      try {
        const { activities: more, nextCursor: nc } = await api('GET', `/api/activity?limit=20&cursor=${encodeURIComponent(actCursor)}`);
        actCursor = nc;
        list.insertAdjacentHTML('beforeend', activityRows(more));
        if (!nc) btn.remove();
        else { btn.textContent = 'Load more'; btn.disabled = false; }
      } catch(e) { btn.textContent = 'Error — retry'; btn.disabled = false; }
    };

    return `
      <div id="activity-list" class="space-y-2">${activityRows(activities)}</div>
      ${nextCursor ? `<button id="activity-load-more" class="btn btn-z w-full mt-2" onclick="loadMoreActivity()">Load more</button>` : ''}`;
  }

  async function renderMediaTab() {
    const d = await api('GET', `/api/feed?tab=global&limit=50`);
    const mediaPosts = d.posts.filter(p => p.username === username && (p.nft_id != null || p.image_url != null));
    if (!mediaPosts.length) return '<p class="text-[#4e5872] text-sm px-4 py-6">No media yet</p>';
    return `<div class="grid grid-cols-3 gap-1 px-1">${mediaPosts.map(p =>
      `<div class="aspect-square rounded overflow-hidden bg-[var(--bg-card)] flex items-center justify-center">
        ${p.image_url ? `<img src="${esc(p.image_url)}" class="w-full h-full object-cover" loading="lazy">` : `<div class="text-[#4e5872] text-xs text-center p-2">${esc(p.content?.slice(0,60))}…</div>`}
      </div>`
    ).join('')}</div>`;
  }

  async function fullRender() {

    if (activeTab === 'posts') tabContent = await renderPostTab(null).catch(() => '');
    else if (activeTab === 'replies') tabContent = await renderPostTab(true).catch(() => '');
    else if (activeTab === 'media') tabContent = await renderMediaTab().catch(e => err(e.message));
    else if (activeTab === 'portfolio') tabContent = await renderPortfolioTab().catch(e => err(e.message));

    const joinedDate = user.created_at
      ? new Date(user.created_at).toLocaleString('en-US', { month: 'long', year: 'numeric' })
      : null;

    // Cover photo area
    const coverStyle = user.cover_url
      ? `background: url('${esc(user.cover_url)}') center/cover no-repeat`
      : `background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue))`;

      ? `<div class="relative h-[200px]" style="${coverStyle}">
           <label class="absolute inset-0 flex items-center justify-center bg-black/40 cursor-pointer hover:bg-black/50 transition-colors" title="Change cover photo">

               <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/></svg>
               <span class="text-xs font-medium">Change cover</span>
             </div>
             <input type="file" accept="image/*" class="hidden" onchange="handleCoverUpload(this)">

         </div>`
      : `<div class="h-[200px]" style="${coverStyle}"></div>`;

    // Avatar
    const avatarBlock = isMe

           ${avatarImg(username, 'w-20 h-20 ring-4 ring-[var(--bg-deep)]', user.avatar_url)}
           ${editMode ? `<div class="absolute inset-0 rounded-full bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity pointer-events-none"><span class="text-white text-sm">📷</span></div>
           <input id="avatar-file-input" type="file" accept="image/jpeg,image/png" class="hidden" onchange="handleAvatarUpload(this)">` : ''}
         </label>`
      : avatarImg(username, 'w-20 h-20 ring-4 ring-[var(--bg-deep)]', user.avatar_url);

    const profileTabs = ['posts', 'replies', 'media', 'portfolio'];

    sec.innerHTML = `
      <div>
        ${coverArea}
        <div class="relative px-4">
          <div class="flex items-end justify-between" style="margin-top:-40px">
            <div class="shrink-0">${avatarBlock}</div>
            <div class="flex gap-2 pb-1">
              ${editMode
                ? `<button class="btn btn-v text-sm" onclick="saveProfile()">Save</button>
                   <button class="btn btn-z text-sm" onclick="editMode=false;fullRender()">Cancel</button>`

  window.switchProfileTab = (t) => { activeTab = t; fullRender(); };

  window.linkAccount = async (provider) => {
    try {
      const start = await api('POST', '/api/social/link/start', { provider });
      if (start.simulated) {
        await api('POST', '/api/social/link/complete', { provider, code: 'staging-code', state: start.state });
        S.social_accounts = (await api('GET', '/api/social/accounts')).accounts;
        await fullRender();
      } else if (start.oauth_url) {
        const popup = window.open(start.oauth_url, '_blank', 'width=600,height=700,noopener');
        const handler = async (e) => {
          if (!e.data || e.data.type !== 'oauth_callback') return;
          window.removeEventListener('message', handler);
          if (popup && !popup.closed) popup.close();
          const { code, state: cbState, error: cbError, provider: cbProv } = e.data;
          if (cbError) return alert('OAuth error: ' + cbError);
          try {
            await api('POST', '/api/social/link/complete', { provider: cbProv || provider, code, state: cbState });
            S.social_accounts = (await api('GET', '/api/social/accounts')).accounts;
            await fullRender();
          } catch (err) { alert(err.message); }
        };
        window.addEventListener('message', handler);
      }
    } catch (e) { alert(e.message); }
  };

  window.unlinkAccount = async (provider) => {
    if (!confirm('Unlink this account?')) return;
    try {
      await api('DELETE', `/api/social/link/${provider}`);
      S.social_accounts = (await api('GET', '/api/social/accounts')).accounts;
      await fullRender();

  };
  window.saveProfile = async () => {
    const display_name = document.getElementById('edit-name')?.value;

      await api('PATCH', '/api/me', { display_name, bio });

    } catch (e) { alert(e.message); }
  };

  window.handleAvatarUpload = async (input) => {
    const file = input.files && input.files[0];
    if (!file) return;
    // Client-side validation (server re-validates type + size authoritatively).
    if (file.type !== 'image/jpeg' && file.type !== 'image/png') {
      alert('Avatar must be a JPG or PNG image'); input.value = ''; return;
    }
    if (file.size > 2 * 1024 * 1024) {
      alert('Image must be under 2 MB'); input.value = ''; return;
    }
    try {
      // Upload the raw file bytes; the server stores them in Postgres and
      // returns a cache-busted serve URL we point the avatar at.
      const h = { 'Content-Type': file.type };
      if (S.token) h['x-usernode-token'] = S.token;
      const res = await fetch('/api/avatar', { method: 'POST', headers: h, body: file });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      user.avatar_url = data.avatar_url;
      if (S.user && S.user.user_id === user.user_id) S.user.avatar_url = data.avatar_url;
      await fullRender();
    } catch (e) {
      alert(e.message);
    } finally {
      input.value = '';
    }
  };
  window.handleCoverUpload = (input) => {
    const file = input.files && input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('Cover image must be under 2 MB'); input.value = ''; return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = async () => {
        const W = 1200, H = 400;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(W / img.width, H / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (W - w) / 2, (H - h) / 2, w, h);
        const dataUri = canvas.toDataURL('image/jpeg', 0.82);
        try {
          await api('PUT', '/api/profile/cover', { cover_url: dataUri });
          user.cover_url = dataUri;
          await fullRender();
        } catch (e) { alert(e.message); }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  window.doFollow = async (uname, following) => {
    if (!requireWalletThen(null, 'follow')) return;
    try {
      await api('POST', following ? '/api/unfollow' : '/api/follow', { username: uname });
      await renderProfile(sec);
    } catch (e) { alert(e.message); }
  };

  await fullRender();
}

// ── Portfolio Dashboard ───────────────────────────────────────────────────────
async function renderPortfolio(sec) {
  let chartRange = '1d';
  let walletTab = 'receive';
  let sendToken = '';
  let sendRecipient = '';
  let sendAmount = '';
  let sendStatus = 'idle';
  let sendError = '';

  let scanError = '';         // transient hint shown in the scanner viewfinder
  let scanStream = null;      // active MediaStream while the camera is open
  let scanRaf = null;         // requestAnimationFrame handle for the decode loop
  let searchTerm = '';
  let activityCursor = null;
  let allActivities = [];
  let chartPoints = [];
  let holdings = [];
  let prices = {};
  let topCoins = [];
  let sparkData = {};

  const PTOK = {
    BTC:  { color:'#f59e0b', bg:'rgba(245,158,11,0.15)',  symbol:'₿' },
    ETH:  { color:'#38bdf8', bg:'rgba(56,189,248,0.15)',  symbol:'Ξ' },
    SOL:  { color:'#a855f7', bg:'rgba(168,85,247,0.15)',  symbol:'◎' },
    BNB:  { color:'#f3ba2f', bg:'rgba(243,186,47,0.15)',  symbol:'B' },
    XRP:  { color:'#0095cf', bg:'rgba(0,149,207,0.15)',   symbol:'X' },
    DOGE: { color:'#eab308', bg:'rgba(234,179,8,0.15)',   symbol:'Ð' },
    ADA:  { color:'#3b82f6', bg:'rgba(59,130,246,0.15)',  symbol:'₳' },
    AVAX: { color:'#ef4444', bg:'rgba(239,68,68,0.15)',   symbol:'A' },
    LINK: { color:'#60a5fa', bg:'rgba(96,165,250,0.15)',  symbol:'⬡' },
    DOT:  { color:'#ec4899', bg:'rgba(236,72,153,0.15)',  symbol:'●' },
    TON:  { color:'#0088cc', bg:'rgba(0,136,204,0.15)',   symbol:'◆' },
    BLOOM:{ color:'#7c5cfc', bg:'rgba(124,92,252,0.15)',  symbol:'✿' },
    USDC: { color:'#10b981', bg:'rgba(16,185,129,0.15)',  symbol:'$' },
    USDT: { color:'#26a17b', bg:'rgba(38,161,123,0.15)',  symbol:'₮' },
  };
  const STAKING_APY = { BLOOM:12, ETH:6, SOL:8, BTC:4 };
  const WATCHLIST = ['BTC','ETH','SOL','BNB','XRP','DOGE','ADA','AVAX'];
  const ACCENT = '#22d3ee';
  const GLASS = 'bg-[#161b2a] border border-[rgba(34,211,238,0.10)] rounded-2xl p-4';

  function tokStyle(sym) { return PTOK[sym] || { color: ACCENT, bg: 'rgba(34,211,238,0.15)', symbol: (sym||'?')[0] }; }

  function fmtPrice(p) {
    if (p == null) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    if (p >= 1) return '$' + p.toFixed(2);
    return '$' + p.toFixed(4);
  }

  function fmtQty(q) { const n=parseFloat(q); return n<1?n.toFixed(6):n<10?n.toFixed(4):n.toFixed(2); }

  function sparkSvg(hist, color) {
    const ps = (hist||[]).map(h => parseFloat(typeof h === 'object' ? (h.price_usd||h) : h)).filter(isFinite);
    if (ps.length < 2) return `<svg viewBox="0 0 60 24" width="60" height="24"><line x1="0" y1="12" x2="60" y2="12" stroke="${color}" stroke-width="1.5" stroke-opacity="0.4"/></svg>`;
    const mn=Math.min(...ps), mx=Math.max(...ps), rng=Math.max(mx-mn,0.000001), xStep=60/(ps.length-1);
    const pts=ps.map((p,i)=>`${(i*xStep).toFixed(1)},${(22-((p-mn)/rng)*20).toFixed(1)}`).join(' ');
    return `<svg viewBox="0 0 60 24" width="60" height="24"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  }

  function areaSvg(pts, color) {
    const W=480,H=140,pad={t:10,r:8,b:28,l:8};
    const IW=W-pad.l-pad.r, IH=H-pad.t-pad.b;
    if (!pts||pts.length<2) return `<svg viewBox="0 0 ${W} ${H}" width="100%" class="rounded-xl"><rect width="${W}" height="${H}" fill="rgba(0,0,0,0.2)" rx="12"/><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#4e5872" font-size="11" font-family="sans-serif">Not enough history yet</text></svg>`;
    const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
    const xMin=Math.min(...xs), xMax=Math.max(...xs);
    let yMin=Math.min(...ys), yMax=Math.max(...ys);
    const yRng=yMax-yMin; yMin-=yRng*0.08; yMax+=yRng*0.08;
    if (yMax-yMin<0.01){yMin-=1;yMax+=1;}
    const xS=x=>pad.l+(xMax===xMin?IW/2:(x-xMin)/(xMax-xMin)*IW);
    const yS=y=>pad.t+IH-((y-yMin)/(yMax-yMin))*IH;
    const lp=pts.map(p=>`${xS(p.x).toFixed(1)},${yS(p.y).toFixed(1)}`).join(' ');
    const ap=`${lp} ${xS(xs[xs.length-1]).toFixed(1)},${(pad.t+IH).toFixed(1)} ${xS(xs[0]).toFixed(1)},${(pad.t+IH).toFixed(1)}`;
    const isLong = chartRange!=='1d';
    const fmtL = ts => { const d=new Date(ts); return isLong ? `${d.getMonth()+1}/${d.getDate()}` : d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" class="rounded-xl">
      <defs><linearGradient id="pfGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
        <stop offset="90%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient></defs>
      <rect width="${W}" height="${H}" fill="rgba(0,0,0,0.25)" rx="12"/>
      <polygon points="${ap}" fill="url(#pfGrad)"/>
      <polyline points="${lp}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${xS(xs[xs.length-1]).toFixed(1)}" cy="${yS(ys[ys.length-1]).toFixed(1)}" r="3.5" fill="${color}"/>
      <text x="${pad.l+2}" y="${pad.t+IH+18}" fill="#4e5872" font-size="9" font-family="sans-serif">${fmtL(xs[0])}</text>
      <text x="${pad.l+IW-2}" y="${pad.t+IH+18}" fill="#4e5872" font-size="9" font-family="sans-serif" text-anchor="end">${fmtL(xs[xs.length-1])}</text>
      <text x="${pad.l+2}" y="${pad.t+12}" fill="#4e5872" font-size="9" font-family="sans-serif">$${yMax.toFixed(0)}</text>
    </svg>`;
  }

  function computeDelta(pts) {
    if (!pts||pts.length<2) return null;
    const first=pts[0].y, last=pts[pts.length-1].y;
    return {delta:last-first, pct:first>0?((last-first)/first*100):0};
  }

  function render() {
    const user = S.user || {};
    const username = user.username || '';
    const avatarSrc = user.avatar_url || avatarDataUri(username);
    const walletAddr = user.usernode_pubkey || '';
    const shortW = shortAddr(walletAddr);
    const isDark = document.documentElement.classList.contains('dark');
    const unread = S.totalUnread || 0;

    let totalValue = 0;
    for (const h of holdings) {
      const p = prices[(h.ticker||'').toUpperCase()] ?? null;
      if (p != null) totalValue += parseFloat(h.quantity) * p;
    }
    const delta = computeDelta(chartPoints);
    const rangeLabel = chartRange==='1m'?'30d':chartRange==='1w'?'7d':'24h';

    const sq = searchTerm.trim().toLowerCase();
    const filtH = sq ? holdings.filter(h=>(h.ticker||'').toLowerCase().includes(sq)||(h.asset_name||'').toLowerCase().includes(sq)) : holdings;
    const filtW = sq ? WATCHLIST.filter(s=>s.toLowerCase().includes(sq)||((topCoins.find(c=>c.symbol===s)||{}).name||'').toLowerCase().includes(sq)) : WATCHLIST;

    const heldTickers = holdings.map(h=>(h.ticker||'').toUpperCase()).filter(Boolean);
    const activeSendToken = sendToken || heldTickers[0] || 'BLOOM';
    const sendBal = (S.balances && S.balances[activeSendToken]) ? (Number(S.balances[activeSendToken])/1e6).toFixed(4) : '—';
    const bridgeAvail = !!(window.usernode && typeof window.usernode.sendTransaction==='function');

    // Asset cards
    const assetHtml = filtH.length===0
      ? `<div class="col-span-3 text-[#4e5872] text-sm text-center py-4">${sq?'No matches':'No holdings yet'}</div>`
      : filtH.map(h=>{
          const sym=(h.ticker||'').toUpperCase(), tk=tokStyle(sym);
          const lp=prices[sym]??null;
          const val=lp!=null?(parseFloat(h.quantity)*lp):null;
          const apy=STAKING_APY[sym];
          const spark=sparkData[sym]||[];
          return `<div class="min-w-0 ${GLASS} flex flex-col gap-2" style="backdrop-filter:blur(8px)">
            <div class="flex items-center gap-2">
              <div class="w-9 h-9 rounded-full flex items-center justify-center text-base font-bold shrink-0" style="background:${tk.bg};color:${tk.color}">${esc(tk.symbol)}</div>
              <div><div class="font-semibold text-[#e8eaf0] text-sm">${esc(sym)}</div><div class="text-[#8b95ab] text-xs">${esc(h.asset_name||sym)}</div></div>
            </div>
            <div><div class="text-[#e8eaf0] font-mono text-sm">${fmtQty(h.quantity)} ${esc(sym)}</div>
              <div class="text-[#8b95ab] text-xs">${val!=null?'$'+val.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—'}</div></div>
            <div class="flex items-center justify-between">
              ${apy?`<span class="text-xs px-2 py-0.5 rounded-full font-semibold" style="background:rgba(34,211,238,0.12);color:#22d3ee">${apy}% APY</span>`:'<span></span>'}
              ${sparkSvg(spark,tk.color)}
            </div>
          </div>`;
        }).join('');

    // Watchlist
    const watchHtml = filtW.length===0

          ${activityCursor?`<button id="pf-load-more" class="w-full mt-3 py-2 text-sm transition-colors" style="color:#22d3ee" onclick="window._pfLoadMore()">Load more</button>`:''}

      </div>`;

    // Event handlers
    window._pfSearch = v => { searchTerm = v||''; render(); };

    window._pfWalletTab = tab => {

      render();
    };

    // ── Camera QR scanner ──────────────────────────────────────────────────
    // Extract a wallet address from a scanned QR payload. Handles bare
    // addresses and common payment-request URIs (scheme:addr?params).
    window._pfParseScannedAddr = (raw) => {
      let s = (raw||'').trim();
      if (!s) return '';
      // Strip a "scheme:" prefix (ethereum:, bitcoin:, usernode:, etc.)
      const colon = s.indexOf(':');
      if (colon > 0 && colon < 24 && /^[a-zA-Z][a-zA-Z0-9.+-]*$/.test(s.slice(0,colon))) {
        s = s.slice(colon+1);
      }
      // Drop any query string / fragment (?value=…, @chainId, #…)
      s = s.split('?')[0].split('#')[0].split('@')[0].trim();
      return s;
    };

    window._pfStopScanner = () => {
      if (scanRaf) { cancelAnimationFrame(scanRaf); scanRaf = null; }
      if (scanStream) { try { scanStream.getTracks().forEach(t=>t.stop()); } catch(_){} scanStream = null; }
    };

    window._pfOnScanned = (raw) => {
      const addr = window._pfParseScannedAddr(raw);
      if (!addr) {
        scanError = 'No address found — try again.';

        if (msg){ msg.textContent='No address found — keep the QR in frame.'; msg.classList.remove('hidden'); }
        return; // stay in scan mode, keep the loop running

      window._pfStopScanner();
      sendRecipient = addr;
      scanError = '';
      sendView = 'form';
      sendStatus = 'idle'; sendError = '';
      render();
    };

    window._pfStartScanner = async () => {
      const video = document.getElementById('pf-scan-video');
      const msg = document.getElementById('pf-scan-msg');
      if (!video) return;
      const fail = (note) => {
        // Camera unavailable for any reason — fall back to the manual form.
        window._pfStopScanner();
        scanError = note || 'Camera unavailable — enter the address manually.';
        sendView = 'form';
        render();
      };
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return fail('Camera unavailable — enter the address manually.');
      }
      let detector = null;
      try {
        if ('BarcodeDetector' in window) {
          const fmts = await window.BarcodeDetector.getSupportedFormats?.();
          if (!fmts || fmts.includes('qr_code')) detector = new window.BarcodeDetector({ formats:['qr_code'] });
        }
      } catch(_){ detector = null; }
      if (!detector) {
        // Lazy-load jsQR as a fallback decoder.
        try {
          if (!window.jsQR) {
            await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
          }
        } catch(_){ return fail('Scanner unavailable — enter the address manually.'); }
      }
      try {
        scanStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
      } catch(e) {
        return fail('Camera unavailable — enter the address manually.');
      }
      // The user may have navigated away while permission was pending.
      if (walletTab!=='send' || sendView!=='scan') { window._pfStopScanner(); return; }
      video.srcObject = scanStream;
      try { await video.play(); } catch(_){}
      if (msg) msg.classList.add('hidden');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently:true });
      const tick = async () => {
        if (!scanStream) return; // stopped
        if (video.readyState >= 2 && video.videoWidth) {
          canvas.width = video.videoWidth; canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          try {
            if (detector) {
              const codes = await detector.detect(canvas);
              if (codes && codes.length && codes[0].rawValue) { window._pfOnScanned(codes[0].rawValue); return; }
            } else if (window.jsQR) {
              const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const code = window.jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' });
              if (code && code.data) { window._pfOnScanned(code.data); return; }
            }

        if (scanStream) scanRaf = requestAnimationFrame(tick);
      };
