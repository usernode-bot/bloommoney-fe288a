        <!-- Bids panel -->
        ${bids.length || !isOwner ? `<div class="card space-y-2">
          <div class="flex items-center justify-between mb-1">
            <h4 class="font-semibold text-sm">Bids (${bids.length})</h4>
            ${!isOwner ? `<button class="text-xs text-[#7c5cfc] hover:underline" onclick="showNFTBidModal(${nft.id})">Place Bid</button>` : ''}
          </div>
          ${bids.length ? bids.map(b => `
            <div class="flex items-center gap-2 text-sm">
              <span class="font-medium">${(Number(b.price_usdc)/1e6).toFixed(2)} USDC</span>
              <span class="text-[#8b95ab]">by @${esc(b.bidder_username)}</span>
              <span class="text-xs text-[#4e5872] ml-auto">${tsAgo(b.created_at)}</span>
              ${isOwner ? `<button class="text-xs text-emerald-400 hover:underline" onclick="nftAcceptBid(${nft.id},${b.id})">Accept</button>` : ''}
              ${S.user && S.user.user_id === b.bidder_user_id ? `<button class="text-xs text-red-400 hover:underline" onclick="nftWithdrawBid(${b.id})">Withdraw</button>` : ''}
            </div>`).join('') : '<p class="text-[#4e5872] text-xs">No bids yet</p>'}
        </div>` : ''}

        <!-- Transfer history -->
        ${transfers.length ? `<div class="card space-y-1">
          <h4 class="font-semibold text-sm mb-2">History</h4>
          ${transfers.map(t => {
            const el = { mint:'✦ Minted', sale:'⇄ Sale', transfer:'→ Transfer' }[t.event_type] || t.event_type;
            return `<div class="flex items-center gap-2 text-xs text-[#8b95ab]">
              <span class="text-[#e8eaf0]">${el}</span>
              <span>${t.to_username ? `to @${esc(t.to_username)}` : ''}</span>
              ${t.price_usdc ? `<span class="text-emerald-400">${(Number(t.price_usdc)/1e6).toFixed(2)} USDC</span>` : ''}
              <span class="ml-auto">${tsAgo(t.created_at)}</span>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>
    </div>
    <!-- Bid Modal -->
    <div id="nft-bid-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
      <div class="card w-full max-w-sm space-y-3 mx-4">
        <h3 class="font-semibold">Place Bid</h3>
        <input id="nft-bid-price" class="inp" placeholder="Bid amount (USDC micro-units)">
        <input id="nft-bid-days" class="inp" placeholder="Expires in days (1-30)">
        <div class="flex gap-2">
          <button class="btn-v flex-1" onclick="nftSubmitBid(${nft.id})">Submit Bid</button>
          <button class="btn-z flex-1" onclick="document.getElementById('nft-bid-modal').classList.add('hidden')">Cancel</button>
        </div>
        <p id="nft-bid-msg" class="text-sm"></p>
      </div>
    </div>
    <!-- Transfer Modal -->
    <div id="nft-transfer-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
      <div class="card w-full max-w-sm space-y-3 mx-4">
        <h3 class="font-semibold">Transfer NFT</h3>
        <p class="text-xs text-[#8b95ab]">Costs 0.5 BLOOM gas fee</p>
        <input id="nft-transfer-to" class="inp" placeholder="Recipient username">
        <div id="nft-transfer-step2" class="hidden text-sm text-[#8b95ab]"></div>
        <div class="flex gap-2">
          <button class="btn-v flex-1" onclick="nftSubmitTransfer(${nft.id})">Send</button>
          <button class="btn-z flex-1" onclick="document.getElementById('nft-transfer-modal').classList.add('hidden')">Cancel</button>
        </div>
        <p id="nft-transfer-msg" class="text-sm"></p>
      </div>
    </div>
    <!-- Receive Modal -->
    <div id="nft-receive-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
      <div class="card w-full max-w-sm space-y-3 mx-4 text-center">
        <h3 class="font-semibold">Receive NFT</h3>
        <p class="text-xs text-[#8b95ab]">Share your username to receive NFTs</p>
        <div id="nft-qr-container" class="flex justify-center py-2"></div>
        <p class="font-mono text-sm text-[#7c5cfc]">${S.user ? '@'+esc(S.user.username) : ''}</p>
        <button class="btn-z w-full" onclick="document.getElementById('nft-receive-modal').classList.add('hidden')">Close</button>
      </div>
    </div>
  `;

  window.nftToggleFav = async (id) => {
    try {
      const d = await api('POST', `/api/nfts/${id}/favorite`);
      const btn = document.getElementById('nft-fav-btn');
      if (btn) btn.textContent = d.favorited ? '♥ Unfavorite' : '♡ Favorite';
    } catch (e) { alert(e.message); }
  };
  window.nftBuy = async (id) => {
    if (!confirm('Buy this NFT?')) return;
    try { await api('POST', `/api/nfts/${id}/buy`); await refreshBalances(); window._nftNav('detail', id); }
    catch (e) { alert(e.message); }
  };
  window.nftList = async (id) => {
    const price = parseInt(document.getElementById('nft-list-price')?.value);
    if (!price) return alert('Enter a price in USDC micro-units (1 USDC = 1000000)');
    try { await api('POST', `/api/nfts/${id}/list`, { price_usdc: price }); window._nftNav('detail', id); }
    catch (e) { alert(e.message); }
  };
  window.nftDelist = async (id) => {
    try { await api('DELETE', `/api/nfts/${id}/list`); window._nftNav('detail', id); }
    catch (e) { alert(e.message); }
  };
  window.nftAcceptBid = async (nftId, bidId) => {
    if (!confirm('Accept this bid?')) return;
    try { await api('POST', `/api/nfts/${nftId}/accept-bid/${bidId}`); await refreshBalances(); window._nftNav('detail', nftId); }
    catch (e) { alert(e.message); }
  };
  window.nftWithdrawBid = async (bidId) => {
    try { await api('DELETE', `/api/nfts/bids/${bidId}`); window._nftNav('detail', nft.id); }
    catch (e) { alert(e.message); }
  };
  window.showNFTBidModal = () => document.getElementById('nft-bid-modal')?.classList.remove('hidden');
  window.nftSubmitBid = async (id) => {
    const price = parseInt(document.getElementById('nft-bid-price')?.value);
    const days = parseInt(document.getElementById('nft-bid-days')?.value) || 7;
    const msg = document.getElementById('nft-bid-msg');
    try {
      await api('POST', `/api/nfts/${id}/bid`, { price_usdc: price, expires_days: days });
      document.getElementById('nft-bid-modal')?.classList.add('hidden');
      window._nftNav('detail', id);
    } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
  };
  window.showNFTTransferModal = () => document.getElementById('nft-transfer-modal')?.classList.remove('hidden');
  window.nftSubmitTransfer = async (id) => {
    const to = document.getElementById('nft-transfer-to')?.value?.trim();
    const msg = document.getElementById('nft-transfer-msg');
    if (!to) return;
    try {
      await api('POST', `/api/nfts/${id}/transfer`, { to_username: to });
      document.getElementById('nft-transfer-modal')?.classList.add('hidden');
      if (msg) { msg.className='text-emerald-400 text-sm'; msg.textContent='Transferred!'; }
      setTimeout(() => window._nftNav('portfolio'), 1200);
    } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
  };
  window.showNFTReceiveModal = async () => {
    const modal = document.getElementById('nft-receive-modal');
    modal?.classList.remove('hidden');
    const container = document.getElementById('nft-qr-container');
    if (!container || !S.user) return;
    try {
      if (!window.QRCode) {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }
      container.innerHTML = '<canvas id="nft-qr-canvas"></canvas>';
      await QRCode.toCanvas(document.getElementById('nft-qr-canvas'), S.user.username, { width: 160, color: { dark: '#e8eaf0', light: '#131620' } });
    } catch (_) { container.innerHTML = `<p class="text-sm font-mono text-[#7c5cfc]">${esc(S.user.username)}</p>`; }
  };
}

async function renderNFTMint(sec) {
  let step = 1;
  const form = { name: '', description: '', image_url: '', collection: 'BloomMoney Genesis', royalty_bps: 500, rarity: 'common', properties: '' };

  function renderStep() {
    sec.innerHTML = nftTopBar('mint', 'window._nftNav') + `
      <h2 class="text-xl font-bold mb-1">Mint NFT</h2>
      <p class="text-[#8b95ab] text-sm mb-4">Costs 10.5 BLOOM • Balance: ${getBal('BLOOM')} BLOOM</p>
      <div class="flex gap-2 mb-6">
        ${['Artwork','Properties','Confirm'].map((l,i) => `
          <div class="flex items-center gap-1 ${i>0?'ml-2':''}">
            <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${step===i+1?'bg-[#7c5cfc] text-white':step>i+1?'bg-emerald-500 text-white':'bg-[#1c2236] text-[#8b95ab]'}">${step>i+1?'✓':i+1}</div>
            <span class="text-xs ${step===i+1?'text-[#e8eaf0]':'text-[#4e5872]'}">${l}</span>
            ${i<2?'<span class="text-[#4e5872] ml-2">—</span>':''}
          </div>`).join('')}
      </div>
      ${step === 1 ? `
        <div class="card space-y-3">
          <input id="mint-name" class="inp" placeholder="NFT Name *" value="${esc(form.name)}">
          <textarea id="mint-desc" class="inp resize-none" rows="3" placeholder="Description (optional)">${esc(form.description)}</textarea>
          <input id="mint-img" class="inp" placeholder="Image URL (https://…) *" value="${esc(form.image_url)}">
          ${form.image_url ? `<div class="h-32 rounded-lg overflow-hidden bg-[#0f1117]"><img src="${esc(form.image_url)}" class="h-full object-cover" onerror="this.style.display='none'"></div>` : ''}
          <button class="btn-v w-full" onclick="mintStep1Next()">Next →</button>
        </div>` : step === 2 ? `
        <div class="card space-y-3">
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Collection</label>
            <input id="mint-collection" class="inp" value="${esc(form.collection)}">
          </div>
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Rarity</label>
            <select id="mint-rarity" class="inp">
              ${['common','uncommon','rare','epic','legendary'].map(r => `<option value="${r}" ${form.rarity===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Royalty % (0–20)</label>
            <input id="mint-royalty" class="inp" type="number" min="0" max="20" step="0.5" value="${(form.royalty_bps/100).toFixed(1)}">
          </div>
          <div>
            <label class="text-xs text-[#8b95ab] mb-1 block">Properties (JSON, optional)</label>
            <textarea id="mint-props" class="inp font-mono text-xs resize-none" rows="3" placeholder='{"trait":"value"}'>${esc(form.properties)}</textarea>
          </div>
          <div class="flex gap-2">
            <button class="btn-z flex-1" onclick="mintStepBack()">← Back</button>
            <button class="btn-v flex-1" onclick="mintStep2Next()">Review →</button>
          </div>
        </div>` : `
        <div class="card space-y-3">
          <div class="aspect-square w-32 rounded-lg overflow-hidden bg-[#0f1117] mx-auto">
            <img src="${esc(form.image_url)}" class="w-full h-full object-cover" onerror="this.style.display='none'">
          </div>
          <h3 class="text-lg font-bold text-center">${esc(form.name)}</h3>
          <div class="grid grid-cols-2 gap-2 text-sm">
            <div class="text-[#8b95ab]">Collection</div><div>${esc(form.collection)}</div>
            <div class="text-[#8b95ab]">Rarity</div><div class="capitalize">${esc(form.rarity)}</div>
            <div class="text-[#8b95ab]">Royalty</div><div>${(form.royalty_bps/100).toFixed(1)}%</div>
            <div class="text-[#8b95ab]">Mint Cost</div><div class="text-amber-400">10.5 BLOOM</div>
          </div>
          <p id="mint-msg" class="text-sm text-center"></p>
          <div class="flex gap-2">
            <button class="btn-z flex-1" onclick="mintStepBack()">← Back</button>
            <button id="mint-confirm-btn" class="btn-v flex-1" onclick="mintConfirm()">Mint NFT</button>
          </div>
        </div>`}
    `;
  }

  window.mintStep1Next = () => {
    form.name = document.getElementById('mint-name')?.value?.trim() || '';
    form.description = document.getElementById('mint-desc')?.value?.trim() || '';
    form.image_url = document.getElementById('mint-img')?.value?.trim() || '';
    if (!form.name) return alert('Name is required');
    if (!form.image_url || !/^https?:\/\//.test(form.image_url)) return alert('Valid image URL required');
    step = 2; renderStep();
  };
  window.mintStep2Next = () => {
    form.collection = document.getElementById('mint-collection')?.value?.trim() || 'BloomMoney Genesis';
    form.rarity = document.getElementById('mint-rarity')?.value || 'common';
    form.royalty_bps = Math.round((parseFloat(document.getElementById('mint-royalty')?.value)||5) * 100);
    form.properties = document.getElementById('mint-props')?.value?.trim() || '';
    step = 3; renderStep();
  };
  window.mintStepBack = () => { step = Math.max(1, step - 1); renderStep(); };
  window.mintConfirm = async () => {
    const btn = document.getElementById('mint-confirm-btn');
    const msg = document.getElementById('mint-msg');
    if (btn) { btn.disabled = true; btn.textContent = 'Minting…'; }
    try {
      const d = await api('POST', '/api/nfts/mint', {
        name: form.name, description: form.description, image_url: form.image_url,
        collection: form.collection, rarity: form.rarity, royalty_bps: form.royalty_bps,
        properties: form.properties || undefined
      });
      if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = `✓ Minted ${d.token_id}`; }
      await refreshBalances();
      setTimeout(() => window._nftNav('detail', d.nft_id), 1500);
    } catch (e) {
      if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; }
      if (btn) { btn.disabled = false; btn.textContent = 'Mint NFT'; }
    }
  };

  renderStep();
}

async function renderNFTPortfolio(sec, activeTab) {
  activeTab = activeTab || 'owned';
  const tabs = ['owned','created','listed','favorites','activity'];

  async function loadTab() {
    const panel = document.getElementById('nft-portfolio-panel');
    if (!panel) return;
    panel.innerHTML = `<div class="flex items-center justify-center py-8"><div class="spinner"></div></div>`;
    try {
      if (activeTab === 'owned') {
        const { nfts } = await api('GET', `/api/nfts?owner=${encodeURIComponent(S.user.username)}`);
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No NFTs owned yet</p>';
      } else if (activeTab === 'created') {
        const { nfts } = await api('GET', `/api/nfts?creator=${encodeURIComponent(S.user.username)}`);
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No NFTs created yet</p>';
      } else if (activeTab === 'listed') {
        const { nfts } = await api('GET', `/api/nfts?owner=${encodeURIComponent(S.user.username)}&listed=true`);
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No active listings</p>';
      } else if (activeTab === 'favorites') {
        const { nfts } = await api('GET', '/api/nfts/favorites');
        panel.innerHTML = nfts.length ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `window._nftNav('detail',${n.id})` })).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No favorites yet</p>';
      } else if (activeTab === 'activity') {
        const { events } = await api('GET', '/api/nft-activity');
        if (!events.length) { panel.innerHTML = '<p class="text-[#4e5872] text-sm">No activity yet</p>'; return; }
        panel.innerHTML = `<div class="space-y-2">${events.map(e => {
          const typeLabel = { mint:'Minted', sale:'Sold', transfer:'Transferred' }[e.event_type] || e.event_type;
          const typeColor = { mint:'text-[#7c5cfc]', sale:'text-emerald-400', transfer:'text-[#4e9af1]' }[e.event_type] || 'text-[#8b95ab]';
          return `<div class="card flex items-center gap-3">
            <img src="${esc(e.nft_image||'')}" class="w-12 h-12 rounded object-cover bg-[#0f1117] flex-shrink-0" onerror="this.style.display='none'">
            <div class="min-w-0 flex-1">
              <p class="text-sm font-medium truncate">${esc(e.nft_name||'')}</p>
              <p class="text-xs"><span class="${typeColor}">${typeLabel}</span>${e.to_username ? ` to @${esc(e.to_username)}` : ''}</p>
            </div>
            ${e.price_usdc ? `<span class="text-emerald-400 text-sm font-semibold">${(Number(e.price_usdc)/1e6).toFixed(2)} USDC</span>` : ''}
            <span class="text-xs text-[#4e5872]">${tsAgo(e.created_at)}</span>
          </div>`;
        }).join('')}</div>`;
      }
    } catch (e) { panel.innerHTML = `<p class="text-red-400 text-sm">${esc(e.message)}</p>`; }
  }

  sec.innerHTML = nftTopBar('portfolio', 'window._nftNav') + `
    <h2 class="text-xl font-bold mb-4">My Portfolio</h2>
    <div class="flex gap-2 mb-4 flex-wrap">
      ${tabs.map(t => `<button class="pill-${activeTab===t?'active':'inactive'} text-sm capitalize" onclick="nftPortTab('${t}')">${t}</button>`).join('')}
    </div>
    <div id="nft-portfolio-panel"></div>
  `;
  window.nftPortTab = (t) => { activeTab = t; loadTab(); sec.querySelectorAll('.pill-active,.pill-inactive').forEach((el,i) => { el.className = `pill-${tabs[i]===t?'active':'inactive'} text-sm capitalize`; }); };
  await loadTab();
}

  sec.innerHTML = nftTopBar('activity', 'window._nftNav') + `

    ${events.length ? `<div class="space-y-2">${events.map(e => {
      const typeLabel = { mint:'Minted', sale:'Sold', transfer:'Transferred' }[e.event_type] || e.event_type;
      const typeColor = { mint:'text-[#7c5cfc]', sale:'text-emerald-400', transfer:'text-[#4e9af1]' }[e.event_type] || 'text-[#8b95ab]';
      const isSent = S.user && e.from_user_id === S.user.user_id;
      return `<div class="card flex items-center gap-3">
        <img src="${esc(e.nft_image||'')}" class="w-12 h-12 rounded object-cover bg-[#0f1117] flex-shrink-0" onerror="this.style.display='none'">
        <div class="min-w-0 flex-1">
          <p class="text-sm font-medium truncate cursor-pointer hover:text-[#7c5cfc]" onclick="window._nftNav('detail',${e.nft_id})">${esc(e.nft_name||'')}</p>
          <p class="text-xs text-[#8b95ab]">
            <span class="${typeColor}">${typeLabel}</span>

    }).join('')}</div>` : '<p class="text-[#4e5872] text-sm">No NFT activity yet</p>'}

// ── Verify (three-tier self-service) ────────────────────────────────────────────
const PROVIDER_LABEL = { x: 'X', instagram: 'Instagram', tiktok: 'TikTok', coinbase: 'Coinbase' };

async function renderVerify(sec) {
  const [{ kyc }, providers] = await Promise.all([
    api('GET', '/api/kyc').catch(() => ({ kyc: null })),
    api('GET', '/api/verify/providers').catch(() => ({ social_providers: [], social_enabled: false, premium_enabled: false, staging: false })),
  ]);
  S.kyc = kyc;
  const level = (kyc && kyc.status === 'approved') ? kyc.level : 'basic';
  const isSocial = level === 'social' || level === 'premium';
  const isPremium = level === 'premium';

  function tierCard(name, badge, active, unlocks, action) {
    return `<div class="card space-y-2 ${active ? 'border-[#7c5cfc]' : ''}">
      <div class="flex items-center justify-between">
        <h3 class="font-semibold">${badge} ${name}</h3>
        ${active ? '<span class="tag-social">Active</span>' : '<span class="text-xs text-[#4e5872]">Locked</span>'}
      </div>
      <ul class="text-xs text-[#8b95ab] list-disc pl-4 space-y-0.5">${unlocks.map(u => `<li>${u}</li>`).join('')}</ul>
      ${action || ''}
    </div>`;
  }

  const socialAction = isSocial
    ? `<p class="text-xs text-emerald-400">✓ Verified via ${esc(kyc?.provider || 'social')}</p>`
    : providers.social_enabled && providers.social_providers.length
      ? `<div class="flex flex-wrap gap-2">${providers.social_providers.map(p =>
          `<button class="btn btn-v text-xs" onclick="connectSocial('${p}')">Connect ${PROVIDER_LABEL[p] || p}</button>`).join('')}</div>
         <p id="social-msg" class="text-sm"></p>`
      : `<p class="text-xs text-amber-400">No social providers are configured right now — try Premium instead.</p>`;

  const premiumAction = isPremium
    ? `<p class="text-xs text-emerald-400">✓ Premium verified via zkPassport</p>`
    : providers.premium_enabled
      ? `<button class="btn btn-v text-xs" onclick="startZkSession()">Verify with zkPassport</button>
         <div id="zk-qr-section" class="hidden space-y-2 mt-2">
           <img id="zk-qr-img" src="" alt="ZK QR Code" class="w-48 h-48 rounded-lg mx-auto bg-[#161b2a]">
           <p class="text-xs text-[#8b95ab] text-center">Scan with your zkPassport app</p>
           <p id="zk-session-msg" class="text-sm text-center"></p>
         </div>`
      : `<p class="text-xs text-amber-400">zkPassport is unavailable in this environment.</p>`;

  sec.innerHTML = `
    <h2 class="text-xl font-bold mb-1">🪪 Verification</h2>
    <p class="text-sm text-[#8b95ab] mb-4">Your tier: <span class="font-semibold text-[#e8eaf0]">${tierLabel(level)}</span>${kyc?.status === 'pending' ? ' <span class="text-amber-400">(pending)</span>' : ''}</p>
    <div class="space-y-3">
      ${tierCard('Basic', '🔵', true, ['Post, follow, swap, stake, provide liquidity', 'Join ICOs & prediction markets', 'Paper futures trading'],
        '<p class="text-xs text-emerald-400">✓ Granted automatically on wallet link</p>')}
      ${tierCard('Social', '🟢', isSocial, ['Everything in Basic', 'Live futures up to 5× leverage', 'Removes per-day Basic limits'], socialAction)}
      ${tierCard('Premium', '⭐', isPremium, ['Everything in Social', 'Up to 20× leverage', 'Higher trade-size limits', 'Premium profile badge', '20 tracked holdings (vs 10)'], premiumAction)}
    </div>`;

  window.connectSocial = async (provider) => {
    const msg = document.getElementById('social-msg');
    try {
      const start = await api('POST', '/api/verify/social/start', { provider });
      if (start.simulated) {
        // Staging / simulated path: complete immediately with the signed state.
        await api('POST', '/api/verify/social/complete', { provider, code: 'staging-code', state: start.state });
        if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = '✓ Connected'; }
        await renderVerify(sec);
      } else if (start.oauth_url) {
        // Production: hand off to the provider's OAuth screen.
        window.location.href = start.oauth_url;
      }
    } catch (e) {
      if (msg) {
        msg.className = 'text-red-400 text-sm';
        msg.textContent = e.message === 'social_account_in_use'
          ? 'That account already verifies another wallet.' : e.message;
      }
    }
  };

  window.connectZk = async () => {
    const msg = document.getElementById('zk-msg');
    try {
      await api('POST', '/api/verify/zkpassport', { proof: { simulated: true } });
      if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = '✓ Premium verified'; }
      await renderVerify(sec);
    } catch (e) { if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; } }
  };

  window.startZkSession = async () => {
    const qrSection = document.getElementById('zk-qr-section');
    const qrImg = document.getElementById('zk-qr-img');
    const msg = document.getElementById('zk-session-msg');
    if (!qrSection || !qrImg || !msg) return;
    try {
      msg.className = 'text-[#8b95ab] text-sm text-center';
      msg.textContent = 'Starting session…';
      qrSection.classList.remove('hidden');
      const { sessionId, qrUrl } = await api('POST', '/api/zk/start', {});
      if (qrUrl) qrImg.src = qrUrl;
      msg.textContent = 'Waiting for scan…';
      let attempts = 0;
      const poll = async () => {
        attempts++;
        try {
          const { status } = await api('GET', `/api/zk/status/${sessionId}`);
          if (status === 'verified') {
            S.kyc = { level: 'premium', status: 'approved', provider: 'zkpassport' };
            msg.className = 'text-emerald-400 text-sm text-center';
            msg.textContent = '✓ Identity verified!';
            setTimeout(() => renderVerify(sec), 1200);
          } else if (status === 'failed' || attempts >= 60) {
            msg.className = 'text-red-400 text-sm text-center';
            msg.textContent = status === 'failed' ? 'Verification failed.' : 'Session timed out.';
          } else {
            setTimeout(poll, 3000);
          }
        } catch (e) {
          msg.className = 'text-red-400 text-sm text-center';
          msg.textContent = e.message;
        }
      };
      setTimeout(poll, 3000);
    } catch (e) {
      if (msg) { msg.className = 'text-red-400 text-sm text-center'; msg.textContent = e.message; }
    }
  };

  // OAuth return handler: if a provider redirected back with ?code&state, finish.
  const qp = new URLSearchParams(location.search);
  if (qp.get('code') && qp.get('state') && qp.get('provider')) {
    try {
      await api('POST', '/api/verify/social/complete', { provider: qp.get('provider'), code: qp.get('code'), state: qp.get('state') });
      await renderVerify(sec);
    } catch {}
  }
}

      else if (adminTab === 'ico') content.innerHTML = await loadICOAdmin();
      else if (adminTab === 'prices') content.innerHTML = await loadPrices();
      else if (adminTab === 'financials') content.innerHTML = await loadFinancials();
      else if (adminTab === 'nfts') content.innerHTML = await loadNFTs();
      else if (adminTab === 'audit') content.innerHTML = await loadAudit();
    } catch (e) { content.innerHTML = err(e.message); }
  }

  window.switchAdminTab = (t) => { adminTab = t; fullRender(); };
  window.adminSearch = async (q) => {
    const content = document.getElementById('admin-content');
    if (content) content.innerHTML = await loadUsers(q).catch(e => err(e.message));
  };
  window.banUser = async (id) => {
    if (!confirm('Ban this user?')) return;
    try { await api('POST', `/api/admin/users/${id}/ban`); fullRender(); } catch (e) { alert(e.message); }
  };
  window.toggleAdmin = async (id) => {

// ── Trade Journal ─────────────────────────────────────────────────────────────

let journalEntries = [];
let journalFilters = { asset_type: '', direction: '', status: '' };

function calcPnl(entry) {
  const ep = parseFloat(entry.entry_price);
  const xp = entry.exit_price != null ? parseFloat(entry.exit_price) : null;
  const qty = parseFloat(entry.quantity);
  if (xp == null) return null;
  const pnl = entry.direction === 'buy' ? (xp - ep) * qty : (ep - xp) * qty;
  const pct = ep > 0 ? (pnl / (ep * qty)) * 100 : 0;
  return { pnl, pct };
}

function fmtQty(q) {
  const n = parseFloat(q);
  if (n < 1) return n.toFixed(6);
  if (n < 10) return n.toFixed(4);
  return n.toFixed(2);
}

function fmtPrice(p) {
  const n = parseFloat(p);
  if (n < 1) return n.toFixed(4);
  return n.toFixed(2);
}

function journalAssetPill(at) {
  if (at === 'stock') return '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-blue-900/40 text-blue-300">Stock</span>';
  if (at === 'etf')   return '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-emerald-900/40 text-emerald-300">ETF</span>';
  return '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-amber-900/40 text-amber-300">Crypto</span>';
}

function renderJournalList() {
  const filtered = journalEntries.filter(e => {
    if (journalFilters.asset_type && e.asset_type !== journalFilters.asset_type) return false;
    if (journalFilters.direction && e.direction !== journalFilters.direction) return false;
    if (journalFilters.status === 'open' && e.exit_price != null) return false;
    if (journalFilters.status === 'closed' && e.exit_price == null) return false;
    return true;
  });

  if (!filtered.length) {
    return `<div class="card text-center py-8 text-zinc-500 text-sm">No trades match these filters.</div>`;
  }

  return filtered.map(e => {
    const p = calcPnl(e);
    const dirLabel = e.direction === 'buy'
      ? '<span class="text-emerald-400 font-semibold">Buy ↑</span>'
      : '<span class="text-red-400 font-semibold">Sell ↓</span>';
    const statusBadge = e.exit_price == null
      ? '<span class="text-xs px-2 py-0.5 rounded-full bg-zinc-700 text-zinc-300">Open</span>'
      : '';
    const pnlHtml = p != null
      ? `<span class="${p.pnl >= 0 ? 'text-emerald-400' : 'text-red-400'} font-mono text-sm">${p.pnl >= 0 ? '+' : ''}$${Math.abs(p.pnl).toFixed(2)} (${p.pnl >= 0 ? '+' : ''}${p.pct.toFixed(1)}%)</span>`
      : '';
    const notesHtml = e.notes ? `<div class="mt-2 text-xs text-zinc-400 italic border-t border-zinc-800 pt-2">${esc(e.notes)}</div>` : '';
    return `
      <div class="card space-y-2">
        <div class="flex items-center justify-between gap-2 flex-wrap">
          <div class="flex items-center gap-2 flex-wrap">
            ${journalAssetPill(e.asset_type)}
            <span class="font-semibold font-mono text-sm">${esc(e.ticker)}</span>
            ${dirLabel}
            ${statusBadge}
          </div>
          <div class="flex items-center gap-2">
            ${pnlHtml}
            <button class="text-zinc-500 hover:text-zinc-200 text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700"
              onclick="openTradeModal(${e.id})">Edit</button>
          </div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs">
          <div><div class="text-zinc-500">Qty</div><div class="font-mono">${fmtQty(e.quantity)}</div></div>
          <div><div class="text-zinc-500">Entry</div><div class="font-mono">$${fmtPrice(e.entry_price)}</div></div>
          <div><div class="text-zinc-500">Exit</div><div class="font-mono">${e.exit_price != null ? '$'+fmtPrice(e.exit_price) : '<span class="text-zinc-600">—</span>'}</div></div>
          <div><div class="text-zinc-500">Date</div><div class="font-mono">${String(e.trade_date).slice(0,10)}</div></div>
        </div>
        ${notesHtml}
      </div>`;
  }).join('');
}

window.applyJournalFilters = function() {
  journalFilters.asset_type = document.getElementById('jf-asset')?.value || '';
  journalFilters.direction  = document.getElementById('jf-dir')?.value || '';
  journalFilters.status     = document.getElementById('jf-status')?.value || '';
  const list = document.getElementById('journal-list');
  if (list) list.innerHTML = renderJournalList();
};

window.resetJournalFilters = function() {
  journalFilters = { asset_type: '', direction: '', status: '' };
  const fa = document.getElementById('jf-asset');   if (fa) fa.value = '';
  const fd = document.getElementById('jf-dir');     if (fd) fd.value = '';
  const fs = document.getElementById('jf-status');  if (fs) fs.value = '';
  const list = document.getElementById('journal-list');
  if (list) list.innerHTML = renderJournalList();
};

window.openTradeModal = function(idOrNull) {
  const existing = typeof idOrNull === 'number' ? journalEntries.find(e => e.id === idOrNull) : null;
  const today = new Date().toISOString().slice(0, 10);

  const modal = document.createElement('div');
  modal.id = 'trade-journal-modal';
  modal.className = 'fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4';
  modal.onclick = (ev) => { if (ev.target === modal) modal.remove(); };

  const title = existing ? 'Edit Trade' : 'Log a Trade';
  const deleteBtn = existing
    ? `<button class="btn btn-r text-sm" onclick="deleteTradeEntry(${existing.id})">Delete</button>`
    : '';

  modal.innerHTML = `
    <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-5 w-full max-w-lg space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold">${title}</h2>
        <button onclick="document.getElementById('trade-journal-modal')?.remove()" class="text-zinc-400 hover:text-white text-xl leading-none">✕</button>
      </div>
      <div id="trade-modal-err" class="hidden text-red-400 text-sm"></div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-zinc-400 block mb-1">Asset type</label>
          <select id="tm-asset" class="inp">
            <option value="stock" ${existing?.asset_type==='stock'?'selected':''}>Stock</option>
            <option value="etf"   ${existing?.asset_type==='etf'  ?'selected':''}>ETF</option>
            <option value="crypto"${existing?.asset_type==='crypto'?'selected':''}>Crypto</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-zinc-400 block mb-1">Direction</label>
          <select id="tm-direction" class="inp">
            <option value="buy"  ${existing?.direction==='buy' ?'selected':''}>Buy</option>
            <option value="sell" ${existing?.direction==='sell'?'selected':''}>Sell</option>
          </select>
        </div>
      </div>
      <div>
        <label class="text-xs text-zinc-400 block mb-1">Ticker / Symbol</label>
        <input id="tm-ticker" class="inp" placeholder="e.g. BTC, AAPL, SPY" maxlength="20"
          value="${esc(existing?.ticker||'')}" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-zinc-400 block mb-1">Quantity</label>
          <input id="tm-qty" type="number" step="any" min="0" class="inp" placeholder="0.00"
            value="${existing ? parseFloat(existing.quantity) : ''}">
        </div>
        <div>
          <label class="text-xs text-zinc-400 block mb-1">Entry price (USD)</label>
          <input id="tm-entry" type="number" step="any" min="0" class="inp" placeholder="0.00"
            value="${existing ? parseFloat(existing.entry_price) : ''}">
        </div>
      </div>
      <div>
        <label class="text-xs text-zinc-400 block mb-1">Trade date</label>
        <input id="tm-date" type="date" class="inp" value="${existing ? String(existing.trade_date).slice(0,10) : today}">
      </div>
      <div class="border-t border-zinc-800 pt-3">
        <div class="text-xs text-zinc-500 mb-2">Close trade (optional)</div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Exit price (USD)</label>
            <input id="tm-exit" type="number" step="any" min="0" class="inp" placeholder="leave blank if open"
              value="${existing?.exit_price != null ? parseFloat(existing.exit_price) : ''}">
          </div>
          <div>
            <label class="text-xs text-zinc-400 block mb-1">Exit date</label>
            <input id="tm-exitdate" type="date" class="inp"
              value="${existing?.exit_date ? String(existing.exit_date).slice(0,10) : ''}">
          </div>
        </div>
      </div>
      <div>
        <label class="text-xs text-zinc-400 block mb-1">Notes (optional)</label>
        <textarea id="tm-notes" class="inp" rows="2" maxlength="500" placeholder="Trade rationale, lessons…">${esc(existing?.notes||'')}</textarea>
      </div>
      <div class="flex gap-2 pt-1">
        <button class="btn btn-v flex-1 text-sm" onclick="saveTradeEntry(${existing ? existing.id : 'null'})">
          ${existing ? 'Save changes' : 'Log trade'}
        </button>
        ${deleteBtn}
        <button class="btn btn-z text-sm" onclick="document.getElementById('trade-journal-modal')?.remove()">Cancel</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
};

window.saveTradeEntry = async function(idOrNull) {
  const errEl = document.getElementById('trade-modal-err');
  if (errEl) { errEl.classList.add('hidden'); errEl.textContent = ''; }
  const payload = {
    asset_type:  document.getElementById('tm-asset')?.value,
    ticker:      document.getElementById('tm-ticker')?.value.trim(),
    direction:   document.getElementById('tm-direction')?.value,
    quantity:    document.getElementById('tm-qty')?.value,
    entry_price: document.getElementById('tm-entry')?.value,
    trade_date:  document.getElementById('tm-date')?.value,
    exit_price:  document.getElementById('tm-exit')?.value || null,
    exit_date:   document.getElementById('tm-exitdate')?.value || null,
    notes:       document.getElementById('tm-notes')?.value || null,
  };
  try {
    if (idOrNull) {
      await api('PATCH', `/api/journal/${idOrNull}`, payload);
    } else {
      await api('POST', '/api/journal', payload);
    }
    document.getElementById('trade-journal-modal')?.remove();
    const sec = document.getElementById('section-journal');
    if (sec) await renderJournal(sec);
  } catch (e) {
    if (errEl) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    else alert(e.message);
  }
};

window.deleteTradeEntry = async function(id) {
  if (!confirm('Delete this trade entry? This cannot be undone.')) return;
  try {
    await api('DELETE', `/api/journal/${id}`);
    document.getElementById('trade-journal-modal')?.remove();
    const sec = document.getElementById('section-journal');
    if (sec) await renderJournal(sec);
  } catch (e) { alert(e.message); }
};

async function renderJournal(sec) {
  sec.innerHTML = spin();
  try {
    const [summaryData, listData] = await Promise.all([
      api('GET', '/api/journal/summary'),
      api('GET', '/api/journal'),
    ]);
    journalEntries = listData.entries || [];
    const s = summaryData;
    const pnlCls = s.realized_pnl >= 0 ? 'text-emerald-400' : 'text-red-400';
    const pnlSign = s.realized_pnl >= 0 ? '+' : '';
    const winRate = s.closed_count > 0
      ? `${s.profitable_count} of ${s.closed_count} (${Math.round(s.profitable_count/s.closed_count*100)}%)`
      : '—';

    sec.innerHTML = `
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <h1 class="text-xl font-bold">Trade Journal</h1>
          <button class="btn btn-v text-sm" onclick="openTradeModal(null)">+ Log Trade</button>
        </div>

        <!-- Summary dashboard -->
        <div class="card grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div>
            <div class="text-xs text-zinc-500 mb-1">Realised P&amp;L</div>
            <div class="text-lg font-bold font-mono ${pnlCls}">${pnlSign}$${Math.abs(s.realized_pnl).toFixed(2)}</div>
          </div>
          <div>
            <div class="text-xs text-zinc-500 mb-1">Win rate</div>
            <div class="text-lg font-bold text-zinc-100">${winRate}</div>
          </div>
          <div>
            <div class="text-xs text-zinc-500 mb-1">Open positions</div>
            <div class="text-lg font-bold text-zinc-100">${s.open_count}</div>
          </div>
          <div>
            <div class="text-xs text-zinc-500 mb-1">Total trades</div>
            <div class="text-lg font-bold text-zinc-100">${s.total_count}</div>
          </div>
        </div>

        <!-- Filters -->
        <div class="card flex flex-wrap items-center gap-3">
          <select id="jf-asset" class="inp w-auto text-xs" onchange="applyJournalFilters()">
            <option value="">All types</option>
            <option value="stock">Stock</option>
            <option value="etf">ETF</option>
            <option value="crypto">Crypto</option>
          </select>
          <select id="jf-dir" class="inp w-auto text-xs" onchange="applyJournalFilters()">
            <option value="">All directions</option>
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
          </select>
          <select id="jf-status" class="inp w-auto text-xs" onchange="applyJournalFilters()">
            <option value="">All statuses</option>
            <option value="open">Open</option>
            <option value="closed">Closed</option>
          </select>
          <button class="text-xs text-zinc-500 hover:text-zinc-300 underline" onclick="resetJournalFilters()">Reset</button>
        </div>

        <!-- Trade list -->
        <div id="journal-list" class="space-y-3">
          ${renderJournalList()}
        </div>
        ${journalEntries.length === 0 ? `
          <div class="card text-center py-10 space-y-3">
            <div class="text-zinc-500 text-sm">No trades logged yet.</div>
            <button class="btn btn-v text-sm" onclick="openTradeModal(null)">Log your first trade</button>
          </div>` : ''}
      </div>`;
  } catch (e) { sec.innerHTML = err(e.message); }
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
