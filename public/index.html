  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

<body class="bg-[#0f1117] text-[#e8eaf0] h-screen overflow-hidden flex flex-col">

<!-- ───── Wallet Gate ───── -->
<div id="wallet-gate" class="hidden fixed inset-0 z-50 bg-[#0f1117] flex flex-col items-center justify-center gap-6 p-8 text-center" style="background: radial-gradient(ellipse at 50% 60%, rgba(124,92,252,0.12) 0%, transparent 70%), #0f1117;">
  <div class="text-7xl">🌸</div>
  <h1 class="text-3xl font-bold text-[#e8eaf0]">BloomMoney</h1>
  <p class="text-[#8b95ab] max-w-xs">The onchain social money layer. Connect your wallet to get started.</p>
  <button id="connect-wallet-btn" class="active:scale-95 transition-all text-white px-10 py-3 rounded-2xl font-semibold text-lg shadow-lg shadow-[#7c5cfc]/30" style="background: linear-gradient(135deg, #7c5cfc, #4e9af1);">Connect Wallet</button>
  <p id="wallet-status" class="text-[#4e5872] text-sm"></p>
</div>

<!-- ───── Tip Modal ───── -->
<div id="tip-modal" class="hidden fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-4" onclick="if(event.target.id==='tip-modal') closeTipModal()">
  <div class="bg-[#131620] border border-[rgba(255,255,255,0.08)] rounded-xl p-6 w-full max-w-sm" onclick="event.stopPropagation()">
    <h2 class="text-xl font-bold mb-4" id="tip-modal-title">Send BLOOM</h2>
    <div class="space-y-4">
      <div>
        <label class="text-sm text-[#8b95ab] block mb-2">Amount (BLOOM)</label>
        <input id="tip-amount" type="number" placeholder="0.00" step="0.01" min="0" class="inp w-full" />
      </div>
      <div class="text-sm text-[#8b95ab]">
        Your balance: <span id="tip-balance" class="text-[#7c5cfc] font-semibold">0 BLOOM</span>
      </div>
      <div id="tip-error" class="text-red-400 text-sm hidden"></div>
      <div class="flex gap-2 justify-end">
        <button class="btn btn-z" onclick="closeTipModal()">Cancel</button>
        <button class="btn btn-v" onclick="submitTip()" id="tip-submit-btn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- ───── Main App ───── -->

        <span class="text-[#4e5872]">/</span>
        <span class="text-emerald-400 font-semibold" id="hdr-usdc">—</span>

          <span class="text-[#4e5872]">BLOOM</span>

          <span class="text-[#4e5872]">USDC</span>

  <div class="flex flex-1 overflow-hidden">

    <!-- Desktop Sidebar + Mobile Drawer -->

      </div>

      <button class="nav-item" data-view="futures">📈 Futures</button>
      <button class="nav-item" data-view="journal">📓 Journal</button>
      <button class="nav-item" data-view="earn">🌱 Earn</button>
      <button class="nav-item" data-view="vault">🏦 Vault</button>
      <button class="nav-item" data-view="launchpad">🚀 Launchpad</button>

      <button class="nav-item" data-view="explore">🔭 Explore</button>
      <button class="nav-item" data-view="verify">🪪 Verify</button>
      <button class="nav-item" data-view="nfts">🎨 NFTs</button>
      <a class="nav-item text-amber-400 hidden" id="admin-nav" target="_blank" rel="noopener">⚙️ Admin console</a>
      <!-- Points available (Post-to-Earn) — pinned to the bottom of the nav -->
      <div id="points-available" class="relative mt-auto mx-1 mb-1 px-3 py-2 rounded-xl bg-[#7c5cfc]/10 border border-[#7c5cfc]/25 flex items-center gap-2">
        <span class="text-base leading-none">✨</span>
        <div class="min-w-0">
          <div class="text-[0.65rem] uppercase tracking-wide text-[#4e5872] leading-tight">Points available</div>
          <div class="text-sm font-bold text-[#7c5cfc] leading-tight"><span id="points-value">0</span></div>
        </div>

    <!-- Main Content -->
    <main id="main-scroll" class="flex-1 overflow-y-auto pb-16 md:pb-0">

      <!-- Feed -->

      <!-- Profile -->

        <!-- CI test anchor populated by renderProfile() -->
        <div id="linked-accounts-section" class="hidden"></div>

      <!-- Swap -->
      <section id="section-swap" class="view hidden max-w-md mx-auto py-4 px-4"></section>

      <section id="section-vault" class="view hidden max-w-2xl mx-auto py-4 px-4"></section>

      <!-- Futures -->

      <!-- NFTs -->

      <!-- Explore -->
      <section id="section-explore" class="view hidden max-w-2xl mx-auto py-4 px-4"></section>

      <!-- Verify -->
      <section id="section-verify" class="view hidden max-w-lg mx-auto py-4 px-4">
        <!-- CI test anchor populated by renderVerify() -->
        <span class="tag-zk-verified hidden"></span>
      </section>

      <!-- KYC -->
      <section id="section-kyc" class="view hidden max-w-lg mx-auto py-4 px-4"></section>

      <!-- Admin -->
      <section id="section-admin" class="view hidden max-w-4xl mx-auto py-4 px-4"></section>

      <!-- Messages -->
      <section id="section-messages" class="view hidden max-w-2xl mx-auto py-4 px-4"></section>

    </main>
  </div>

  <!-- Mobile Bottom Nav (six tabs) -->
  <nav id="bottom-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-[#131620] border-t border-[rgba(255,255,255,0.06)] flex z-30">
    <button data-tab="home" class="bottom-tab flex-1 py-3 flex flex-col items-center text-xs gap-0.5 text-[#8b95ab] transition-colors" onclick="navigate('home')">🏠<span>Home</span></button>
    <button data-tab="trade" class="bottom-tab flex-1 py-3 flex flex-col items-center text-xs gap-0.5 text-[#8b95ab] transition-colors" onclick="navigate('trade')">↔<span>Trade</span></button>

    <button data-tab="earn" class="bottom-tab flex-1 py-3 flex flex-col items-center text-xs gap-0.5 text-[#8b95ab] transition-colors" onclick="navigate('earn')">🌱<span>Earn</span></button>

</div><!-- /#app -->

<style>
:root {
  --bg-deep:        #0f1117;
  --bg-surface:     #131620;
  --bg-card:        #161b2a;
  --bg-card-hover:  #1c2236;
  --bg-input:       #0d1021;
  --border-subtle:  rgba(255,255,255,0.06);
  --border-hover:   rgba(124,92,252,0.20);
  --border-focus:   #7c5cfc;
  --accent-purple:  #7c5cfc;
  --accent-blue:    #4e9af1;
  --text-primary:   #e8eaf0;
  --text-secondary: #8b95ab;
  --text-muted:     #4e5872;
}
.nav-item {
  width: 100%; text-align: left; padding: 0.5rem 0.75rem; border-radius: 0.5rem;
  font-size: 0.875rem; color: var(--text-secondary); transition: color 0.15s, background 0.15s;
}
.nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
.nav-item.active { background: linear-gradient(90deg, rgba(124,92,252,0.12), transparent); border-left: 2px solid var(--accent-purple); color: var(--text-primary); padding-left: calc(0.75rem - 2px); }
.card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 0.75rem; padding: 1rem; transition: border-color 0.2s, box-shadow 0.2s; }
.card:hover { border-color: var(--border-hover); box-shadow: 0 0 16px rgba(124,92,252,0.08); }
.inp { background: var(--bg-input); border: 1px solid rgba(255,255,255,0.08); border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; color: var(--text-primary); width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.inp:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(124,92,252,0.15); }
.btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; transform: translateY(0); }
.btn:hover { transform: translateY(-1px); }
.btn-v { background: linear-gradient(135deg, #7c5cfc, #4e9af1); color: #fff; }
.btn-v:hover { opacity: 0.9; }
.btn-z { background: var(--bg-card-hover); color: var(--text-primary); border: 1px solid var(--border-subtle); }
.btn-z:hover { border-color: var(--border-hover); }
.btn-r { background: #dc2626; color: #fff; }
.btn-r:hover { background: #b91c1c; }
.btn-g { background: #10b981; color: #fff; }
.btn-g:hover { background: #059669; }
.tag-basic { background: rgba(78,154,241,0.15); color: #93c5fd; font-size:0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; }
.tag-social { background: rgba(16,185,129,0.15); color: #6ee7b7; font-size:0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; }
.tag-premium { background: rgba(245,158,11,0.15); color: #fcd34d; font-size:0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; }
.tag-verified { background: rgba(16,185,129,0.15); color: #6ee7b7; font-size:0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; }
.tag-elite { background: rgba(245,158,11,0.15); color: #fcd34d; font-size:0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; }
.tag-zk-verified { background: rgba(20,184,166,0.15); color: #5eead4; font-size:0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; }
.spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.08); border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Post-to-Earn points animations */
.points-pulse { animation: pointsPulse 0.7s ease-out; }
@keyframes pointsPulse {
  0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(124,92,252,0.5); }
  35%  { transform: scale(1.06); box-shadow: 0 0 16px 4px rgba(124,92,252,0.45); }
  100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(124,92,252,0); }
}
.points-float {
  position: absolute; right: 0.75rem; top: 0.25rem;
  font-size: 0.85rem; font-weight: 700; color: #a78bfa;
  pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  animation: pointsFloat 0.9s ease-out forwards;
}
@keyframes pointsFloat {
  0%   { opacity: 0; transform: translateY(4px) scale(0.8); }
  20%  { opacity: 1; transform: translateY(0) scale(1.1); }
  100% { opacity: 0; transform: translateY(-22px) scale(1); }
}
select.inp option { background: var(--bg-card); }
/* Pill-style tab buttons */
.pill-active { background: linear-gradient(135deg, #7c5cfc, #4e9af1); color: #fff !important; border-radius: 9999px; border: none; }
.pill-inactive { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-subtle); border-radius: 9999px; }
.pill-inactive:hover { color: var(--text-primary); border-color: var(--border-hover); }
/* Futures table zebra rows — kept for fallback compatibility */
#section-futures tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
/* Avatar hue override — purple/blue band */

/* ── Futures Terminal ─────────────────────────────────────────────────────── */
.futures-terminal {
  --long:     #26a69a;
  --short:    #ef5350;
  --bg-term:  #0b0e11;
  --bg-panel: #0d1018;
  --border-t: rgba(255,255,255,0.05);
  background: var(--bg-term);
  font-variant-numeric: tabular-nums;
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 4rem);
}
.fut-header { background: var(--bg-panel); }
.futures-terminal__main {
  display: grid;
  grid-template-columns: 180px 1fr 320px;
  flex: 1;
}
.fut-panel-ob {
  background: var(--bg-panel);
  min-height: 420px;
  border-right: 1px solid var(--border-t);
}
.fut-panel-chart {
  background: var(--bg-term);
  min-height: 420px;
  border-right: 1px solid var(--border-t);
}
.fut-panel-entry {
  background: var(--bg-panel);
  min-height: 420px;
  overflow-y: auto;
}
.fut-panel-bottom {
  background: var(--bg-panel);
  border-top: 1px solid var(--border-t);
  max-height: 280px;
  overflow: hidden;
}
.fut-panel-bottom .fut-bottom-scroll {
  overflow-y: auto;
  max-height: 225px;
}
.fut-ask { color: var(--short) !important; }
.fut-bid { color: var(--long) !important; }
.fut-side-long  { background: var(--long) !important;  color: #fff !important; }
.fut-side-short { background: var(--short) !important; color: #fff !important; }
.lev-active { outline: 1.5px solid currentColor !important; color: #e8eaf0 !important; }
.fut-ob-row { position: relative; cursor: default; }
.fut-ob-ask::before { content:''; position:absolute; top:0; right:0; bottom:0; width:var(--bar-w,0%); background:var(--short); opacity:0.1; }
.fut-ob-bid::before { content:''; position:absolute; top:0; right:0; bottom:0; width:var(--bar-w,0%); background:var(--long); opacity:0.1; }
.fut-mkt-tab { color:#8b95ab; border:1px solid rgba(255,255,255,0.06); background:transparent; transition:all 0.15s; }
.fut-mkt-tab:hover { color:#e8eaf0; border-color:rgba(255,255,255,0.15); }

.fut-tab-btn { padding:0.3rem 0.75rem; font-size:0.75rem; color:#8b95ab; border-bottom:2px solid transparent; transition:color 0.15s, border-color 0.15s; }

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let _activeInterval = null;
const S = {
  token: new URLSearchParams(location.search).get('token') || '',
  user: null,
  balances: {},
  kyc: null,
  view: 'home',
  prices: {},
  marketId: null,
  tradeToken: null,
  profileUser: null,
  futuresMode: 'paper',
  futuresMarket: null,
  social_accounts: [],
  points: 0,
  msgOpenConv: null,
  totalUnread: 0,
};

// ── Token refresh via bridge postMessage ───────────────────────────────────────
window.addEventListener('message', (e) => {
  if (e.data && typeof e.data === 'object') {
    const t = e.data.token || e.data.jwt;
    if (t && typeof t === 'string' && t.length > 20) {
      S.token = t;
      init();
    }
  }
});

// ── API ────────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const h = { 'Content-Type': 'application/json' };
  if (S.token) h['x-usernode-token'] = S.token;
  const opts = { method, headers: h };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Helpers ────────────────────────────────────────────────────────────────────
const U = 1_000_000;
function fmtAmt(sym, v) {
  const n = Number(v) / U;
  if (sym === 'ETH') return n.toFixed(6);
  if (sym === 'BTC') return n.toFixed(8);
  return n.toFixed(2);
}
function fmtUSD(v) { return (Number(v) / U).toFixed(2); }
// AI Trade Helper: client-side mirror of server COINGECKO_TICKER_MAP keys.
const KNOWN_TICKERS = new Set(['BTC','ETH','BNB','SOL','XRP','USDT','ADA','DOGE','TON','LINK','DOT','AVAX']);
const TICKER_RE = /\$([A-Za-z]{2,6})\b/g;
function detectTickers(text) {
  const seen = [];
  let m;
  TICKER_RE.lastIndex = 0;
  while ((m = TICKER_RE.exec(text || '')) !== null) {
    const sym = m[1].toUpperCase();
    if (KNOWN_TICKERS.has(sym) && !seen.includes(sym)) seen.push(sym);
    if (seen.length >= 3) break;
  }
  return seen;
}
function fmtTickerPrice(v) {
  const n = Number(v);
  if (!isFinite(n)) return '';
  if (n >= 1) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return '$' + n.toFixed(4);
}
function getBal(sym) { return fmtAmt(sym, S.balances[sym] || 0); }
function shortAddr(a) { return a ? a.slice(0,6)+'…'+a.slice(-4) : ''; }
function tsAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return Math.floor(s)+'s';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}
function tierLabel(lvl) {
  return { basic: 'Basic', social: 'Social ✓', premium: 'Premium ★' }[lvl] || (lvl || 'Basic');
}
function kycTag(lvl) {
  if (!lvl) return '';
  return `<span class="tag-${lvl}">${tierLabel(lvl)}</span>`;
}
function fundingCountdown(ts) {
  const ms = new Date(ts) - Date.now();
  if (ms <= 0) return 'due';
  const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
  if (m >= 60) return Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
  return m + 'm ' + s + 's';
}
function err(msg) { return `<div class="text-red-400 text-sm py-2">${msg}</div>`; }
function spin() { return `<div class="flex justify-center py-8"><div class="spinner"></div></div>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Avatar placeholder ─────────────────────────────────────────────────────────
// Deterministic, stylish initials avatar rendered as an inline SVG data-URI image.
// Same username always yields the same gradient, so avatars stay consistent across
// the feed, threads, and profiles without any upload flow.
function _avatarHash(str) {
  let h = 0;
  str = String(str || '?');
  for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) | 0; }
  return Math.abs(h);
}
function avatarDataUri(username) {
  const name = String(username || '?');
  const initial = (name.replace(/[^a-zA-Z0-9]/g, '')[0] || name[0] || '?').toUpperCase();
  const h = _avatarHash(name);
  const hue = 200 + (h % 80); // 200–280° = blue/purple band
  const hue2 = (hue + 40) % 360;
  const c1 = `hsl(${hue},72%,62%)`;
  const c2 = `hsl(${hue2},78%,44%)`;
  const gid = 'g' + h;
  const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">` +
      `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1">` +
        `<stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>` +
      `</linearGradient></defs>` +
      `<rect width="64" height="64" fill="url(#${gid})"/>` +
      `<text x="32" y="34" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" ` +
        `font-size="30" font-weight="600" fill="#fff" fill-opacity="0.95" ` +
        `text-anchor="middle" dominant-baseline="central">${initial}</text>` +
    `</svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}
// Reusable circular <img> avatar. `cls` adds Tailwind sizing/extra classes.
// `avatarUrl` is an optional stored data URI; falls back to the generated SVG.
function avatarImg(username, cls, avatarUrl) {
  const src = avatarUrl || avatarDataUri(username);
  return `<img src="${esc(src)}" alt="@${esc(username)}" ` +
    `class="rounded-full object-cover shrink-0 ring-1 ring-white/10 ${cls || 'w-8 h-8'}" ` +
    `loading="lazy" draggable="false">`;
}

// ── Navigation ────────────────────────────────────────────────────────────────
// Six primary tabs (home/trade/futures/earn/predict/profile) plus explore,
// verify and nfts. Legacy aliases (feed/swap/markets/stake/…) still resolve so
// internal deep-links keep working.
const VIEW_SECTION = {
  home: 'app-feed', feed: 'app-feed',
  trade: 'section-swap', swap: 'section-swap',
  futures: 'section-futures',
  journal: 'section-journal',
  earn: 'section-earn', stake: 'section-earn', liquidity: 'section-earn', ico: 'section-earn',
  launchpad: 'section-earn',
  vault: 'section-vault',
  predict: 'section-markets', markets: 'section-markets',
  profile: 'section-profile',
  messages: 'section-messages',
  explore: 'section-explore',
  verify: 'section-verify', kyc: 'section-verify',
  nfts: 'section-nfts',
  admin: 'section-admin',
};
// Which bottom tab is highlighted for a given view.
const VIEW_TAB = {
  home: 'home', feed: 'home', trade: 'trade', swap: 'trade', futures: 'futures',
  earn: 'earn', stake: 'earn', liquidity: 'earn', ico: 'earn',
  launchpad: 'earn', vault: 'earn',
  predict: 'predict', markets: 'predict', profile: 'profile',
};

function navigate(view, opts) {
  clearInterval(_activeInterval); _activeInterval = null;
  if (opts) Object.assign(S, opts);
  S.view = view;
  document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
  const sec = document.getElementById(VIEW_SECTION[view]);
  if (sec) sec.classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  const tab = VIEW_TAB[view];
  document.querySelectorAll('.bottom-tab').forEach(b => {
    b.classList.toggle('text-[#7c5cfc]', b.dataset.tab === tab);
    b.classList.toggle('text-[#8b95ab]', b.dataset.tab !== tab);
  });
  hideMobileSidebar();
  loadView(view);
  document.getElementById('main-scroll').scrollTo(0, 0);
}

async function loadView(view) {
  const sec = document.getElementById(VIEW_SECTION[view]);
  if (!sec) return;
  sec.innerHTML = spin();
  try {
    switch (view) {
      case 'home': case 'feed': await renderFeed(sec); break;
      case 'profile': await renderProfile(sec); break;
      case 'trade': case 'swap': await renderSwap(sec); break;
      case 'earn': case 'stake': case 'liquidity': case 'ico': await renderEarn(sec); break;
      case 'launchpad': S.earnTab = 'launchpad'; await renderEarn(sec); break;
      case 'vault': await renderVault(sec); break;
      case 'predict': case 'markets': await renderMarkets(sec); break;
      case 'messages': await renderMessages(sec); break;
      case 'futures': await renderFutures(sec); break;
      case 'journal': await renderJournal(sec); break;
      case 'nfts': await renderNFTs(sec); break;
      case 'explore': await renderExplore(sec); break;
      case 'verify': case 'kyc': await renderVerify(sec); break;
      case 'admin': await renderAdmin(sec); break;
    }
  } catch (e) { sec.innerHTML = err(e.message); }
}

function toggleMobileSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('mob-overlay');
  const open = !sb.classList.contains('-translate-x-full');
  sb.classList.toggle('-translate-x-full', open);
  ov.classList.toggle('hidden', open);
}
function hideMobileSidebar() {
  document.getElementById('sidebar').classList.add('-translate-x-full');
  document.getElementById('mob-overlay').classList.add('hidden');
}

// ── Sidebar nav setup ─────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.view));
});

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {
  // Skip the network round-trip when there's no token to present — this avoids
  // a guaranteed 401 that shows up as a console error in headless test runners.
  if (!S.token) {
    document.getElementById('wallet-gate').classList.remove('hidden');
    return;
  }
  try {
    const data = await api('GET', '/api/me');
    S.user = data.user;
    S.points = Number(data.user?.points) || 0;
    S.kyc = data.kyc;
    S.social_accounts = data.social_accounts || [];
    if (data.balances) {
      S.balances = {};
      data.balances.forEach(b => { S.balances[b.token_symbol] = b.balance; });
    }
    if (!S.user.usernode_pubkey) {
      showWalletGate();
      return;
    }
    showApp();
  } catch (e) {
    document.getElementById('wallet-gate').classList.remove('hidden');
    document.getElementById('wallet-status').textContent = 'Authentication required.';
  }
}

function showWalletGate() {
  document.getElementById('wallet-gate').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

function showApp() {
  document.getElementById('wallet-gate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  updateHeader();
  if (S.user.is_admin) {
    const adminLink = document.getElementById('admin-nav');
    adminLink.href = '/admin' + (S.token ? '?token=' + encodeURIComponent(S.token) : '');
    adminLink.classList.remove('hidden');
  }
  refreshUnreadBadge();
  clearInterval(_unreadInterval);
  _unreadInterval = setInterval(refreshUnreadBadge, 20000);
  navigate(S.view);
}

// ── Messaging unread badge ─────────────────────────────────────────────────────
const MSG_DEMO = new URLSearchParams(location.search).get('demo') === '1';
let _unreadInterval = null;
function setUnreadBadge(total) {
  S.totalUnread = total;
  for (const id of ['hdr-unread-badge', 'nav-unread-badge']) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (total > 0) { el.textContent = total > 99 ? '99+' : String(total); el.classList.remove('hidden'); }
    else el.classList.add('hidden');
  }
}
async function refreshUnreadBadge() {
  try {
    const d = await api('GET', '/api/conversations' + (MSG_DEMO ? '?demo=1' : ''));
    setUnreadBadge(Number(d.total_unread) || 0);
  } catch (_) { /* non-fatal */ }
}

function updateHeader() {
  const walletEl = document.getElementById('hdr-wallet');
  const bloomEl = document.getElementById('hdr-bloom');
  const usdcEl = document.getElementById('hdr-usdc');
  if (S.user) {
    walletEl.textContent = shortAddr(S.user.usernode_pubkey);
    bloomEl.textContent = getBal('BLOOM');
    usdcEl.textContent = getBal('USDC');
    document.getElementById('hdr-bloom-lg').textContent = getBal('BLOOM');
    document.getElementById('hdr-usdc-lg').textContent = getBal('USDC');
    const drawerUser = document.getElementById('drawer-user');
    document.getElementById('drawer-username').textContent = '@' + S.user.username;
    document.getElementById('drawer-wallet').textContent = shortAddr(S.user.usernode_pubkey) || '';
    drawerUser.classList.remove('hidden');
  }
  updatePoints();
}

// Writes the current points total into the "Points available" badge (no animation).
function updatePoints() {
  const el = document.getElementById('points-value');
  if (el) el.textContent = String(S.points || 0);
}

// Animates the badge from its old total up to `newTotal`, floating a "+gained"
// chip and pulsing the badge. Drives off the server-confirmed total.
function animatePointsGain(newTotal, gained) {
  const valEl = document.getElementById('points-value');
  const badge = document.getElementById('points-available');
  const from = Number(S.points) || 0;
  S.points = newTotal;
  if (!valEl || !badge) { updatePoints(); return; }

  // Floating "+N" chip
  const float = document.createElement('div');
  float.className = 'points-float';
  float.textContent = '+' + gained;
  badge.appendChild(float);
  float.addEventListener('animationend', () => float.remove());

  // Glow/pulse on the badge
  badge.classList.remove('points-pulse');
  void badge.offsetWidth; // restart animation
  badge.classList.add('points-pulse');
  badge.addEventListener('animationend', () => badge.classList.remove('points-pulse'), { once: true });

  // Count-up tween from old -> new
  const start = performance.now();
  const dur = 600;
  function tick(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    valEl.textContent = String(Math.round(from + (newTotal - from) * eased));
    if (t < 1) requestAnimationFrame(tick);
    else valEl.textContent = String(newTotal);
  }
  requestAnimationFrame(tick);
}

async function refreshBalances() {
  try {
    const d = await api('GET', '/api/balances');
    S.balances = {};
    d.balances.forEach(b => { S.balances[b.token_symbol] = b.balance; });
    updateHeader();
  } catch {}
}

async function connectWallet() {
  const btn = document.getElementById('connect-wallet-btn');
  const status = document.getElementById('wallet-status');
  btn.disabled = true;
  btn.textContent = 'Connecting…';
  status.textContent = '';
  try {
    if (window.usernode && window.usernode.requestWalletLink) {
      await window.usernode.requestWalletLink();
    } else {
      status.textContent = 'Bridge not available — open inside Usernode.';
    }
  } catch (e) {
    status.textContent = e.message || 'Failed to connect wallet.';
  }
  btn.disabled = false;
  btn.textContent = 'Connect Wallet';
}
document.getElementById('connect-wallet-btn').addEventListener('click', connectWallet);

// ── Feed ──────────────────────────────────────────────────────────────────────
async function renderFeed(sec) {
  let feedState = { tab: 'global', posts: [], cursor: null, thread: null };

  const MILESTONE_LABELS = {
    debt_free:        'Paid off debt 💳',
    savings_goal:     'Hit my savings goal 🎯',
    investment_win:   'Investment win 📈',
    income_milestone: 'Income milestone 💼',
    emergency_fund:   'Emergency fund complete 🛡️',
    net_worth:        'Net worth milestone 💰',
    other_win:        'Other win 🏆',
  };

  // AI Trade Helper composer badge state (lives across re-renders).
  const tickerCache = {};        // TICKER -> price (number) or 'err'
  let tickerDebounce = null;     // pending debounce timer
  let lastTickerKey = '';        // last looked-up recognized-ticker set

  function renderTickerBadge(symbols) {
    const el = document.getElementById('compose-ticker-badge');
    if (!el) return;
    if (!symbols.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = 'flex';
    el.innerHTML = symbols.map(sym => {
      const v = tickerCache[sym];
      let body;
      if (v === undefined) body = '<span class="text-[#8b95ab]">…</span>';
      else if (v === 'err') body = '<span class="text-[#8b95ab]">price unavailable</span>';
      else body = `<span class="text-[#4e9af1] font-semibold">${fmtTickerPrice(v)}</span>`;
      return `<span class="inline-flex items-center gap-1 text-xs bg-[#161b2a] border border-[rgba(78,154,241,0.3)] rounded-full px-2 py-0.5">
        <span class="w-1.5 h-1.5 rounded-full bg-[#4e9af1]"></span>
        <span class="text-[#e8eaf0] font-medium">$${sym}</span>
        <span class="text-[#4e5872]">·</span>${body}</span>`;
    }).join('');
  }

  async function refreshTickers(symbols) {
    const need = symbols.filter(s => tickerCache[s] === undefined);
    renderTickerBadge(symbols);
    if (!need.length) return;
    try {
      const d = await api('GET', '/api/ticker-prices?symbols=' + encodeURIComponent(need.join(',')));
      for (const s of need) {
        const p = d.prices && d.prices[s];
        tickerCache[s] = (p != null) ? p : 'err';
      }
    } catch {
      for (const s of need) if (tickerCache[s] === undefined) tickerCache[s] = 'err';
    }
    // Re-render against the current composer text (user may have kept typing).
    const box = document.getElementById('compose-box');
    renderTickerBadge(detectTickers(box ? box.value : ''));
  }

  function onComposeInput() {
    const box = document.getElementById('compose-box');
    if (!box) return;
    const cnt = document.getElementById('compose-count');
    if (cnt) cnt.textContent = box.value.length + '/280';
    const symbols = detectTickers(box.value);
    const key = symbols.join(',');
    renderTickerBadge(symbols);
    if (key === lastTickerKey) return;
    lastTickerKey = key;
    if (tickerDebounce) clearTimeout(tickerDebounce);
    if (!symbols.length) return;
    tickerDebounce = setTimeout(() => refreshTickers(symbols), 500);
  }

  function resetComposerTicker() {
    if (tickerDebounce) { clearTimeout(tickerDebounce); tickerDebounce = null; }
    lastTickerKey = '';
    renderTickerBadge([]);
  }

  async function loadPosts() {
    const params = new URLSearchParams({ tab: feedState.tab, limit: 20 });
    if (feedState.cursor) params.set('cursor', feedState.cursor);
    const d = await api('GET', '/api/feed?' + params);
    feedState.posts = feedState.cursor ? [...feedState.posts, ...d.posts] : d.posts;
    feedState.cursor = d.nextCursor;
    render();
  }

  function postCard(p) {
    const isMilestone = !!p.milestone_type;
    const isBot = !!p.is_bot;
    const cheerCls = p.liked_by_me ? 'text-rose-400' : 'text-[#4e5872] hover:text-rose-400';
    const isLockedForMe = p.locked && !p.unlocked;
    const body = isLockedForMe
      ? `<div class="relative rounded-lg overflow-hidden">
           <p class="text-sm text-[#8b95ab] leading-relaxed select-none blur-sm pointer-events-none">Locked alpha — pay 5 TOK to reveal this premium post. Locked alpha — pay 5 TOK to reveal.</p>
           <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 text-center px-2" style="background: linear-gradient(to bottom, transparent, rgba(15,17,23,0.8));">
             <span class="text-xs font-semibold text-[#7c5cfc]">🔒 Pay 5 TOK to read alpha</span>
             <button class="btn btn-v text-xs px-3 py-1" onclick="unlockPost(${p.id})">Pay 5 TOK</button>
           </div>
         </div>`
      : `<p class="text-sm text-[#8b95ab] leading-relaxed">${esc(p.content)}</p>`;
    const milestoneBanner = isMilestone
      ? `<div class="milestone-banner text-xs font-semibold px-2 py-1 rounded bg-amber-900/40 text-amber-300 mb-1">${esc(MILESTONE_LABELS[p.milestone_type] || p.milestone_type)}</div>`
      : '';
    const sourcePill = isBot && p.bot_source
      ? `<span class="inline-flex items-center text-xs bg-[#161b2a] border border-[rgba(78,154,241,0.25)] rounded-full px-2 py-0.5 text-[#4e9af1] ml-1">${esc(p.bot_source)}</span>`
      : '';
    const readMoreLink = isBot && p.source_url
      ? `<a href="${esc(p.source_url)}" target="_blank" rel="noopener noreferrer" class="text-[#4e9af1] hover:text-[#7c5cfc] text-xs transition-colors">Read article →</a>`
      : '';
    const likeBtn = isMilestone
      ? `<button class="${cheerCls} flex items-center gap-1 text-xs transition-colors" onclick="likePost(${p.id})">🎉 ${p.like_count}</button>`
      : `<button class="${cheerCls} flex items-center gap-1 text-xs transition-colors" onclick="likePost(${p.id})">♥ ${p.like_count}</button>`;
    return `<div class="card space-y-2" data-post-id="${p.id}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2.5 min-w-0">
          <button class="shrink-0 leading-none" onclick="navigate('profile',{profileUser:'${esc(p.username)}'})" aria-label="@${esc(p.username)} profile">${avatarImg(p.username, 'post-avatar w-10 h-10', p.author_avatar_url)}</button>
          <div class="min-w-0">
            <button class="text-sm font-semibold text-[#e8eaf0] hover:text-[#7c5cfc] truncate" onclick="navigate('profile',{profileUser:'${esc(p.username)}'})">@${esc(p.username)}</button>
            ${isBot ? '<span class="text-xs ml-1" title="Automated news bot">🤖</span>' : ''}
            ${sourcePill}
            ${p.is_premium ? '<span class="tag-zk-verified ml-1">⊛</span>' : ''}
            ${p.locked ? '<span class="text-amber-400 text-xs ml-1" title="Premium locked post">🔒</span>' : ''}
            <span class="text-[#4e5872] text-xs ml-2">${tsAgo(p.created_at)}</span>
          </div>
        </div>
      </div>
      ${milestoneBanner}
      ${body}
      <div class="flex items-center gap-4">
        ${likeBtn}
        <button class="text-[#4e5872] hover:text-[#8b95ab] flex items-center gap-1 text-xs transition-colors" onclick="openThread(${p.id})">💬 ${p.reply_count}</button>
        ${readMoreLink}
        ${!isBot && S.user && p.user_id !== S.user.user_id ? `<button class="text-[#4e5872] hover:text-amber-400 text-xs transition-colors" onclick="openTipModal(${p.id}, '${esc(p.username)}')">💰 Tip</button>` : ''}
        ${!isBot && S.user && p.user_id !== S.user.user_id ? `<button class="text-[#4e5872] hover:text-[#7c5cfc] text-xs transition-colors" onclick="toggleFollow('${esc(p.username)}')">+ Follow</button>` : ''}
      </div>
    </div>`;
  }

  function threadView(post, replies) {
    return `<div class="space-y-3">
      <button class="text-sm text-[#8b95ab] hover:text-[#e8eaf0] flex items-center gap-1" onclick="backToFeed()">← Back to Feed</button>
      ${postCard(post)}
      <div class="ml-4 border-l border-[rgba(255,255,255,0.06)] pl-4 space-y-3">
        ${replies.map(r => postCard(r)).join('')}
        <div class="card">
          <textarea id="reply-box" class="inp" rows="2" placeholder="Write a reply…" maxlength="280"></textarea>
          <div class="flex justify-end mt-2">
            <button class="btn btn-v" onclick="submitReply(${post.id})">Reply</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  function render() {
    if (feedState.thread) return;
    const isNewsTab = feedState.tab === 'news';
    sec.innerHTML = `
      ${isNewsTab ? '' : `<div class="card space-y-2">
        <textarea id="compose-box" class="inp" rows="3" placeholder="What's on your mind?" maxlength="280"></textarea>
        <div id="compose-ticker-badge" class="flex flex-wrap gap-2" style="display:none"></div>
        <select id="compose-milestone" class="inp text-xs py-1">
          <option value="">— Just posting —</option>
          <option value="debt_free">Paid off debt 💳</option>
          <option value="savings_goal">Hit my savings goal 🎯</option>
          <option value="investment_win">Investment win 📈</option>
          <option value="income_milestone">Income milestone 💼</option>
          <option value="emergency_fund">Emergency fund complete 🛡️</option>
          <option value="net_worth">Net worth milestone 💰</option>
          <option value="other_win">Other win 🏆</option>
        </select>
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3">
            <span id="compose-count" class="text-xs text-[#4e5872]">0/280</span>
            <label class="flex items-center gap-1.5 text-xs text-[#8b95ab] cursor-pointer select-none" title="Lock this post behind a 5 TOK paywall">
              <input id="compose-lock" type="checkbox" class="accent-violet-600 w-3.5 h-3.5">
              <span>🔒 Lock Post</span>
            </label>
          </div>
          <button class="btn btn-v" onclick="submitPost()">Post</button>
        </div>
      </div>`}
      <div class="flex gap-2 border-b border-[rgba(255,255,255,0.06)] pb-3">
        <button class="text-sm px-4 py-1 font-medium transition-colors ${feedState.tab==='global'?'pill-active':'pill-inactive'}" onclick="switchTab('global')">Global</button>
        <button class="text-sm px-4 py-1 font-medium transition-colors ${feedState.tab==='following'?'pill-active':'pill-inactive'}" onclick="switchTab('following')">Following</button>
        <button class="text-sm px-4 py-1 font-medium transition-colors ${feedState.tab==='wins'?'pill-active':'pill-inactive'}" onclick="switchTab('wins')">Wins 🏆</button>
        <button class="text-sm px-4 py-1 font-medium transition-colors ${feedState.tab==='news'?'pill-active':'pill-inactive'}" onclick="switchTab('news')">News 📰</button>
      </div>
      <div id="feed-list" class="space-y-3">
        ${feedState.posts.length ? feedState.posts.map(postCard).join('') : '<p class="text-[#4e5872] text-sm text-center py-4">No posts yet</p>'}
      </div>
      ${feedState.cursor ? `<button class="btn btn-z w-full" onclick="loadMore()">Load more</button>` : ''}
    `;
    const box = document.getElementById('compose-box');
    if (box) {
      box.addEventListener('input', onComposeInput);
      // Restore any previously-detected ticker badge after a background re-render.
      renderTickerBadge(detectTickers(box.value));
    }
    window._feedFns = { loadPosts, postCard, threadView, feedState };
  }

  window.switchTab = (tab) => { feedState.tab = tab; feedState.cursor = null; loadPosts(); };
  window.loadMore = () => loadPosts();

  window.submitPost = async () => {
    const box = document.getElementById('compose-box');
    const content = box?.value.trim();
    if (!content) return;
    const locked = !!document.getElementById('compose-lock')?.checked;
    const milestoneEl = document.getElementById('compose-milestone');
    const milestone_type = milestoneEl?.value || undefined;
    try {
      const body = { content, locked };
      if (milestone_type) body.milestone_type = milestone_type;
      const res = await api('POST', '/api/posts', body);
      box.value = '';
      if (milestoneEl) milestoneEl.value = '';
      resetComposerTicker();
      feedState.cursor = null;
      await loadPosts();
      // Post-to-Earn: animate the confirmed points credit (server-driven).
      if (res && res.awarded > 0 && res.points != null) {
        animatePointsGain(Number(res.points), Number(res.awarded));
      }
    } catch (e) { alert(e.message); }
  };

  window.unlockPost = async (id) => {
    try {
      const { content } = await api('POST', `/api/posts/${id}/unlock`);
      const post = feedState.posts.find(p => p.id === id);
      if (post) { post.unlocked = true; post.content = content; }
      if (feedState.thread && feedState.thread.post.id === id) {
        feedState.thread.post.unlocked = true;
        feedState.thread.post.content = content;
        sec.innerHTML = threadView(feedState.thread.post, feedState.thread.replies);
      } else {
        render();
      }
    } catch (e) { alert(e.message); }
  };

  window.likePost = async (id) => {
    try {
      await api('POST', `/api/posts/${id}/like`);
      feedState.cursor = null;
      await loadPosts();
    } catch (e) { alert(e.message); }
  };

  window.openThread = async (id) => {
    sec.innerHTML = spin();
    try {
      const { post, replies } = await api('GET', `/api/posts/${id}`);
      feedState.thread = { post, replies };
      sec.innerHTML = threadView(post, replies);
    } catch (e) { sec.innerHTML = err(e.message); }
  };

  window.backToFeed = () => { feedState.thread = null; render(); };

  window.submitReply = async (parentId) => {
    const content = document.getElementById('reply-box')?.value.trim();
    if (!content) return;
    try {
      await api('POST', '/api/posts', { content, parent_id: parentId });
      await window.openThread(parentId);
    } catch (e) { alert(e.message); }
  };

  window.toggleFollow = async (username) => {
    try {
      await api('POST', '/api/follow', { username });
      await loadPosts();
    } catch (e) { alert(e.message); }
  };

  await loadPosts();
}

// ── Tip Modal ──────────────────────────────────────────────────────────────────
let tipState = { postId: null, creatorUsername: null };

window.openTipModal = (postId, creatorUsername) => {
  tipState.postId = postId;
  tipState.creatorUsername = creatorUsername;
  const modal = document.getElementById('tip-modal');
  const title = document.getElementById('tip-modal-title');
  const balance = document.getElementById('tip-balance');
  const amountInput = document.getElementById('tip-amount');
  const errorDiv = document.getElementById('tip-error');

  title.textContent = `Send BLOOM to @${esc(creatorUsername)}`;
  const bloomTipBal = S.balances['BLOOM'] || 0;
  balance.textContent = `${fmtAmt('BLOOM', bloomTipBal)} BLOOM`;
  amountInput.value = '';
  errorDiv.classList.add('hidden');
  errorDiv.textContent = '';

  modal.classList.remove('hidden');
  amountInput.focus();
};

window.closeTipModal = () => {
  const modal = document.getElementById('tip-modal');
  modal.classList.add('hidden');
  tipState = { postId: null, creatorUsername: null };
};

window.submitTip = async () => {
  const amountInput = document.getElementById('tip-amount');
  const errorDiv = document.getElementById('tip-error');
  const amount = parseFloat(amountInput.value);

  errorDiv.classList.add('hidden');
  errorDiv.textContent = '';

  if (!amount || amount <= 0) {
    errorDiv.textContent = 'Please enter an amount greater than 0';
    errorDiv.classList.remove('hidden');
    return;
  }

  const bloomTipBal = S.balances['BLOOM'] || 0;
  const amountUnits = toUnits(amount.toString());
  if (amountUnits > bloomTipBal) {
    errorDiv.textContent = 'Insufficient BLOOM balance';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    const submitBtn = document.getElementById('tip-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    await api('POST', `/api/posts/${tipState.postId}/tip`, { amount: amount.toString() });

    closeTipModal();
    await refreshBalances();
    await window._feedFns.loadPosts();

    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
  } catch (e) {
    errorDiv.textContent = e.message || 'Failed to send tip';
    errorDiv.classList.remove('hidden');
    const submitBtn = document.getElementById('tip-submit-btn');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
  }
};

async function renderProfile(sec) {
  const username = S.profileUser || S.user?.username;

  const [profile, roiData] = await Promise.all([
    api('GET', `/api/profile/${encodeURIComponent(username)}`),

  ]);
  const { user, counts, kyc, isFollowing } = profile;
  const isMe = S.user && user.user_id === S.user.user_id;

  let activeTab = 'posts';
  let editMode = false;

  async function renderNFTTab() {

    return nfts.length
      ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${nfts.map(n => nftCard(n, { onclick: `navigate('nfts');setTimeout(()=>window._nftNav&&window._nftNav('detail',${n.id}),50)` })).join('')}</div>`

  async function renderPostTab(parent = null) {

    return userPosts.length

          <p class="text-sm ${p.locked && !p.unlocked ? 'text-[#8b95ab] italic' : 'text-[#e8eaf0]'}">${p.locked && !p.unlocked ? 'Locked alpha — open the feed to pay 5 TOK and read.' : esc(p.content)}</p>
          <div class="flex gap-3 text-xs text-[#8b95ab]"><span>♥ ${p.like_count}</span><span>💬 ${p.reply_count}</span></div>
        </div>`).join('')
      : '<p class="text-[#4e5872] text-sm">No posts yet</p>';
  }

  async function renderPortfolioTab() {
    const PTOK = {
      BTC:   { color: '#f59e0b', bg: 'bg-amber-400/10',    text: 'text-amber-400'   },
      ETH:   { color: '#38bdf8', bg: 'bg-sky-400/10',      text: 'text-sky-400'     },
      SOL:   { color: '#a855f7', bg: 'bg-purple-500/10',   text: 'text-purple-400'  },
      DOGE:  { color: '#eab308', bg: 'bg-yellow-400/10',   text: 'text-yellow-400'  },
      ADA:   { color: '#3b82f6', bg: 'bg-blue-500/10',     text: 'text-blue-400'    },
      LINK:  { color: '#60a5fa', bg: 'bg-blue-300/10',     text: 'text-blue-300'    },
      DOT:   { color: '#ec4899', bg: 'bg-pink-500/10',     text: 'text-pink-400'    },
      AVAX:  { color: '#ef4444', bg: 'bg-red-500/10',      text: 'text-red-400'     },
      BLOOM: { color: '#7c5cfc', bg: 'bg-[#7c5cfc]/10',   text: 'text-[#7c5cfc]'  },
      USDC:  { color: '#10b981', bg: 'bg-emerald-400/10',  text: 'text-emerald-400' },
    };

    function pSparkline(hist, color) {
      if (!hist || hist.length < 2) {
        return `<svg viewBox="0 0 60 24" width="60" height="24"><line x1="0" y1="12" x2="60" y2="12" stroke="${color}" stroke-width="1.5" stroke-opacity="0.4"/></svg>`;
      }
      const ps = hist.map(h => parseFloat(h.price_usd));
      const mn = Math.min(...ps), mx = Math.max(...ps);
      const rng = Math.max(mx - mn, 0.000001);
      const xStep = 60 / (ps.length - 1);
      const pts = ps.map((p, i) => `${(i*xStep).toFixed(1)},${(22-((p-mn)/rng)*20).toFixed(1)}`).join(' ');
      return `<svg viewBox="0 0 60 24" width="60" height="24"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
    }

    function fmtLivePrice(p) {
      if (p == null) return '—';
      if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (p >= 1)    return '$' + p.toFixed(2);
      return '$' + p.toFixed(4);
    }

    function fmtQty(qty) {
      return qty < 1 ? qty.toFixed(6) : qty < 10 ? qty.toFixed(4) : qty.toFixed(2);
    }

    // Fetch portfolio data and chart data in parallel
    const [portData, initChart] = await Promise.all([
      fetch(`/explorer-api/portfolio/${encodeURIComponent(username)}`).then(r => r.json()),
      isMe ? api('GET', '/api/portfolio/chart?range=1d').catch(() => ({ points: [], range: '1d' })) : Promise.resolve({ points: [], range: '1d' }),
    ]);

    const holdings = portData.holdings || [];
    const prices   = portData.prices   || {};

    // Fetch 24h sparkline history for all held tickers in parallel
    const tickers = [...new Set(holdings.map(h => h.ticker?.toUpperCase()).filter(Boolean))];
    const sparkData = {};
    if (tickers.length) {
      const results = await Promise.all(
        tickers.map(sym => api('GET', `/api/price-history?symbol=${sym}&hours=24`).catch(() => ({ history: [] })))
      );
      tickers.forEach((sym, i) => { sparkData[sym] = results[i].history || []; });
    }

    // Compute total value and chart delta
    let totalValue = 0;
    for (const h of holdings) {
      const p = prices[h.ticker?.toUpperCase()] ?? null;
      if (p != null) totalValue += parseFloat(h.quantity) * p;
    }

    let chartRange = '1d';
    let chartPoints = initChart.points || [];

    function computeDelta(pts) {
      if (!pts || pts.length < 2) return null;
      const first = pts[0].value, last = pts[pts.length - 1].value;
      return { delta: last - first, pct: first > 0 ? ((last - first) / first * 100) : 0 };
    }

    function heroHtml(pts) {
      const d = computeDelta(pts);
      const rangeLabel = chartRange === '1m' ? '30d' : chartRange === '1w' ? '7d' : '24h';
      const deltaHtml = d ? `<div class="text-sm font-medium mt-1 ${d.delta >= 0 ? 'text-emerald-400' : 'text-red-400'}">
        ${d.delta >= 0 ? '+' : ''}$${Math.abs(d.delta).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
        &nbsp;(${d.delta >= 0 ? '+' : ''}${d.pct.toFixed(2)}%)
        <span class="text-[#4e5872] font-normal">${rangeLabel}</span>
      </div>` : '';
      return `<div class="portfolio-hero" id="ptab-hero">
        <div class="text-xs text-[#8b95ab] uppercase tracking-widest mb-1">Total Portfolio Value</div>
        <div class="text-4xl font-bold text-[#e8eaf0] tracking-tight">$${totalValue.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        ${deltaHtml}
      </div>`;
    }

    function areaChartHtml(pts) {
      const W = 480, H = 160, color = '#7c5cfc';
      const pad = { t: 10, r: 8, b: 28, l: 8 };
      const IW = W - pad.l - pad.r, IH = H - pad.t - pad.b;
      if (!pts || pts.length < 2) {
        return `<svg viewBox="0 0 ${W} ${H}" width="100%" class="rounded-xl"><rect width="${W}" height="${H}" fill="#0d1021" rx="12"/><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#4e5872" font-size="11" font-family="sans-serif">Not enough history yet</text></svg>`;
      }
      const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
      const xMin = Math.min(...xs), xMax = Math.max(...xs);
      let yMin = Math.min(...ys), yMax = Math.max(...ys);
      const yRng = yMax - yMin;
      yMin -= yRng * 0.08; yMax += yRng * 0.08;
      if (yMax - yMin < 0.01) { yMin -= 1; yMax += 1; }
      const xS = x => pad.l + (xMax === xMin ? IW/2 : (x-xMin)/(xMax-xMin)*IW);
      const yS = y => pad.t + IH - ((y-yMin)/(yMax-yMin))*IH;
      const linePts = pts.map(p => `${xS(p.x).toFixed(1)},${yS(p.y).toFixed(1)}`).join(' ');
      const areaPts = `${linePts} ${xS(xs[xs.length-1]).toFixed(1)},${(pad.t+IH).toFixed(1)} ${xS(xs[0]).toFixed(1)},${(pad.t+IH).toFixed(1)}`;
      const fmtTs = ts => { const d = new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
      const fmtV  = v  => v >= 10000 ? '$'+(v/1000).toFixed(1)+'k' : '$'+v.toFixed(0);
      return `<svg viewBox="0 0 ${W} ${H}" width="100%" class="rounded-xl">
        <defs>
          <linearGradient id="ptabGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${color}" stop-opacity="0.25"/>
            <stop offset="85%" stop-color="${color}" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <rect width="${W}" height="${H}" fill="#0d1021" rx="12"/>
        <polygon points="${areaPts}" fill="url(#ptabGrad)"/>
        <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${xS(xs[xs.length-1]).toFixed(1)}" cy="${yS(ys[ys.length-1]).toFixed(1)}" r="3.5" fill="${color}"/>
        <text x="${pad.l+2}" y="${pad.t+IH+18}" fill="#4e5872" font-size="9" font-family="sans-serif">${fmtTs(xs[0])}</text>
        <text x="${pad.l+IW-2}" y="${pad.t+IH+18}" fill="#4e5872" font-size="9" font-family="sans-serif" text-anchor="end">${fmtTs(xs[xs.length-1])}</text>
        <text x="${pad.l+2}" y="${pad.t+12}" fill="#4e5872" font-size="9" font-family="sans-serif">${fmtV(yMax)}</text>
        <text x="${pad.l+2}" y="${pad.t+IH-2}" fill="#4e5872" font-size="9" font-family="sans-serif">${fmtV(yMin)}</text>
      </svg>`;
    }

    function chartSectionHtml(pts) {
      if (!isMe) return '';
      const cpts = (pts || []).map(p => ({ x: new Date(p.ts).getTime(), y: p.value }));
      return `<div id="ptab-chart-section" class="space-y-2">
        <div class="flex gap-1.5 items-center">
          ${['1d','1w','1m'].map(r => `<button id="ptab-rng-${r}" onclick="window.portfolioSetRange('${r}')"
            class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${r === chartRange ? 'pill-active' : 'pill-inactive'}">${r.toUpperCase()}</button>`).join('')}
        </div>
        <div id="ptab-chart">${areaChartHtml(cpts)}</div>
      </div>`;
    }

    function tokenRowHtml(h) {
      const sym = h.ticker?.toUpperCase();
      const meta = PTOK[sym] || { color: '#8b95ab', bg: 'bg-[#1c2236]', text: 'text-[#8b95ab]' };
      const qty = parseFloat(h.quantity);
      const live = prices[sym] ?? null;
      const val = live != null ? qty * live : null;
      const hist = sparkData[sym] || [];
      const ch24 = hist.length >= 2
        ? ((parseFloat(hist[hist.length-1].price_usd) - parseFloat(hist[0].price_usd)) / parseFloat(hist[0].price_usd) * 100)
        : null;
      const tradeable = ['ETH','BTC','BLOOM','USDC'].includes(sym);
      return `<div class="flex items-center gap-3 py-3 px-1 border-b border-[rgba(255,255,255,0.04)] last:border-0 ${tradeable ? 'cursor-pointer hover:bg-[#1c2236]/40 rounded transition-colors' : ''}"
               ${tradeable ? `onclick="window.openTokenDetail('${sym}')"` : ''}>
        <div class="w-9 h-9 rounded-full flex items-center justify-center shrink-0 text-xs font-bold ${meta.bg} ${meta.text}">${sym || '?'}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-[#e8eaf0] truncate">${esc(h.asset_name)}</div>
          <div class="text-xs text-[#8b95ab]">${sym || ''}</div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-semibold">${fmtLivePrice(live)}</div>
          <div class="text-xs font-medium ${ch24 == null ? 'text-[#8b95ab]' : ch24 >= 0 ? 'text-emerald-400' : 'text-red-400'}">
            ${ch24 == null ? '—' : (ch24 >= 0 ? '+' : '') + ch24.toFixed(2) + '%'}
          </div>
        </div>
        <div class="text-right shrink-0 min-w-[4.5rem] hidden sm:block">
          <div class="text-xs text-[#8b95ab]">${fmtQty(qty)} ${sym || ''}</div>
          <div class="text-sm font-semibold">${val != null ? '$'+val.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</div>
        </div>
        <div class="shrink-0">${pSparkline(hist, meta.color)}</div>
      </div>`;
    }

    function tokensHtml() {
      if (!holdings.length) {
        return `<div class="text-center py-10 text-[#4e5872] text-sm">Your holdings will appear here once you make your first trade.</div>`;
      }
      return `<div>${holdings.map(tokenRowHtml).join('')}</div>`;
    }

    const html = `<div class="md:flex md:gap-6 space-y-5 md:space-y-0">
      <div class="md:w-[55%] space-y-4">
        ${heroHtml(chartPoints)}
        ${chartSectionHtml(chartPoints)}
      </div>
      <div class="md:w-[45%]">
        <div class="flex gap-2 mb-4">
          <button id="ptab-sub-tokens"   onclick="window.portfolioSwitchSubTab('tokens')"   class="text-sm px-4 py-1 font-medium transition-colors pill-active">Tokens</button>

      } else if (start.oauth_url) {
        const popup = window.open(start.oauth_url, '_blank', 'width=600,height=700,noopener');
        const handler = async (e) => {
          if (!e.data || e.data.type !== 'oauth_callback') return;
          window.removeEventListener('message', handler);
          if (popup && !popup.closed) popup.close();
          const { code, state: cbState, error: cbError, provider: cbProv } = e.data;
          if (cbError) return alert('OAuth error: ' + cbError);
          try {
            await api('POST', '/api/social/link/complete', { provider: cbProv || provider, code, state: cbState });
            S.social_accounts = (await api('GET', '/api/social/accounts')).accounts;

        window.addEventListener('message', handler);

    const file = input.files && input.files[0];
    if (!file) return;
    if (file.size > 1024 * 1024) { alert('Image must be under 1 MB'); input.value = ''; return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = async () => {
        const SIZE = 200;
        const canvas = document.createElement('canvas');
        canvas.width = SIZE;
        canvas.height = SIZE;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(SIZE / img.width, SIZE / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (SIZE - w) / 2, (SIZE - h) / 2, w, h);
        const dataUri = canvas.toDataURL('image/jpeg', 0.80);
        try {
          await api('PATCH', '/api/me', { avatar_url: dataUri });
          user.avatar_url = dataUri;
          if (S.user && S.user.user_id === user.user_id) S.user.avatar_url = dataUri;
          await fullRender();
        } catch (e) { alert(e.message); }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

      await api('POST', following ? '/api/unfollow' : '/api/follow', { username: uname });

  };

  await fullRender();
}

                      style="background:#0d1021;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 8px;color:#e8eaf0;font-size:13px;width:76px;outline:none;">
                    <button onclick="swapSetSlippage()" style="flex:1;background:linear-gradient(135deg,#7c5cfc,#4e9af1);color:#fff;font-weight:700;font-size:12px;padding:7px 0;border-radius:8px;border:none;cursor:pointer;">Set</button>
                  </div>
                </div>` : ''}
            </div>
          </div>

          <!-- From label + quick-select -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;">
            <span style="font-size:12px;color:#4e5872;font-weight:500;">From</span>
            <div style="display:flex;gap:5px;">
              ${['25%','50%','75%','Max'].map(p => `<button onclick="swapQuickSelect('${p}')" style="font-size:11px;color:#4e5872;padding:2px 7px;background:#1c2236;border:1px solid rgba(255,255,255,0.06);border-radius:9999px;cursor:pointer;transition:color .15s;" onmouseover="this.style.color='#8b95ab'" onmouseout="this.style.color='#4e5872'">${p}</button>`).join('')}
            </div>
          </div>

          <!-- From card -->
          <div id="swap-from-card" style="background:#161b2a;border-radius:18px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0;border:1px solid rgba(255,255,255,0.06);">
            <div style="display:flex;align-items:center;gap:10px;">
              ${tokenBadge(swapState.from)}
              <div style="display:flex;align-items:center;gap:2px;cursor:pointer;">
                <select id="swap-from-sel" onchange="swapFromChange(this.value)"
                  style="background:transparent;border:none;color:#fff;font-weight:600;font-size:15px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:2px;min-width:48px;">
                  ${tokens.map(t=>`<option value="${t}" ${t===swapState.from?'selected':''} style="background:#161b2a;">${t}</option>`).join('')}
                </select>
                ${svgChevron}
              </div>
            </div>
            <div style="text-align:right;flex:1;margin-left:8px;">
              <input id="swap-amt-inp" type="number" value="${swapState.fromAmt}" placeholder="0.00" min="0"
                oninput="swapAmtChange(this.value)"
                style="background:transparent;border:none;color:#e8eaf0;font-size:22px;font-weight:700;text-align:right;width:100%;outline:none;display:block;">
              <div style="font-size:11px;color:#4e5872;margin-top:3px;">Balance: ${fromBal}</div>
            </div>
          </div>

          <!-- Floating switch button -->
          <div style="display:flex;justify-content:center;position:relative;z-index:2;margin:-1px 0;">
            <button id="swap-flip-btn" onclick="swapFlipTokens()"
              style="width:38px;height:38px;border-radius:50%;background:#1c2236;border:3px solid #0f1117;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,background .15s;"
              onmouseover="this.style.background='#232c42'" onmouseout="this.style.background='#1c2236'">
              ${svgSwapArrows}
            </button>
          </div>

          <!-- To card -->
          <div id="swap-to-card" style="background:#161b2a;border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <div style="display:flex;align-items:center;gap:10px;">
              ${tokenBadge(swapState.to)}
              <div style="display:flex;align-items:center;gap:2px;cursor:pointer;">
                <select id="swap-to-sel" onchange="swapToChange(this.value)"
                  style="background:transparent;border:none;color:#e8eaf0;font-weight:600;font-size:15px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:2px;min-width:48px;">
                  ${tokens.map(t=>`<option value="${t}" ${t===swapState.to?'selected':''} style="background:#161b2a;">${t}</option>`).join('')}
                </select>
                ${svgChevron}
              </div>
            </div>
            <div style="text-align:right;flex:1;margin-left:8px;">
              <div style="color:${toAmt?'#e8eaf0':'#4e5872'};font-size:22px;font-weight:700;">${toAmt || '0.00'}</div>
              <div style="font-size:11px;color:#4e5872;margin-top:3px;">Balance: ${toBal}</div>
            </div>
          </div>

          <!-- Transaction breakdown -->
          <div style="background:#161b2a;border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:14px 16px;margin-bottom:14px;display:flex;flex-direction:column;gap:11px;">
            ${breakdownRows.map(row => `
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:4px;">
                  <span style="font-size:12px;color:#8b95ab;">${row.label}</span>
                  ${row.info ? svgInfo : ''}
                </div>
                ${row.raw
                  ? `<span style="font-size:12px;font-weight:500;">${row.value}</span>`
                  : `<span style="font-size:12px;color:#e8eaf0;font-weight:500;">${row.value}</span>`}
              </div>`).join('')}
          </div>

          <!-- Feedback message -->
          <div id="swap-msg" style="font-size:12px;text-align:center;min-height:16px;margin-bottom:6px;"></div>

          <!-- CTA -->
          <button onclick="execSwap()"
            style="width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,#7c5cfc,#4e9af1);color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.01em;margin-bottom:18px;transition:opacity .15s;"
            onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
            Create swap →
          </button>

      </div>`;
  }

  try {
    const d = await api('GET', '/api/prices');
    d.prices.forEach(p => { S.prices[p.symbol] = parseFloat(p.price_usd); });
  } catch {}

  window.swapFromChange = (v) => {
    swapState.from = v;
    if (swapState.from === swapState.to) swapState.to = tokens.find(t => t !== swapState.from);
    render();
  };
  window.swapToChange = (v) => {
    swapState.to = v;
    if (swapState.to === swapState.from) swapState.from = tokens.find(t => t !== swapState.to);
    render();
  };
  window.swapAmtChange = (v) => { swapState.fromAmt = v; render(); };

  window.swapQuickSelect = (pct) => {
    const balNum = parseFloat(S.balances[swapState.from] || 0) / 1_000_000;
    swapState.fromAmt = pct === 'Max'
      ? String(balNum)
      : String(parseFloat((balNum * parseInt(pct) / 100).toFixed(8)));
    render();
  };

  window.swapToggleSlippage = () => {
    swapState.showSlippagePopover = !swapState.showSlippagePopover;
    render();
  };
  window.swapSetSlippage = () => {
    const inp = document.getElementById('slippage-inp');
    if (inp) { const v = parseFloat(inp.value); if (v > 0 && v <= 50) swapState.slippage = v; }
    swapState.showSlippagePopover = false;
    render();
  };

  window.swapFlipTokens = () => {
    if (swapState.flipping) return;
    swapState.flipping = true;
    const fromCard = document.getElementById('swap-from-card');
    const toCard   = document.getElementById('swap-to-card');
    if (fromCard) fromCard.classList.add('swap-flip-down');
    if (toCard)   toCard.classList.add('swap-flip-up');
    setTimeout(() => {
      const prevToAmt = calcToAmt();
      [swapState.from, swapState.to] = [swapState.to, swapState.from];
      if (prevToAmt) swapState.fromAmt = prevToAmt;
      swapState.flipping = false;
      render();
    }, 150);
  };

  window.execSwap = async () => {
    const msg = document.getElementById('swap-msg');
    if (!msg) return;
    try {
      const d = await api('POST', '/api/defi/swap', { from_token: swapState.from, to_token: swapState.to, from_amount: swapState.fromAmt });
      msg.style.color = '#34d399';
      msg.textContent = `✓ Received ${d.to_amount.toFixed(6)} ${d.to_token}`;
      await refreshBalances();
      swapState.fromAmt = '';
      setTimeout(() => { msg.textContent = ''; render(); }, 2000);
    } catch (e) {
      if (msg) { msg.style.color = '#f87171'; msg.textContent = e.message; }
    }
  };

  render();

  // ── Markets list ──────────────────────────────────────────────────────────
  const mwrap = document.getElementById('swap-markets-wrap');
  if (!mwrap) return;

  const TOKEN_META = {
    BTC:   { name: 'Bitcoin',    color: 'rgb(251,191,36)',  badgeBg: 'bg-amber-400/10',   badgeText: 'text-amber-400',   desc: 'The original decentralised digital currency with a fixed supply of 21 million coins.' },
    ETH:   { name: 'Ethereum',   color: 'rgb(56,189,248)',  badgeBg: 'bg-sky-400/10',     badgeText: 'text-sky-400',     desc: 'The programmable blockchain powering smart contracts and DeFi.' },
    BNB:   { name: 'BNB',        color: 'rgb(243,186,47)',  badgeBg: 'bg-yellow-400/10',  badgeText: 'text-yellow-400',  desc: 'The native token of BNB Chain, used for gas fees and the Binance ecosystem.' },
    SOL:   { name: 'Solana',     color: 'rgb(153,69,255)',  badgeBg: 'bg-purple-500/10',  badgeText: 'text-purple-400',  desc: 'A high-performance blockchain built for fast, low-cost decentralised applications.' },
    XRP:   { name: 'XRP',        color: 'rgb(0,149,207)',   badgeBg: 'bg-cyan-500/10',    badgeText: 'text-cyan-400',    desc: 'Digital asset designed for fast, low-cost cross-border payments.' },
    USDT:  { name: 'Tether',     color: 'rgb(38,161,123)',  badgeBg: 'bg-teal-500/10',    badgeText: 'text-teal-400',    desc: 'The world\'s largest stablecoin, pegged 1:1 to the US dollar.' },
    ADA:   { name: 'Cardano',    color: 'rgb(0,140,255)',   badgeBg: 'bg-blue-500/10',    badgeText: 'text-blue-400',    desc: 'A proof-of-stake blockchain platform built on peer-reviewed research.' },
    DOGE:  { name: 'Dogecoin',   color: 'rgb(203,155,31)',  badgeBg: 'bg-yellow-600/10',  badgeText: 'text-yellow-500',  desc: 'The original meme coin, now widely used for tipping and payments.' },
    TON:   { name: 'Toncoin',    color: 'rgb(0,136,204)',   badgeBg: 'bg-sky-600/10',     badgeText: 'text-sky-400',     desc: 'The fast, scalable blockchain powering the Telegram ecosystem.' },
    BLOOM: { name: 'BloomMoney', color: 'rgb(167,139,250)', badgeBg: 'bg-[#7c5cfc]/10',  badgeText: 'text-[#7c5cfc]',  desc: 'BloomMoney\'s native token used for rewards, governance, and platform fees.' },
    USDC:  { name: 'USD Coin',   color: 'rgb(52,211,153)',  badgeBg: 'bg-emerald-400/10', badgeText: 'text-emerald-400', desc: 'A dollar-pegged stablecoin issued by Circle, redeemable 1:1 for USD.' },
  };
  const MARKET_ORDER = ['BTC', 'ETH', 'BNB', 'SOL', 'XRP', 'USDT', 'ADA', 'DOGE', 'TON', 'BLOOM', 'USDC'];

  let marketTab = 'most_active';
  let marketStats = {};

  // Fetch price histories and market stats in parallel
  let histories = {};
  try {
    const [histResults, statsData] = await Promise.all([
      Promise.all(MARKET_ORDER.map(sym => api('GET', `/api/price-history?symbol=${sym}&hours=24`).catch(() => ({ history: [] })))),
      api('GET', '/api/trade/market-stats').catch(() => ({ stats: [] })),
    ]);
    MARKET_ORDER.forEach((sym, i) => { histories[sym] = (histResults[i] && histResults[i].history) || []; });
    (statsData.stats || []).forEach(s => { marketStats[s.symbol] = s.swap_count; });
  } catch {}

  function buildSparkline(hist, color) {
    if (!hist || hist.length < 2) {
      return `<svg viewBox="0 0 60 24" width="60" height="24"><line x1="0" y1="12" x2="60" y2="12" stroke="${color}" stroke-width="1.5"/></svg>`;
    }
    const prices = hist.map(h => parseFloat(h.price_usd));
    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const range = Math.max(max - min, 0.000001);
    const xStep = 60 / (prices.length - 1);
    const pts = prices.map((p, i) =>
      `${(i * xStep).toFixed(1)},${(22 - ((p - min) / range) * 20).toFixed(1)}`
    ).join(' ');
    return `<svg viewBox="0 0 60 24" width="60" height="24"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  }

  function computeChange(hist) {
    if (!hist || hist.length < 2) return null;
    const first = parseFloat(hist[0].price_usd);
    const last  = parseFloat(hist[hist.length - 1].price_usd);
    return ((last - first) / first) * 100;
  }

  function fmtMarketPrice(sym) {
    const p = S.prices[sym];
    if (p == null) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(2);
    return '$' + p.toFixed(4);
  }

  function getSortedSymbols(tab) {
    const syms = [...MARKET_ORDER];
    if (tab === 'most_active') {
      syms.sort((a, b) => (marketStats[b] || 0) - (marketStats[a] || 0));
    } else if (tab === 'top_gainer') {
      syms.sort((a, b) => {
        const ca = computeChange(histories[a]);
        const cb = computeChange(histories[b]);
        if (ca === null && cb === null) return 0;
        if (ca === null) return 1;
        if (cb === null) return -1;
        return cb - ca;
      });
    } else if (tab === 'top_loser') {
      syms.sort((a, b) => {
        const ca = computeChange(histories[a]);
        const cb = computeChange(histories[b]);
        if (ca === null && cb === null) return 0;
        if (ca === null) return 1;
        if (cb === null) return -1;
        return ca - cb;
      });
    }
    return syms;
  }

  function renderMarketRows(tab) {
    const rowsEl = document.getElementById('swap-market-rows');
    if (!rowsEl) return;
    const tabBtns = { most_active: 'mkt-tab-most-active', top_gainer: 'mkt-tab-top-gainer', top_loser: 'mkt-tab-top-loser' };
    Object.entries(tabBtns).forEach(([t, id]) => {
      const btn = document.getElementById(id);
      if (btn) btn.className = `text-sm px-3 py-1 font-medium transition-colors ${tab === t ? 'pill-active' : 'pill-inactive'}`;
    });
    const sorted = getSortedSymbols(tab);
    rowsEl.innerHTML = sorted.map(sym => {
      const meta = TOKEN_META[sym];
      const hist = histories[sym];
      const change = computeChange(hist);
      const changeStr = change === null ? '—' :
        (change >= 0 ? `+${change.toFixed(1)}%` : `${change.toFixed(1)}%`);
      const changeClass = change === null ? 'text-[#8b95ab]' :
        change > 0.05 ? 'text-emerald-400' : change < -0.05 ? 'text-red-400' : 'text-[#8b95ab]';
      const sparkline = buildSparkline(hist, meta.color);
      return `
        <div class="token-market-row card flex items-center gap-3 cursor-pointer hover:bg-[#1c2236]/60 transition-colors py-3"
             onclick="openTokenDetail('${sym}')">
          <div class="w-9 h-9 rounded-full flex items-center justify-center ${meta.badgeBg} ${meta.badgeText} text-xs font-bold shrink-0">${sym}</div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-semibold">${sym}</div>
            <div class="text-xs text-[#8b95ab] truncate">${meta.name}</div>
          </div>
          <div class="text-right shrink-0">
            <div class="text-sm font-semibold">${fmtMarketPrice(sym)}</div>
            <div class="text-xs font-medium ${changeClass}">${changeStr}</div>
          </div>
          <div class="shrink-0">${sparkline}</div>
        </div>`;
    }).join('');
  }

  window.setMarketTab = (tab) => {
    marketTab = tab;
    renderMarketRows(tab);
  };

  mwrap.innerHTML = `
    <div class="flex items-center justify-between mt-6 mb-2">
      <h3 class="font-semibold text-[#e8eaf0]">Markets</h3>
      <div class="flex gap-2">
        <button id="mkt-tab-most-active" class="text-sm px-3 py-1 font-medium transition-colors pill-active" onclick="setMarketTab('most_active')">Most Active</button>
        <button id="mkt-tab-top-gainer"  class="text-sm px-3 py-1 font-medium transition-colors pill-inactive" onclick="setMarketTab('top_gainer')">Top Gainer</button>
        <button id="mkt-tab-top-loser"   class="text-sm px-3 py-1 font-medium transition-colors pill-inactive" onclick="setMarketTab('top_loser')">Top Loser</button>
      </div>
    </div>
    <div id="swap-market-rows" class="space-y-2"></div>`;

  renderMarketRows(marketTab);
}
