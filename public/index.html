  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let _activeInterval = null;
const S = {
  token: new URLSearchParams(location.search).get('token') || '',
  user: null,
  balances: {},
  kyc: null,
  view: 'home',
  prices: {},
  marketId: null,
  tradeToken: null,
  profileUser: null,
  futuresMode: 'paper',
  futuresMarket: null,
  social_accounts: [],
  points: 0,
};

// ── Token refresh via bridge postMessage ───────────────────────────────────────
window.addEventListener('message', (e) => {
  if (e.data && typeof e.data === 'object') {
    const t = e.data.token || e.data.jwt;
    if (t && typeof t === 'string' && t.length > 20) {
      S.token = t;
      init();
    }
  }
});

// ── API ────────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const h = { 'Content-Type': 'application/json' };
  if (S.token) h['x-usernode-token'] = S.token;
  const opts = { method, headers: h };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Helpers ────────────────────────────────────────────────────────────────────
const U = 1_000_000;
function fmtAmt(sym, v) {
  const n = Number(v) / U;
  if (sym === 'ETH') return n.toFixed(6);
  if (sym === 'BTC') return n.toFixed(8);
  return n.toFixed(2);
}
function fmtUSD(v) { return (Number(v) / U).toFixed(2); }
// AI Trade Helper: client-side mirror of server COINGECKO_TICKER_MAP keys.
const KNOWN_TICKERS = new Set(['BTC','ETH','SOL','DOGE','ADA','LINK','DOT','AVAX']);
const TICKER_RE = /\$([A-Za-z]{2,6})\b/g;
function detectTickers(text) {
  const seen = [];
  let m;
  TICKER_RE.lastIndex = 0;
  while ((m = TICKER_RE.exec(text || '')) !== null) {
    const sym = m[1].toUpperCase();
    if (KNOWN_TICKERS.has(sym) && !seen.includes(sym)) seen.push(sym);
    if (seen.length >= 3) break;
  }
  return seen;
}
function fmtTickerPrice(v) {
  const n = Number(v);
  if (!isFinite(n)) return '';
  if (n >= 1) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return '$' + n.toFixed(4);
}
function getBal(sym) { return fmtAmt(sym, S.balances[sym] || 0); }
function shortAddr(a) { return a ? a.slice(0,6)+'…'+a.slice(-4) : ''; }
function tsAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return Math.floor(s)+'s';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}
function tierLabel(lvl) {
  return { basic: 'Basic', social: 'Social ✓', premium: 'Premium ★' }[lvl] || (lvl || 'Basic');
}
function kycTag(lvl) {
  if (!lvl) return '';
  return `<span class="tag-${lvl}">${tierLabel(lvl)}</span>`;
}
function fundingCountdown(ts) {
  const ms = new Date(ts) - Date.now();
  if (ms <= 0) return 'due';
  const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
  if (m >= 60) return Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
  return m + 'm ' + s + 's';
}
function err(msg) { return `<div class="text-red-400 text-sm py-2">${msg}</div>`; }
function spin() { return `<div class="flex justify-center py-8"><div class="spinner"></div></div>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Avatar placeholder ─────────────────────────────────────────────────────────
// Deterministic, stylish initials avatar rendered as an inline SVG data-URI image.
// Same username always yields the same gradient, so avatars stay consistent across
// the feed, threads, and profiles without any upload flow.
function _avatarHash(str) {
  let h = 0;
  str = String(str || '?');
  for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) | 0; }
  return Math.abs(h);
}
function avatarDataUri(username) {
  const name = String(username || '?');
  const initial = (name.replace(/[^a-zA-Z0-9]/g, '')[0] || name[0] || '?').toUpperCase();
  const h = _avatarHash(name);
  const hue = h % 360;
  const hue2 = (hue + 48) % 360;
  const c1 = `hsl(${hue},68%,58%)`;
  const c2 = `hsl(${hue2},72%,42%)`;
  const gid = 'g' + h;
  const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">` +
      `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1">` +
        `<stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>` +
      `</linearGradient></defs>` +
      `<rect width="64" height="64" fill="url(#${gid})"/>` +
      `<text x="32" y="34" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" ` +
        `font-size="30" font-weight="600" fill="#fff" fill-opacity="0.95" ` +
        `text-anchor="middle" dominant-baseline="central">${initial}</text>` +
    `</svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}
// Reusable circular <img> avatar. `cls` adds Tailwind sizing/extra classes.
function avatarImg(username, cls) {
  return `<img src="${avatarDataUri(username)}" alt="@${esc(username)}" ` +
    `class="rounded-full object-cover shrink-0 ring-1 ring-white/10 ${cls || 'w-8 h-8'}" ` +
    `loading="lazy" draggable="false">`;
}

// ── Navigation ────────────────────────────────────────────────────────────────
// Six primary tabs (home/trade/futures/earn/predict/profile) plus explore,
// verify and nfts. Legacy aliases (feed/swap/markets/stake/…) still resolve so
// internal deep-links keep working.
const VIEW_SECTION = {
  home: 'app-feed', feed: 'app-feed',
  trade: 'section-swap', swap: 'section-swap',
  futures: 'section-futures',
  earn: 'section-earn', stake: 'section-earn', liquidity: 'section-earn', ico: 'section-earn',
  predict: 'section-markets', markets: 'section-markets',
  profile: 'section-profile',
  explore: 'section-explore',
  verify: 'section-verify', kyc: 'section-verify',
  nfts: 'section-nfts',
  admin: 'section-admin',
};
// Which bottom tab is highlighted for a given view.
const VIEW_TAB = {
  home: 'home', feed: 'home', trade: 'trade', swap: 'trade', futures: 'futures',
  earn: 'earn', stake: 'earn', liquidity: 'earn', ico: 'earn',
  predict: 'predict', markets: 'predict', profile: 'profile',
};

function navigate(view, opts) {
  clearInterval(_activeInterval); _activeInterval = null;
  if (opts) Object.assign(S, opts);
  S.view = view;
  document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
  const sec = document.getElementById(VIEW_SECTION[view]);
  if (sec) sec.classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  const tab = VIEW_TAB[view];
  document.querySelectorAll('.bottom-tab').forEach(b => {
    b.classList.toggle('text-violet-400', b.dataset.tab === tab);
    b.classList.toggle('text-zinc-400', b.dataset.tab !== tab);
  });
  hideMobileSidebar();
  loadView(view);
  document.getElementById('main-scroll').scrollTo(0, 0);
}

async function loadView(view) {
  const sec = document.getElementById(VIEW_SECTION[view]);
  if (!sec) return;
  sec.innerHTML = spin();
  try {
    switch (view) {
      case 'home': case 'feed': await renderFeed(sec); break;
      case 'profile': await renderProfile(sec); break;
      case 'trade': case 'swap': await renderSwap(sec); break;
      case 'earn': case 'stake': case 'liquidity': case 'ico': await renderEarn(sec); break;
      case 'predict': case 'markets': await renderMarkets(sec); break;
      case 'futures': await renderFutures(sec); break;
      case 'nfts': await renderNFTs(sec); break;
      case 'explore': await renderExplore(sec); break;
      case 'verify': case 'kyc': await renderVerify(sec); break;
      case 'admin': await renderAdmin(sec); break;
    }
  } catch (e) { sec.innerHTML = err(e.message); }
}

function toggleMobileSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('mob-overlay');
  const open = !sb.classList.contains('-translate-x-full');
  sb.classList.toggle('-translate-x-full', open);
  ov.classList.toggle('hidden', open);
}
function hideMobileSidebar() {
  document.getElementById('sidebar').classList.add('-translate-x-full');

  // a guaranteed 401 that shows up as a console error in headless test runners.
  if (!S.token) {
    document.getElementById('wallet-gate').classList.remove('hidden');
    return;
  }
  try {
    const data = await api('GET', '/api/me');
    S.user = data.user;
    S.points = Number(data.user?.points) || 0;
    S.kyc = data.kyc;
    S.social_accounts = data.social_accounts || [];
    if (data.balances) {

    }

  } catch (e) {
    document.getElementById('wallet-gate').classList.remove('hidden');

}

// Writes the current points total into the "Points available" badge (no animation).
function updatePoints() {
  const el = document.getElementById('points-value');
  if (el) el.textContent = String(S.points || 0);
}

// Animates the badge from its old total up to `newTotal`, floating a "+gained"
// chip and pulsing the badge. Drives off the server-confirmed total.
function animatePointsGain(newTotal, gained) {
  const valEl = document.getElementById('points-value');
  const badge = document.getElementById('points-available');
  const from = Number(S.points) || 0;
  S.points = newTotal;
  if (!valEl || !badge) { updatePoints(); return; }

  // Floating "+N" chip
  const float = document.createElement('div');
  float.className = 'points-float';
  float.textContent = '+' + gained;
  badge.appendChild(float);
  float.addEventListener('animationend', () => float.remove());

  // Glow/pulse on the badge
  badge.classList.remove('points-pulse');
  void badge.offsetWidth; // restart animation
  badge.classList.add('points-pulse');
  badge.addEventListener('animationend', () => badge.classList.remove('points-pulse'), { once: true });

  // Count-up tween from old -> new
  const start = performance.now();
  const dur = 600;
  function tick(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    valEl.textContent = String(Math.round(from + (newTotal - from) * eased));
    if (t < 1) requestAnimationFrame(tick);
    else valEl.textContent = String(newTotal);
  }
  requestAnimationFrame(tick);
}

// ── Feed ──────────────────────────────────────────────────────────────────────
async function renderFeed(sec) {
  let feedState = { tab: 'global', posts: [], cursor: null, thread: null };
  // AI Trade Helper composer badge state (lives across re-renders).
  const tickerCache = {};        // TICKER -> price (number) or 'err'
  let tickerDebounce = null;     // pending debounce timer
  let lastTickerKey = '';        // last looked-up recognized-ticker set

  function renderTickerBadge(symbols) {
    const el = document.getElementById('compose-ticker-badge');
    if (!el) return;
    if (!symbols.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = 'flex';
    el.innerHTML = symbols.map(sym => {
      const v = tickerCache[sym];
      let body;
      if (v === undefined) body = '<span class="text-zinc-500">…</span>';
      else if (v === 'err') body = '<span class="text-zinc-500">price unavailable</span>';
      else body = `<span class="text-emerald-400 font-semibold">${fmtTickerPrice(v)}</span>`;
      return `<span class="inline-flex items-center gap-1 text-xs bg-zinc-800/70 border border-zinc-700 rounded-full px-2 py-0.5">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
        <span class="text-zinc-300 font-medium">$${sym}</span>
        <span class="text-zinc-600">·</span>${body}</span>`;
    }).join('');
  }

  async function refreshTickers(symbols) {
    const need = symbols.filter(s => tickerCache[s] === undefined);
    renderTickerBadge(symbols);
    if (!need.length) return;
    try {
      const d = await api('GET', '/api/ticker-prices?symbols=' + encodeURIComponent(need.join(',')));
      for (const s of need) {
        const p = d.prices && d.prices[s];
        tickerCache[s] = (p != null) ? p : 'err';
      }
    } catch {
      for (const s of need) if (tickerCache[s] === undefined) tickerCache[s] = 'err';
    }
    // Re-render against the current composer text (user may have kept typing).
    const box = document.getElementById('compose-box');
    renderTickerBadge(detectTickers(box ? box.value : ''));
  }

  function onComposeInput() {
    const box = document.getElementById('compose-box');
    if (!box) return;
    const cnt = document.getElementById('compose-count');
    if (cnt) cnt.textContent = box.value.length + '/280';
    const symbols = detectTickers(box.value);
    const key = symbols.join(',');
    renderTickerBadge(symbols);
    if (key === lastTickerKey) return;
    lastTickerKey = key;
    if (tickerDebounce) clearTimeout(tickerDebounce);
    if (!symbols.length) return;
    tickerDebounce = setTimeout(() => refreshTickers(symbols), 500);
  }

  function resetComposerTicker() {
    if (tickerDebounce) { clearTimeout(tickerDebounce); tickerDebounce = null; }
    lastTickerKey = '';
    renderTickerBadge([]);
  }

  async function loadPosts() {
    const params = new URLSearchParams({ tab: feedState.tab, limit: 20 });
    if (feedState.cursor) params.set('cursor', feedState.cursor);
    const d = await api('GET', '/api/feed?' + params);
    feedState.posts = feedState.cursor ? [...feedState.posts, ...d.posts] : d.posts;
    feedState.cursor = d.nextCursor;
    render();
  }

  function postCard(p) {
    const heartCls = p.liked_by_me ? 'text-rose-400' : 'text-zinc-500 hover:text-rose-400';
    const isLockedForMe = p.locked && !p.unlocked;
    const body = isLockedForMe
      ? `<div class="relative rounded-lg overflow-hidden">
           <p class="text-sm text-zinc-300 leading-relaxed select-none blur-sm pointer-events-none">Locked alpha — pay 5 TOK to reveal this premium post. Locked alpha — pay 5 TOK to reveal.</p>
           <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 bg-zinc-950/40 text-center px-2">
             <span class="text-xs font-semibold text-violet-200">🔒 Pay 5 TOK to read alpha</span>
             <button class="btn btn-v text-xs px-3 py-1" onclick="unlockPost(${p.id})">Pay 5 TOK</button>
           </div>
         </div>`
      : `<p class="text-sm text-zinc-300 leading-relaxed">${esc(p.content)}</p>`;
    return `<div class="card space-y-2" data-post-id="${p.id}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2.5 min-w-0">
          <button class="shrink-0 leading-none" onclick="navigate('profile',{profileUser:'${esc(p.username)}'})" aria-label="@${esc(p.username)} profile">${avatarImg(p.username, 'post-avatar w-10 h-10')}</button>
          <div class="min-w-0">
            <button class="text-sm font-semibold hover:text-violet-300 truncate" onclick="navigate('profile',{profileUser:'${esc(p.username)}'})">@${esc(p.username)}</button>
            ${p.is_premium ? '<span class="tag-zk-verified ml-1">⊛</span>' : ''}
            ${p.locked ? '<span class="text-amber-400 text-xs ml-1" title="Premium locked post">🔒</span>' : ''}
            <span class="text-zinc-600 text-xs ml-2">${tsAgo(p.created_at)}</span>
          </div>
        </div>
      </div>
      ${body}
      <div class="flex items-center gap-4">
        <button class="${heartCls} flex items-center gap-1 text-xs transition-colors" onclick="likePost(${p.id})">♥ ${p.like_count}</button>
        <button class="text-zinc-500 hover:text-zinc-300 flex items-center gap-1 text-xs transition-colors" onclick="openThread(${p.id})">💬 ${p.reply_count}</button>
        ${S.user && p.user_id !== S.user.user_id ? `<button class="text-zinc-600 hover:text-amber-400 text-xs transition-colors" onclick="openTipModal(${p.id}, '${esc(p.username)}')">💰 Tip</button>` : ''}
        ${S.user && p.user_id !== S.user.user_id ? `<button class="text-zinc-600 hover:text-violet-400 text-xs transition-colors" onclick="toggleFollow('${esc(p.username)}')">+ Follow</button>` : ''}
      </div>
    </div>`;
  }

  function threadView(post, replies) {
    return `<div class="space-y-3">
      <button class="text-sm text-zinc-400 hover:text-white flex items-center gap-1" onclick="backToFeed()">← Back to Feed</button>
      ${postCard(post)}
      <div class="ml-4 border-l border-zinc-800 pl-4 space-y-3">
        ${replies.map(r => postCard(r)).join('')}
        <div class="card">
          <textarea id="reply-box" class="inp" rows="2" placeholder="Write a reply…" maxlength="280"></textarea>
          <div class="flex justify-end mt-2">
            <button class="btn btn-v" onclick="submitReply(${post.id})">Reply</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  function render() {
    if (feedState.thread) return;
    sec.innerHTML = `
      <div class="card space-y-2">
        <textarea id="compose-box" class="inp" rows="3" placeholder="What's on your mind?" maxlength="280"></textarea>
        <div id="compose-ticker-badge" class="flex flex-wrap gap-2" style="display:none"></div>
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3">
            <span id="compose-count" class="text-xs text-zinc-600">0/280</span>
            <label class="flex items-center gap-1.5 text-xs text-zinc-400 cursor-pointer select-none" title="Lock this post behind a 5 TOK paywall">
              <input id="compose-lock" type="checkbox" class="accent-violet-600 w-3.5 h-3.5">
              <span>🔒 Lock Post</span>
            </label>
          </div>
          <button class="btn btn-v" onclick="submitPost()">Post</button>
        </div>
      </div>
      <div class="flex gap-2 border-b border-zinc-800 pb-2">
        <button class="text-sm px-3 py-1 rounded-lg transition-colors ${feedState.tab==='global'?'bg-violet-600 text-white':'text-zinc-400 hover:text-white'}" onclick="switchTab('global')">Global</button>
        <button class="text-sm px-3 py-1 rounded-lg transition-colors ${feedState.tab==='following'?'bg-violet-600 text-white':'text-zinc-400 hover:text-white'}" onclick="switchTab('following')">Following</button>
      </div>
      <div id="feed-list" class="space-y-3">
        ${feedState.posts.length ? feedState.posts.map(postCard).join('') : '<p class="text-zinc-600 text-sm text-center py-4">No posts yet</p>'}
      </div>
      ${feedState.cursor ? `<button class="btn btn-z w-full" onclick="loadMore()">Load more</button>` : ''}
    `;
    const box = document.getElementById('compose-box');
    if (box) {
      box.addEventListener('input', onComposeInput);
      // Restore any previously-detected ticker badge after a background re-render.
      renderTickerBadge(detectTickers(box.value));
    }
    window._feedFns = { loadPosts, postCard, threadView, feedState };
  }

  window.switchTab = (tab) => { feedState.tab = tab; feedState.cursor = null; loadPosts(); };
  window.loadMore = () => loadPosts();

  window.submitPost = async () => {
    const box = document.getElementById('compose-box');
    const content = box?.value.trim();
    if (!content) return;
    const locked = !!document.getElementById('compose-lock')?.checked;
    try {
      const res = await api('POST', '/api/posts', { content, locked });
      box.value = '';
      resetComposerTicker();
      feedState.cursor = null;
      await loadPosts();
      // Post-to-Earn: animate the confirmed points credit (server-driven).
      if (res && res.awarded > 0 && res.points != null) {
        animatePointsGain(Number(res.points), Number(res.awarded));
      }
    } catch (e) { alert(e.message); }
  };

  window.unlockPost = async (id) => {
    try {
      const { content } = await api('POST', `/api/posts/${id}/unlock`);
      const post = feedState.posts.find(p => p.id === id);
      if (post) { post.unlocked = true; post.content = content; }
      if (feedState.thread && feedState.thread.post.id === id) {
        feedState.thread.post.unlocked = true;
        feedState.thread.post.content = content;
        sec.innerHTML = threadView(feedState.thread.post, feedState.thread.replies);
      } else {
        render();
      }
    } catch (e) { alert(e.message); }
  };

  window.likePost = async (id) => {
    try {
      await api('POST', `/api/posts/${id}/like`);
      feedState.cursor = null;
      await loadPosts();
    } catch (e) { alert(e.message); }
  };

  window.openThread = async (id) => {
    sec.innerHTML = spin();
    try {
      const { post, replies } = await api('GET', `/api/posts/${id}`);
      feedState.thread = { post, replies };
      sec.innerHTML = threadView(post, replies);
    } catch (e) { sec.innerHTML = err(e.message); }
  };

  window.backToFeed = () => { feedState.thread = null; render(); };

  window.submitReply = async (parentId) => {
    const content = document.getElementById('reply-box')?.value.trim();
    if (!content) return;
    try {
      await api('POST', '/api/posts', { content, parent_id: parentId });
      await window.openThread(parentId);
    } catch (e) { alert(e.message); }
  };

  window.toggleFollow = async (username) => {
    try {
      await api('POST', '/api/follow', { username });
      await loadPosts();
    } catch (e) { alert(e.message); }
  };

  await loadPosts();
}

window.closeTipModal = () => {

window.submitTip = async () => {
  const amountInput = document.getElementById('tip-amount');
  const errorDiv = document.getElementById('tip-error');
  const amount = parseFloat(amountInput.value);

  errorDiv.classList.add('hidden');
  errorDiv.textContent = '';

  if (!amount || amount <= 0) {
    errorDiv.textContent = 'Please enter an amount greater than 0';
    errorDiv.classList.remove('hidden');
    return;
  }

  const tokBal = S.balances['TOK'] || 0;
  const amountUnits = toUnits(amount.toString());
  if (amountUnits > tokBal) {
    errorDiv.textContent = 'Insufficient TOK balance';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    const submitBtn = document.getElementById('tip-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    await api('POST', `/api/posts/${tipState.postId}/tip`, { amount: amount.toString() });

    closeTipModal();
    await refreshBalances();
    await window._feedFns.loadPosts();

    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
  } catch (e) {
    errorDiv.textContent = e.message || 'Failed to send tip';
    errorDiv.classList.remove('hidden');
    const submitBtn = document.getElementById('tip-submit-btn');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
  }
};

    return userPosts.length

          <p class="text-sm ${p.locked && !p.unlocked ? 'text-zinc-500 italic' : 'text-zinc-300'}">${p.locked && !p.unlocked ? 'Locked alpha — open the feed to pay 5 TOK and read.' : esc(p.content)}</p>

        </div>`).join('')
      : '<p class="text-zinc-600 text-sm">No posts yet</p>';

  async function renderPortfolioTab() {
    const data = await fetch(`/explorer-api/portfolio/${encodeURIComponent(username)}`).then(r => r.json());
    const holdings = data.holdings || [];
    const prices = data.prices || {};

    let totalValue = 0, totalCost = 0;
    const rows = holdings.map(h => {
      const qty = parseFloat(h.quantity);
      const buyPrice = parseFloat(h.purchase_price);
      const livePrice = prices[h.ticker?.toUpperCase()] ?? null;
      const costBasis = qty * buyPrice;
      let currentValue = null, pnl = null, pnlPct = null;
      if (livePrice != null) {
        currentValue = qty * livePrice;
        pnl = currentValue - costBasis;
        pnlPct = costBasis > 0 ? (pnl / costBasis * 100) : 0;
        totalValue += currentValue;
        totalCost += costBasis;
      }
      const pnlCls = (pnl != null && pnl >= 0) ? 'text-emerald-400' : 'text-red-400';
      const qtyStr = qty < 1 ? qty.toFixed(6) : qty < 10 ? qty.toFixed(4) : qty.toFixed(2);

          </div>

    const totalPnl = totalValue - totalCost;
    const totalPnlPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;
    const totalPnlCls = totalPnl >= 0 ? 'text-emerald-400' : 'text-red-400';

    return `
      <div class="card bg-zinc-900/50 space-y-1">
        <div class="text-xs text-zinc-500">Portfolio value</div>
        <div class="text-2xl font-bold text-violet-300">$${totalValue.toFixed(2)}</div>

        ? `<div class="space-y-3">${rows.join('')}</div>`

  async function renderActivityTab() {
    const typeConfig = {
      swap:         { label: 'Swap',              color: 'text-blue-400',   bg: 'bg-blue-900/30' },
      market_trade: { label: 'Prediction Market', color: 'text-violet-400', bg: 'bg-violet-900/30' },

      futures_pnl:  { label: 'Futures Close',     color: 'text-orange-400', bg: 'bg-orange-900/30' },
      funding:      { label: 'Funding Payment',   color: 'text-amber-400',  bg: 'bg-amber-900/30' },
      ico_invest:   { label: 'ICO Investment',    color: 'text-green-400',  bg: 'bg-green-900/30' },
    };

    function activityRows(items) {
      return items.map(a => {
        const cfg = typeConfig[a.type] || { label: esc(a.type), color: 'text-zinc-400', bg: 'bg-zinc-800/30' };
        const rawAmt = Number(a.amount);
        const formatted = fmtAmt(a.token_symbol || 'USDC', Math.abs(rawAmt));
        const sign = rawAmt >= 0 ? '+' : '-';
        const amtColor = rawAmt >= 0 ? 'text-emerald-400' : 'text-red-400';
        return `
          <div class="card flex items-start justify-between gap-3">
            <div class="flex items-start gap-2 min-w-0 flex-1">
              <span class="text-xs font-semibold px-2 py-0.5 rounded shrink-0 ${cfg.color} ${cfg.bg}">${cfg.label}</span>
              <span class="text-sm text-zinc-300 leading-tight">${esc(a.description)}</span>
            </div>
            <div class="shrink-0 text-right">
              <div class="text-sm font-mono ${amtColor}">${sign}${formatted} ${esc(a.token_symbol || '')}</div>
              <div class="text-xs text-zinc-600">${tsAgo(a.created_at)} ago</div>
            </div>
          </div>`;
      }).join('');
    }

    const { activities, nextCursor } = await api('GET', '/api/activity?limit=20');

    if (!activities.length) {
      return `<div class="card text-center py-8 text-zinc-500 text-sm">No on-chain activity yet. Make a swap, trade a market, or open a futures position to get started.</div>`;
    }

    let actCursor = nextCursor;
    window.loadMoreActivity = async () => {
      const btn = document.getElementById('activity-load-more');
      const list = document.getElementById('activity-list');
      if (!btn || !list) return;
      btn.textContent = 'Loading…';
      btn.disabled = true;
      try {
        const { activities: more, nextCursor: nc } = await api('GET', `/api/activity?limit=20&cursor=${encodeURIComponent(actCursor)}`);
        actCursor = nc;
        list.insertAdjacentHTML('beforeend', activityRows(more));
        if (!nc) btn.remove();
        else { btn.textContent = 'Load more'; btn.disabled = false; }
      } catch(e) { btn.textContent = 'Error — retry'; btn.disabled = false; }
    };

    return `
      <div id="activity-list" class="space-y-2">${activityRows(activities)}</div>
      ${nextCursor ? `<button id="activity-load-more" class="btn btn-z w-full mt-2" onclick="loadMoreActivity()">Load more</button>` : ''}`;
  }

        <div class="flex gap-2 border-b border-zinc-800 pb-2">
          ${['posts','replies','nfts','portfolio', ...(isMe ? ['activity'] : [])].map(t => `<button class="text-sm px-3 py-1 rounded-lg transition-colors ${activeTab===t?'bg-violet-600 text-white':'text-zinc-400 hover:text-white'}" onclick="switchProfileTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
        </div>
        <div id="profile-tab-content" class="space-y-3">${tabContent}</div>
      </div>`;
  }

  window.switchProfileTab = (t) => { activeTab = t; fullRender(); };

  window.linkAccount = async (provider) => {
    try {
      const start = await api('POST', '/api/social/link/start', { provider });
      if (start.simulated) {
        await api('POST', '/api/social/link/complete', { provider, code: 'staging-code', state: start.state });
        S.social_accounts = (await api('GET', '/api/social/accounts')).accounts;
        await fullRender();
      } else if (start.oauth_url) {
        const popup = window.open(start.oauth_url, '_blank', 'width=600,height=700,noopener');
        const handler = async (e) => {
          if (!e.data || e.data.type !== 'oauth_callback') return;
          window.removeEventListener('message', handler);
          if (popup && !popup.closed) popup.close();
          const { code, state: cbState, error: cbError, provider: cbProv } = e.data;
          if (cbError) return alert('OAuth error: ' + cbError);
          try {
            await api('POST', '/api/social/link/complete', { provider: cbProv || provider, code, state: cbState });
            S.social_accounts = (await api('GET', '/api/social/accounts')).accounts;
            await fullRender();
          } catch (err) { alert(err.message); }
        };
        window.addEventListener('message', handler);
      }
    } catch (e) { alert(e.message); }
  };

  window.unlinkAccount = async (provider) => {
    if (!confirm('Unlink this account?')) return;
    try {
      await api('DELETE', `/api/social/link/${provider}`);

  };

      await renderProfile(sec);
    } catch (e) { alert(e.message); }
  };

  await fullRender();
}

window.doCopyTrade = async (username) => {
  try {
    const modal = document.getElementById('copy-trade-modal');
    const btn = modal?.querySelector('button.btn-v');
    if (btn) { btn.textContent = 'Copying…'; btn.disabled = true; }

    const idempKey = `copy-${username}-${Date.now()}`;
    const result = await api('POST', `/api/futures/positions/copy-from/${encodeURIComponent(username)}`, { idempotency_key: idempKey });

    if (result.ok && result.copied_count > 0) {
      if (modal) modal.remove();
      alert(`✓ Copied ${result.copied_count} position${result.copied_count !== 1 ? 's' : ''} from ${username}!`);
      await refreshBalances();
      const futSec = document.getElementById('section-futures');
      if (futSec && futSec.offsetParent !== null) {
        await renderFutures(futSec);
      }
    } else {
      alert('No positions were copied');
    }
  } catch (e) {
    alert('Error copying positions: ' + e.message);
  }
};

                <select id="swap-from-sel" onchange="swapFromChange(this.value)"
                  style="background:transparent;border:none;color:#fff;font-weight:600;font-size:15px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:2px;min-width:48px;">
                  ${tokens.map(t=>`<option value="${t}" ${t===swapState.from?'selected':''} style="background:#16161c;">${t}</option>`).join('')}
                </select>
                ${svgChevron}
              </div>
            </div>
            <div style="text-align:right;flex:1;margin-left:8px;">
              <input id="swap-amt-inp" type="number" value="${swapState.fromAmt}" placeholder="0.00" min="0"
                oninput="swapAmtChange(this.value)"
                style="background:transparent;border:none;color:#fff;font-size:22px;font-weight:700;text-align:right;width:100%;outline:none;display:block;">
              <div style="font-size:11px;color:#52525b;margin-top:3px;">Balance: ${fromBal}</div>
            </div>
          </div>

          <!-- Floating switch button -->
          <div style="display:flex;justify-content:center;position:relative;z-index:2;margin:-1px 0;">
            <button id="swap-flip-btn" onclick="swapFlipTokens()"
              style="width:38px;height:38px;border-radius:50%;background:#22222a;border:3px solid #0d0d11;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,background .15s;"
              onmouseover="this.style.background='#2e2e3a'" onmouseout="this.style.background='#22222a'">
              ${svgSwapArrows}
            </button>
          </div>

          <!-- To card -->
          <div id="swap-to-card" style="background:#16161c;border-radius:18px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <div style="display:flex;align-items:center;gap:10px;">
              ${tokenBadge(swapState.to)}
              <div style="display:flex;align-items:center;gap:2px;cursor:pointer;">
                <select id="swap-to-sel" onchange="swapToChange(this.value)"
                  style="background:transparent;border:none;color:#fff;font-weight:600;font-size:15px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:2px;min-width:48px;">
                  ${tokens.map(t=>`<option value="${t}" ${t===swapState.to?'selected':''} style="background:#16161c;">${t}</option>`).join('')}
                </select>
                ${svgChevron}
              </div>
            </div>
            <div style="text-align:right;flex:1;margin-left:8px;">
              <div style="color:${toAmt?'#fff':'#3a3a45'};font-size:22px;font-weight:700;">${toAmt || '0.00'}</div>
              <div style="font-size:11px;color:#52525b;margin-top:3px;">Balance: ${toBal}</div>
            </div>
          </div>

          <!-- Transaction breakdown -->
          <div style="background:#16161c;border-radius:18px;padding:14px 16px;margin-bottom:14px;display:flex;flex-direction:column;gap:11px;">
            ${breakdownRows.map(row => `
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:4px;">
                  <span style="font-size:12px;color:#71717a;">${row.label}</span>
                  ${row.info ? svgInfo : ''}
                </div>
                <span style="font-size:12px;color:#d4d4d8;font-weight:500;">${row.value}</span>
              </div>`).join('')}
          </div>

          <!-- Feedback message -->
          <div id="swap-msg" style="font-size:12px;text-align:center;min-height:16px;margin-bottom:6px;"></div>

          <!-- CTA -->
          <button onclick="execSwap()"
            style="width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(90deg,#7fe5d9,#b59efa);color:#0d0d11;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.01em;margin-bottom:18px;transition:opacity .15s;"
            onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
            Create swap →
          </button>

      </div>`;
  }

  try {
    const d = await api('GET', '/api/prices');
    d.prices.forEach(p => { S.prices[p.symbol] = parseFloat(p.price_usd); });
  } catch {}

  window.swapFromChange = (v) => {
    swapState.from = v;
    if (swapState.from === swapState.to) swapState.to = tokens.find(t => t !== swapState.from);
    render();
  };
  window.swapToChange = (v) => {
    swapState.to = v;
    if (swapState.to === swapState.from) swapState.from = tokens.find(t => t !== swapState.to);
    render();
  };
  window.swapAmtChange = (v) => { swapState.fromAmt = v; render(); };

  window.swapQuickSelect = (pct) => {
    const balNum = parseFloat(S.balances[swapState.from] || 0) / 1_000_000;
    swapState.fromAmt = pct === 'Max'
      ? String(balNum)
      : String(parseFloat((balNum * parseInt(pct) / 100).toFixed(8)));
    render();
  };

  window.swapToggleSlippage = () => {
    swapState.showSlippagePopover = !swapState.showSlippagePopover;
    render();
  };
  window.swapSetSlippage = () => {
    const inp = document.getElementById('slippage-inp');
    if (inp) { const v = parseFloat(inp.value); if (v > 0 && v <= 50) swapState.slippage = v; }
    swapState.showSlippagePopover = false;
    render();
  };

  window.swapFlipTokens = () => {
    if (swapState.flipping) return;
    swapState.flipping = true;
    const fromCard = document.getElementById('swap-from-card');
    const toCard   = document.getElementById('swap-to-card');
    if (fromCard) fromCard.classList.add('swap-flip-down');
    if (toCard)   toCard.classList.add('swap-flip-up');
    setTimeout(() => {
      const prevToAmt = calcToAmt();
      [swapState.from, swapState.to] = [swapState.to, swapState.from];
      if (prevToAmt) swapState.fromAmt = prevToAmt;
      swapState.flipping = false;
      render();
    }, 150);
  };

  window.execSwap = async () => {
    const msg = document.getElementById('swap-msg');
    if (!msg) return;
    try {
      const d = await api('POST', '/api/defi/swap', { from_token: swapState.from, to_token: swapState.to, from_amount: swapState.fromAmt });
      msg.style.color = '#34d399';
      msg.textContent = `✓ Received ${d.to_amount.toFixed(6)} ${d.to_token}`;
      await refreshBalances();
      swapState.fromAmt = '';
      setTimeout(() => { msg.textContent = ''; render(); }, 2000);
    } catch (e) {
      if (msg) { msg.style.color = '#f87171'; msg.textContent = e.message; }
    }
  };

  render();

  // ── Markets list ──────────────────────────────────────────────────────────
  const mwrap = document.getElementById('swap-markets-wrap');
  if (!mwrap) return;

  const TOKEN_META = {
    ETH:   { name: 'Ethereum',   color: 'rgb(56,189,248)',  badgeBg: 'bg-sky-400/10',     badgeText: 'text-sky-400',     desc: 'The programmable blockchain powering smart contracts and DeFi.'     },
    BTC:   { name: 'Bitcoin',    color: 'rgb(251,191,36)',  badgeBg: 'bg-amber-400/10',   badgeText: 'text-amber-400',   desc: 'The original decentralised digital currency with a fixed supply of 21 million coins.' },
    BLOOM: { name: 'BloomMoney', color: 'rgb(167,139,250)', badgeBg: 'bg-violet-400/10',  badgeText: 'text-violet-400',  desc: 'BloomMoney\'s native token used for rewards, governance, and platform fees.' },
    USDC:  { name: 'USD Coin',   color: 'rgb(52,211,153)',  badgeBg: 'bg-emerald-400/10', badgeText: 'text-emerald-400', desc: 'A dollar-pegged stablecoin issued by Circle, redeemable 1:1 for USD.'  },
  };
  const MARKET_ORDER = ['ETH', 'BTC', 'BLOOM', 'USDC'];

  // Fetch all four price histories in parallel
  let histories = {};
  try {
    const results = await Promise.all(
      MARKET_ORDER.map(sym => api('GET', `/api/price-history?symbol=${sym}&hours=24`).catch(() => ({ history: [] })))
    );
    MARKET_ORDER.forEach((sym, i) => { histories[sym] = (results[i] && results[i].history) || []; });
  } catch {}

  function buildSparkline(hist, color) {
    if (!hist || hist.length < 2) {
      return `<svg viewBox="0 0 60 24" width="60" height="24"><line x1="0" y1="12" x2="60" y2="12" stroke="${color}" stroke-width="1.5"/></svg>`;
    }
    const prices = hist.map(h => parseFloat(h.price_usd));
    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const range = Math.max(max - min, 0.000001);
    const xStep = 60 / (prices.length - 1);
    const pts = prices.map((p, i) =>
      `${(i * xStep).toFixed(1)},${(22 - ((p - min) / range) * 20).toFixed(1)}`
    ).join(' ');
    return `<svg viewBox="0 0 60 24" width="60" height="24"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  }

  function computeChange(hist) {
    if (!hist || hist.length < 2) return null;
    const first = parseFloat(hist[0].price_usd);
    const last  = parseFloat(hist[hist.length - 1].price_usd);
    return ((last - first) / first) * 100;
  }

  function fmtMarketPrice(sym) {
    const p = S.prices[sym];
    if (p == null) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(2);
    return '$' + p.toFixed(4);
  }

  const rows = MARKET_ORDER.map(sym => {
    const meta = TOKEN_META[sym];
    const hist = histories[sym];
    const change = computeChange(hist);
    const changeStr = change === null ? '—' :
      (change >= 0 ? `+${change.toFixed(1)}%` : `${change.toFixed(1)}%`);
    const changeClass = change === null ? 'text-zinc-500' :
      change > 0.05 ? 'text-emerald-400' : change < -0.05 ? 'text-red-400' : 'text-zinc-500';
    const sparkline = buildSparkline(hist, meta.color);
    return `
      <div class="token-market-row card flex items-center gap-3 cursor-pointer hover:bg-zinc-800/60 transition-colors py-3"
           onclick="openTokenDetail('${sym}')">
        <div class="w-9 h-9 rounded-full flex items-center justify-center ${meta.badgeBg} ${meta.badgeText} text-xs font-bold shrink-0">${sym}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold">${sym}</div>
          <div class="text-xs text-zinc-500 truncate">${meta.name}</div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-semibold">${fmtMarketPrice(sym)}</div>
          <div class="text-xs font-medium ${changeClass}">${changeStr}</div>
        </div>
        <div class="shrink-0">${sparkline}</div>
      </div>`;
  }).join('');

  mwrap.innerHTML = `
    <h3 class="font-semibold mb-2 mt-6 text-zinc-300">Markets</h3>
    <div class="space-y-2">${rows}</div>`;
}

// ── Token Detail ──────────────────────────────────────────────────────────────
async function renderTokenDetail(sec) {
  const sym = S.tradeToken;
  const TOKEN_META_DETAIL = {
    ETH:   { name: 'Ethereum',   color: 'rgb(56,189,248)',  badgeBg: 'bg-sky-400/10',     badgeText: 'text-sky-400',     btnCls: 'bg-sky-500 hover:bg-sky-400',     desc: 'The programmable blockchain powering smart contracts and DeFi.'                         },
    BTC:   { name: 'Bitcoin',    color: 'rgb(251,191,36)',  badgeBg: 'bg-amber-400/10',   badgeText: 'text-amber-400',   btnCls: 'bg-amber-500 hover:bg-amber-400',  desc: 'The original decentralised digital currency with a fixed supply of 21 million coins.' },
    BLOOM: { name: 'BloomMoney', color: 'rgb(167,139,250)', badgeBg: 'bg-violet-400/10',  badgeText: 'text-violet-400',  btnCls: 'bg-violet-600 hover:bg-violet-500', desc: 'BloomMoney\'s native token used for rewards, governance, and platform fees.'        },
    USDC:  { name: 'USD Coin',   color: 'rgb(52,211,153)',  badgeBg: 'bg-emerald-400/10', badgeText: 'text-emerald-400', btnCls: 'bg-emerald-600 hover:bg-emerald-500', desc: 'A dollar-pegged stablecoin issued by Circle, redeemable 1:1 for USD.'           },
  };
  const TV_SYMBOLS = { BTC: 'COINBASE:BTCUSD', ETH: 'COINBASE:ETHUSD' };
  const useTradingView = sym in TV_SYMBOLS;

  const meta = TOKEN_META_DETAIL[sym];
  if (!meta) { S.tradeToken = null; navigate('trade'); return; }

  let chartHours = 24;

  function computeChangePct(hist) {
    if (!hist || hist.length < 2) return null;
    const first = parseFloat(hist[0].price_usd);
    const last  = parseFloat(hist[hist.length - 1].price_usd);
    return ((last - first) / first) * 100;
  }

  async function renderChart() {
    const chartWrap = document.getElementById('token-detail-chart');
    if (!chartWrap) return;
    chartWrap.innerHTML = `<div class="text-zinc-600 text-sm text-center py-6">${spin()}</div>`;
    let hist = [];
    try {
      const res = await api('GET', `/api/price-history?symbol=${sym}&hours=${chartHours}`);
      hist = (res && res.history) || [];
    } catch {}
    const pts = hist.map(h => ({ x: new Date(h.recorded_at).getTime(), y: parseFloat(h.price_usd) }));
    chartWrap.innerHTML = svgLineChart(pts, { color: meta.color, width: 480, height: 140 });
  }

  function mountTradingViewChart(tokenSym) {
    const container = document.getElementById('tv-chart-container');
    if (!container) return;
    container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.type = 'text/javascript';
    script.async = true;
    script.textContent = JSON.stringify({
      autosize: true,
      symbol: TV_SYMBOLS[tokenSym],
      interval: 'D',
      timezone: 'Etc/UTC',
      theme: 'dark',
      style: '1',
      locale: 'en',
      hide_top_toolbar: false,
      hide_legend: true,
      allow_symbol_change: false,
    });
    container.appendChild(script);
  }

  function fmtDetailPrice(s) {
    const p = S.prices[s];
    if (p == null) return '—';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(2);
    return '$' + p.toFixed(4);
  }

  async function load() {
    await refreshBalances();
    let hist24 = [];
    try {
      const res = await api('GET', `/api/price-history?symbol=${sym}&hours=24`);
      hist24 = (res && res.history) || [];
    } catch {}

    const change = computeChangePct(hist24);
    const changeStr = change === null ? '—' : (change >= 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`);
    const changeCls = change === null ? 'text-zinc-500' : change > 0.05 ? 'text-emerald-400' : change < -0.05 ? 'text-red-400' : 'text-zinc-500';

    const chartSection = useTradingView
      ? `<div id="tv-chart-container" class="tradingview-widget-container" style="height:400px;min-height:400px"></div>`
      : `<div>
          <div class="flex gap-2 mb-3">
            <button id="btn-24h" class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${chartHours === 24 ? 'bg-zinc-700 text-white' : 'text-zinc-500 hover:text-zinc-300'}" onclick="window._setTokenChartHours(24)">24H</button>
            <button id="btn-7d"  class="text-xs px-3 py-1 rounded-full font-medium transition-colors ${chartHours === 168 ? 'bg-zinc-700 text-white' : 'text-zinc-500 hover:text-zinc-300'}" onclick="window._setTokenChartHours(168)">7D</button>
          </div>
          <div id="token-detail-chart"></div>
        </div>`;

    sec.innerHTML = `
      <button class="text-sm text-zinc-400 hover:text-white mb-4 flex items-center gap-1 token-detail-back" onclick="S.tradeToken=null;navigate('trade')">← Markets</button>
      <div class="card space-y-4 mb-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full flex items-center justify-center ${meta.badgeBg} ${meta.badgeText} text-sm font-bold shrink-0">${sym}</div>
          <div>
            <div class="font-bold text-lg leading-tight">${esc(meta.name)}</div>
            <div class="text-sm text-zinc-500">${sym}</div>
          </div>
          <div class="ml-auto text-right">
            <div class="text-2xl font-bold">${fmtDetailPrice(sym)}</div>
            <div class="text-sm font-medium ${changeCls}">${changeStr} <span class="text-zinc-600 font-normal">24h</span></div>
          </div>
        </div>
        <p class="text-sm text-zinc-400">${esc(meta.desc)}</p>
        ${chartSection}
      </div>
      <button class="w-full py-3 rounded-xl font-semibold text-white transition-colors ${meta.btnCls}" onclick="window._swapFromDetail('${sym}')">Swap ${esc(sym)} →</button>`;

    if (useTradingView) {
      mountTradingViewChart(sym);
    } else {
      await renderChart();
    }
  }

  window._setTokenChartHours = async (h) => {
    chartHours = h;
    const b24 = document.getElementById('btn-24h');
    const b7d  = document.getElementById('btn-7d');
    if (b24) b24.className = `text-xs px-3 py-1 rounded-full font-medium transition-colors ${h === 24 ? 'bg-zinc-700 text-white' : 'text-zinc-500 hover:text-zinc-300'}`;
    if (b7d)  b7d.className  = `text-xs px-3 py-1 rounded-full font-medium transition-colors ${h === 168 ? 'bg-zinc-700 text-white' : 'text-zinc-500 hover:text-zinc-300'}`;
    await renderChart();
  };

  window._swapFromDetail = (s) => {
    S.tradeToken = null;
    navigate('trade');
    setTimeout(() => { if (window.swapFromChange) window.swapFromChange(s); }, 50);
  };

  await load();
}

// ── SVG Line Chart ────────────────────────────────────────────────────────────
function svgLineChart(points, opts = {}) {
  const { width = 480, height = 120, color = '#7c3aed', refLine = null } = opts;
  if (!points || points.length < 2) {
    return `<svg viewBox="0 0 ${width} ${height}" width="100%" class="rounded-lg bg-zinc-900/50">
      <text x="${width/2}" y="${height/2}" text-anchor="middle" fill="#52525b" font-size="11">No history yet</text></svg>`;
  }
  const pad = { top: 16, right: 10, bottom: 20, left: 38 };
  const W = width - pad.left - pad.right;
  const H = height - pad.top - pad.bottom;
  const xs = points.map(p => p.x);
  const ys = points.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  let yMin = opts.yMin != null ? opts.yMin : Math.min(...ys);
  let yMax = opts.yMax != null ? opts.yMax : Math.max(...ys);
  if (yMax - yMin < 0.001) { yMin -= 1; yMax += 1; }
  const xScale = x => pad.left + (xMax === xMin ? W / 2 : (x - xMin) / (xMax - xMin) * W);
  const yScale = y => pad.top + H - ((y - yMin) / (yMax - yMin)) * H;
  const polyline = points.map(p => `${xScale(p.x).toFixed(1)},${yScale(p.y).toFixed(1)}`).join(' ');
  const fmt = ts => { const d = new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
  const fmtY = v => v >= 10000 ? (v/1000).toFixed(1)+'k' : v >= 1 ? v.toFixed(1) : v.toFixed(4);
  let refLineEl = '';
  if (refLine != null && refLine >= yMin && refLine <= yMax) {
    const ry = yScale(refLine).toFixed(1);
    refLineEl = `<line x1="${pad.left}" y1="${ry}" x2="${pad.left+W}" y2="${ry}" stroke="#52525b" stroke-width="1" stroke-dasharray="3,3"/>`;
  }
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" class="rounded-lg bg-zinc-900/50">
    <rect x="${pad.left}" y="${pad.top}" width="${W}" height="${H}" fill="#0a0a0b" rx="4"/>
    ${refLineEl}
    <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${xScale(xs[xs.length-1]).toFixed(1)}" cy="${yScale(ys[ys.length-1]).toFixed(1)}" r="3" fill="${color}"/>
    <text x="${pad.left}" y="${pad.top-3}" fill="#71717a" font-size="9">${fmt(xMin)}</text>
    <text x="${pad.left+W}" y="${pad.top-3}" fill="#71717a" font-size="9" text-anchor="end">${fmt(xMax)}</text>
    <text x="${pad.left-3}" y="${pad.top+5}" fill="#71717a" font-size="9" text-anchor="end">${fmtY(yMax)}</text>
    <text x="${pad.left-3}" y="${pad.top+H}" fill="#71717a" font-size="9" text-anchor="end">${fmtY(yMin)}</text>
  </svg>`;
}

// ── Opinion Markets ───────────────────────────────────────────────────────────
async function renderMarkets(sec) {
  if (S.marketId) { await renderMarketDetail(sec); return; }

  let showCreate = false;

  function fmtCountdown(closesAt) {
    const ms = new Date(closesAt) - Date.now();
    if (ms <= 0) return 'closing';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 1) return `${h}h ${m}m`;
    return m > 0 ? `${m}m` : 'closing';
  }

  function marketCard(m, opts = {}) {
    const yesPct = (Number(m.yes_pool)/(Number(m.yes_pool)+Number(m.no_pool))*100).toFixed(1);
    const noPct = (100 - parseFloat(yesPct)).toFixed(1);
    const statusCls = { open:'text-emerald-400', closed:'text-zinc-500', resolved:'text-blue-400' };
    return `<div class="card space-y-2 cursor-pointer hover:border-zinc-600 transition-colors" onclick="openMarket(${m.id})">
      <div class="flex justify-between items-start gap-2">
        <div class="flex flex-wrap items-start gap-2 min-w-0">
          <h3 class="font-semibold text-sm leading-snug">${esc(m.title)}</h3>
          ${opts.daily ? '<span class="shrink-0 text-xs font-semibold bg-amber-900/40 border border-amber-700/50 text-amber-300 px-2 py-0.5 rounded-full">Daily</span>' : ''}
        </div>
        <span class="${statusCls[m.status]||'text-zinc-400'} text-xs shrink-0 ml-1">${m.status}</span>
      </div>
      <div class="flex gap-2 text-xs">
        <div class="flex-1 bg-emerald-900/40 border border-emerald-800/50 rounded px-2 py-1">YES <span class="font-bold text-emerald-300">${yesPct}%</span></div>
        <div class="flex-1 bg-red-900/40 border border-red-800/50 rounded px-2 py-1">NO <span class="font-bold text-red-300">${noPct}%</span></div>
      </div>
      <div class="flex justify-between text-xs text-zinc-500">
        <span>Liquidity: ${fmtUSD(Number(m.yes_pool)+Number(m.no_pool))} USDC</span>
        ${opts.daily && m.closes_at ? `<span class="text-amber-400">&#x23f1; ${fmtCountdown(m.closes_at)}</span>` :
          m.closes_at ? `<span>Closes ${new Date(m.closes_at).toLocaleDateString()}</span>` : ''}
      </div>
      ${m.resolved_outcome ? `<div class="text-xs text-blue-300">&#x2713; Resolved: ${m.resolved_outcome}</div>` : ''}
    </div>`;
  }

  async function load() {
    const { markets } = await api('GET', '/api/markets');
    const dailyToday = markets.filter(m => m.is_daily && m.status === 'open');
    const otherMarkets = markets.filter(m => !(m.is_daily && m.status === 'open'));

    sec.innerHTML = `
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Opinion Markets</h2>
        <button class="btn btn-z text-xs" onclick="toggleCreate()">+ New Market</button>
      </div>
      ${dailyToday.length ? `
      <div class="mb-5">
        <h3 class="font-semibold text-sm text-amber-400 mb-2">&#x1f4c5; Today's Markets</h3>
        <div class="space-y-3">${dailyToday.map(m => marketCard(m, { daily: true })).join('')}</div>
      </div>` : ''}
      <div id="create-market-form" class="${showCreate ? '' : 'hidden'} card space-y-2 mb-4">
        <h3 class="font-semibold text-sm">Create Market</h3>
        <input id="mk-title" class="inp" placeholder="Question (e.g. Will ETH hit $5k?)">
        <input id="mk-desc" class="inp" placeholder="Description (optional)">
        <input id="mk-criteria" class="inp" placeholder="Resolution criteria (optional)">
        <input id="mk-closes" class="inp" type="date" placeholder="Closes at (optional)">
        <button class="btn btn-v w-full" onclick="createMarket()">Create Market</button>
        <p id="mk-msg" class="text-sm"></p>
      </div>
      ${otherMarkets.length ? `
      ${dailyToday.length ? '<h3 class="font-semibold text-sm text-zinc-400 mb-2">Community Markets</h3>' : ''}
      <div class="space-y-3">${otherMarkets.map(m => marketCard(m)).join('')}</div>` :
      dailyToday.length ? '' : '<p class="text-zinc-600 text-sm">No markets</p>'}
    `;

    window.toggleCreate = () => { showCreate = !showCreate; load(); };
    window.openMarket = (id) => { S.marketId = id; clearInterval(_activeInterval); _activeInterval = null; renderMarkets(sec); };
    window.createMarket = async () => {
      const title = document.getElementById('mk-title')?.value;
      const desc = document.getElementById('mk-desc')?.value;
      const criteria = document.getElementById('mk-criteria')?.value;
      const closes = document.getElementById('mk-closes')?.value;
      const msg = document.getElementById('mk-msg');

        setTimeout(() => load(), 800);

    };

  await load();
  _activeInterval = setInterval(load, 10000);
}

    const canClaim = positions.some(p => !p.claimed && p.outcome === market.resolved_outcome);
    const chartPts = history.map(h => ({ x: new Date(h.created_at).getTime(), y: parseFloat(h.yes_pct) }));

      ${market.status === 'open' ? `
      <div class="card space-y-3 mb-4">

        <div class="grid grid-cols-2 gap-2">

          </div>
          <div class="flex flex-col justify-end gap-2">
            <button class="btn btn-g w-full" onclick="tradeMarket('YES')">Buy YES</button>
            <button class="btn btn-r w-full" onclick="tradeMarket('NO')">Buy NO</button>

        </div>
        <div class="text-xs text-zinc-500">Balance: ${getBal('USDC')} USDC</div>

      ${market.status === 'resolved' && canClaim ? `
      <div class="card mb-4">

        <button class="btn btn-g" onclick="claimWinnings(${market.id})">Claim Winnings</button>
        <p id="claim-msg" class="text-sm mt-2"></p>

      <div class="card mb-4 space-y-2">
        <h3 class="text-sm font-semibold">Resolve Market</h3>
        <div class="flex gap-2">
          <button class="btn btn-g" onclick="resolveMarket(${market.id},'YES')">Resolve YES</button>
          <button class="btn btn-r" onclick="resolveMarket(${market.id},'NO')">Resolve NO</button>

// ── Futures ───────────────────────────────────────────────────────────────────
async function renderFutures(sec) {
  let side = 'long', leverage = 5, qty = '';

  async function load() {
    const [{ markets }, { positions }, paperBal] = await Promise.all([
      api('GET', '/api/futures/markets'),
      api('GET', '/api/futures/positions'),
      api('GET', '/api/futures/paper-balance').then(d => d.balance).catch(() => 0),
    ]);
    await refreshBalances();

    if (!S.futuresMarket && markets.length) S.futuresMarket = markets[0];
    const mkt = S.futuresMarket || markets[0];
    if (!S.futuresMarket && mkt) S.futuresMarket = mkt;
    const futTier = (S.kyc && S.kyc.status === 'approved') ? S.kyc.level : 'basic';

    function marginPreview() {
      if (!qty || !mkt) return '—';
      const mp = parseFloat(mkt.mark_price);
      const margin = (parseFloat(qty) * mp * 1e6 / leverage);
      const liqDist = mp * (0.9 / leverage);
      const liqP = side === 'long' ? mp - liqDist : mp + liqDist;
      return { margin: (margin/1e6).toFixed(2), liq: liqP.toFixed(2) };
    }

    const preview = marginPreview();
    const openPositions = positions.filter(p => p.status === 'open');
    const closedPositions = positions.filter(p => p.status !== 'open').slice(0, 5);

    let chartHtml = '';
    if (mkt) {
      const { history } = await api('GET', `/api/futures/markets/${mkt.id}/history`).catch(() => ({ history: [] }));
      const chartPts = history.map(h => ({ x: new Date(h.created_at).getTime(), y: parseFloat(h.mark_price) }));
      chartHtml = svgLineChart(chartPts, { color: '#7c3aed', refLine: parseFloat(mkt.mark_price) });
    }

    sec.innerHTML = `
      <h2 class="text-xl font-bold mb-4">Futures Trading</h2>
      <div class="flex gap-2 mb-4">
        <button class="btn ${S.futuresMode==='paper'?'btn-v':'btn-z'}" onclick="S.futuresMode='paper';load()">📄 Paper Trading</button>
        <button class="btn ${S.futuresMode==='live'?'btn-v':'btn-z'}" onclick="S.futuresMode='live';load()">⚡ Live Trading</button>
      </div>
      ${S.futuresMode==='paper'
        ? `<div class="card mb-4 flex gap-4 items-center"><span class="text-zinc-400 text-sm">Paper Balance:</span><span class="text-violet-300 font-bold">${fmtUSD(paperBal)} USDC</span></div>`
        : `<div class="card mb-4 flex gap-4 items-center"><span class="text-amber-400 text-sm font-medium">⚠ LIVE MODE — real balance</span><span class="text-emerald-400 font-bold">${getBal('USDC')} USDC</span></div>`}
      ${S.futuresMode==='live' && futTier==='basic'
        ? `<div class="card mb-4 border-amber-700/50"><p class="text-sm text-amber-300">🔒 Live trading needs <b>Social</b> verification. <button class="underline" onclick="navigate('verify')">Verify to unlock →</button></p></div>`
        : S.futuresMode==='live' && futTier==='social'
        ? `<div class="card mb-4 border-amber-700/50"><p class="text-xs text-zinc-400">Social tier: up to 5× leverage. <button class="underline text-violet-300" onclick="navigate('verify')">Go Premium for 20× →</button></p></div>` : ''}
      ${mkt && chartHtml ? `<div class="card mb-4">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm font-medium">${esc(mkt.symbol)}</span>
          <span class="font-mono text-white">$${parseFloat(mkt.mark_price).toFixed(2)}</span>
        </div>
        ${chartHtml}
      </div>` : ''}
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div class="card space-y-3">
          <h3 class="font-semibold">Place Order</h3>
          <div>
            <label class="text-xs text-zinc-500">Market</label>
            <div class="flex gap-1 mt-1">${markets.map(m=>`<button class="btn text-xs ${S.futuresMarket?.id===m.id?'btn-v':'btn-z'}" onclick="S.futuresMarket=${JSON.stringify(m).replace(/"/g,'&quot;')};load()">${m.symbol}</button>`).join('')}</div>
          </div>
          ${mkt ? `<div class="text-xs text-zinc-400">Mark: <span class="text-white font-mono">$${parseFloat(mkt.mark_price).toFixed(2)}</span></div>` : ''}
          <div>
            <div class="flex gap-2">
              <button id="side-long" class="btn flex-1 ${side==='long'?'btn-g':'btn-z'}" onclick="side='long';updateFutures()">Long ▲</button>
              <button id="side-short" class="btn flex-1 ${side==='short'?'btn-r':'btn-z'}" onclick="side='short';updateFutures()">Short ▼</button>
            </div>
          </div>
          <div>
            <label class="text-xs text-zinc-500">Leverage: <span id="lev-label">${leverage}×</span></label>
            <input id="lev-slider" type="range" min="1" max="20" value="${leverage}" class="w-full mt-1" oninput="leverage=parseInt(this.value);document.getElementById('lev-label').textContent=leverage+'×';updateFutures()">
            <div class="flex justify-between text-xs text-zinc-600"><span>1×</span><span>20×</span></div>
          </div>
          <div>
            <label class="text-xs text-zinc-500">Quantity</label>
            <input id="fut-qty" type="number" class="inp mt-1" placeholder="0.000" min="0" oninput="qty=this.value;updateFutures()">
          </div>
          <div id="fut-preview" class="text-xs text-zinc-500 space-y-0.5">
            ${typeof preview === 'object' ? `<div>Margin: ${preview.margin} USDC</div><div>Liq. Price: $${preview.liq}</div>` : ''}
          </div>
          <button class="btn btn-v w-full" onclick="placeFutures()">Place Order</button>
          <p id="fut-msg" class="text-sm"></p>
        </div>
        <div class="card">
          <h3 class="font-semibold mb-3">Markets · Funding</h3>
          <div class="space-y-2">${markets.map(m => {
            const rate = (parseFloat(m.funding_rate||0)*100);
            const next = m.next_funding_at ? fundingCountdown(m.next_funding_at) : '—';
            return `<div class="flex justify-between items-center text-sm py-1 border-b border-zinc-800 last:border-0">
              <span class="font-medium">${m.symbol}</span>
              <span class="font-mono">$${parseFloat(m.mark_price).toFixed(2)}</span>
              <span class="text-xs ${rate>=0?'text-emerald-400':'text-red-400'}" title="funding rate">${rate>=0?'+':''}${rate.toFixed(4)}%</span>
              <span class="text-xs text-zinc-500" title="next funding">⏱ ${next}</span>
            </div>`;}).join('')}</div>
          <p class="text-xs text-zinc-600 mt-2">Longs pay shorts when funding is positive.</p>
        </div>
      </div>
      <div class="card mb-4">
        <h3 class="font-semibold mb-3">Open Positions</h3>
        ${openPositions.length ? `<div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-zinc-500 text-xs">${['Market','Mode','Side','Lev','Size','Entry','Mark','Funding','PnL',''].map(h=>`<th class="text-left py-1 pr-3">${h}</th>`).join('')}</tr></thead>
          <tbody>${openPositions.map(p => {
            const pnl = parseFloat(p.unrealized_pnl||0)/1e6;
            const fund = parseFloat(p.funding_paid||0)/1e6;
            return `<tr class="border-t border-zinc-800">
              <td class="py-1.5 pr-3 font-medium">${p.symbol}</td>
              <td class="pr-3 text-xs">${p.mode==='paper'?'📄':'⚡'}</td>
              <td class="pr-3 ${p.side==='long'?'text-emerald-400':'text-red-400'}">${p.side}</td>
              <td class="pr-3">${p.leverage}×</td>
              <td class="pr-3 font-mono">${parseFloat(p.quantity).toFixed(4)}</td>
              <td class="pr-3 font-mono">$${parseFloat(p.entry_price).toFixed(2)}</td>
              <td class="pr-3 font-mono">$${parseFloat(p.mark_price||0).toFixed(2)}</td>
              <td class="pr-3 ${fund>=0?'text-emerald-400':'text-red-400'}" title="funding paid/received">${fund>=0?'+':''}${fund.toFixed(2)}</td>
              <td class="pr-3 ${pnl>=0?'text-emerald-400':'text-red-400'}">${pnl>=0?'+':''}${pnl.toFixed(2)}</td>
              <td><button class="btn btn-r text-xs px-2 py-1" onclick="closeFutures(${p.id})">Close</button></td>
            </tr>`;}).join('')}</tbody>
        </table></div>` : '<p class="text-zinc-600 text-sm">No open positions</p>'}
      </div>
      ${closedPositions.length ? `<div class="card">
        <h3 class="font-semibold mb-3">Recent History</h3>
        <div class="space-y-1">${closedPositions.map(p => {
          const pnl = parseFloat(p.realized_pnl||0)/1e6;
          return `<div class="flex justify-between text-sm py-1 border-b border-zinc-800 last:border-0">
            <span>${p.symbol} <span class="${p.side==='long'?'text-emerald-400':'text-red-400'}">${p.side}</span> ${p.leverage}×</span>
            <span class="text-xs text-zinc-500">${p.status}</span>
            <span class="${pnl>=0?'text-emerald-400':'text-red-400'}">${pnl>=0?'+':''}${pnl.toFixed(2)} USDC</span>
          </div>`;}).join('')}</div>
      </div>` : ''}`;

    window.updateFutures = () => {};
    window.placeFutures = async () => {
      const msg = document.getElementById('fut-msg');
      const qtyEl = document.getElementById('fut-qty');
      const levEl = document.getElementById('lev-slider');
      if (!S.futuresMarket) return;
      try {
        await api('POST', '/api/futures/positions', {
          market_id: S.futuresMarket.id,
          side, leverage: parseInt(levEl?.value||5),
          quantity: parseFloat(qtyEl?.value||0),
          mode: S.futuresMode,
          idempotency_key: 'fut-' + S.user.user_id + '-' + Date.now()
        });
        if (msg) { msg.className='text-emerald-400 text-sm'; msg.textContent='✓ Order placed'; }
        await refreshBalances();
        await load();
      } catch (e) { if (msg) { msg.className='text-red-400 text-sm'; msg.textContent=e.message; } }
    };
    window.closeFutures = async (id) => {
      try {
        const d = await api('DELETE', `/api/futures/positions/${id}`);
        alert(`Position closed. PnL: ${d.pnl>=0?'+':''}${d.pnl.toFixed(2)} USDC`);
        await load();
      } catch (e) { alert(e.message); }
    };
  }

  await load();
  _activeInterval = setInterval(load, 5000);
}

// ── Verify (three-tier self-service) ────────────────────────────────────────────
const PROVIDER_LABEL = { x: 'X', instagram: 'Instagram', tiktok: 'TikTok', coinbase: 'Coinbase' };

async function renderVerify(sec) {
  const [{ kyc }, providers] = await Promise.all([
    api('GET', '/api/kyc').catch(() => ({ kyc: null })),
    api('GET', '/api/verify/providers').catch(() => ({ social_providers: [], social_enabled: false, premium_enabled: false, staging: false })),
  ]);
  S.kyc = kyc;
  const level = (kyc && kyc.status === 'approved') ? kyc.level : 'basic';
  const isSocial = level === 'social' || level === 'premium';
  const isPremium = level === 'premium';

  function tierCard(name, badge, active, unlocks, action) {
    return `<div class="card space-y-2 ${active ? 'border-violet-600' : ''}">
      <div class="flex items-center justify-between">
        <h3 class="font-semibold">${badge} ${name}</h3>
        ${active ? '<span class="tag-social">Active</span>' : '<span class="text-xs text-zinc-500">Locked</span>'}
      </div>
      <ul class="text-xs text-zinc-400 list-disc pl-4 space-y-0.5">${unlocks.map(u => `<li>${u}</li>`).join('')}</ul>
      ${action || ''}
    </div>`;
  }

  const socialAction = isSocial
    ? `<p class="text-xs text-emerald-400">✓ Verified via ${esc(kyc?.provider || 'social')}</p>`
    : providers.social_enabled && providers.social_providers.length
      ? `<div class="flex flex-wrap gap-2">${providers.social_providers.map(p =>
          `<button class="btn btn-v text-xs" onclick="connectSocial('${p}')">Connect ${PROVIDER_LABEL[p] || p}</button>`).join('')}</div>
         <p id="social-msg" class="text-sm"></p>`
      : `<p class="text-xs text-amber-400">No social providers are configured right now — try Premium instead.</p>`;

  const premiumAction = isPremium
    ? `<p class="text-xs text-emerald-400">✓ Premium verified via zkPassport</p>`
    : providers.premium_enabled
      ? `<button class="btn btn-v text-xs" onclick="startZkSession()">Verify with zkPassport</button>
         <div id="zk-qr-section" class="hidden space-y-2 mt-2">
           <img id="zk-qr-img" src="" alt="ZK QR Code" class="w-48 h-48 rounded-lg mx-auto bg-zinc-800">
           <p class="text-xs text-zinc-400 text-center">Scan with your zkPassport app</p>
           <p id="zk-session-msg" class="text-sm text-center"></p>
         </div>`
      : `<p class="text-xs text-amber-400">zkPassport is unavailable in this environment.</p>`;

  sec.innerHTML = `
    <h2 class="text-xl font-bold mb-1">🪪 Verification</h2>
    <p class="text-sm text-zinc-500 mb-4">Your tier: <span class="font-semibold text-zinc-200">${tierLabel(level)}</span>${kyc?.status === 'pending' ? ' <span class="text-amber-400">(pending)</span>' : ''}</p>
    <div class="space-y-3">
      ${tierCard('Basic', '🔵', true, ['Post, follow, swap, stake, provide liquidity', 'Join ICOs & prediction markets', 'Paper futures trading'],
        '<p class="text-xs text-emerald-400">✓ Granted automatically on wallet link</p>')}
      ${tierCard('Social', '🟢', isSocial, ['Everything in Basic', 'Live futures up to 5× leverage', 'Removes per-day Basic limits'], socialAction)}
      ${tierCard('Premium', '⭐', isPremium, ['Everything in Social', 'Up to 20× leverage', 'Higher trade-size limits', 'Premium profile badge', '20 tracked holdings (vs 10)'], premiumAction)}
    </div>`;

  window.connectSocial = async (provider) => {
    const msg = document.getElementById('social-msg');
    try {
      const start = await api('POST', '/api/verify/social/start', { provider });
      if (start.simulated) {
        // Staging / simulated path: complete immediately with the signed state.
        await api('POST', '/api/verify/social/complete', { provider, code: 'staging-code', state: start.state });
        if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = '✓ Connected'; }
        await renderVerify(sec);
      } else if (start.oauth_url) {
        // Production: hand off to the provider's OAuth screen.
        window.location.href = start.oauth_url;
      }
    } catch (e) {
      if (msg) {
        msg.className = 'text-red-400 text-sm';
        msg.textContent = e.message === 'social_account_in_use'
          ? 'That account already verifies another wallet.' : e.message;
      }
    }
  };

  window.connectZk = async () => {
    const msg = document.getElementById('zk-msg');
    try {
      await api('POST', '/api/verify/zkpassport', { proof: { simulated: true } });
      if (msg) { msg.className = 'text-emerald-400 text-sm'; msg.textContent = '✓ Premium verified'; }
      await renderVerify(sec);
    } catch (e) { if (msg) { msg.className = 'text-red-400 text-sm'; msg.textContent = e.message; } }
  };

  window.startZkSession = async () => {
    const qrSection = document.getElementById('zk-qr-section');
    const qrImg = document.getElementById('zk-qr-img');
    const msg = document.getElementById('zk-session-msg');
    if (!qrSection || !qrImg || !msg) return;
    try {
      msg.className = 'text-zinc-400 text-sm text-center';
      msg.textContent = 'Starting session…';
      qrSection.classList.remove('hidden');
      const { sessionId, qrUrl } = await api('POST', '/api/zk/start', {});
      if (qrUrl) qrImg.src = qrUrl;
      msg.textContent = 'Waiting for scan…';
      let attempts = 0;
      const poll = async () => {
        attempts++;
        try {
          const { status } = await api('GET', `/api/zk/status/${sessionId}`);
          if (status === 'verified') {
            S.kyc = { level: 'premium', status: 'approved', provider: 'zkpassport' };
            msg.className = 'text-emerald-400 text-sm text-center';
            msg.textContent = '✓ Identity verified!';
            setTimeout(() => renderVerify(sec), 1200);
          } else if (status === 'failed' || attempts >= 60) {
            msg.className = 'text-red-400 text-sm text-center';
            msg.textContent = status === 'failed' ? 'Verification failed.' : 'Session timed out.';
          } else {
            setTimeout(poll, 3000);
          }
        } catch (e) {
          msg.className = 'text-red-400 text-sm text-center';
          msg.textContent = e.message;
        }
      };
      setTimeout(poll, 3000);
    } catch (e) {
      if (msg) { msg.className = 'text-red-400 text-sm text-center'; msg.textContent = e.message; }
    }
  };

  // OAuth return handler: if a provider redirected back with ?code&state, finish.
  const qp = new URLSearchParams(location.search);
  if (qp.get('code') && qp.get('state') && qp.get('provider')) {
    try {
      await api('POST', '/api/verify/social/complete', { provider: qp.get('provider'), code: qp.get('code'), state: qp.get('state') });
      await renderVerify(sec);
    } catch {}
  }
}

// ── Admin (in-SPA panel for #section-admin) ──────────────────────────────────
